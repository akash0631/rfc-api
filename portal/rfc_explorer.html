<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V2 Retail · RFC API Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--dim:#484f58;
  --green:#3fb950;--green-bg:rgba(63,185,80,.12);
  --blue:#58a6ff;--blue-bg:rgba(88,166,255,.1);
  --orange:#f0883e;--orange-bg:rgba(240,136,62,.1);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,.1);
  --red:#f85149;
  --font:'DM Mono',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap');

body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

/* TOP BAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.3px;}
.logo-text span{color:var(--blue);}
.logo-badge{font-family:var(--font);font-size:10px;background:var(--blue-bg);border:1px solid rgba(88,166,255,.3);color:var(--blue);padding:2px 8px;border-radius:4px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.stat-pill{font-family:var(--font);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.stat-pill strong{color:var(--text);}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0;}

/* SIDEBAR */
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:transparent;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.search-wrap{padding:0 12px 12px;}
.search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:7px 10px 7px 32px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;position:relative;}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.search-wrap{position:relative;}
.search:focus{border-color:var(--blue);background:var(--bg);}
.search::placeholder{color:var(--dim);}

.group-header{padding:6px 16px 4px;font-family:var(--font);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.group-header:hover{color:var(--muted);}
.group-header .count{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0 6px;font-size:9px;color:var(--dim);}
.group-endpoints{overflow:hidden;}
.ep-item{padding:6px 16px 6px 24px;font-size:12px;font-family:var(--font);color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;}
.ep-item:hover{color:var(--text);background:var(--surface2);}
.ep-item.active{color:var(--blue);border-left-color:var(--blue);background:var(--blue-bg);}
.ep-item .method-dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:32px;}
.main::-webkit-scrollbar{width:6px;}
.main::-webkit-scrollbar-track{background:transparent;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* WELCOME STATE */
.welcome{max-width:640px;margin:80px auto;text-align:center;}
.welcome-icon{font-size:48px;margin-bottom:20px;opacity:.6;}
.welcome h2{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-bottom:8px;}
.welcome p{color:var(--muted);font-size:14px;line-height:1.7;}
.welcome-stats{display:flex;gap:20px;justify-content:center;margin-top:32px;flex-wrap:wrap;}
.wstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 24px;text-align:center;}
.wstat .num{font-family:var(--font);font-size:28px;font-weight:500;color:var(--blue);display:block;}
.wstat .lbl{font-size:11px;color:var(--muted);margin-top:4px;}

/* ENDPOINT DETAIL */
.ep-header{margin-bottom:24px;}
.ep-title{display:flex;align-items:center;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
.method-badge{font-family:var(--font);font-size:11px;font-weight:500;background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.3);padding:3px 10px;border-radius:4px;}
.ep-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;word-break:break-all;}
.ep-rfc{font-family:var(--font);font-size:12px;color:var(--muted);margin-bottom:4px;}
.ep-rfc span{color:var(--purple);}
.ep-route{font-family:var(--font);font-size:13px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--orange);display:inline-flex;align-items:center;gap:8px;margin-top:8px;}
.ep-route .base{color:var(--muted);}

.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden;}
.section-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
.section-title{font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
.section-count{background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:10px;padding:1px 7px;border-radius:10px;}
.section-body{padding:0;}

/* PARAM TABLE */
.param-table{width:100%;border-collapse:collapse;}
.param-table th{padding:8px 16px;font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--dim);text-align:left;border-bottom:1px solid var(--border);}
.param-table td{padding:9px 16px;font-family:var(--font);font-size:12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle;}
.param-table tr:last-child td{border-bottom:none;}
.param-table tr:hover td{background:var(--surface2);}
.param-name{color:var(--blue);}
.param-type{color:var(--muted);}
.param-in{display:inline-flex;align-items:center;padding:1px 7px;border-radius:3px;font-size:10px;background:var(--green-bg);color:var(--green);border:1px solid rgba(63,185,80,.2);}

/* TABLE LIST */
.table-list{padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.table-chip{font-family:var(--font);font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--orange);padding:4px 10px;border-radius:4px;}

/* COLUMN MANAGER */
.col-mgr{padding:16px;}
.col-mgr-form{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;}
.col-mgr-form label{font-family:var(--font);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:5px;}
.col-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none;}
.col-input:focus{border-color:var(--blue);}
.col-input::placeholder{color:var(--dim);}
.col-select{appearance:none;cursor:pointer;}
.add-btn{background:var(--green);color:#000;border:none;border-radius:6px;padding:9px 16px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.add-btn:hover{background:#2ea043;}
.remove-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:9px 16px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.remove-btn:hover{background:#da3633;}
.col-ops-list{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
.col-op-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-family:var(--font);font-size:12px;}
.col-op-add{color:var(--green);}
.col-op-remove{color:var(--red);}
.col-op-del{margin-left:auto;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:0 4px;}
.col-op-del:hover{color:var(--red);}
.apply-btn{width:100%;margin-top:12px;background:var(--blue);color:#fff;border:none;border-radius:6px;padding:10px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.apply-btn:hover{background:#388bfd;}
.apply-btn:disabled{opacity:.4;cursor:not-allowed;}
.col-result{margin-top:10px;padding:10px 12px;border-radius:6px;font-family:var(--font);font-size:12px;display:none;}
.col-result.ok{background:var(--green-bg);border:1px solid rgba(63,185,80,.3);color:var(--green);}
.col-result.err{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red);}

/* SOURCE LINK */
.source-link{margin-top:6px;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-size:11px;color:var(--dim);text-decoration:none;}
.source-link:hover{color:var(--blue);}

/* EMPTY */
.empty{padding:40px;text-align:center;color:var(--dim);font-family:var(--font);font-size:12px;}

/* NO PARAMS */
.no-params{padding:16px;font-family:var(--font);font-size:12px;color:var(--dim);}

@media(max-width:768px){
  .sidebar{width:200px;}
  .col-mgr-form{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .col-mgr-form .add-btn,.col-mgr-form .remove-btn{grid-column:span 2;}
}
</style>
</head>

<div class="topbar">
  <div class="logo">

    <div id="endpointDetail" style="display:none"></div>

</div>

const GITHUB_BASE = "https://github.com/akash0631/rfc-api/blob/master/";
const IIS_BASE    = "https://V2DC-ADDVERB/";

// ─── Init ─────────────────────────────────────────────────────────────────────
function init() {
  // Stats
  const totalParams = ENDPOINTS.reduce((s,e)=>s+e.params.length,0);
  const totalTables = new Set(ENDPOINTS.flatMap(e=>e.tables)).size;
  const groups = [...new Set(ENDPOINTS.map(e=>e.group))];
  
  document.getElementById("total-count").textContent = ENDPOINTS.length;
  document.getElementById("group-count").textContent  = groups.length;
  document.getElementById("ws-total").textContent   = ENDPOINTS.length;
  document.getElementById("ws-groups").textContent  = groups.length;
  document.getElementById("ws-params").textContent  = totalParams;
  document.getElementById("ws-tables").textContent  = totalTables;

  renderSidebar(ENDPOINTS);
  
  // Auto-open from hash
  if (location.hash) {
    const id = location.hash.slice(1);
    const ep = ENDPOINTS.find(e=>e.id===id);
    if (ep) showEndpoint(ep);
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(endpoints) {
  const grouped = {};
  for (const ep of endpoints) {
    if (!grouped[ep.group]) grouped[ep.group]=[];
    grouped[ep.group].push(ep);
  }
  
  const container = document.getElementById("sidebarGroups");
  container.innerHTML = "";
  
  for (const [group, eps] of Object.entries(grouped)) {
    const gid = "g_"+group.replace(/\W/g,"_");
    const div = document.createElement("div");
    div.innerHTML = `
      <div class="group-header" onclick="toggleGroup('${gid}')">
        <span>${group}</span>
        <span class="count">${eps.length}</span>
      </div>
      <div class="group-endpoints" id="${gid}">
        ${eps.map(ep=>`
          <div class="ep-item" id="item_${ep.id}" onclick="showEndpoint(ENDPOINTS.find(e=>e.id==='${ep.id}'))">
            <span class="method-dot"></span>
            ${ep.name}
          </div>
        `).join("")}
      </div>
    `;
    container.appendChild(div);
  }
}

function toggleGroup(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display==="none" ? "" : "none";
}

// ─── Search ───────────────────────────────────────────────────────────────────
function filterEndpoints() {
  const q = document.getElementById("searchInput").value.toLowerCase().trim();
  if (!q) { renderSidebar(ENDPOINTS); return; }
  const filtered = ENDPOINTS.filter(e=>
    e.name.toLowerCase().includes(q) ||
    e.rfc.toLowerCase().includes(q) ||
    e.group.toLowerCase().includes(q) ||
    e.params.some(p=>p.name.toLowerCase().includes(q)) ||
    e.tables.some(t=>t.toLowerCase().includes(q))
  );
  renderSidebar(filtered);
}

// ─── Endpoint Detail ──────────────────────────────────────────────────────────
let currentEp = null;
let colOps = [];

function showEndpoint(ep) {
  if (!ep) return;
  currentEp = ep;
  colOps = [];
  location.hash = ep.id;
  
  // Highlight sidebar
  document.querySelectorAll(".ep-item").forEach(el=>el.classList.remove("active"));
  const item = document.getElementById("item_"+ep.id);
  if (item) { item.classList.add("active"); item.scrollIntoView({block:"nearest"}); }
  
  document.getElementById("welcomeState").style.display = "none";
  document.getElementById("endpointDetail").style.display = "block";
  
  const paramsHtml = ep.params.length ? `
    <table class="param-table">
      <thead><tr><th>Parameter</th><th>Type</th><th>Source</th></tr></thead>
      <tbody>
        ${ep.params.map(p=>`
          <tr>
            <td class="param-name">${p.name}</td>
            <td class="param-type">string</td>
            <td><span class="param-in">body</span></td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  ` : `<div class="no-params">No explicit request parameters extracted — check source file.</div>`;

  const tablesHtml = ep.tables.length ? ep.tables.map(t=>`
    <span class="table-chip">${t}</span>
  `).join("") : `<span style="color:var(--dim);font-family:var(--font);font-size:12px;">No tables detected</span>`;

  document.getElementById("endpointDetail").innerHTML = `
    <div class="ep-header">
      <div class="ep-title">
        <span class="method-badge">POST</span>
        <span class="ep-name">${ep.name}</span>
      </div>
      <div class="ep-rfc">SAP RFC Function: <span>${ep.rfc}</span></div>
      <div>
        <div class="ep-route">
          <span class="base">IIS → SAP /</span>${ep.route}
        </div>
      </div>
      <a class="source-link" href="${GITHUB_BASE}${ep.path}" target="_blank">
        ↗ View source on GitHub
      </a>
    </div>

    <!-- Request Parameters -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">
          Request Parameters
          <span class="section-count">${ep.params.length}</span>
        </span>
      </div>
      <div class="section-body">${paramsHtml}</div>
    </div>

    <!-- Response Tables -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">
          SAP Response Tables
          <span class="section-count">${ep.tables.length}</span>
        </span>
      </div>
      <div class="table-list">${tablesHtml}</div>
    </div>

    <!-- Column Manager -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Manage Data Lake Columns</span>
      </div>
      <div class="col-mgr">
        <div class="col-mgr-form">
          <div>
            <label>Column Name</label>
            <input class="col-input" id="colName" type="text" placeholder="e.g. STORE_CODE">
          </div>
          <div>
            <label>SQL Type</label>
            <input class="col-input" id="colType" type="text" placeholder="e.g. NVARCHAR(50)" value="NVARCHAR(255)">
          </div>
          <div style="display:flex;gap:8px;">
            <div>
              <label>&nbsp;</label>
              <button class="add-btn" onclick="addColOp('ADD')">+ Add</button>
            </div>
            <div>
              <label>&nbsp;</label>
              <button class="remove-btn" onclick="addColOp('REMOVE')">− Remove</button>
            </div>
          </div>
        </div>
        <div id="colOpsList" class="col-ops-list"></div>
        <button class="apply-btn" id="applyBtn" onclick="applyColumns()" disabled>
          ⚡ Apply Changes to Data Lake
        </button>
        <div class="col-result" id="colResult"></div>
      </div>
    </div>
  `;
}

// ─── Column Manager ───────────────────────────────────────────────────────────
function addColOp(action) {
  const name = document.getElementById("colName").value.trim().toUpperCase();
  const type = document.getElementById("colType").value.trim() || "NVARCHAR(255)";
  if (!name) { document.getElementById("colName").focus(); return; }
  
  colOps.push({action, column: name, sqlType: type});
  document.getElementById("colName").value = "";
  renderColOps();
}

function removeColOp(i) {
  colOps.splice(i, 1);
  renderColOps();
}

function renderColOps() {
  const el = document.getElementById("colOpsList");
  if (!el) return;
  el.innerHTML = colOps.map((op,i)=>`
    <div class="col-op-item">
      <span class="${op.action==='ADD'?'col-op-add':'col-op-remove'}">${op.action==='ADD'?'+':'-'}</span>
      <span style="color:var(--blue)">${op.column}</span>
      <span style="color:var(--muted)">${op.action==='ADD'?op.sqlType:''}</span>
      <button class="col-op-del" onclick="removeColOp(${i})">✕</button>
    </div>
  `).join("");
  
  const btn = document.getElementById("applyBtn");
  if (btn) btn.disabled = colOps.length === 0;
}

async function applyColumns() {
  if (!currentEp || colOps.length === 0) return;
  
  const btn = document.getElementById("applyBtn");
  const result = document.getElementById("colResult");
  btn.disabled = true;
  btn.textContent = "Applying...";
  
  // Derive table name from first table in ep, or use RFC name
  const tableName = currentEp.tables[0] || currentEp.rfc.replace(/_RFC$/,"");
  
  try {
    const r = await fetch("/columns", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({tableName, operations: colOps})
    });
    const d = await r.json();
    
    if (r.ok) {
      result.className = "col-result ok";
      result.textContent = `✓ Applied ${colOps.length} change(s) to ${tableName}. SQL migration pushed to GitHub.`;
      result.style.display = "block";
      colOps = [];
      renderColOps();
    } else {
      throw new Error(d.error || "Unknown error");
    }
  } catch(e) {
    result.className = "col-result err";
    result.textContent = "✗ Error: " + e.message;
    result.style.display = "block";
  }
  
  btn.textContent = "⚡ Apply Changes to Data Lake";
  btn.disabled = colOps.length === 0;
}

init();
</script>
</body>
</html>
