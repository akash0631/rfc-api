name: Verify and fix .46 IIS final
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Verify appsettings + DLLs + recycle IIS
        shell: powershell
        run: |
          Write-Host "=== appsettings.json ==="
          if (Test-Path "C:\RfcCollector\appsettings.json") {
            Get-Content "C:\RfcCollector\appsettings.json"
          } else {
            Write-Host "NOT FOUND — writing now"
            @{ IIS_HOST="127.0.0.1"; IIS_PORT="80"; Logging=@{ LogLevel=@{ Default="Information" } }; AllowedHosts="*" } | ConvertTo-Json -Depth 5 | Set-Content "C:\RfcCollector\appsettings.json"
            Write-Host "Written: $(Get-Content C:\RfcCollector\appsettings.json)"
          }
          Write-Host ""
          Write-Host "=== Store Tracker bin on .46 — Vendor DLLs ==="
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "Vendor*" -ErrorAction SilentlyContinue | Select Name, Length
          Write-Host ""
          Write-Host "=== Store Tracker bin on .46 — SAP DLLs ==="
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*sap*" -ErrorAction SilentlyContinue | Select Name, Length
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*SAP*" -ErrorAction SilentlyContinue | Select Name, Length
          Write-Host ""
          Write-Host "=== Recycle IIS app pools ==="
          Import-Module WebAdministration
          Get-ChildItem IIS:\AppPools | ForEach-Object {
            Restart-WebAppPool $_.Name -ErrorAction SilentlyContinue
            Write-Host "Recycled: $($_.Name)"
          }
          Start-Sleep 5
          Get-Website | Select Name, State | Format-Table
          Write-Host ""
          Write-Host "=== Restart RFC Collector ==="
          Restart-Service RfcCollector -Force
          Start-Sleep 8
          Write-Host "RfcCollector: $((Get-Service RfcCollector).Status)"
          Write-Host ""
          Write-Host "=== Test IIS :80 directly ==="
          try {
            $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "IIS Health: HTTP $($r.StatusCode) — $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))"
          } catch {
            Write-Host "IIS Health error: $_"
          }
          Write-Host ""
          Write-Host "=== Test RFC Collector /fetch ==="
          Start-Sleep 3
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 45
            Write-Host "FETCH HTTP $($r.StatusCode):"
            Write-Host ($r.Content.Substring(0,[Math]::Min(1200,$r.Content.Length)))
          } catch {
            Write-Host "FETCH error: $_"
          }
