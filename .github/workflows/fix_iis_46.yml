
name: Fix .46 IIS — Copy from .36 and wire RFC Collector
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Discover .36 IIS paths
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%
          echo === wwwroot on .36 ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot" /B 2>nul
          echo === All IIS sites (appcmd) ===
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" list site 2>nul || echo APPCMD_FAILED
          echo === Searching for any .cs or .dll under wwwroot on .36 ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\" /S /B 2>nul | findstr "\.dll$" | find "bin\"
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Discover RFC Collector config on .46
        shell: powershell
        run: |
          Write-Host "=== RfcCollector dir ==="
          Get-ChildItem "C:\RfcCollector" | Select Name, Length
          Write-Host "=== Environment vars with IIS or RFC ==="
          [System.Environment]::GetEnvironmentVariables([System.EnvironmentVariableTarget]::Machine) `
            | Where-Object { $_.Key -match 'IIS|RFC|HOST|PORT|SAP' } `
            | Format-Table -AutoSize
          Write-Host "=== RfcCollector.exe strings (config) ==="
          try { Select-String -Path "C:\RfcCollector\*.json","C:\RfcCollector\*.config","C:\RfcCollector\*.xml" -Pattern "IIS|HOST|PORT|SAP" -ErrorAction SilentlyContinue } catch {}
          Write-Host "=== All files in RfcCollector dir ==="
          Get-ChildItem "C:\RfcCollector" -Recurse | Select FullName, Length
