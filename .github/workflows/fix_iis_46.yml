name: Fix .46 IIS — Copy from .36 and wire RFC Collector
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Mount .36 and xcopy Store Tracker IIS app
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE_EXIT: %ERRORLEVEL%
          echo === .36 Store Tracker bin DLLs ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin" /B 2>nul
          echo === Copying Store Tracker to .46 ===
          xcopy /E /Y /I "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker" "C:\inetpub\wwwroot\Store Tracker"
          echo XCOPY_EXIT: %ERRORLEVEL%
          echo === .46 Store Tracker bin DLLs ===
          dir "C:\inetpub\wwwroot\Store Tracker\bin" /B 2>nul
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Update RFC Collector appsettings to use localhost IIS
        shell: powershell
        run: |
          $cfg = "C:\RfcCollector\appsettings.json"
          Write-Host "=== BEFORE ==="
          Get-Content $cfg
          $json = Get-Content $cfg -Raw | ConvertFrom-Json
          $json.IIS_HOST = "127.0.0.1"
          $json.IIS_PORT = "80"
          $json | ConvertTo-Json -Depth 10 | Set-Content $cfg -Encoding UTF8
          Write-Host "=== AFTER ==="
          Get-Content $cfg

      - name: Restart RFC Collector service
        shell: powershell
        run: |
          Restart-Service RfcCollector -Force
          Start-Sleep 10
          Write-Host "RfcCollector state:" (Get-Service RfcCollector).Status

      - name: Restart Store Tracker IIS app pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Get-Website | Select Name, State, PhysicalPath | Format-Table
          Restart-WebAppPool "DefaultAppPool" -ErrorAction SilentlyContinue
          Start-Sleep 6
          Get-Website "Store Tracker" -ErrorAction SilentlyContinue | Select Name, State

      - name: Test RFC Collector end-to-end
        shell: powershell
        run: |
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "RFC Collector /fetch HTTP $($r.StatusCode):"
            Write-Host ($r.Content.Substring(0,[Math]::Min(600,$r.Content.Length)))
          } catch {
            Write-Host "FETCH ERROR: $_"
          }
