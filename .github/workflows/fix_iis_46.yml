name: Verify and fix .46 IIS final
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Search .24 for compiled RFC app DLLs
        shell: cmd
        run: |
          net use \\192.168.151.24\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE_24: %ERRORLEVEL%
          echo === Searching .24 for Vendor_SRM DLL ===
          dir \\192.168.151.24\C$\Vendor_SRM*.dll /S /B 2>nul
          dir "\\192.168.151.24\C$\actions-runner\_work" /B 2>nul
          dir "\\192.168.151.24\C$\actions-runner\_work\rfc-api\rfc-api\bin\Release" /B 2>nul
          echo === Checking D drive on .24 ===
          dir \\192.168.151.24\D$ /B 2>nul
          net use \\192.168.151.24\C$ /delete /y 2>nul

      - name: Search .36 for compiled RFC app
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE_36: %ERRORLEVEL%
          echo === Searching .36 for Vendor_SRM DLL ===
          dir \\192.168.151.36\C$\Vendor_SRM*.dll /S /B 2>nul
          echo === actions-runner on .36 ===
          dir "\\192.168.151.36\C$\actions-runner\_work\rfc-api\rfc-api\bin\Release" /B 2>nul
          echo === RfcApp on .36 ===
          dir \\192.168.151.36\C$\RfcApp /B 2>nul
          echo === inetpub wwwroot sites on .36 ===
          dir \\192.168.151.36\C$\inetpub\wwwroot /B 2>nul
          echo === D drive on .36 ===
          dir \\192.168.151.36\D$ /B 2>nul
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Build RFC app on .46 using MSBuild after fixing targets
        shell: powershell
        run: |
          # Check if VS Web Application targets are installed
          $targets = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
          Write-Host "VS17 targets exist: $(Test-Path $targets)"
          # Check VS installs
          Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -ErrorAction SilentlyContinue | Select Name | Format-Table
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -ErrorAction SilentlyContinue | Select Name | Format-Table
          # Find any msbuild
          Get-ChildItem "C:\Program Files (x86)\MSBuild" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select FullName | Format-Table
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | Select FullName | Format-Table
