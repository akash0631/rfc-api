name: Verify and fix .46 IIS final
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Check Store Tracker DLLs on .46
        shell: powershell
        run: |
          $bin = "C:\inetpub\wwwroot\Store Tracker\bin"
          Write-Host "=== Vendor + SAP DLLs in Store Tracker\bin ==="
          Get-ChildItem $bin -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "Vendor*" -or $_.Name -like "*sap*" -or $_.Name -like "*SAP*" } | Select Name, Length | Format-Table
          Write-Host "Total DLL count: $((Get-ChildItem $bin -Filter '*.dll' -ErrorAction SilentlyContinue).Count)"

      - name: Recycle all IIS app pools
        shell: powershell
        run: |
          Import-Module WebAdministration
          Get-ChildItem IIS:\AppPools | ForEach-Object { Restart-WebAppPool $_.Name -ErrorAction SilentlyContinue; Write-Host "Recycled $($_.Name)" }
          Start-Sleep 6
          Get-Website | Select Name, State, PhysicalPath | Format-Table

      - name: Restart RFC Collector
        shell: powershell
        run: |
          Restart-Service RfcCollector -Force
          Start-Sleep 10
          Write-Host "RfcCollector: $((Get-Service RfcCollector).Status)"

      - name: Test IIS :80 health endpoint
        shell: powershell
        run: |
          $resp = $null
          try { $resp = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10 } catch { Write-Host "Health: $_" }
          if ($resp) { Write-Host "IIS Health HTTP $($resp.StatusCode): $($resp.Content)" }

      - name: End-to-end smoke test via RFC Collector
        shell: powershell
        run: |
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          $resp = $null
          try { $resp = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 45 } catch { Write-Host "Error: $_" }
          if ($resp) { Write-Host "FETCH HTTP $($resp.StatusCode):"; Write-Host ($resp.Content.Substring(0,[Math]::Min(1500,$resp.Content.Length))) }
