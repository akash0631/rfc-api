name: Fix .46 IIS — Copy from .36 and wire RFC Collector
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Read RFC Collector config
        shell: powershell
        run: |
          $cfg = "C:\RfcCollector\appsettings.json"
          Write-Host "=== appsettings.json ==="
          if (Test-Path $cfg) { Get-Content $cfg } else { Write-Host "NOT FOUND at $cfg" }

      - name: Mount .36 and xcopy full Store Tracker to .46
        shell: powershell
        run: |
          $pass = ConvertTo-SecureString "vrl@55555" -AsPlainText -Force
          $cred = New-Object System.Management.Automation.PSCredential("Administrator", $pass)
          
          # Mount .36
          try {
            New-PSDrive -Name X -PSProvider FileSystem -Root "\\192.168.151.36\C$" -Credential $cred -ErrorAction Stop
            Write-Host "Mounted .36 as X:"
          } catch {
            Write-Host "PSDrive failed: $_ - trying net use"
            net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          }
          
          $src = "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker"
          $dst = "C:\inetpub\wwwroot\Store Tracker"
          
          Write-Host "=== Source DLLs on .36 ==="
          Get-ChildItem "$src\bin" -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object Name, Length | Sort-Object Name
          
          Write-Host "=== Copying ==="
          if (-not (Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }
          Copy-Item -Path "$src\*" -Destination $dst -Recurse -Force -ErrorAction Continue
          Write-Host "Copy exit: $LASTEXITCODE"
          
          Write-Host "=== .46 Store Tracker bin DLLs ==="
          Get-ChildItem "$dst\bin" -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object Name, Length | Sort-Object Name
          
          Write-Host "=== SAP NCo on .46 ==="
          Get-ChildItem "$dst\bin" -Filter "*sap*" -ErrorAction SilentlyContinue | Select-Object Name
          Get-ChildItem "$dst\bin" -Filter "*SAP*" -ErrorAction SilentlyContinue | Select-Object Name
          
          # Cleanup
          Remove-PSDrive X -ErrorAction SilentlyContinue
          net use \\192.168.151.36\C$ /delete /y 2>$null

      - name: Update RFC Collector appsettings to localhost
        shell: powershell
        run: |
          $cfg = "C:\RfcCollector\appsettings.json"
          $json = Get-Content $cfg | ConvertFrom-Json
          Write-Host "BEFORE: IIS_HOST=$($json.IIS_HOST)  IIS_PORT=$($json.IIS_PORT)"
          $json.IIS_HOST = "127.0.0.1"
          $json.IIS_PORT = "80"
          $json | ConvertTo-Json -Depth 10 | Set-Content $cfg
          $check = Get-Content $cfg | ConvertFrom-Json
          Write-Host "AFTER:  IIS_HOST=$($check.IIS_HOST)  IIS_PORT=$($check.IIS_PORT)"

      - name: Restart RFC Collector service
        shell: powershell
        run: |
          Restart-Service RfcCollector -Force -ErrorAction Stop
          Start-Sleep 8
          Write-Host "RfcCollector state:" (Get-Service RfcCollector).Status

      - name: Ensure Store Tracker IIS site is started
        shell: powershell
        run: |
          Import-Module WebAdministration -ErrorAction SilentlyContinue
          $site = Get-Website "Store Tracker" -ErrorAction SilentlyContinue
          if ($site) {
            Write-Host "Site state before:" $site.State
            Start-Website "Store Tracker" -ErrorAction SilentlyContinue
            Restart-WebAppPool ($site.applicationPool) -ErrorAction SilentlyContinue
            Start-Sleep 5
            Write-Host "Site state after:" (Get-Website "Store Tracker").State
          } else {
            Write-Host "Store Tracker site not found — listing all sites:"
            Get-Website | Select Name, State, PhysicalPath, @{n="Port";e={$_.bindings.collection[0].bindingInformation}}
          }

      - name: Test RFC end-to-end on .46
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Start-Sleep 5
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          
          # Test RFC Collector directly
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "RFC Collector HTTP $($r.StatusCode):"
            Write-Host ($r.Content.Substring(0,[Math]::Min(600,$r.Content.Length)))
          } catch {
            Write-Host "RFC Collector ERROR: $_"
          }
          
          # Test IIS directly
          try {
            $b2 = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"}'
            $r2 = Invoke-WebRequest -Uri "http://localhost:80/api/ZADVANCE_PAYMENT_RFC" -Method POST -Body $b2 -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "IIS HTTP $($r2.StatusCode):"
            Write-Host ($r2.Content.Substring(0,[Math]::Min(400,$r2.Content.Length)))
          } catch {
            Write-Host "IIS ERROR: $_"
          }

          # Test putway BIN val
          $body3 = '{"rfc":"ZVND_PUTWAY_BIN_VAL_RFC","params":{"IM_USER":"TEST01","IM_PLANT":"DC01","IM_BIN":"BIN-001"},"targetTable":"ET_ZVND_PUTWAY_BIN_VAL","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r3 = Invoke-WebRequest -Uri "http://localhost:9090/fetch" -Method POST -Body $body3 -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "PUTWAY BIN VAL HTTP $($r3.StatusCode):"
            Write-Host ($r3.Content.Substring(0,[Math]::Min(400,$r3.Content.Length)))
          } catch {
            Write-Host "PUTWAY BIN VAL ERROR: $_"
          }
