name: Verify and fix .46 IIS final
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find app root on .36 and copy to .46
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%
          echo === wwwroot on .36 ===
          dir \\192.168.151.36\C$\inetpub\wwwroot /B 2>nul
          echo === inetpub root ===
          dir \\192.168.151.36\C$\inetpub /B 2>nul
          echo === Testing exact path ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker" /B 2>nul
          echo EXIT: %ERRORLEVEL%
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Check IIS site physical paths on .36 via appcmd
        shell: powershell
        run: |
          # Use appcmd over PSRemoting to .36
          $sess = New-PSSession -ComputerName 192.168.151.36 -Credential (New-Object PSCredential("Administrator", (ConvertTo-SecureString "vrl@55555" -AsPlainText -Force))) -ErrorAction SilentlyContinue
          if ($sess) {
            Write-Host "PSRemoting connected"
            Invoke-Command -Session $sess -ScriptBlock {
              & "C:\Windows\System32\inetsrv\appcmd.exe" list sites
              & "C:\Windows\System32\inetsrv\appcmd.exe" list vdir
            }
            Remove-PSSession $sess
          } else {
            Write-Host "PSRemoting not available — trying WMI"
            # Fall back: list shares available on .36
            net view \\192.168.151.36 2>$null
          }

      - name: Mount .36 and list all wwwroot subfolders
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo wwwroot contents:
          dir \\192.168.151.36\C$\inetpub\wwwroot 2>nul
          echo.
          echo Checking alternate paths:
          dir \\192.168.151.36\C$\StoreTracker 2>nul
          dir "\\192.168.151.36\C$\Store Tracker" 2>nul
          dir \\192.168.151.36\C$\RfcApp 2>nul
          dir \\192.168.151.36\C$\iis 2>nul
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Check .46 local IIS site paths
        shell: powershell
        run: |
          Import-Module WebAdministration
          Write-Host "=== .46 IIS sites with physical paths ==="
          Get-Website | Select Name, State, @{n='Path';e={$_.PhysicalPath}} | Format-Table -AutoSize
          Write-Host "=== .46 Store Tracker bin ==="
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker" -ErrorAction SilentlyContinue | Select Name | Format-Table
          Write-Host "=== .46 RfcApp ==="
          Get-ChildItem "C:\RfcApp" -ErrorAction SilentlyContinue | Select Name | Format-Table
          Write-Host "=== Web.config in Store Tracker? ==="
          Test-Path "C:\inetpub\wwwroot\Store Tracker\Web.config"
          Write-Host "=== Web.config in RfcApp? ==="
          Test-Path "C:\RfcApp\Web.config"
