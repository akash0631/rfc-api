name: Fix .46 IIS — Copy from .36 and wire RFC Collector
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Read RFC Collector config
        shell: powershell
        run: |
          $svcPath = (Get-WmiObject Win32_Service -Filter "Name='RfcCollector'").PathName
          Write-Host "Service path: $svcPath"
          $dir = Split-Path $svcPath -Parent
          Write-Host "Service dir: $dir"
          if (Test-Path "$dir\appsettings.json") {
            Write-Host "=== appsettings.json ==="
            Get-Content "$dir\appsettings.json"
          }
          # Also check common locations
          @("C:\RfcCollector","C:\rfc-collector","C:\actions-runner\_work\rfc-api\rfc-api\rfc-collector") | ForEach-Object {
            if (Test-Path "$_\appsettings.json") { Write-Host "Found at: $_"; Get-Content "$_\appsettings.json" }
          }

      - name: Mount .36 and xcopy IIS app
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET USE: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 (
            net use \\192.168.151.36\C$ Vrl@55555 /user:Administrator /persistent:no
            echo NET USE2: %ERRORLEVEL%
          )
          echo === Store Tracker on .36 ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin" /B 2>nul | findstr ".dll" | head
          echo === Copying to Store Tracker on .46 ===
          xcopy /E /Y /I "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker" "C:\inetpub\wwwroot\Store Tracker"
          echo XCOPY: %ERRORLEVEL%
          echo === .46 Store Tracker bin ===
          dir "C:\inetpub\wwwroot\Store Tracker\bin" /B 2>nul | findstr ".dll"
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Update RFC Collector to use localhost IIS
        shell: powershell
        run: |
          $svcPath = (Get-WmiObject Win32_Service -Filter "Name='RfcCollector'").PathName
          $dir = Split-Path $svcPath -Parent
          $cfg = "$dir\appsettings.json"
          if (Test-Path $cfg) {
            $json = Get-Content $cfg | ConvertFrom-Json
            Write-Host "BEFORE IIS_HOST:" ($json.IIS_HOST)
            Write-Host "BEFORE IIS_PORT:" ($json.IIS_PORT)
            $json.IIS_HOST = "127.0.0.1"
            $json.IIS_PORT = "80"
            $json | ConvertTo-Json -Depth 10 | Set-Content $cfg
            Write-Host "AFTER:" (Get-Content $cfg | ConvertFrom-Json | Select IIS_HOST, IIS_PORT | Format-List | Out-String)
          } else {
            Write-Host "appsettings.json not found at $cfg"
          }

      - name: Restart RFC Collector and test
        shell: powershell
        run: |
          Restart-Service RfcCollector -Force
          Start-Sleep 8
          $r = Get-Service RfcCollector
          Write-Host "RfcCollector state:" $r.Status
          # Restart Store Tracker IIS site
          Import-Module WebAdministration
          Restart-WebAppPool "DefaultAppPool" -ErrorAction SilentlyContinue
          Start-Sleep 5
          # Test via RFC Collector
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $resp = Invoke-WebRequest -Uri "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "RFC Collector /fetch HTTP $($resp.StatusCode):"
            Write-Host ($resp.Content.Substring(0,[Math]::Min(500,$resp.Content.Length)))
          } catch {
            Write-Host "ERROR: $_"
          }
