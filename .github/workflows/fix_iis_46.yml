name: Fix .46 IIS — Copy from .36 and wire RFC Collector
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find RFC Collector config method
        shell: powershell
        run: |
          Write-Host "=== Service dir contents ==="
          Get-ChildItem "C:\RfcCollector" -ErrorAction SilentlyContinue | Select Name, Length
          Write-Host "=== appsettings anywhere under C:\RfcCollector ==="
          Get-ChildItem "C:\RfcCollector" -Recurse -ErrorAction SilentlyContinue | Select FullName, Length
          Write-Host "=== Service registry env vars ==="
          $reg = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector" -ErrorAction SilentlyContinue
          $reg | Format-List
          Write-Host "=== Service env block ==="
          $envReg = Get-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector\Parameters" -ErrorAction SilentlyContinue
          $envReg | Format-List
          Write-Host "=== Any json files near RfcCollector.exe ==="
          Get-ChildItem "C:\RfcCollector" -Filter "*.json" -Recurse -ErrorAction SilentlyContinue | Select FullName

      - name: Mount .36 and copy Store Tracker using cmd net use then PS copy
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%
          dir "\\192.168.151.36\C$\inetpub\wwwroot" 2>nul
          echo Copying...
          robocopy "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker" "C:\inetpub\wwwroot\Store Tracker" /E /IS /IT /NFL /NDL
          echo ROBOCOPY: %ERRORLEVEL%
          dir "C:\inetpub\wwwroot\Store Tracker\bin" /B 2>nul | findstr ".dll" | findstr /V "Microsoft Azure System"
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Set RFC Collector IIS_HOST env via registry and restart
        shell: powershell
        run: |
          # ASP.NET Core reads env vars from registry under HKLM:\SYSTEM\CCS\Services\<name>\Parameters\AppParameters or Environment
          # Try setting Environment block
          $envPath = "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector\Environment"
          if (-not (Test-Path $envPath)) {
            New-Item -Path $envPath -Force | Out-Null
          }
          Set-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector" -Name "Environment" `
            -Value @("IIS_HOST=127.0.0.1", "IIS_PORT=80") -Type MultiString
          Write-Host "Registry env set"
          # Also write appsettings.json since it's ASP.NET Core
          $appsettings = @{
            Logging = @{ LogLevel = @{ Default = "Information" } }
            AllowedHosts = "*"
            IIS_HOST = "127.0.0.1"
            IIS_PORT = "80"
          } | ConvertTo-Json -Depth 5
          $appsettings | Set-Content "C:\RfcCollector\appsettings.json"
          Write-Host "appsettings.json written"
          # Restart
          Restart-Service RfcCollector -Force
          Start-Sleep 10
          Write-Host "Service: $((Get-Service RfcCollector).Status)"

      - name: End-to-end smoke test
        shell: powershell
        run: |
          Start-Sleep 5
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 45
            Write-Host "=== FETCH HTTP $($r.StatusCode) ==="
            Write-Host ($r.Content.Substring(0,[Math]::Min(1000,$r.Content.Length)))
          } catch {
            Write-Host "Fetch error: $_"
            # Test IIS directly too
            try {
              Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10 | Select StatusCode,Content | Format-List
            } catch { Write-Host "IIS health: $_" }
          }
