name: Fix .36 firewall and test pipeline
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Open firewall on .36 via schtasks
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo @echo off > \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall delete rule name="V2RfcApi-9191" >> \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall add rule name="V2RfcApi-9191" dir=in action=allow protocol=TCP localport=9191 profile=any >> \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall add rule name="RfcApiApp-8888" dir=in action=allow protocol=TCP localport=8888 profile=any >> \\192.168.151.36\C$\fw_open.bat
          echo echo done > C:\fw_done.txt >> \\192.168.151.36\C$\fw_open.bat
          net use \\192.168.151.36\C$ /delete /y 2>nul
          schtasks /create /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "OpenFW" /tr "C:\fw_open.bat" /sc once /st 00:00 /ru SYSTEM /f
          schtasks /run /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "OpenFW"
          echo %ERRORLEVEL%
          timeout /t 20 /nobreak
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          type \\192.168.151.36\C$\fw_done.txt 2>nul || echo NOT_DONE
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test all ports and run full pipeline
        shell: powershell
        run: |
          Start-Sleep 12
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($t in @("http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health","http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health")) {
            try { $r=Invoke-WebRequest $t -UseBasicParsing -TimeoutSec 10; Write-Host "OK $t $($r.StatusCode) $($r.Content)" }
            catch { Write-Host "ERR $t $($_.Exception.Message)" }
          }
          try {
            $r2=Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "EXECUTE: $($r2.StatusCode) $($r2.Content)"
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }

          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST="192.168.151.36"; $cfg.IIS_PORT="9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force; Start-Sleep 12
          Write-Host "Collector: $((Invoke-WebRequest 'http://localhost:9090/' -UseBasicParsing).Content)"

          $b='{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r3=Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "=== PIPELINE: HTTP $($r3.StatusCode) ==="; Write-Host $r3.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
