name: Check NCo and Fix Build
on:
  workflow_dispatch:
jobs:
  check-fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Check NCo files and .36 access
        shell: powershell
        run: |
          # Check if NCo was copied
          Write-Host "=== C:\RfcApp\bin contents ==="
          Get-ChildItem "C:\RfcApp\bin" -ErrorAction SilentlyContinue | Select Name, Length | Sort Name

          # Try to access .36 IIS bin directly (the deployed app)
          Write-Host "=== .36 IIS Store Tracker bin ==="
          $iisPath = "\\192.168.151.36\c`$\inetpub\wwwroot\Store Tracker\bin"
          try {
            $files = Get-ChildItem $iisPath -Filter "*.dll" -ErrorAction Stop
            Write-Host "Found $($files.Count) DLLs in .36 IIS"
            $files | Where-Object {$_.Name -like "*sap*" -or $_.Name -like "*SAP*"} | Select Name, Length
          } catch { Write-Host "Cannot access .36: $_" }

          # Try alternate path
          Write-Host "=== Alternative .36 paths ==="
          $paths = @("\\192.168.151.36\sapnco", "\\192.168.151.36\SAP")
          foreach ($p in $paths) {
            if (Test-Path $p -ErrorAction SilentlyContinue) {
              Write-Host "Found: $p"
              Get-ChildItem $p -Recurse -Filter "*.dll" | Select Name
            }
          }

          # Check if .36 admin share works at all
          Write-Host "=== .36 admin share test ==="
          $testPath = "\\192.168.151.36\c`$"
          if (Test-Path $testPath -ErrorAction SilentlyContinue) {
            Write-Host "Admin share accessible"
            Get-ChildItem $testPath -ErrorAction SilentlyContinue | Select-Object -First 5 | Select Name
          } else {
            Write-Host "Admin share NOT accessible - need credentials"
          }
