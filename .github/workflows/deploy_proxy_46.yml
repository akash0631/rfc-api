name: DEPLOY_PROXY_ON_46
on:
  push:
    paths: ['.github/workflows/deploy_proxy_46.yml']
jobs:
  proxy:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Deploy HTTP reverse proxy on .46:8080 -> .36:9292
        shell: powershell
        run: |
          # Kill any existing proxy on port 8080
          try {
            $procs = Get-NetTCPConnection -LocalPort 8080 -EA SilentlyContinue
            if ($procs) {
              $procs | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force -EA SilentlyContinue }
              Start-Sleep 2
              Write-Host "Killed old process on 8080"
            }
          } catch {}

          # Write a tiny HTTP reverse proxy script
          $proxyScript = @'
$listener = New-Object System.Net.HttpListener
$listener.Prefixes.Add("http://+:8080/")
$listener.Start()
Write-Host "Proxy listening on :8080 -> 192.168.151.36:9292"
while ($listener.IsListening) {
    $ctx = $listener.GetContext()
    $req = $ctx.Request
    $resp = $ctx.Response
    $path = $req.Url.PathAndQuery
    $targetUrl = "http://192.168.151.36:9292$path"
    Write-Host "$(Get-Date -f HH:mm:ss) $($req.HttpMethod) $path -> $targetUrl"
    try {
        $wc = New-Object System.Net.WebClient
        $wc.Headers["Content-Type"] = $req.ContentType
        $wc.Headers["Accept"] = "application/json"
        if ($req.HttpMethod -eq "POST") {
            $reader = New-Object System.IO.StreamReader($req.InputStream)
            $body = $reader.ReadToEnd()
            $bodyBytes = [System.Text.Encoding]::UTF8.GetBytes($body)
            $wc.Headers["Content-Type"] = "application/json"
            $result = $wc.UploadData($targetUrl, "POST", $bodyBytes)
        } else {
            $result = $wc.DownloadData($targetUrl)
        }
        $resp.ContentType = "application/json"
        $resp.StatusCode = 200
        $resp.OutputStream.Write($result, 0, $result.Length)
    } catch {
        $errBytes = [System.Text.Encoding]::UTF8.GetBytes("{`"error`":`"$($_.Exception.Message)`"}")
        $resp.StatusCode = 502
        $resp.ContentType = "application/json"
        $resp.OutputStream.Write($errBytes, 0, $errBytes.Length)
    }
    $resp.Close()
}
'@
          # Save script
          $scriptPath = "C:\V2Proxy\proxy.ps1"
          New-Item -ItemType Directory -Path "C:\V2Proxy" -Force | Out-Null
          $proxyScript | Out-File $scriptPath -Encoding UTF8
          Write-Host "Script saved to $scriptPath"

          # Add URL ACL for port 8080
          try {
            netsh http add urlacl url=http://+:8080/ user=Everyone 2>&1 | Out-Null
            Write-Host "URL ACL added"
          } catch {}

          # Start proxy as background job
          Start-Job -ScriptBlock {
            powershell -NoProfile -File "C:\V2Proxy\proxy.ps1"
          } -Name "V2Proxy"
          Start-Sleep 3
          
          # Verify proxy started
          $conn = Get-NetTCPConnection -LocalPort 8080 -EA SilentlyContinue
          if ($conn) {
            Write-Host "=== PROXY IS LISTENING ON :8080 ==="
            $conn | Select-Object LocalAddress, LocalPort, State
          } else {
            Write-Host "WARNING: Port 8080 not listening yet"
          }

      - name: Test proxy - call .46:8080 which forwards to .36:9292
        shell: powershell
        run: |
          Start-Sleep 3
          Write-Host "=== Test 1: ZPO_DD_UPD_RFC via proxy ==="
          try {
            $r = Invoke-WebRequest "http://localhost:8080/api/ZPO_DD_UPD_RFC/Post" `
              -Method POST `
              -Body '{"PO_NO":"4500001234","DELV_DATE":"20260401"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 20
            Write-Host "HTTP $($r.StatusCode): $($r.Content)"
          } catch { Write-Host "Error: $_" }

          Write-Host "`n=== Test 2: ZPO_MODIFICATION via proxy ==="
          try {
            $r2 = Invoke-WebRequest "http://localhost:8080/api/ZPO_MODIFICATION/Execute" `
              -Method POST `
              -Body '{"IM_PO_NO":"","IM_DEL_CHG_DATE_LOW":"20260301","IM_DEL_CHG_DATE_HIGH":"20260320"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 25
            Write-Host "HTTP $($r2.StatusCode): $($r2.Content[0..300] -join '')"
          } catch { Write-Host "Error: $_" }
          
          Write-Host "`n=== Test 3: ZADVANCE_PAYMENT_RFC via proxy ==="
          try {
            $r3 = Invoke-WebRequest "http://localhost:8080/api/ZADVANCE_PAYMENT_RFC/Post" `
              -Method POST `
              -Body '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260101","I_POSTING_DATE_HIGH":"20260320"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 25
            Write-Host "HTTP $($r3.StatusCode): $($r3.Content[0..400] -join '')"
          } catch { Write-Host "Error: $_" }
          
          Write-Host "`nDone."
