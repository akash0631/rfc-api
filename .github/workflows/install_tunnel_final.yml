name: INSTALL_TUNNEL_FINAL
on:
  push:
    paths:
      - '.github/workflows/install_tunnel_final.yml'
jobs:
  install:
    runs-on: [self-hosted, iis]
    steps:
      - name: Install named CF tunnel as Windows service on .36
        shell: powershell
        run: |
          $cfPath = "C:\cloudflared\cloudflared.exe"
          $token = "eyJhIjoiYmFiMDZjOTNlMTdhZTcxY2FlM2MxMWI0Y2M0MDI0MGIiLCJ0IjoiN2U3M2NjNTEtOWIwYi00MDg0LThmN2ItNDRiYzljOGYzMWEzIiwicyI6Im5wZGd0TXIvRWdMcnhkemNNUUR2Q2x5S0NSZUVpbEVBaG9LdTFPTTdYOFI1eEtmRG9pakZmRnhsd0xod1VqK2ZYa2NnTFRhUWprUXJFT2lSU0R2N0JnPT0ifQ=="
          $tunnelId = "7e73cc51-9b0b-4084-8f7b-44bc9c8f31a3"
          $tunnelUrl = "https://7e73cc51-9b0b-4084-8f7b-44bc9c8f31a3.cfargotunnel.com"
          
          Write-Host "=== Installing CF tunnel service on .36 ==="
          Write-Host "Tunnel: $tunnelId"
          
          # Kill any quick tunnel processes
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 3
          
          # Remove existing service
          $svc = Get-Service "cloudflared" -ErrorAction SilentlyContinue
          if ($svc) {
            Write-Host "Removing existing cloudflared service..."
            Stop-Service "cloudflared" -Force -ErrorAction SilentlyContinue
            Start-Sleep 2
            & $cfPath service uninstall 2>&1 | Write-Host
            Start-Sleep 3
          }
          
          # Install with named tunnel token
          Write-Host "=== Installing service with tunnel token ==="
          $r = & $cfPath service install $token 2>&1
          Write-Host "Install: $r"
          Write-Host "Exit code: $LASTEXITCODE"
          
          Start-Sleep 3
          Start-Service "cloudflared"
          Start-Sleep 10
          
          $status = (Get-Service "cloudflared").Status
          Write-Host "=== Service status: $status ==="
          
          # Save info
          $tunnelUrl | Out-File "C:\cloudflared\tunnel_url.txt" -Force
          @{tunnelId=$tunnelId;tunnelUrl=$tunnelUrl;service=$status.ToString();installed=(Get-Date).ToString()} | ConvertTo-Json | Out-File "C:\cloudflared\tunnel_info.json" -Force
          
          # TEST via tunnel
          Write-Host "=== Testing SAP via named tunnel ==="
          Start-Sleep 5
          try {
            $r2 = Invoke-WebRequest "$tunnelUrl/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body '{"PO_NO":"4500001234","DELV_DATE":"20260401"}' -ContentType "application/json" -UseBasicParsing -TimeoutSec 25
            Write-Host "=== SAP RESPONSE: $($r2.Content) ==="
          } catch { Write-Host "SAP test: $_" }
          
          Write-Host "=== DONE. Permanent URL: $tunnelUrl ==="
