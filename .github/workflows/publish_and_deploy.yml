name: PUBLISH_AND_DEPLOY
on:
  push:
    paths:
      - '.github/workflows/publish_and_deploy.yml'
jobs:
  deploy:
    runs-on: [self-hosted, iis]
    steps:
      - name: Build publish and deploy to IIS
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $msbuild = "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
          $sln = "D:\V2 Projects\Vendor_SRM_Routing_Application\Vendor_SRM_Routing_Application.sln"
          $pubDir = "C:\V2RfcTest"
          
          Write-Host "=== Building with VS2022 MSBuild ==="
          $result = & $msbuild $sln `
            /p:Configuration=Release `
            /p:DeployOnBuild=true `
            /p:PublishProfile=FolderProfile `
            /p:WebPublishMethod=FileSystem `
            /p:publishUrl=$pubDir `
            /p:DeleteExistingFiles=False `
            /t:Build `
            /v:minimal `
            /m 2>&1
          
          $result | Select-Object -Last 20 | ForEach-Object { Write-Host $_ }
          Write-Host "MSBuild exit: $LASTEXITCODE"
          
          # If publish didn't work via MSBuild profile, try direct bin copy
          $builtDll = "D:\V2 Projects\Vendor_SRM_Routing_Application\bin\Release\Vendor_SRM_Routing_Application.dll"
          if (Test-Path $builtDll) {
            $built = Get-Item $builtDll
            Write-Host "Built DLL: $($built.LastWriteTime) Size: $($built.Length)"
            Write-Host "Copying DLL to IIS bin..."
            Copy-Item $builtDll "$pubDir\bin\" -Force
            Write-Host "Copied"
          } else {
            Write-Host "Built DLL not found at expected path"
            # Try obj/Release
            $altDll = Get-ChildItem "D:\V2 Projects\Vendor_SRM_Routing_Application\obj" -Recurse -Filter "Vendor_SRM_Routing_Application.dll" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($altDll) {
              Write-Host "Found in obj: $($altDll.FullName) - $($altDll.LastWriteTime)"
              Copy-Item $altDll.FullName "$pubDir\bin\" -Force
              Write-Host "Copied from obj"
            }
          }
          
          # Fix Web.config — point to SAP Dev
          $webConfig = "$pubDir\Web.config"
          if (Test-Path $webConfig) {
            (Get-Content $webConfig) -replace '192\.168\.144\.170','192.168.144.174' -replace '"600"','"210"' | Set-Content $webConfig
            Write-Host "Web.config fixed to Dev"
          }
          
          # Recycle app pool
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool 2>&1 | Write-Host
          Start-Sleep 8
          
          # TEST QTY — no PO_ITEM
          Write-Host "=== TEST ZPO_QTY_UPD_RFC (no PO_ITEM) ==="
          try {
            $r = Invoke-WebRequest "http://localhost:9292/api/ZPO_QTY_UPD_RFC/Post" -Method POST `
              -Body '{"IM_DATA":[{"EBELN":"5100001680","MATNR":"1110002329002","QTY":"1000"}]}' `
              -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "QTY: $($r.Content)"
          } catch { Write-Host "QTY: $_" }
          
          # TEST COST — no PO_ITEM
          Write-Host "=== TEST ZPO_COST_UPD_RFC (no PO_ITEM) ==="
          try {
            $r2 = Invoke-WebRequest "http://localhost:9292/api/ZPO_COST_UPD_RFC/Post" -Method POST `
              -Body '{"IM_DATA":[{"EBELN":"5100001680","MATNR":"1110002329002","COST":"500.00"}]}' `
              -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "COST: $($r2.Content)"
          } catch { Write-Host "COST: $_" }
          
          Write-Host "=== DONE ==="
          exit 0
