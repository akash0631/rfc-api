name: Run36_909515
on:
  push:
    paths:
      - '.github/workflows/run36_909515.yml'
jobs:
  run:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Copy DLLs from FMS_PUTWAY and fix C:\V2RfcTest
        shell: powershell
        run: |
          $LIVE = "D:\V2 Published\FMS_PUTWAY\bin"
          $OUT  = "C:\V2RfcTest"
          $VSPROJ = "D:\V2 Projects\Vendor_SRM_Routing_Application"
          $MSBUILD = "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"

          # Sync latest controllers
          Write-Host "=== Sync controllers ==="
          $REPO = "C:\actions-runner\_work\rfc-api\rfc-api"
          git -C $REPO pull origin master 2>&1 | Write-Host
          robocopy "$REPO\Controllers" "$VSPROJ\Controllers" /E /IS /IT /NFL /NDL
          Write-Host "Synced"

          # Build
          Write-Host "=== Build ==="
          if (-not (Test-Path "$OUT\bin")) { New-Item "$OUT\bin" -ItemType Directory -Force | Out-Null }
          & $MSBUILD "$VSPROJ\Vendor_SRM_Routing_Application.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath="$OUT\bin\" /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
          Write-Host "Build: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { Write-Host "BUILD FAILED"; exit 1 }

          # Copy ALL DLLs from live FMS_PUTWAY
          Write-Host "=== Copy DLLs from FMS_PUTWAY ==="
          Get-ChildItem $LIVE -Filter "*.dll" | Where {$_.Name -ne "Vendor_SRM_Routing_Application.dll"} | ForEach {
            Copy-Item $_.FullName "$OUT\bin\" -Force
          }
          Write-Host "Total DLLs: $((Get-ChildItem "$OUT\bin" -Filter "*.dll").Count)"
          (Get-ChildItem "$OUT\bin" -Filter "Vendor*.dll").Name

          # Global.asax
          Copy-Item "$VSPROJ\Global.asax" "$OUT\" -Force

          # Web.config
          $cfg = @'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <appSettings>
    <add key="Name" value="V2Dev" />
    <add key="AppServerHost" value="192.168.144.174" />
    <add key="Client" value="210" />
    <add key="User" value="POWERBI" />
    <add key="Password" value="India@123456" />
    <add key="SystemNumber" value="00" />
    <add key="Language" value="EN" />
  </appSettings>
  <system.web>
    <compilation debug="false" targetFramework="4.8" />
    <httpRuntime targetFramework="4.8" maxRequestLength="2147483647" />
    <customErrors mode="Off" />
  </system.web>
  <system.webServer>
    <handlers>
      <remove name="ExtensionlessUrlHandler-Integrated-4.0" />
      <add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0" />
    </handlers>
  </system.webServer>
  <runtime>
    <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
      <dependentAssembly>
        <assemblyIdentity name="Microsoft.Web.Infrastructure" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-2.0.1.0" newVersion="2.0.1.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Web.Http" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Net.Http.Formatting" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="Newtonsoft.Json" publicKeyToken="30ad4fe6b2a6aeed" />
        <bindingRedirect oldVersion="0.0.0.0-13.0.0.0" newVersion="13.0.0.0" />
      </dependentAssembly>
    </assemblyBinding>
  </runtime>
</configuration>
'@
          [System.IO.File]::WriteAllText("$OUT\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config written"

          # Recycle
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15

          # Test
          foreach ($url in @("http://localhost:9292/api/ZpoDdUpdRfc/Health","http://localhost:9292/api/ZpoModificationRfc/Health")) {
            try {
              $r = Invoke-WebRequest $url -UseBasicParsing -TimeoutSec 10
              Write-Host "SUCCESS $($r.StatusCode): $($r.Content)"
            } catch { Write-Host "FAIL: $($_.Exception.Message) [$url]" }
          }
