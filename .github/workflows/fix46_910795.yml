name: Fix46_910795
on:
  push:
    paths:
      - '.github/workflows/fix46_910795.yml'
jobs:
  run:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Fix V2RfcTest on .36 via psexec
        shell: cmd
        run: |
          echo === Connecting to .36 and fixing V2RfcTest ===
          powershell -NoProfile -Command "& {$cred=New-Object PSCredential('V2DC-ADDVERB\Administrator',(ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force));$s=New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop;Write-Host Connected;Invoke-Command -Session $s -ScriptBlock {Get-ChildItem 'D:\V2 Published\FMS_PUTWAY\bin' -Filter *.dll | Where-Object {$_.Name -ne 'Vendor_SRM_Routing_Application.dll'} | ForEach-Object {Copy-Item $_.FullName 'C:\V2RfcTest\bin\' -Force};Write-Host DLLs_COPIED;Copy-Item 'D:\V2 Projects\Vendor_SRM_Routing_Application\Global.asax' 'C:\V2RfcTest\' -Force;Import-Module WebAdministration -EA SilentlyContinue;Restart-WebAppPool V2RfcTestPool -EA SilentlyContinue;Start-Sleep 12;$r=Invoke-WebRequest 'http://localhost:9292/api/ZpoDdUpdRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host $r.StatusCode $r.Content};Remove-PSSession $s}"
          echo Done: %ERRORLEVEL%
