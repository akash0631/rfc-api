name: Deploy RFC to IIS (.36 self-hosted)
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
jobs:
  deploy:
    runs-on: [self-hosted, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Restore NuGet
        run: nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive
        continue-on-error: true

      - name: Build and publish to C:\V2RfcTest
        shell: powershell
        run: |
          $vsPath = "C:\Program Files\Microsoft Visual Studio‚2\Community\MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $vsPath)) {
            $vsPath = (Get-Command msbuild -ErrorAction SilentlyContinue).Source
          }
          if (-not $vsPath) { Write-Error "MSBuild not found"; exit 1 }
          & $vsPath Vendor_SRM_Routing_Application.csproj `
            /p:Configuration=Release /p:Platform=AnyCPU `
            /p:DeployOnBuild=true /p:WebPublishMethod=FileSystem `
            /p:PublishUrl="C:\V2RfcTest" `
            /p:DeleteExistingFiles=false `
            /p:VisualStudioVersion=17.0 `
            /nologo /verbosity:minimal
          if ($LASTEXITCODE -ne 0) { Write-Error "Build failed: $LASTEXITCODE"; exit 1 }
          Write-Host "Build and publish succeeded"

      - name: Fix Web.config SAP host and client
        shell: powershell
        run: |
          $cfg = "C:\V2RfcTest\Web.config"
          if (-not (Test-Path $cfg)) { Write-Host "Web.config not found, skipping"; exit 0 }
          $lines = Get-Content $cfg
          $fixed = $false
          $out = $lines | ForEach-Object {
            if (-not $fixed -and $_ -match 'key="AppServerHost"' -and $_ -match '192.168.144.170') {
              $_ = $_ -replace '192.168.144.170','192.168.144.174'
              Write-Host "Fixed AppServerHost to Dev"
            }
            if (-not $fixed -and $_ -match 'key="Client"' -and $_ -match 'value="600"' -and $_ -notmatch '<!--') {
              $_ = $_ -replace 'value="600"','value="210"'
              $fixed = $true
              Write-Host "Fixed Client to 210"
            }
            $_
          }
          $out | Set-Content $cfg -Encoding UTF8
          Write-Host "Web.config patched"

      - name: Recycle app pool
        shell: powershell
        run: |
          C:\Windows\System32\inetsrvppcmd.exe recycle apppool /apppool.name:V2RfcTestPool
          Write-Host "App pool recycled"

      - name: Smoke test - hit the IIS endpoint
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          try {
            $body = '{"PO_NO":"TEST001","DELV_DATE":"20260401"}'
            $r = Invoke-WebRequest "http://localhost:9292/api/ZPO_DD_UPD_RFC/Post" `
              -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "Smoke test HTTP $($r.StatusCode): $($r.Content)"
          } catch {
            Write-Host "Smoke test failed (may be SAP connectivity): $_"
          }

