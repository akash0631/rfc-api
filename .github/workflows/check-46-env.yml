name: Check .46 Environment
on: [workflow_dispatch]
jobs:
  check:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Check environment
        shell: cmd
        run: |
          echo === .NET Runtimes ===
          dotnet --list-runtimes
          echo === .NET SDKs ===
          dotnet --list-sdks
          echo === IIS Service ===
          sc query W3SVC
          echo === SAP NCo DLLs ===
          dir C:\Windows\System32\sapnco*.dll 2>nul
          dir C:\Windows\assembly\GAC_64\sapnco 2>nul
          dir C:\Windows\assembly\GAC_MSIL\sapnco 2>nul
          echo === Open Ports ===
          netstat -ano | findstr LISTENING
          echo === inetpub ===
          dir C:\inetpub\wwwroot 2>nul
          echo === Program Files .NET ===
          dir "C:\Program Files\dotnet\shared\Microsoft.AspNetCore.App" 2>nul
          echo === DONE ===
