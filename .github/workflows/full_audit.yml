name: Full System Audit and Fix
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Full .46 system audit
        shell: powershell
        run: |
          Import-Module WebAdministration -ErrorAction SilentlyContinue

          Write-Host "========================================"
          Write-Host "IIS SITES"
          Write-Host "========================================"
          Get-Website | Select Name, State, @{n='Port';e={($_.Bindings.Collection[0].bindingInformation -split ':')[1]}}, @{n='Path';e={$_.PhysicalPath}} | Format-Table -AutoSize

          Write-Host "========================================"
          Write-Host "STORE TRACKER BIN (port 80)"
          Write-Host "========================================"
          $stPath = "C:\inetpub\wwwroot\Store Tracker\bin"
          $stDlls = (Get-ChildItem $stPath -Filter "*.dll" -EA SilentlyContinue).Count
          Write-Host "DLL count: $stDlls"
          Get-ChildItem $stPath -Filter "Vendor*.dll" -EA SilentlyContinue | Select Name | Format-Table
          Get-ChildItem $stPath -Filter "*sap*.dll" -EA SilentlyContinue | Select Name | Format-Table
          Write-Host "Web.config: $(Test-Path 'C:\inetpub\wwwroot\Store Tracker\Web.config')"

          Write-Host "========================================"
          Write-Host "RFCAPP (port 8888)"
          Write-Host "========================================"
          $rfcDlls = (Get-ChildItem "C:\RfcApp" -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
          Write-Host "DLL count: $rfcDlls"
          Get-ChildItem "C:\RfcApp" -Filter "Vendor*.dll" -EA SilentlyContinue | Select Name | Format-Table

          Write-Host "========================================"
          Write-Host "RFC COLLECTOR"
          Write-Host "========================================"
          Get-Service RfcCollector -EA SilentlyContinue | Select Name, Status, StartType
          Get-Content "C:\RfcCollector\appsettings.json" -EA SilentlyContinue

          Write-Host "========================================"
          Write-Host "SAP NCo DLLs"
          Write-Host "========================================"
          @("C:\Windows\System32\sapnco.dll","C:\Windows\System32\sapnco_utils.dll") | ForEach-Object { Write-Host "$_ : $(Test-Path $_)" }

      - name: Test IIS :80 and :8888 directly
        shell: powershell
        run: |
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($port in @(80, 8888)) {
            $url = "http://localhost:$port/api/ZAdvancePaymentRfc/Execute"
            try { $r = Invoke-WebRequest $url -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 10; Write-Host "IIS :$port → HTTP $($r.StatusCode): $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))" }
            catch { Write-Host "IIS :$port → $($_.Exception.Message)" }
          }

      - name: Test RFC Collector fetch
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":3}'
          try { $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60; Write-Host "FETCH HTTP $($r.StatusCode)"; Write-Host ($r.Content.Substring(0,[Math]::Min(800,$r.Content.Length))) }
          catch { Write-Host "FETCH ERROR: $($_.Exception.Message)" }

      - name: If bins empty - deploy compiled app from actions-runner cache
        shell: powershell
        run: |
          $stDlls = (Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*.dll" -EA SilentlyContinue).Count
          $rfcDlls = (Get-ChildItem "C:\RfcApp" -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
          Write-Host "Store Tracker DLLs: $stDlls | RfcApp DLLs: $rfcDlls"

          if ($stDlls -eq 0 -and $rfcDlls -eq 0) {
            Write-Host "Both bins empty — checking runner cache..."
            $cache = "C:\actions-runner\_work\rfc-api\rfc-api\bin\Release"
            $cacheDlls = (Get-ChildItem $cache -Filter "*.dll" -EA SilentlyContinue).Count
            Write-Host "Runner cache DLLs: $cacheDlls"

            if ($cacheDlls -gt 0) {
              Write-Host "Deploying from cache to Store Tracker..."
              Copy-Item "$cache\*" "C:\inetpub\wwwroot\Store Tracker" -Recurse -Force
              Copy-Item "Web.config" "C:\inetpub\wwwroot\Store Tracker\" -Force -EA SilentlyContinue
              Write-Host "Deployed: $((Get-ChildItem 'C:\inetpub\wwwroot\Store Tracker\bin' -Filter '*.dll' -EA SilentlyContinue).Count) DLLs"
            } else {
              Write-Host "Cache also empty — will need NuGet + build"
            }
          }

          # Recycle app pools
          Get-ChildItem IIS:\AppPools | ForEach-Object { Restart-WebAppPool $_.Name -EA SilentlyContinue }
          Start-Sleep 6
          Restart-Service RfcCollector -Force -EA SilentlyContinue
          Start-Sleep 12
          Write-Host "RfcCollector: $((Get-Service RfcCollector -EA SilentlyContinue).Status)"
