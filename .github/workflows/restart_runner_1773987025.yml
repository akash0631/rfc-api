name: restart_runner_1773987025
on:
  push:
    paths:
      - '.github/workflows/restart_runner_1773987025.yml'
jobs:
  restart:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Restart GitHub Actions runner on .36
        shell: cmd
        run: |
          powershell -NoProfile -Command "& {
            $cred = New-Object PSCredential('V2DC-ADDVERB\Administrator', (ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force));
            $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop;
            Invoke-Command -Session $s -ScriptBlock {
              Write-Host '=== Runner services on .36 ===';
              Get-Service | Where-Object {\.Name -like 'actions.runner*'} | Select-Object Name, Status, DisplayName;
              Write-Host '=== Restarting all runner services ===';
              Get-Service | Where-Object {\.Name -like 'actions.runner*'} | Restart-Service -Force;
              Start-Sleep 5;
              Write-Host '=== Post-restart status ===';
              Get-Service | Where-Object {\.Name -like 'actions.runner*'} | Select-Object Name, Status;
            };
            Remove-PSSession $s;
          }"

