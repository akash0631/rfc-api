name: Fix Stopped AppPool

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: iis
    steps:
      - name: Set LocalSystem and start pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "V2RfcTestPool"

          # Revert identity to LocalSystem
          Set-ItemProperty "IIS:\AppPools\$pool" -Name processModel.identityType -Value 0
          Start-Sleep -Seconds 2

          # Start the pool
          $state = (Get-WebAppPoolState -Name $pool).Value
          Write-Host "State before: $state"
          if ($state -ne "Started") {
            Start-WebAppPool -Name $pool
            Start-Sleep -Seconds 5
          }
          Write-Host "State after: $((Get-WebAppPoolState -Name $pool).Value)"
          Write-Host "Identity: $((Get-ItemProperty "IIS:\AppPools\$pool" -Name processModel).identityType)"
