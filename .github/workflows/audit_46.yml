name: Audit .46 — everything on this machine only
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Full audit of .46
        shell: powershell
        run: |
          Import-Module WebAdministration -EA SilentlyContinue

          Write-Host "======== IIS SITES ========"
          Get-Website | Select Name, State, @{n='Port';e={($_.Bindings.Collection[0].bindingInformation -split ':')[1]}}, @{n='Path';e={$_.PhysicalPath}} | Format-Table -AutoSize

          Write-Host "======== APP POOLS ========"
          Get-ChildItem IIS:\AppPools | Select Name, State, @{n='Runtime';e={$_.managedRuntimeVersion}} | Format-Table

          Write-Host "======== ALL IIS PHYSICAL PATHS - DLL COUNTS ========"
          Get-Website | ForEach-Object {
            $p = $_.PhysicalPath
            $dlls = (Get-ChildItem $p -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
            Write-Host "$($_.Name) → $p → $dlls DLLs"
          }

          Write-Host "======== WHAT ROUTES DOES :80 SERVE ========"
          try { $r = Invoke-WebRequest "http://localhost:80/" -UseBasicParsing -TimeoutSec 5; Write-Host ":80/ → $($r.StatusCode): $($r.Content.Substring(0,[Math]::Min(150,$r.Content.Length)))" } catch { Write-Host ":80/ → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))" }
          try { $r = Invoke-WebRequest "http://localhost:80/swagger" -UseBasicParsing -TimeoutSec 5; Write-Host ":80/swagger → $($r.StatusCode)" } catch { Write-Host ":80/swagger → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))" }
          try { $b = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'; $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 8; Write-Host ":80/api/ZAdvancePaymentRfc/Execute → $($r.StatusCode): $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))" } catch { Write-Host ":80/api/ZAdvancePaymentRfc/Execute → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))" }

          Write-Host "======== WHAT ROUTES DOES :8888 SERVE ========"
          try { $r = Invoke-WebRequest "http://localhost:8888/swagger" -UseBasicParsing -TimeoutSec 5; Write-Host ":8888/swagger → $($r.StatusCode)" } catch { Write-Host ":8888/swagger → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))" }
          try { $b = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'; $r = Invoke-WebRequest "http://localhost:8888/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 8; Write-Host ":8888/api/ZAdvancePaymentRfc/Execute → $($r.StatusCode): $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))" } catch { Write-Host ":8888/api/ZAdvancePaymentRfc/Execute → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))" }

          Write-Host "======== RFC COLLECTOR ========"
          Get-Service RfcCollector -EA SilentlyContinue | Select Name, Status, StartType
          Get-Content "C:\RfcCollector\appsettings.json" -EA SilentlyContinue
          Write-Host "RfcCollector.exe last modified: $((Get-Item 'C:\RfcCollector\RfcCollector.exe' -EA SilentlyContinue).LastWriteTime)"

          Write-Host "======== SAP NCo ========"
          Test-Path "C:\Windows\System32\sapnco.dll"
          Test-Path "C:\Windows\System32\sapnco_utils.dll"
          Get-ChildItem "C:\Windows\System32" -Filter "sapnco*.dll" -EA SilentlyContinue | Select Name, Length

          Write-Host "======== SQL SERVER ON .28 ========"
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection("Server=192.168.151.28,1433;Database=DataV2;User Id=sa;Password=vrl@55555;TrustServerCertificate=true;")
            $conn.Open()
            $cmd = $conn.CreateCommand(); $cmd.CommandText = "SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_CATALOG='DataV2'"
            Write-Host "DataV2 tables: $($cmd.ExecuteScalar())"
            $conn.Close()
          } catch { Write-Host "DataV2 SQL error: $($_.Exception.Message.Substring(0,[Math]::Min(100,$_.Exception.Message.Length)))" }

          Write-Host "======== claudetestv2 on .46 ========"
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection("Server=192.168.151.46,1433;Database=claudetestv2;User Id=sa;Password=vrl@55555;TrustServerCertificate=true;")
            $conn.Open()
            $cmd = $conn.CreateCommand(); $cmd.CommandText = "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES ORDER BY TABLE_NAME"
            $r = $cmd.ExecuteReader()
            $tables = @(); while($r.Read()) { $tables += $r[0] }
            $conn.Close()
            Write-Host "Tables in claudetestv2: $($tables.Count)"
            $tables | ForEach-Object { Write-Host "  $_" }
          } catch { Write-Host "claudetestv2 error: $($_.Exception.Message.Substring(0,[Math]::Min(100,$_.Exception.Message.Length)))" }
