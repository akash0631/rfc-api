name: Audit .46 — everything on this machine only
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Audit and write to step summary
        shell: powershell
        run: |
          Import-Module WebAdministration -EA SilentlyContinue
          $s = ""

          # IIS Sites
          $s += "## IIS Sites`n`n"
          Get-Website | ForEach-Object {
            $port = ($_.Bindings.Collection[0].bindingInformation -split ':')[1]
            $dlls = (Get-ChildItem $_.PhysicalPath -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
            $s += "- **$($_.Name)** | Port $port | $($_.State) | $($_.PhysicalPath) | **$dlls DLLs**`n"
          }

          # Route tests
          $s += "`n## IIS Route Tests`n`n"
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($url in @("http://localhost:80/","http://localhost:80/api/ZAdvancePaymentRfc/Execute","http://localhost:8888/api/ZAdvancePaymentRfc/Execute")) {
            try {
              $m = if ($url -like "*/Execute") {"POST"} else {"GET"}
              $b = if ($m -eq "POST") {$body} else {$null}
              $r = Invoke-WebRequest $url -Method $m -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 8
              $s += "- ✅ ``$url`` → HTTP $($r.StatusCode): ``$($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length)))```n"
            } catch {
              $s += "- ❌ ``$url`` → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))`n"
            }
          }

          # RFC Collector config
          $s += "`n## RFC Collector`n`n"
          $svc = Get-Service RfcCollector -EA SilentlyContinue
          $s += "- Status: **$($svc.Status)**`n"
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" -Raw -EA SilentlyContinue
          $s += "- Config: ``$cfg```n"
          $s += "- Exe modified: $((Get-Item 'C:\RfcCollector\RfcCollector.exe' -EA SilentlyContinue).LastWriteTime)`n"

          # SAP NCo
          $s += "`n## SAP NCo on .46`n`n"
          $s += "- sapnco.dll: **$(Test-Path 'C:\Windows\System32\sapnco.dll')**`n"
          $s += "- sapnco_utils.dll: **$(Test-Path 'C:\Windows\System32\sapnco_utils.dll')**`n"

          # RFC Collector fetch test
          $s += "`n## RFC Collector Fetch Test`n`n"
          try {
            $b2 = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":3}'
            $r2 = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b2 -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            $s += "- ✅ HTTP $($r2.StatusCode)`n- ``$($r2.Content.Substring(0,[Math]::Min(400,$r2.Content.Length)))```n"
          } catch { $s += "- ❌ $($_.Exception.Message)`n" }

          # claudetestv2 tables
          $s += "`n## claudetestv2 Tables`n`n"
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection("Server=192.168.151.46,1433;Database=claudetestv2;User Id=sa;Password=vrl@55555;TrustServerCertificate=true;")
            $conn.Open()
            $cmd = $conn.CreateCommand(); $cmd.CommandText = "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES ORDER BY TABLE_NAME"
            $rd = $cmd.ExecuteReader()
            $tables = @(); while($rd.Read()) { $tables += $rd[0] }
            $conn.Close()
            $s += "Count: **$($tables.Count)**`n`n"
            $tables | ForEach-Object { $s += "- $_`n" }
          } catch { $s += "- ❌ $($_.Exception.Message.Substring(0,[Math]::Min(100,$_.Exception.Message.Length)))`n" }

          # Write to GitHub step summary
          $s | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          Write-Host "Summary written"
