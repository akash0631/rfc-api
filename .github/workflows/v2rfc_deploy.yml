name: V2RfcDeploy
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - '.github/workflows/v2rfc_deploy.yml'
jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2
      - uses: NuGet/setup-nuget@v2

      - name: Stub VS17 targets
        shell: powershell
        run: |
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          New-Item $d -ItemType Directory -Force | Out-Null
          [System.IO.File]::WriteAllText("$d\Microsoft.WebApplication.targets",
            '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>',
            [System.Text.Encoding]::UTF8)
          Write-Host "Stubbed"

      - name: NuGet restore
        run: nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive
        continue-on-error: true

      - name: Build package for Web Deploy
        shell: powershell
        run: |
          msbuild Vendor_SRM_Routing_Application.csproj `
            /p:Configuration=Release /p:Platform=AnyCPU `
            /p:DeployOnBuild=true /p:PublishProfile=Default `
            /p:DeployTarget=MSDeployPublish `
            /p:MsDeployServiceUrl="https://192.168.151.36:8172/msdeploy.axd" `
            /p:DeployIisAppPath="V2RfcTest" `
            /p:UserName="V2DC-ADDVERB\Administrator" `
            /p:Password="vrl@55555" `
            /p:AllowUntrustedCertificate=true `
            /p:SkipExtraFilesOnServer=false `
            /p:VisualStudioVersion=17.0 `
            /nologo /verbosity:minimal
          Write-Host "Deploy exit: $LASTEXITCODE"
