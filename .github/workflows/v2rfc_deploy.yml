name: V2RfcDeploy
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - '.github/workflows/v2rfc_deploy.yml'
jobs:
  build-on-gh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Stub VS17 WebApplication targets
        run: |
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          New-Item $d -ItemType Directory -Force | Out-Null
          $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>'
          [System.IO.File]::WriteAllText("$d\Microsoft.WebApplication.targets", $xml, [System.Text.Encoding]::UTF8)
        shell: powershell

      - name: NuGet restore
        run: nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive
        continue-on-error: true

      - name: Build + Package
        run: |
          msbuild Vendor_SRM_Routing_Application.csproj `
            /p:Configuration=Release `
            /p:Platform=AnyCPU `
            /p:DeployOnBuild=true `
            /p:DeployTarget=Package `
            /p:PackageLocation=publish_output `
            /p:VisualStudioVersion=17.0 `
            /nologo /verbosity:minimal
        shell: powershell
        continue-on-error: true

      - name: Simple file output publish
        run: |
          msbuild Vendor_SRM_Routing_Application.csproj `
            /p:Configuration=Release /p:Platform=AnyCPU `
            /p:OutputPath=bin\Release\ /p:VisualStudioVersion=17.0 `
            /nologo /verbosity:minimal
          Write-Host "DLLs built:"
          Get-ChildItem bin\Release -Filter "*.dll" | Select Name
        shell: powershell

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rfc-api-build
          path: bin/Release/

  deploy-to-36:
    needs: build-on-gh
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: rfc-api-build
          path: downloaded_bin

      - name: Deploy to C:\V2RfcTest
        shell: powershell
        run: |
          $OUT  = "C:\V2RfcTest"
          $LIVE = "D:\V2 Published\FMS_PUTWAY\bin"
          $VSPROJ = "D:\V2 Projects\Vendor_SRM_Routing_Application"
          $REPO = "C:\actions-runner\_work\rfc-api\rfc-api"

          if (-not (Test-Path "$OUT\bin")) { New-Item "$OUT\bin" -ItemType Directory -Force | Out-Null }

          Write-Host "=== Copy built DLL from GH ==="
          Copy-Item "downloaded_bin\*.dll" "$OUT\bin\" -Force -EA SilentlyContinue
          Write-Host "Copied from GH build"

          Write-Host "=== Copy ALL DLLs from live FMS_PUTWAY ==="
          Get-ChildItem $LIVE -Filter "*.dll" | Where {$_.Name -ne "Vendor_SRM_Routing_Application.dll"} | ForEach {
            Copy-Item $_.FullName "$OUT\bin\" -Force
          }
          Write-Host "Total DLLs: $((Get-ChildItem "$OUT\bin" -Filter "*.dll").Count)"
          (Get-ChildItem "$OUT\bin" -Filter "Vendor*.dll").Name

          Write-Host "=== Sync controllers to VS project and rebuild locally ==="
          robocopy "$REPO\Controllers" "$VSPROJ\Controllers" /E /IS /IT /NFL /NDL
          $MSBUILD = "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
          & $MSBUILD "$VSPROJ\Vendor_SRM_Routing_Application.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath="$OUT\bin\" /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
          Write-Host "Local build: $LASTEXITCODE"

          Write-Host "=== Copy Global.asax ==="
          Copy-Item "$VSPROJ\Global.asax" "$OUT\" -Force

          Write-Host "=== Write Web.config ==="
          $cfg = @'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <appSettings>
    <add key="Name" value="V2Dev" />
    <add key="AppServerHost" value="192.168.144.174" />
    <add key="Client" value="210" />
    <add key="User" value="POWERBI" />
    <add key="Password" value="India@123456" />
    <add key="SystemNumber" value="00" />
    <add key="Language" value="EN" />
  </appSettings>
  <system.web>
    <compilation debug="false" targetFramework="4.8" />
    <httpRuntime targetFramework="4.8" maxRequestLength="2147483647" />
    <customErrors mode="Off" />
  </system.web>
  <system.webServer>
    <handlers>
      <remove name="ExtensionlessUrlHandler-Integrated-4.0" />
      <add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0" />
    </handlers>
  </system.webServer>
  <runtime>
    <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
      <dependentAssembly>
        <assemblyIdentity name="Microsoft.Web.Infrastructure" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-2.0.1.0" newVersion="2.0.1.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Web.Http" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Net.Http.Formatting" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="Newtonsoft.Json" publicKeyToken="30ad4fe6b2a6aeed" />
        <bindingRedirect oldVersion="0.0.0.0-13.0.0.0" newVersion="13.0.0.0" />
      </dependentAssembly>
    </assemblyBinding>
  </runtime>
</configuration>
'@
          [System.IO.File]::WriteAllText("$OUT\Web.config", $cfg, [System.Text.Encoding]::UTF8)

          Write-Host "=== Recycle V2RfcTestPool ==="
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15

          Write-Host "=== TEST ==="
          foreach ($url in @("http://localhost:9292/api/ZpoDdUpdRfc/Health","http://localhost:9292/api/ZpoModificationRfc/Health")) {
            try {
              $r = Invoke-WebRequest $url -UseBasicParsing -TimeoutSec 10
              Write-Host "OK $($r.StatusCode): $($r.Content)"
            } catch { Write-Host "ERR: $($_.Exception.Message) — $url" }
          }
