name: V2RfcDeploy
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - '.github/workflows/v2rfc_deploy.yml'
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Build + Deploy via MSDeploy to V2RfcTest
        shell: powershell
        run: |
          $VSPROJ  = "D:\V2 Projects\Vendor_SRM_Routing_Application"
          $LIVE    = "D:\V2 Published\FMS_PUTWAY\bin"
          $OUT     = "C:\V2RfcTest"
          $MSBUILD = "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"
          $REPO    = "C:\actions-runner\_work\rfc-api\rfc-api"

          # Step 1: Sync controllers
          Write-Host "=== Sync controllers ==="
          robocopy "$REPO\Controllers" "$VSPROJ\Controllers" /E /IS /IT /NFL /NDL
          Write-Host "Synced: $LASTEXITCODE"

          # Step 2: Build
          Write-Host "=== Build ==="
          if (-not (Test-Path "$OUT\bin")) { New-Item "$OUT\bin" -ItemType Directory -Force | Out-Null }
          & $MSBUILD "$VSPROJ\Vendor_SRM_Routing_Application.csproj" `
            /p:Configuration=Release /p:Platform=AnyCPU `
            /p:OutputPath="$OUT\bin\" /p:VisualStudioVersion=17.0 `
            /nologo /verbosity:minimal
          if ($LASTEXITCODE -ne 0) { Write-Host "BUILD FAILED"; exit 1 }
          Write-Host "BUILD SUCCESS"
          (Get-ChildItem "$OUT\bin" -Filter "Vendor*.dll").Name

          # Step 3: Copy ALL DLLs from live working FMS_PUTWAY app
          Write-Host "=== Copy DLLs from live FMS_PUTWAY ==="
          $copied = 0
          Get-ChildItem $LIVE -Filter "*.dll" | Where {$_.Name -ne "Vendor_SRM_Routing_Application.dll"} | ForEach {
            Copy-Item $_.FullName "$OUT\bin\" -Force; $copied++
          }
          Write-Host "Copied: $copied | Total: $((Get-ChildItem "$OUT\bin" -Filter "*.dll").Count)"

          # Step 4: Copy supporting files
          Write-Host "=== Copy Global.asax + Views + Content ==="
          Copy-Item "$VSPROJ\Global.asax" "$OUT\" -Force
          if (Test-Path "$VSPROJ\Views") { robocopy "$VSPROJ\Views" "$OUT\Views" /E /IS /IT /NFL /NDL }
          if (Test-Path "$LIVE\..\Content") { robocopy "$LIVE\..\Content" "$OUT\Content" /E /IS /IT /NFL /NDL }

          # Step 5: Write clean Web.config
          Write-Host "=== Write Web.config ==="
          $cfg = @'
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <appSettings>
    <add key="Name" value="V2Dev" />
    <add key="AppServerHost" value="192.168.144.174" />
    <add key="Client" value="210" />
    <add key="User" value="POWERBI" />
    <add key="Password" value="India@123456" />
    <add key="SystemNumber" value="00" />
    <add key="Language" value="EN" />
  </appSettings>
  <system.web>
    <compilation debug="false" targetFramework="4.8" />
    <httpRuntime targetFramework="4.8" maxRequestLength="2147483647" />
    <customErrors mode="Off" />
  </system.web>
  <system.webServer>
    <handlers>
      <remove name="ExtensionlessUrlHandler-Integrated-4.0" />
      <add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0" />
    </handlers>
  </system.webServer>
  <runtime>
    <assemblyBinding xmlns="urn:schemas-microsoft-com:asm.v1">
      <dependentAssembly>
        <assemblyIdentity name="Microsoft.Web.Infrastructure" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-2.0.1.0" newVersion="2.0.1.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Web.Http" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="System.Net.Http.Formatting" publicKeyToken="31bf3856ad364e35" />
        <bindingRedirect oldVersion="0.0.0.0-5.3.0.0" newVersion="5.3.0.0" />
      </dependentAssembly>
      <dependentAssembly>
        <assemblyIdentity name="Newtonsoft.Json" publicKeyToken="30ad4fe6b2a6aeed" />
        <bindingRedirect oldVersion="0.0.0.0-13.0.0.0" newVersion="13.0.0.0" />
      </dependentAssembly>
    </assemblyBinding>
  </runtime>
</configuration>
'@
          [System.IO.File]::WriteAllText("$OUT\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config written"

          # Step 6: Ensure site exists and recycle
          Write-Host "=== Ensure IIS site + recycle ==="
          Import-Module WebAdministration -EA SilentlyContinue
          if (-not (Get-WebAppPoolState "V2RfcTestPool" -EA SilentlyContinue)) {
            New-WebAppPool "V2RfcTestPool"
            Set-ItemProperty "IIS:\AppPools\V2RfcTestPool" managedRuntimeVersion "v4.0"
          }
          if (-not (Get-Website "V2RfcTest" -EA SilentlyContinue)) {
            New-Website -Name "V2RfcTest" -Port 9292 -PhysicalPath $OUT -ApplicationPool "V2RfcTestPool"
            netsh advfirewall firewall add rule name="V2RfcTest-9292" dir=in action=allow protocol=TCP localport=9292 profile=any
          }
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15

          # Step 7: Test both controllers
          Write-Host "=== TEST ==="
          $tests = @(
            "http://localhost:9292/api/ZpoDdUpdRfc/Health",
            "http://localhost:9292/api/ZpoModificationRfc/Health"
          )
          foreach ($url in $tests) {
            try {
              $r = Invoke-WebRequest $url -UseBasicParsing -TimeoutSec 10
              Write-Host "OK $($r.StatusCode): $url"
              Write-Host $r.Content
            } catch {
              Write-Host "ERR $url : $($_.Exception.Message)"
            }
          }
