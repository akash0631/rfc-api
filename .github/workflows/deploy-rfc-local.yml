name: Deploy RFC Collector to .46 (Build on Runner)
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET 8 SDK if needed
        shell: powershell
        run: |
          $dotnet = Get-Command dotnet -ErrorAction SilentlyContinue
          if (-not $dotnet) {
            Write-Host "Installing .NET 8 SDK..."
            $url = "https://dot.net/v1/dotnet-install.ps1"
            $script = Invoke-WebRequest $url -UseBasicParsing
            $script.Content | Out-File -FilePath "$env:TEMP\dotnet-install.ps1"
            & "$env:TEMP\dotnet-install.ps1" -Version "8.0.404" -InstallDir "C:\dotnet8"
            $env:PATH = "C:\dotnet8;$env:PATH"
            [Environment]::SetEnvironmentVariable("PATH", "C:\dotnet8;" + $env:PATH, "Machine")
          } else {
            Write-Host "dotnet found: $(dotnet --version)"
          }

      - name: Build and publish
        shell: cmd
        run: |
          set PATH=C:\dotnet8;%PATH%
          if not exist C:\RfcCollector mkdir C:\RfcCollector
          dotnet publish rfc-collector\RfcCollector\RfcCollector.csproj -c Release -r win-x64 --self-contained true -o C:\RfcCollector
          echo Build done: %ERRORLEVEL%

      - name: Stop old process and start new
        shell: powershell
        run: |
          Stop-Process -Name RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          $script = @"
@echo off
set IIS_HOST=192.168.151.36
set IIS_PORT=80
set SQL_SERVER=192.168.151.46
set SQL_USER=sa
set SQL_PASS=vrl@55555
set SQL_DB=claudetestv2
set ASPNETCORE_URLS=http://0.0.0.0:9090
C:\RfcCollector\RfcCollector.exe >> C:\RfcCollector\rfc.log 2>&1
"@
          $script | Out-File "C:\RfcCollector\start.bat" -Encoding ASCII
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c C:\RfcCollector\start.bat" -WindowStyle Hidden
          Start-Sleep -Seconds 8

          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 10
            Write-Host "SUCCESS - RFC Collector is UP"
            Write-Host $r.Content
          } catch {
            Write-Host "App not responding yet - checking log:"
            if (Test-Path "C:\RfcCollector\rfc.log") {
              Get-Content "C:\RfcCollector\rfc.log" | Select-Object -Last 30
            }
          }

      - name: Done
        shell: cmd
        run: |
          echo Health:  http://192.168.151.46:9090/
          echo Swagger: http://192.168.151.46:9090/swagger
          echo Fetch:   POST http://192.168.151.46:9090/fetch
          echo DB:      claudetestv2 @ 192.168.151.46
