name: Scan .36 for SAP files
on:
  workflow_dispatch:
jobs:
  scan:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Mount .36 and scan for SAP DLLs
        shell: powershell
        run: |
          net use "\\192.168.151.36\c$" /user:Administrator vrl@55555 /persistent:no
          Write-Host "Mount: $LASTEXITCODE"
          
          Write-Host "=== Searching for sapnco across C drive on .36 ==="
          try {
            $files = Get-ChildItem "\\192.168.151.36\c$" -Recurse -Filter "*sapnco*" -ErrorAction SilentlyContinue -Force
            $files | Select FullName, Length | Format-Table -AutoSize
          } catch { Write-Host "Error: $_" }
          
          Write-Host "=== Search for SAP NCo installer ==="
          try {
            Get-ChildItem "\\192.168.151.36\c$" -Recurse -Filter "*nco*" -Include "*.msi","*.exe","*.dll" -ErrorAction SilentlyContinue -Force | 
              Select FullName, Length | Format-Table -AutoSize
          } catch {}
          
          Write-Host "=== .36 IIS wwwroot contents ==="
          Get-ChildItem "\\192.168.151.36\c$\inetpub\wwwroot" -ErrorAction SilentlyContinue | Select Name, Mode
          
          Write-Host "=== .36 Program Files (x86) SAP ==="
          Get-ChildItem "\\192.168.151.36\c$\Program Files (x86)\SAP" -Recurse -ErrorAction SilentlyContinue | Select FullName
          
          Write-Host "=== .36 C: root folders ==="
          Get-ChildItem "\\192.168.151.36\c$" -ErrorAction SilentlyContinue | Select Name, Mode
          
          net use "\\192.168.151.36\c$" /delete
