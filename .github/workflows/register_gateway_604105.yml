name: RegisterGateway_604105
on:
  push:
    paths: ['.github/workflows/register_gateway_604105.yml']
jobs:
  run:
    runs-on: [self-hosted, iis]
    steps:
      - name: Register gateway via DataGateway PowerShell module
        shell: powershell
        env:
          SP_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          SP_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SP_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Get-Module -ListAvailable -Name DataGateway)) {
            Write-Host "Installing DataGateway module..."
            Install-Module -Name DataGateway -Force -Scope CurrentUser -AllowClobber
          }
          Import-Module DataGateway
          Write-Host "DataGateway module: $(Get-Module DataGateway | Select -Expand Version)"

          $secSecret = ConvertTo-SecureString $env:SP_SECRET -AsPlainText -Force
          Write-Host "Connecting with Service Principal..."
          Connect-DataGatewayServiceAccount -ApplicationId $env:SP_CLIENT_ID -ClientSecret $secSecret -Tenant $env:SP_TENANT_ID
          Write-Host "Connected."

          $existing = Get-DataGatewayCluster -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Gateway already registered:"
            $existing | Select-Object Id, Name, Status | Format-Table
          } else {
            $recoveryKey = ConvertTo-SecureString "V2Retail@Gateway2026" -AsPlainText -Force
            Write-Host "Registering as V2Retail-DataV2..."
            Add-DataGatewayCluster -Name "V2Retail-DataV2" -RecoveryKey $recoveryKey -OverwriteExistingGateway
            $clusters = Get-DataGatewayCluster
            Write-Host "Done. Registered:"
            $clusters | Select-Object Id, Name, Status | Format-Table
          }
