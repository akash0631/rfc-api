name: Deploy36v2
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Verify live sites are untouched before anything
        shell: cmd
        run: |
          echo === LIVE SITES STATE (read-only check) ===
          C:\Windows\System32\inetsrv\appcmd.exe list sites
          echo === Live Vendor SRM path untouched ===
          dir "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC\bin\Vendor*.dll" /B 2>nul

      - name: Build solution using MSBuild on .36
        shell: cmd
        run: |
          echo === Find MSBuild ===
          set MSBUILD=
          for %%p in (
            "C:\Program Files\Microsoft Visual Studio2\Community\MSBuild\Current\Bin\MSBuild.exe"
            "C:\Program Files\Microsoft Visual Studio2\Professional\MSBuild\Current\Bin\MSBuild.exe"
            "C:\Program Files (x86)\Microsoft Visual Studio9\Community\MSBuild\Current\Bin\MSBuild.exe"
            "C:\Program Files (x86)\Microsoft Visual Studio7\Community\MSBuild.0\Bin\MSBuild.exe"
            "C:\Windows\Microsoft.NET\Framework644.0.30319\MSBuild.exe"
          ) do if exist %%p set MSBUILD=%%p
          echo MSBuild: %MSBUILD%

          echo === NuGet restore ===
          nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive 2>&1
          echo NuGet exit: %ERRORLEVEL%

          echo === Stub VS targets if needed ===
          if not exist "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio17.0\WebApplications" (
            mkdir "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio17.0\WebApplications"
            powershell -NoProfile -Command "[System.IO.File]::WriteAllText('C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets','<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>',[System.Text.Encoding]::UTF8)"
          )

          echo === Build to C:\V2RfcApi ===
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=C:\V2RfcApi\bin\ /t:Build /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0 /p:DeployOnBuild=false
          echo BUILD EXIT: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 (
            echo Build failed - trying alternate MSBuild
            "C:\Windows\Microsoft.NET\Framework644.0.30319\MSBuild.exe" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=C:\V2RfcApi\bin\ /t:Build /m /nologo /verbosity:minimal
            echo FALLBACK BUILD EXIT: %ERRORLEVEL%
          )

      - name: Deploy Web.config + recycle + test
        shell: cmd
        run: |
          echo === Copy Web.config to V2RfcApi ===
          copy /Y Web.config C:\V2RfcApi\Web.config

          echo === Switch to SAP Dev (192.168.144.174 / client 210) ===
          powershell -NoProfile -Command "(Get-Content 'C:\V2RfcApi\Web.config') | ForEach-Object { $_ -replace '192.168.144.170','192.168.144.174' -replace '192.168.144.179','192.168.144.174' } | Set-Content 'C:\V2RfcApi\Web.config'"

          echo === DLLs in V2RfcApi bin ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

          echo === Recycle V2RfcApiPool ONLY (not touching any other pool) ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === HEALTH TEST ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"

          echo === EXECUTE TEST ===
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode;Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"

          echo === VERIFY LIVE SITES STILL RUNNING (read-only) ===
          C:\Windows\System32\inetsrv\appcmd.exe list sites
