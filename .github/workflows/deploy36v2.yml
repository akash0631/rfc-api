name: Deploy36v2
on:
  push:
    branches: [deploy-36]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy to V2RfcApi only
        shell: cmd
        run: |
          echo === Find best MSBuild ===
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          if exist "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe" set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe
          if exist "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe" set MSBUILD=C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe
          if exist "C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\MSBuild\15.0\Bin\MSBuild.exe" set MSBUILD=C:\Program Files (x86)\Microsoft Visual Studio\2017\Community\MSBuild\15.0\Bin\MSBuild.exe
          echo MSBuild: %MSBUILD%

          echo === NuGet restore ===
          nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive 2>&1 | tail -3
          echo NuGet: %ERRORLEVEL%

          echo === Stub VS17 targets ===
          if not exist "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications" mkdir "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          powershell -NoProfile -Command "if(-not(Test-Path 'C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets')){[System.IO.File]::WriteAllText('C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets','<?xml version=""1.0"" encoding=""utf-8""?><Project xmlns=""http://schemas.microsoft.com/developer/msbuild/2003""><Target Name=""WebPublish""/><Target Name=""Package""/></Project>',[System.Text.Encoding]::UTF8)}"

          echo === Build — output to C:\V2RfcApi\bin ===
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=C:\V2RfcApi\bin\ /t:Build /m /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%

          echo === DLL check ===
          dir C:\V2RfcApi\bin\Vendor_SRM*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

      - name: Deploy config and test
        shell: cmd
        run: |
          copy /Y Web.config C:\V2RfcApi\Web.config
          powershell -NoProfile -Command "(Get-Content 'C:\V2RfcApi\Web.config') | ForEach-Object { $_ -replace '192.168.144.170','192.168.144.174' -replace '192.168.144.179','192.168.144.174' } | Set-Content 'C:\V2RfcApi\Web.config'"
          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|Client|SystemNumber' | Select -First 6"

          echo === Recycle V2RfcApiPool ONLY ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === HEALTH TEST ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"

          echo === EXECUTE TEST ===
          powershell -NoProfile -Command "$b='{""I_COMPANY_CODE"":""1100"",""I_POSTING_DATE_LOW"":""20260301"",""I_POSTING_DATE_HIGH"":""20260317""}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode;Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
