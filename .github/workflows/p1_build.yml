name: P1 Final - Restart RFC Collector wired to :80
on:
  workflow_dispatch:
jobs:
  restart:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Update config and restart RFC Collector
        shell: powershell
        run: |
          Write-Host "=== Current IIS Sites ==="
          Import-Module WebAdministration
          Get-Website | Select Name, State, @{n='Port';e={($_.Bindings.Collection[0].bindingInformation -split ':')[1]}}, @{n='Path';e={$_.PhysicalPath}} | Format-Table

          Write-Host "=== DLL count in Store Tracker bin (port 80) ==="
          (Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*.dll" -EA SilentlyContinue).Count

          Write-Host "=== DLL count in RfcApp (port 8888) ==="
          (Get-ChildItem "C:\RfcApp" -Filter "*.dll" -Recurse -EA SilentlyContinue).Count

          Write-Host "=== Current appsettings ==="
          Get-Content "C:\RfcCollector\appsettings.json"

          # Determine correct port — whichever IIS site has DLLs
          $stDlls = (Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*.dll" -EA SilentlyContinue).Count
          $rfcDlls = (Get-ChildItem "C:\RfcApp" -Filter "*.dll" -Recurse -EA SilentlyContinue).Count
          Write-Host "Store Tracker DLLs: $stDlls | RfcApp DLLs: $rfcDlls"

          $port = if ($rfcDlls -gt 0) { "8888" } elseif ($stDlls -gt 0) { "80" } else { "80" }
          Write-Host "Using port: $port"

          $cfg = @{
            Logging = @{ LogLevel = @{ Default = "Information"; "Microsoft.AspNetCore" = "Warning" } }
            AllowedHosts = "*"
            IIS_HOST = "127.0.0.1"
            IIS_PORT = $port
          }
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Write-Host "Config updated: IIS_PORT=$port"

          Restart-Service RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep 14
          $svc = Get-Service RfcCollector -EA SilentlyContinue
          Write-Host "Service: $($svc.Status)"

      - name: Test RFC Collector health
        shell: powershell
        run: |
          try {
            $r = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 10
            Write-Host "Collector: $($r.Content)"
          } catch { Write-Host "Collector error: $($_.Exception.Message)" }

      - name: Test full pipeline
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "FETCH HTTP $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(800,$r.Content.Length)))
          } catch { Write-Host "FETCH ERROR: $($_.Exception.Message)" }
