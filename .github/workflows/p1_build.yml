name: P1 Alt - Wire RFC Collector and test pipeline
on:
  workflow_dispatch:
jobs:
  wire:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Check IIS sites and available app
        shell: powershell
        run: |
          Import-Module WebAdministration
          Write-Host "=== IIS Sites ==="
          Get-Website | Select Name, State, @{n='Path';e={$_.PhysicalPath}} | Format-Table
          Write-Host "=== Store Tracker contents (port 80) ==="
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker" -ErrorAction SilentlyContinue | Select Name, Length | Format-Table
          Get-ChildItem "C:\inetpub\wwwroot\Store Tracker\bin" -Filter "*.dll" -ErrorAction SilentlyContinue | Measure-Object | Select Count
          Write-Host "=== RfcApp contents (port 8888) ==="
          Get-ChildItem "C:\RfcApp" -ErrorAction SilentlyContinue | Select Name, Length | Format-Table
          Get-ChildItem "C:\RfcApp\bin" -Filter "*.dll" -ErrorAction SilentlyContinue | Measure-Object | Select Count

      - name: Check RFC Collector config
        shell: powershell
        run: |
          Write-Host "=== appsettings.json ==="
          Get-Content "C:\RfcCollector\appsettings.json" -ErrorAction SilentlyContinue
          Write-Host "=== RFC Collector service ==="
          Get-Service RfcCollector | Select Name, Status, StartType
          Write-Host "=== RfcCollector.exe version ==="
          (Get-Item "C:\RfcCollector\RfcCollector.exe" -ErrorAction SilentlyContinue).LastWriteTime

      - name: Rebuild and reinstall RFC Collector from source
        shell: powershell
        run: |
          $env:PATH = "C:\dotnet8;" + $env:PATH
          $dotnet = if (Get-Command dotnet -EA SilentlyContinue) {"dotnet"} else {"C:\dotnet8\dotnet.exe"}
          Write-Host "dotnet: $($dotnet)"
          & $dotnet publish rfc-collector/RfcCollector/RfcCollector.csproj -c Release -r win-x64 --self-contained true -o C:\RfcCollector
          Write-Host "Publish exit: $LASTEXITCODE"
          Get-ChildItem C:\RfcCollector | Select Name | Format-Table

      - name: Set correct env and restart service
        shell: powershell
        run: |
          # Update appsettings.json — point to Store Tracker on port 80
          $cfg = @{
            Logging = @{ LogLevel = @{ Default = "Information"; "Microsoft.AspNetCore" = "Warning" } }
            AllowedHosts = "*"
            IIS_HOST = "127.0.0.1"
            IIS_PORT = "80"
          }
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Write-Host "Config written"
          # Restart service
          Restart-Service RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep 12
          Write-Host "RfcCollector: $((Get-Service RfcCollector).Status)"
          # Quick health check
          try { $r = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8; Write-Host "Collector health: $($r.Content)" } catch { Write-Host "Collector: $($_.Exception.Message)" }

      - name: Test Store Tracker IIS on :80
        shell: powershell
        run: |
          # Test the ACTUAL route the IIS app uses
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try { $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20; Write-Host "IIS :80 Execute: HTTP $($r.StatusCode) — $($r.Content.Substring(0,200))" } catch { Write-Host "IIS :80: $($_.Exception.Message)" }
          # Also test RFC Collector fetch
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try { $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60; Write-Host "FETCH: HTTP $($r.StatusCode) — $($r.Content.Substring(0,[Math]::Min(500,$r.Content.Length)))" } catch { Write-Host "FETCH: $($_.Exception.Message)" }
