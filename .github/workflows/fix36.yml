name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Copy from LIVE Vendor SRM + switch to SAP Dev + test
        shell: cmd
        run: |
          set LIVEPATH=D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC

          echo === Live site DLL count ===
          dir "%LIVEPATH%\bin\Vendor*.dll" /B 2>nul
          dir "%LIVEPATH%\bin\*.dll" /B 2>nul | find /c ".dll"

          echo === Copy entire live app to C:\V2RfcApi ===
          robocopy "%LIVEPATH%" C:\V2RfcApi /E /IS /IT /NFL /NDL /XD .git
          echo ROBOCOPY: %ERRORLEVEL%

          echo === DLLs in V2RfcApi after copy ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

          echo === Switch Web.config to SAP Dev ===
          powershell -NoProfile -Command "$c=Get-Content 'C:\V2RfcApi\Web.config' -Raw; $c=$c -replace '192.168.144.170','192.168.144.174'; $c=$c -replace '<add key=""Client"" value=""600""','<add key=""Client"" value=""210""'; $c=$c -replace 'customErrors mode=""On""','customErrors mode=""Off""'; $c=$c -replace 'customErrors mode=""RemoteOnly""','customErrors mode=""Off""'; [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config',$c,[System.Text.Encoding]::UTF8); Write-Host Done"
          
          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|Client|SystemNumber|User|customErrors' | Select -First 8"

          echo === Recycle pool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === Test ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());$b=$s.ReadToEnd();Write-Host 'HEALTH_ERR_BODY:' $b.Substring(0,[Math]::Min(500,$b.Length))}else{Write-Host 'HEALTH_ERR:' $_.Exception.Message}}"

          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode; Write-Host $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());$bd=$s.ReadToEnd();Write-Host 'EXECUTE_ERR_BODY:' $bd.Substring(0,[Math]::Min(500,$bd.Length))}else{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}}"
