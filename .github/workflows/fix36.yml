name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Read Web.config and check event log for 500 error
        shell: powershell
        run: |
          Write-Host "=== C:\V2RfcApi\Web.config ==="
          Get-Content "C:\V2RfcApi\Web.config"

          Write-Host "=== Windows Event Log — last app errors ==="
          Get-EventLog -LogName Application -EntryType Error -Newest 5 -EA SilentlyContinue | 
            Select TimeGenerated, Source, @{n='Msg';e={$_.Message.Substring(0,[Math]::Min(300,$_.Message.Length))}} | 
            Format-List

          Write-Host "=== Check bin DLLs ==="
          Get-ChildItem "C:\V2RfcApi\bin" -Filter "*.dll" | Select Name | Format-Table

          Write-Host "=== sapnco in System32 ==="
          Test-Path "C:\Windows\System32\sapnco.dll"
          Test-Path "C:\Windows\System32\sapnco_utils.dll"

      - name: Copy Web.config from LIVE Vendor SRM and test
        shell: powershell
        run: |
          Write-Host "=== LIVE Vendor SRM Web.config location ==="
          $livesite = (Get-Website "LIVE Vendor SRM" -EA SilentlyContinue)
          if ($livesite) {
            Write-Host "Live site path: $($livesite.PhysicalPath)"
            $liveWebConfig = "$($livesite.PhysicalPath)\Web.config"
            if (Test-Path $liveWebConfig) {
              Write-Host "=== Live Web.config SAP settings ==="
              Get-Content $liveWebConfig | Select-String -Pattern "SAP|sap|rfcDestination|RfcDestination|appSettings|connectionString" | Select -First 20
              Write-Host "=== Copying live Web.config to V2RfcApi ==="
              Copy-Item $liveWebConfig "C:\V2RfcApi\Web.config" -Force
              Write-Host "Copied"
            }
          } else {
            Write-Host "LIVE Vendor SRM not found — checking VendorSRM"
            $vs = Get-Website "VendorSRM" -EA SilentlyContinue
            if ($vs) {
              Write-Host "VendorSRM path: $($vs.PhysicalPath)"
              Copy-Item "$($vs.PhysicalPath)\Web.config" "C:\V2RfcApi\Web.config" -Force
              Write-Host "Copied from VendorSRM"
            }
          }
          
          Import-Module WebAdministration
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 10

          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "EXECUTE: HTTP $($r.StatusCode)"
            Write-Host $r.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
