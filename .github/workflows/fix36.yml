name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Robocopy FMS_PUTWAY to V2RfcApi + fix Web.config + test
        shell: cmd
        run: |
          echo === Copy from FMS_PUTWAY ===
          robocopy "D:\V2 Published\FMS_PUTWAY" C:\V2RfcApi /E /IS /IT /NFL /NDL /XD ".git" "logs" "App_Data"
          echo ROBOCOPY: %ERRORLEVEL%

          echo === DLL count ===
          dir C:\V2RfcApi\bin\Vendor_SRM*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

          echo === Fix Web.config ===
          powershell -NoProfile -Command "$c=Get-Content 'C:\V2RfcApi\Web.config' -Raw; $c=$c.Replace('192.168.144.170','192.168.144.174').Replace('value="600"','value="210"'); if($c -notmatch 'customErrors'){$c=$c.Replace('</system.web>','<customErrors mode="Off"/></system.web>')}else{$c=$c.Replace('customErrors mode="On"','customErrors mode="Off"').Replace('customErrors mode="RemoteOnly"','customErrors mode="Off"')}; [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config',$c,[System.Text.Encoding]::UTF8); Write-Host Updated"

          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|Client|SystemNumber|customErrors' | Select -First 8"

          echo === Ensure site on 9191 ===
          C:\Windows\System32\inetsrv\appcmd.exe list apppool /apppool.name:V2RfcApiPool 2>nul || C:\Windows\System32\inetsrv\appcmd.exe add apppool /name:V2RfcApiPool /managedRuntimeVersion:v4.0 /managedPipelineMode:Integrated
          C:\Windows\System32\inetsrv\appcmd.exe list site /site.name:V2RfcApi 2>nul || C:\Windows\System32\inetsrv\appcmd.exe add site /name:V2RfcApi /bindings:http/*:9191: /physicalPath:C:\V2RfcApi
          C:\Windows\System32\inetsrv\appcmd.exe set site /site.name:V2RfcApi /[path='/'].applicationPool:V2RfcApiPool 2>nul
          C:\Windows\System32\inetsrv\appcmd.exe start site /site.name:V2RfcApi 2>nul
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === Port 9191 ===
          netstat -ano | findstr ":9191"

          echo === Health test ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH_OK:' $r.StatusCode $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());Write-Host 'HEALTH_BODY:' $s.ReadToEnd().Substring(0,2000)}else{Write-Host 'HEALTH_ERR:' $_.Exception.Message}}"

          echo === Execute test ===
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE_OK:' $r.StatusCode;Write-Host $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());Write-Host 'EXECUTE_BODY:' $s.ReadToEnd().Substring(0,2000)}else{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}}"
