name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Fix Web.config Client 600 to 210 and test
        shell: cmd
        run: |
          echo === Current first Client line ===
          findstr /n "Client" C:\V2RfcApi\Web.config | findstr /v "<!--" | head

          echo === Replace Client 600 to 210 (first occurrence only) and fix customErrors ===
          powershell -NoProfile -Command "$content = [System.IO.File]::ReadAllText('C:\V2RfcApi\Web.config'); $replaced = $false; $lines = $content -split '
'; $out = foreach ($line in $lines) { if (-not $replaced -and $line -match 'key="Client"' -and $line -notmatch '<!--') { $line = $line -replace 'value="600"','value="210"'; $replaced = $true; Write-Host 'FIXED:' $line.Trim() }; $line }; $fixed = $out -join '
'; $fixed = $fixed -replace 'customErrors mode=Off','customErrors mode="Off"'; $fixed = $fixed -replace 'customErrors mode=On','customErrors mode="Off"'; $fixed = $fixed -replace 'customErrors mode=RemoteOnly','customErrors mode="Off"'; [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config', $fixed, [System.Text.Encoding]::UTF8); Write-Host 'Saved'"

          echo === Verify ===
          findstr "AppServerHost\|Client\|SystemNumber" C:\V2RfcApi\Web.config | findstr /v "<!--" | findstr /v "185\|174.*210\|174.*00"

          echo === Recycle V2RfcApiPool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === Test localhost:9191 ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"

          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode;Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
