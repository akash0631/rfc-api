name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Diagnose 500 error and fix Web.config
        shell: cmd
        run: |
          echo === Web.config content ===
          type C:\V2RfcApi\Web.config

          echo === Windows Event Log errors ===
          powershell -NoProfile -Command "Get-EventLog -LogName Application -EntryType Error -Newest 3 -EA SilentlyContinue | ForEach-Object { Write-Host $_.TimeGenerated $_.Source; Write-Host $_.Message.Substring(0,[Math]::Min(400,$_.Message.Length)) }"

          echo === NCo in System32 ===
          dir C:\Windows\System32\sapnco.dll 2>nul && echo NCo PRESENT || echo NCo MISSING

          echo === Find LIVE site Web.config ===
          C:\Windows\System32\inetsrv\appcmd.exe list site /site.name:"LIVE Vendor SRM"
          C:\Windows\System32\inetsrv\appcmd.exe list vdir /site.name:"LIVE Vendor SRM"

      - name: Copy live Web.config and test
        shell: cmd
        run: |
          echo === Get LIVE Vendor SRM physical path ===
          for /f "tokens=3 delims=:" %%a in ('C:\Windows\System32\inetsrv\appcmd.exe list vdir /site.name:"LIVE Vendor SRM" ^| findstr "physicalPath"') do set LIVEPATH=%%a
          echo Live path: %LIVEPATH%

          echo === Try VendorSRM site instead ===
          C:\Windows\System32\inetsrv\appcmd.exe list vdir /site.name:"VendorSRM"

          echo === Copy from Routemaster RFC site (most likely same app) ===
          C:\Windows\System32\inetsrv\appcmd.exe list vdir /site.name:"Routemaster_RFC_V2SRM"

          echo === Copy Web.config from Routemaster_RFC_V2SRM ===
          for /f "tokens=*" %%a in ('C:\Windows\System32\inetsrv\appcmd.exe list vdir /site.name:"Routemaster_RFC_V2SRM" /text:physicalPath') do set RFCPATH=%%a
          echo RFC path: %RFCPATH%
          if exist "%RFCPATH%\Web.config" (
            copy /Y "%RFCPATH%\Web.config" C:\V2RfcApi\Web.config
            echo Copied from Routemaster RFC
          )

          echo === Recycle pool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 10 /nobreak

          echo === Test localhost:9191 ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
