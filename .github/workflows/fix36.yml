name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Check all existing live sites are still running
        shell: cmd
        run: |
          echo === ALL SITES STATUS ===
          C:\Windows\System32\inetsrv\appcmd.exe list sites

          echo === Test live sites ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:6060/' -UseBasicParsing -TimeoutSec 8;Write-Host 'VendorSRM 6060: OK' $r.StatusCode}catch{Write-Host 'VendorSRM 6060: ERR' $_.Exception.Message}"
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:8002/' -UseBasicParsing -TimeoutSec 8;Write-Host 'LIVE VendorSRM 8002: OK' $r.StatusCode}catch{Write-Host 'LIVE VendorSRM 8002: ERR' $_.Exception.Message}"
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:8181/' -UseBasicParsing -TimeoutSec 8;Write-Host 'VendorHUNewAPI 8181: OK' $r.StatusCode}catch{Write-Host 'VendorHUNewAPI 8181: ERR' $_.Exception.Message}"

          echo === V2RfcApi our new site ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/' -UseBasicParsing -TimeoutSec 8;Write-Host '9191: OK' $r.StatusCode}catch{Write-Host '9191: ERR' $_.Exception.Message}"

          echo === Check D drive live source is untouched ===
          dir "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC\bin\Vendor*.dll" /B 2>nul
