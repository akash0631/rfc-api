name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Fix Web.config SAP settings and test
        shell: powershell
        run: |
          # Read and show current Web.config around SAP settings
          $lines = Get-Content "C:\V2RfcApi\Web.config"
          Write-Host "=== Current SAP config lines ==="
          $lines | Select-String -Pattern "AppServerHost|Client|SystemNumber|User|Password|customErrors" | Select -First 15

          # Fix using XML parsing — most reliable approach
          [xml]$xml = Get-Content "C:\V2RfcApi\Web.config"
          
          $appSettings = $xml.configuration.appSettings.add
          
          foreach ($s in $appSettings) {
            if ($s.key -eq "AppServerHost") { $s.value = "192.168.144.174"; Write-Host "Set AppServerHost: $($s.value)" }
            if ($s.key -eq "Client")        { $s.value = "210";             Write-Host "Set Client: $($s.value)" }
            if ($s.key -eq "SystemNumber")  { $s.value = "00";              Write-Host "Set SystemNumber: $($s.value)" }
            if ($s.key -eq "User")          { $s.value = "POWERBI";         Write-Host "Set User: $($s.value)" }
            if ($s.key -eq "Password")      { $s.value = "India@123456";    Write-Host "Set Password: ***" }
          }

          # Enable custom errors off
          $sysWeb = $xml.configuration."system.web"
          if ($sysWeb.customErrors) {
            $sysWeb.customErrors.mode = "Off"
          } else {
            $ce = $xml.CreateElement("customErrors")
            $ce.SetAttribute("mode", "Off")
            $sysWeb.AppendChild($ce) | Out-Null
          }

          $xml.Save("C:\V2RfcApi\Web.config")
          Write-Host "Web.config saved"

          # Verify
          Write-Host "=== Updated SAP config ==="
          [xml]$verify = Get-Content "C:\V2RfcApi\Web.config"
          $verify.configuration.appSettings.add | Where-Object {$_.key -in @("AppServerHost","Client","SystemNumber","User")} | ForEach-Object { Write-Host "$($_.key) = $($_.value)" }

          # Recycle pool
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 15

          # Test
          Write-Host "=== Testing localhost:9191 ==="
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'

          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: $($r.StatusCode) $($r.Content)"
          } catch {
            if ($_.Exception.Response) {
              $reader = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
              $body2 = $reader.ReadToEnd()
              Write-Host "HEALTH 500 BODY:"
              # Extract just the error message from HTML
              if ($body2 -match "Server Error.*?<b>(.*?)</b>") { Write-Host $Matches[1] }
              if ($body2 -match "Exception Details.*?<b>(.*?)</b>") { Write-Host $Matches[1] }
              if ($body2 -match "System\.\w+Exception.*?(?=<br>)") { Write-Host $Matches[0] }
            } else { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          }

          try {
            $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "EXECUTE: $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
