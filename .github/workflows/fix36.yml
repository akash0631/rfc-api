name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Copy ONLY bin + webconfig from LIVE Vendor SRM to V2RfcApi
        shell: cmd
        run: |
          set LIVEPATH=D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC

          echo === DLL count in live app ===
          dir "%LIVEPATH%\bin\Vendor*.dll" /B 2>nul
          dir "%LIVEPATH%\bin\*.dll" /B 2>nul | find /c ".dll"

          echo === Copy only bin folder ===
          robocopy "%LIVEPATH%\bin" C:\V2RfcApi\bin /E /IS /IT /NFL /NDL
          echo ROBOCOPY BIN: %ERRORLEVEL%

          echo === Copy Web.config and Global.asax only ===
          copy /Y "%LIVEPATH%\Web.config" C:\V2RfcApi\Web.config
          copy /Y "%LIVEPATH%\Global.asax" C:\V2RfcApi\Global.asax 2>nul

          echo === DLLs now in V2RfcApi bin ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

          echo === Switch Web.config to SAP Dev 192.168.144.174 client 210 ===
          powershell -NoProfile -Command "$c=Get-Content 'C:\V2RfcApi\Web.config' -Raw; $c=$c -replace '192.168.144.170','192.168.144.174'; $c=$c -replace '<add key=""Client"" value=""600""','<add key=""Client"" value=""210""'; $c=$c -replace 'customErrors mode=""On""','customErrors mode=""Off""'; $c=$c -replace 'customErrors mode=""RemoteOnly""','customErrors mode=""Off""'; [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config',$c,[System.Text.Encoding]::UTF8); Write-Host Switched"
          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|Client|SystemNumber|User' | Select -First 6"

          echo === Recycle app pool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === Test localhost:9191 ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/' -UseBasicParsing -TimeoutSec 10;Write-Host 'ROOT: OK' $r.StatusCode}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());Write-Host 'ROOT_ERR_BODY:' $s.ReadToEnd().Substring(0,500)}else{Write-Host 'ROOT_ERR:' $_.Exception.Message}}"

          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH: OK' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"

          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE: OK' $r.StatusCode; Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
