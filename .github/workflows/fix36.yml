name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: List bins of all candidate live RFC sites
        shell: cmd
        run: |
          echo === Routemaster_RFC_V2SRM bin (D:\V2 Published\FMS_PUTWAY) ===
          dir "D:\V2 Published\FMS_PUTWAY\bin\*.dll" /B 2>nul | find /c ".dll"
          dir "D:\V2 Published\FMS_PUTWAY\bin\Vendor*.dll" /B 2>nul

          echo === Current C:\V2RfcApi bin ===
          dir "C:\V2RfcApi\bin\*.dll" /B 2>nul | find /c ".dll"
          dir "C:\V2RfcApi\bin\Vendor*.dll" /B 2>nul

          echo === VendorSRM at D:\V2_Vendor_PPT_SRM ===
          dir "D:\V2_Vendor_PPT_SRM\bin\*.dll" /B 2>nul | find /c ".dll"
          dir "D:\V2_Vendor_PPT_SRM\bin\Vendor*.dll" /B 2>nul

      - name: Copy from Routemaster_RFC (live RFC app) + fix Web.config + test
        shell: cmd
        run: |
          echo === Copy bin from Routemaster RFC (D:\V2 Published\FMS_PUTWAY) ===
          robocopy "D:\V2 Published\FMS_PUTWAY" C:\V2RfcApi /E /IS /IT /NFL /NDL /XD .git logs
          echo ROBOCOPY: %ERRORLEVEL%

          dir "C:\V2RfcApi\bin\*.dll" /B 2>nul | find /c ".dll"
          dir "C:\V2RfcApi\bin\Vendor*.dll" /B 2>nul

          echo === Fix Web.config: SAP Dev + customErrors Off ===
          powershell -NoProfile -Command "$c=Get-Content 'C:\V2RfcApi\Web.config' -Raw; $c=$c -replace '192.168.144.170','192.168.144.174'; $c=$c -replace '<add key=""Client"" value=""600""','<add key=""Client"" value=""210""'; if ($c -notmatch 'customErrors mode=""Off""') { $c=$c -replace '</system.web>','  <customErrors mode=""Off""/></system.web>' }; [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config',$c,[System.Text.Encoding]::UTF8); Write-Host 'Web.config updated'"

          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|Client|SystemNumber|customErrors' | Select -First 8"

          echo === Recycle pool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak

          echo === Test health ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'HEALTH OK:' $r.StatusCode $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());Write-Host 'HEALTH_ERR_BODY:' $s.ReadToEnd().Substring(0,1000)}else{Write-Host 'HEALTH_ERR:' $_.Exception.Message}}"

          echo === Test execute ===
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE OK:' $r.StatusCode;Write-Host $r.Content}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());Write-Host 'EXECUTE_ERR_BODY:' $s.ReadToEnd().Substring(0,1500)}else{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}}"
