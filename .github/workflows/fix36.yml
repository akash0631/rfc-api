name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Get Routemaster RFC path correctly and copy
        shell: cmd
        run: |
          echo === List all sites with physical paths ===
          C:\Windows\System32\inetsrv\appcmd.exe list vdir
          
      - name: Enable custom errors off and get real error
        shell: powershell
        run: |
          # Enable custom errors off to see real error
          $cfg = Get-Content "C:\V2RfcApi\Web.config" -Raw
          $cfg = $cfg -replace 'customErrors mode="On"', 'customErrors mode="Off"'
          $cfg = $cfg -replace 'customErrors mode="RemoteOnly"', 'customErrors mode="Off"'
          if ($cfg -notmatch 'customErrors') {
            $cfg = $cfg -replace '</system.web>', '  <customErrors mode="Off"/></system.web>'
          }
          [System.IO.File]::WriteAllText("C:\V2RfcApi\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "customErrors set to Off"

          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 12

          # Now get the full error
          try {
            $r = Invoke-WebRequest "http://localhost:9191/" -UseBasicParsing -TimeoutSec 15
            Write-Host "ROOT OK: $($r.StatusCode)"
            Write-Host $r.Content.Substring(0,[Math]::Min(1000,$r.Content.Length))
          } catch {
            if ($_.Exception.Response) {
              $stream = $_.Exception.Response.GetResponseStream()
              $reader = New-Object System.IO.StreamReader($stream)
              $body = $reader.ReadToEnd()
              Write-Host "ERROR BODY (first 2000 chars):"
              Write-Host $body.Substring(0,[Math]::Min(2000,$body.Length))
            } else {
              Write-Host "ERR: $($_.Exception.Message)"
            }
          }
