name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Open firewall ports on .36
        shell: cmd
        run: |
          netsh advfirewall firewall delete rule name="V2RfcApi-9191" >nul 2>&1
          netsh advfirewall firewall add rule name="V2RfcApi-9191" dir=in action=allow protocol=TCP localport=9191 profile=any
          netsh advfirewall firewall delete rule name="RfcApiApp-8888" >nul 2>&1
          netsh advfirewall firewall add rule name="RfcApiApp-8888" dir=in action=allow protocol=TCP localport=8888 profile=any
          echo Firewall done
          netsh advfirewall firewall show rule name="V2RfcApi-9191"

      - name: Check IIS and recycle V2RfcApiPool
        shell: cmd
        run: |
          echo === IIS Sites ===
          C:\Windows\System32\inetsrv\appcmd.exe list sites
          echo === App Pools ===
          C:\Windows\System32\inetsrv\appcmd.exe list apppools
          echo === Recycle V2RfcApiPool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          echo Recycle: %ERRORLEVEL%
          echo === Port 9191 listening? ===
          netstat -ano | findstr ":9191"
          echo === V2RfcApi bin DLLs ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\sapnco.dll 2>nul

      - name: Test V2RfcApi locally on .36
        shell: powershell
        run: |
          Start-Sleep 8
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          
          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: HTTP $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }

          try {
            $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "EXECUTE: HTTP $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
