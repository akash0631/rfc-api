name: Fix36
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Get exact 500 error from event log
        shell: cmd
        run: |
          echo === Last 3 Application Errors ===
          powershell -NoProfile -Command "Get-EventLog -LogName Application -EntryType Error -Newest 3 | ForEach-Object { Write-Host '---'; Write-Host $_.TimeGenerated; Write-Host $_.Source; Write-Host $_.Message }"

          echo === Try hitting root to get ASP.NET error detail ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/' -UseBasicParsing -TimeoutSec 10;Write-Host $r.Content}catch{$body=$_.Exception.Response;if($body){$s=New-Object System.IO.StreamReader($body.GetResponseStream());Write-Host $s.ReadToEnd()}else{Write-Host $_.Exception.Message}}"
