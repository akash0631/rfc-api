name: WRANGLER_DEPLOY_WITH_SECRET
on:
  push:
    paths:
      - '.github/workflows/wrangler_deploy.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install wrangler and deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_KEY_SECRET: ${{ secrets.CF_API_KEY }}
        run: |
          npm install -g wrangler@latest
          
          # First: set the secret properly (put it directly in the deployed version)
          echo "$CLOUDFLARE_API_KEY_SECRET" | wrangler secret put CLOUDFLARE_API_KEY 2>&1 || true
          
          # Deploy the worker fresh (this includes all secrets in state)
          echo "=== Deploying worker ==="
          wrangler deploy 2>&1
          echo "Deploy exit: $?"
          
          # List secrets
          echo "=== Worker secrets ==="
          wrangler secret list 2>&1
