name: CheckAndBuild36
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Check controller exists in local VS + rebuild
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application

          echo === Check Finance folder in local VS project ===
          dir "%VSPROJ%\Controllers\Finance" /B 2>nul

          echo === Check if ZAdvancePaymentRfc controller exists ===
          dir "%VSPROJ%\Controllers\Finance\*Advance*" 2>nul || echo NOT FOUND

          echo === Copy Finance controllers from GitHub repo ===
          if not exist "%VSPROJ%\Controllers\Finance" mkdir "%VSPROJ%\Controllers\Finance"
          copy /Y Controllers\Finance\*.cs "%VSPROJ%\Controllers\Finance\"
          echo Copied: %ERRORLEVEL%

          echo === Verify controller exists ===
          dir "%VSPROJ%\Controllers\Finance\*Advance*" 2>nul

          echo === Clean obj and rebuild ===
          rmdir /s /q "%VSPROJ%\obj" 2>nul
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe
          "%MSBUILD%" "%VSPROJ%\Vendor_SRM_Routing_Application.csproj" ^
            /p:Configuration=Release /p:Platform=AnyCPU ^
            /p:OutputPath=C:\V2RfcApi\bin\ ^
            /p:VisualStudioVersion=17.0 ^
            /t:Clean;Build ^
            /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 exit /b 1
          dir C:\V2RfcApi\bin\Vendor*.dll /B

      - name: Write correct Web.config and test
        shell: powershell
        run: |
          $w = '<?xml version="1.0" encoding="utf-8"?><configuration><appSettings><add key="webpages:Version" value="3.0.0.0"/><add key="webpages:Enabled" value="false"/><add key="ClientValidationEnabled" value="true"/><add key="UnobtrusiveJavaScriptEnabled" value="true"/><add key="Name" value="Connection Name"/><add key="AppServerHost" value="192.168.144.174"/><add key="Client" value="210"/><add key="User" value="POWERBI"/><add key="Password" value="India@123456"/><add key="SystemNumber" value="00"/><add key="Language" value="EN"/></appSettings><system.web><compilation debug="true" targetFramework="4.8"/><httpRuntime targetFramework="4.8" maxRequestLength="2147483647"/><customErrors mode="Off"/></system.web><system.webServer><handlers><remove name="ExtensionlessUrlHandler-Integrated-4.0"/><remove name="OPTIONSVerbHandler"/><remove name="TRACEVerbHandler"/><add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0"/></handlers></system.webServer></configuration>'
          [System.IO.File]::WriteAllText('C:\V2RfcApi\Web.config', $w, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config written: SAP 192.168.144.174 / client 210"

          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 15

          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 15
            Write-Host "HEALTH: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "=== EXECUTE SUCCESS ==="
            Write-Host "HTTP: $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
