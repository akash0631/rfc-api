name: Deploy to .36
on:
  push:
    branches: [master]
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - '.github/workflows/deploy_36.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Sync controllers + build + deploy to C:\V2RfcTest
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application
          set REPO=C:\actions-runner\_work\rfc-api\rfc-api
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe

          echo === Sync controllers from GitHub to local VS project ===
          robocopy "%REPO%\Controllers" "%VSPROJ%\Controllers" /E /IS /IT /NFL /NDL
          echo Controllers synced: %ERRORLEVEL%

          echo === Build using VS2022 MSBuild ===
          if not exist C:\V2RfcTest\bin mkdir C:\V2RfcTest\bin
          "%MSBUILD%" "%VSPROJ%\Vendor_SRM_Routing_Application.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=C:\V2RfcTest\bin\ /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
          if %ERRORLEVEL% NEQ 0 (echo BUILD FAILED && exit /b 1)
          echo BUILD SUCCESS

          echo === Copy dependency DLLs ===
          robocopy "%VSPROJ%\bin" C:\V2RfcTest\bin /E /IS /IT /NFL /NDL /XF Vendor_SRM_Routing_Application.dll
          echo DEPS COPIED

          echo === Copy Global.asax ===
          copy /Y "%VSPROJ%\Global.asax" C:\V2RfcTest\Global.asax
          echo GLOBAL.ASAX: %ERRORLEVEL%

          echo === DLL count ===
          dir C:\V2RfcTest\bin\*.dll /B 2>nul | find /c ".dll"
          dir C:\V2RfcTest\bin\Vendor*.dll /B 2>nul

      - name: Write valid Web.config
        shell: powershell
        run: |
          # Write via here-string — no escaping issues
          $cfg = @"
<?xml version="1.0" encoding="utf-8"?>
<configuration>
  <appSettings>
    <add key="webpages:Version" value="3.0.0.0" />
    <add key="webpages:Enabled" value="false" />
    <add key="ClientValidationEnabled" value="true" />
    <add key="UnobtrusiveJavaScriptEnabled" value="true" />
    <add key="Name" value="V2Dev" />
    <add key="AppServerHost" value="192.168.144.174" />
    <add key="Client" value="210" />
    <add key="User" value="POWERBI" />
    <add key="Password" value="India@123456" />
    <add key="SystemNumber" value="00" />
    <add key="Language" value="EN" />
  </appSettings>
  <system.web>
    <compilation debug="false" targetFramework="4.8" />
    <httpRuntime targetFramework="4.8" maxRequestLength="2147483647" />
    <customErrors mode="Off" />
  </system.web>
  <system.webServer>
    <handlers>
      <remove name="ExtensionlessUrlHandler-Integrated-4.0" />
      <add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0" />
    </handlers>
  </system.webServer>
</configuration>
"@
          [System.IO.File]::WriteAllText("C:\V2RfcTest\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config written"

          # Validate XML
          try {
            [xml]$x = Get-Content "C:\V2RfcTest\Web.config"
            Write-Host "XML VALID"
            $x.configuration.appSettings.add | Where-Object {$_.key -in @("AppServerHost","Client","SystemNumber")} | ForEach-Object { Write-Host "$($_.key) = $($_.value)" }
          } catch { Write-Host "XML INVALID: $($_.Exception.Message)" }

          # Check Global.asax
          Write-Host "Global.asax exists: $(Test-Path 'C:\V2RfcTest\Global.asax')"

          # Recycle pool
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15

          # Test
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "=== EXECUTE SUCCESS ==="
            Write-Host "HTTP: $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
