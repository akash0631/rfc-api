name: Deploy to .36
on:
  push:
    branches: [master]
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - '.github/workflows/deploy_36.yml'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Sync controllers from GitHub to local VS project
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application
          set REPO=C:\actions-runner\_work\rfc-api\rfc-api

          echo === Syncing new controllers from GitHub to local VS project ===
          robocopy "%REPO%\Controllers" "%VSPROJ%\Controllers" /E /IS /IT /NFL /NDL
          echo ROBOCOPY Controllers: %ERRORLEVEL%

          robocopy "%REPO%\Models" "%VSPROJ%\Models" /E /IS /IT /NFL /NDL 2>nul
          echo ROBOCOPY Models: %ERRORLEVEL%

          echo === Controller count in VS project ===
          dir "%VSPROJ%\Controllers" /S /B /A-D 2>nul | find /c ".cs"

      - name: Build using local VS project and deploy to C:\V2RfcTest
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe

          if not exist C:\V2RfcTest\bin mkdir C:\V2RfcTest\bin

          echo === Building with VS2022 MSBuild ===
          "%MSBUILD%" "%VSPROJ%\Vendor_SRM_Routing_Application.csproj" ^
            /p:Configuration=Release /p:Platform=AnyCPU ^
            /p:OutputPath=C:\V2RfcTest\bin\ ^
            /p:VisualStudioVersion=17.0 ^
            /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 exit /b 1

          echo === Copy all dependency DLLs from VS project bin ===
          robocopy "%VSPROJ%\bin" C:\V2RfcTest\bin /E /IS /IT /NFL /NDL /XF Vendor_SRM_Routing_Application.dll
          echo ALL DLLs: %ERRORLEVEL%

          echo === DLL count ===
          dir C:\V2RfcTest\bin\*.dll /B 2>nul | find /c ".dll"
          dir C:\V2RfcTest\bin\Vendor*.dll /B 2>nul

          echo === Recycle ONLY V2RfcTestPool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool
          timeout /t 15 /nobreak

      - name: Write Web.config and test
        shell: powershell
        run: |
          $cfg = '<?xml version="1.0" encoding="utf-8"?><configuration><appSettings><add key="webpages:Version" value="3.0.0.0"/><add key="webpages:Enabled" value="false"/><add key="ClientValidationEnabled" value="true"/><add key="UnobtrusiveJavaScriptEnabled" value="true"/><add key="Name" value="V2Dev"/><add key="AppServerHost" value="192.168.144.174"/><add key="Client" value="210"/><add key="User" value="POWERBI"/><add key="Password" value="India@123456"/><add key="SystemNumber" value="00"/><add key="Language" value="EN"/></appSettings><system.web><compilation debug="false" targetFramework="4.8"/><httpRuntime targetFramework="4.8" maxRequestLength="2147483647"/><customErrors mode="Off"/></system.web><system.webServer><handlers><remove name="ExtensionlessUrlHandler-Integrated-4.0"/><remove name="OPTIONSVerbHandler"/><remove name="TRACEVerbHandler"/><add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0"/></handlers></system.webServer></configuration>'
          [System.IO.File]::WriteAllText("C:\V2RfcTest\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config: SAP Dev 192.168.144.174 / client 210"

          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15

          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "=== HEALTH: $($r.StatusCode) $($r.Content) ==="
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "=== EXECUTE SUCCESS: $($r2.StatusCode) ==="
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
