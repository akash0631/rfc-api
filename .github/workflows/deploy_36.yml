name: Deploy to .36
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - '.github/workflows/deploy_36.yml'
jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Get real 500 error from event log
        shell: powershell
        run: |
          Write-Host "=== Last 5 Application errors ==="
          Get-EventLog -LogName Application -EntryType Error -Newest 5 -EA SilentlyContinue | 
            Where-Object {$_.Source -match "ASP|IIS|W3SVC|Application"} |
            ForEach-Object { 
              Write-Host "---"
              Write-Host $_.TimeGenerated
              Write-Host $_.Source
              Write-Host $_.Message.Substring(0,[Math]::Min(600,$_.Message.Length))
            }

          Write-Host "=== Check C:\V2RfcTest bin DLL count ==="
          (Get-ChildItem "C:\V2RfcTest\bin" -Filter "*.dll").Count
          Get-ChildItem "C:\V2RfcTest\bin" -Filter "Vendor*.dll" | Select Name

          Write-Host "=== Check Web.config is valid XML ==="
          try {
            [xml]$x = Get-Content "C:\V2RfcTest\Web.config"
            Write-Host "Web.config is valid XML"
            $x.configuration.appSettings.add | Where-Object {$_.key -in @("AppServerHost","Client","User")} | Format-Table
          } catch { Write-Host "Web.config XML error: $($_.Exception.Message)" }

          Write-Host "=== Check Global.asax exists ==="
          Test-Path "C:\V2RfcTest\Global.asax"

          Write-Host "=== Recycle and test ==="
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 12

          try {
            $r = Invoke-WebRequest "http://localhost:9292/" -UseBasicParsing -TimeoutSec 10
            Write-Host "ROOT: $($r.StatusCode)"
          } catch {
            if ($_.Exception.Response) {
              $s = New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream())
              $body = $s.ReadToEnd()
              Write-Host "500 BODY (first 1000):"
              # Extract just the exception message
              if ($body -match 'System\.\w+Exception[^<]+') { Write-Host $Matches[0] }
              if ($body -match 'at [A-Za-z\.]+\(') { Write-Host $Matches[0] }
              Write-Host $body.Substring(0,[Math]::Min(800,$body.Length))
            } else {
              Write-Host "ERR: $($_.Exception.Message)"
            }
          }
