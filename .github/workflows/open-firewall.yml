name: Open firewall port 9090 on VM-CRM
on:
  workflow_dispatch:

jobs:
  open-port:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Add Windows Firewall rule for port 9090
        shell: powershell
        run: |
          $ruleName = "RfcCollector-9090"
          $existing = Get-NetFirewallRule -DisplayName $ruleName -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Firewall rule already exists"
          } else {
            New-NetFirewallRule -DisplayName $ruleName -Direction Inbound -Protocol TCP -LocalPort 9090 -Action Allow
            Write-Host "Firewall rule created for port 9090"
          }
          
          # Verify the app is running and listening
          $listening = netstat -ano | Select-String ":9090"
          Write-Host "Port 9090 listeners: $listening"
          
          # Test local health
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 5
            Write-Host "App healthy: $($r.Content)"
          } catch {
            Write-Host "App not responding - may need restart: $_"
          }
