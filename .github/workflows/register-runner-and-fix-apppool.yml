name: Register runner on v2-data-lake and fix AppPool

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: iis
    steps:
      - name: Register runner on v2-data-lake
        shell: powershell
        run: |
          $runnerDir = $null
          foreach ($d in @("C:\actions-runner","C:\runner","C:\github\runner")) {
            if (Test-Path $d) { $runnerDir = $d; break }
          }
          if (-not $runnerDir) {
            Write-Host "Finding runner dir..."
            $runnerDir = Split-Path (Get-Process Runner.Listener -ErrorAction SilentlyContinue | Select -First 1 -Expand Path) -Parent
          }
          Write-Host "Runner dir: $runnerDir"
          cd $runnerDir
          # Register on v2-data-lake (keeps existing rfc-api registration too)
          .\config.cmd --url https://github.com/akash0631/v2-data-lake --token BU2HDP7BHV6ZISXUNEGTRDDJZIQ2K --name iis-datalake --labels iis --unattended --replace
          Write-Host "Registered on v2-data-lake"

      - name: Fix IIS AppPool to run as local Administrator
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "V2RfcTestPool"
          Set-ItemProperty "IIS:\AppPools\$pool" -Name processModel -Value @{
            userName     = ".\Administrator"
            password     = "vrl@99999"
            identityType = "SpecificUser"
          }
          Restart-WebAppPool -Name $pool
          Start-Sleep -Seconds 5
          $p = Get-ItemProperty "IIS:\AppPools\$pool" -Name processModel
          Write-Host "Pool identity: $($p.userName) / $($p.identityType)"
          Write-Host "Pool state: $((Get-WebAppPoolState -Name $pool).Value)"

      - name: Test SQL connection to Server 28
        shell: powershell
        run: |
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection(
              "Server=192.168.151.28;Database=DataV2;Integrated Security=True;Connection Timeout=15;"
            )
            $conn.Open()
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = "SELECT @@SERVERNAME AS SRV, SUSER_NAME() AS LOGIN"
            $r = $cmd.ExecuteReader()
            while ($r.Read()) { Write-Host "SQL OK: $($r['SRV']) as $($r['LOGIN'])" }
            $conn.Close()
          } catch {
            Write-Host "SQL test: $_"
          }
