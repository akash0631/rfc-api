name: DIAG_IIS
on:
  push:
    paths:
      - '.github/workflows/diag_iis.yml'
jobs:
  diag:
    runs-on: [self-hosted, iis]
    steps:
      - name: Diagnose IIS and fix ZADVANCE
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $pubDir = "C:\V2RfcTest"
          
          # Check what DLLs exist in the bin folder
          Write-Host "=== DLLs in C:\V2RfcTest\bin ==="
          Get-ChildItem "$pubDir\bin" -Filter "*.dll" | Sort-Object Name | Select-Object Name, @{n='KB';e={[Math]::Round($_.Length/1KB,1)}} | Format-Table
          
          # Check the project bin/Release folder 
          $projBin = "D:\V2 Projects\Vendor_SRM_Routing_Application\bin"
          Write-Host "=== Project bin folder ==="
          if (Test-Path $projBin) {
            Get-ChildItem $projBin -Filter "Vendor*" | Select Name
            Get-ChildItem $projBin -Filter "*.dll" | Measure | Select Count
          } else { Write-Host "Not found: $projBin" }
          
          # Check all possible bin locations
          $locations = @(
            "D:\V2 Projects\Vendor_SRM_Routing_Application\bin",
            "D:\V2 Projects\Vendor_SRM_Routing_Application\bin\Release",
            "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC",
            "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC\bin"
          )
          foreach ($loc in $locations) {
            if (Test-Path $loc) {
              Write-Host "=== FOUND: $loc ==="
              Get-ChildItem $loc -Filter "Vendor*" -ErrorAction SilentlyContinue | Select Name
              Get-ChildItem $loc -Filter "*.dll" -ErrorAction SilentlyContinue | Measure-Object | Select Count
            }
          }
          
          # Look for the main application DLL
          $appDll = Get-ChildItem "D:\V2 Projects" -Recurse -Filter "Vendor_SRM_Routing_Application.dll" -ErrorAction SilentlyContinue | Select -First 3
          Write-Host "=== App DLL locations ==="
          $appDll | Select FullName, @{n='Date';e={$_.LastWriteTime.ToString('yyyy-MM-dd HH:mm')}}
          
          # If there's a published version with the DLL, copy it
          $bestDll = $appDll | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($bestDll) {
            $srcBin = Split-Path $bestDll.FullName
            Write-Host "=== Best source bin: $srcBin ==="
            Write-Host "Copying to C:\V2RfcTest\bin..."
            Copy-Item "$srcBin\*.dll" "$pubDir\bin\" -Force -ErrorAction SilentlyContinue
            Copy-Item "$srcBin\*.pdb" "$pubDir\bin\" -Force -ErrorAction SilentlyContinue
            Write-Host "Copied"
          }
          
          # Recycle app pool
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool 2>&1 | Write-Host
          Start-Sleep 5
          
          # Test ZADVANCE
          Write-Host "=== ZADVANCE test ==="
          try {
            $r = Invoke-WebRequest "http://localhost:9292/api/ZADVANCE_PAYMENT_RFC/Post" -Method POST `
              -Body '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260101","I_POSTING_DATE_HIGH":"20260320"}' `
              -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "ZADVANCE: $($r.Content.Substring(0,[Math]::Min(150,$r.Content.Length)))"
          } catch { Write-Host "ZADVANCE: $_" }
          
          exit 0
