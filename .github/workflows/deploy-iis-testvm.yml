name: Build and Deploy to .36 IIS (via test-vm)
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - 'Models/**'

jobs:
  build:
    runs-on: windows-latest
    name: NuGet restore + MSBuild on GitHub runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: NuGet restore
        run: nuget restore Vendor_SRM_Routing_Application.sln
        shell: cmd

      - name: MSBuild compile
        shell: cmd
        run: msbuild Vendor_SRM_Routing_Application.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Build /m /v:minimal

      - name: Upload compiled bin as artifact
        uses: actions/upload-artifact@v4
        with:
          name: iis-bin
          path: |
            **/bin/*.dll
            **/bin/*.pdb
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: [self-hosted, test-vm]
    name: Copy DLL to .36 via SMB + recycle pool
    needs: build
    steps:
      - name: Download compiled bin artifact
        uses: actions/download-artifact@v4
        with:
          name: iis-bin
          path: bin-artifact

      - name: Copy DLL to .36 via SMB + recycle pool
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          # Mount admin share on .36
          Write-Host "Mounting \\192.168.151.36\C$"
          $netResult = & cmd /c "net use \\192.168.151.36\C$ vrl@55555 /user:V2DC-ADDVERB\Administrator" 2>&1
          Write-Host "net use result: $netResult"
          if ($LASTEXITCODE -ne 0 -and $netResult -notmatch 'already been connected') {
            throw "net use failed (exit $LASTEXITCODE): $netResult"
          }

          # Copy all DLLs to IIS bin folder
          $dest = "\\192.168.151.36\C$\V2RfcTest\bin"
          $dlls = Get-ChildItem -Path "bin-artifact" -Recurse -Filter "*.dll"
          $copied = 0
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName "$dest\$($dll.Name)" -Force
            Write-Host "Copied: $($dll.Name)"
            $copied++
          }
          Write-Host "Copied $copied DLL(s) to $dest"

          # Disconnect admin share
          & cmd /c "net use \\192.168.151.36\C$ /delete /yes" 2>&1 | Out-Null

      - name: Recycle IIS pool + health check via PS-Remote
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          $pass = ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force
          $cred = New-Object PSCredential('V2DC-ADDVERB\Administrator', $pass)
          $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -ErrorAction Stop

          Invoke-Command -Session $s -ScriptBlock {
            # Recycle app pool
            & C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool
            Write-Host "[OK] V2RfcTestPool recycled"
            Start-Sleep 5

            # Health check
            try {
              $r = Invoke-WebRequest 'http://localhost:9292/api/ZPO_DD_UPD_RFC/Post' -Method POST -Body '{"PO_NO":"5100001680","DELV_DATE":"20260401"}' -ContentType 'application/json' -UseBasicParsing -TimeoutSec 15
              Write-Host "[OK] Health check: $($r.Content.Substring(0, [Math]::Min(80, $r.Content.Length)))"
            } catch {
              Write-Host "[WARN] Health check failed (may be normal on first deploy): $_"
            }
          }

          Remove-PSSession $s
          Write-Host "Done - sap-api.v2retail.net now serves updated DLLs"
