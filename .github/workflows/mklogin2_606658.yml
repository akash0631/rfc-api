name: MkLogin2_606658
on:
  push:
    paths: ['.github/workflows/mklogin2_606658.yml']
jobs:
  run:
    runs-on: [self-hosted, iis]
    steps:
      - name: Create FabricReader on .28 via ADO.NET
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          
          # Use ADO.NET directly — no Invoke-Sqlcmd needed
          function Run-SQL($connStr, $sql) {
            $conn = New-Object System.Data.SqlClient.SqlConnection($connStr)
            $conn.Open()
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = $sql
            $result = $cmd.ExecuteScalar()
            $conn.Close()
            return $result
          }
          
          $masterConn = "Server=192.168.151.28;Database=master;Integrated Security=True;Connect Timeout=10"
          $datav2Conn = "Server=192.168.151.28;Database=DataV2;Integrated Security=True;Connect Timeout=10"
          
          # Step 1: Test Windows auth
          try {
            $ver = Run-SQL $masterConn "SELECT @@VERSION"
            Write-Host "WIN_AUTH_OK: $($ver.Substring(0,50))"
          } catch {
            Write-Host "WIN_AUTH_FAIL: $_"
            exit 1
          }
          
          # Step 2: Check if SQL auth mode enabled
          try {
            $winOnly = Run-SQL $masterConn "SELECT SERVERPROPERTY('IsIntegratedSecurityOnly')"
            Write-Host "AUTH_MODE: IsWindowsOnly=$winOnly (0=Mixed, 1=WindowsOnly)"
          } catch {
            Write-Host "AUTH_CHECK_FAIL: $_"
          }
          
          # Step 3: Create SQL login FabricReader
          try {
            $exists = Run-SQL $masterConn "SELECT COUNT(*) FROM sys.server_principals WHERE name='FabricReader'"
            if ($exists -eq 0) {
              Run-SQL $masterConn "CREATE LOGIN [FabricReader] WITH PASSWORD='Fabric@V2Retail2026', CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF" | Out-Null
              Write-Host "LOGIN_CREATED: FabricReader"
            } else {
              Write-Host "LOGIN_EXISTS: FabricReader"
            }
          } catch {
            Write-Host "LOGIN_FAIL: $_"
          }
          
          # Step 4: Create DB user and grant read
          try {
            $uExists = Run-SQL $datav2Conn "SELECT COUNT(*) FROM sys.database_principals WHERE name='FabricReader'"
            if ($uExists -eq 0) {
              Run-SQL $datav2Conn "CREATE USER [FabricReader] FOR LOGIN [FabricReader]" | Out-Null
              Write-Host "USER_CREATED"
            } else {
              Write-Host "USER_EXISTS"
            }
            Run-SQL $datav2Conn "EXEC sp_addrolemember 'db_datareader','FabricReader'" | Out-Null
            Write-Host "ROLE_GRANTED: db_datareader"
          } catch {
            Write-Host "GRANT_FAIL: $_"
          }
          
          # Step 5: Test SQL auth login
          try {
            $sqlConn = "Server=192.168.151.28;Database=DataV2;User Id=FabricReader;Password=Fabric@V2Retail2026;Connect Timeout=10"
            $tbl = Run-SQL $sqlConn "SELECT COUNT(*) FROM INFORMATION_SCHEMA.TABLES"
            Write-Host "SQL_AUTH_TEST_OK: $tbl tables visible"
          } catch {
            Write-Host "SQL_AUTH_TEST_FAIL: $_"
          }
