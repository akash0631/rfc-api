name: ADD_CF_SECRET_V2
on:
  push:
    paths:
      - '.github/workflows/add_cf_secret_v2.yml'
jobs:
  add_secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install wrangler
        run: npm install -g wrangler@latest
      
      - name: Add CF API Key as worker secret (versions API)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_KEY_VALUE: ${{ secrets.CF_API_KEY }}
        run: |
          # Use versions secret put (doesn't require deploy)
          if [ -n "$CF_API_KEY_VALUE" ]; then
            echo "Adding CLOUDFLARE_API_KEY via versions secret put..."
            echo "$CF_API_KEY_VALUE" | wrangler versions secret put CLOUDFLARE_API_KEY --name v2-rfc-pipeline 2>&1
            echo "Exit: $?"
          fi
          
          # Also try direct CF API to set the secret
          echo "=== Direct API set ==="
          # Get latest script version
          ACCT="bab06c93e17ae71cae3c11b4cc40240b"
          
          # Put secret via CF Workers API  
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACCT/workers/scripts/v2-rfc-pipeline/secrets" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"CLOUDFLARE_API_KEY\",\"text\":\"$CF_API_KEY_VALUE\",\"type\":\"secret_text\"}" 2>&1)
          echo "API result: $RESULT" | head -c 300
