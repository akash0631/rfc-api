name: Build and Deploy to .36 IIS

on:
  push:
    branches:
      - Finaltest
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - 'App_Start/**'
      - 'Web.config'
      - 'Web.Release.config'
      - 'Global.asax.cs'
      - 'packages.config'
  workflow_dispatch:

env:
  SOLUTION:  Vendor_SRM_Routing_Application.sln
  PROJECT:   Vendor_SRM_Routing_Application.csproj
  SITE_NAME: VendrSrmAndroidApi
  DEST_URL:  http://192.168.151.36:9005/

jobs:
  build-and-deploy:
    name: Build, Package and Deploy
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: Finaltest

      - name: Setup NuGet
        run: nuget restore ${{ env.SOLUTION }}

      - name: Find MSBuild
        shell: powershell
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe 2>$null | Select-Object -First 1
          if (-not $vs) { $vs = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe" }
          echo "MSBUILD_PATH=$vs" >> $env:GITHUB_ENV

      - name: MSBuild Release Package
        shell: powershell
        run: |
          & "$env:MSBUILD_PATH" ${{ env.PROJECT }} /p:Configuration=Release /p:Platform=AnyCPU /p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:PackageLocation="${{ github.workspace }}\deploy-pkg" /p:SkipInvalidConfigurations=true /p:VisualStudioVersion=17.0 /m /nologo /verbosity:minimal
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build successful!"
          Get-ChildItem "${{ github.workspace }}\deploy-pkg" -Recurse | Select FullName

      - name: MSDeploy to IIS
        shell: powershell
        run: |
          $zip = Get-ChildItem "${{ github.workspace }}\deploy-pkg" -Filter "*.zip" -Recurse | Select-Object -First 1
          if (-not $zip) { Write-Error "No zip found!"; exit 1 }
          Write-Host "Deploying: $($zip.FullName)"
          $md = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          if (-not (Test-Path $md)) {
            Write-Host "Installing Web Deploy..."
            $msi = "$env:TEMP\WebDeploy.msi"
            Invoke-WebRequest "https://download.microsoft.com/download/0/1/D/01DC28EA-638C-4A22-A57B-4CEF97755C6C/WebDeploy_amd64_en-US.msi" -OutFile $msi -UseBasicParsing
            Start-Process msiexec.exe -ArgumentList "/i $msi /quiet /norestart ADDLOCAL=ALL" -Wait
          }
          & $md `
            -verb:sync `
            "-source:package=`"$($zip.FullName)`"" `
            "-dest:auto,computerName=`"https://localhost:8172/msdeploy.axd?site=${{ env.SITE_NAME }}`",userName=`"Administrator`",password=`"${{ secrets.DEPLOY_PASSWORD }}`",authType=`"Basic`",includeAcls=`"False`"" `
            -disableLink:AppPoolExtension `
            -disableLink:ContentExtension `
            -disableLink:CertificateExtension `
            "-setParam:name=`"IIS Web Application Name`",value=`"${{ env.SITE_NAME }}`"" `
            -allowUntrusted `
            -enableRule:AppOffline `
            -retryAttempts:3 `
            -retryInterval:2000 `
            -verbose
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "DEPLOYED SUCCESSFULLY to ${{ env.DEST_URL }}"

      - name: Smoke Test
        shell: powershell
        run: |
          Start-Sleep 10
          try {
            $r = Invoke-WebRequest "${{ env.DEST_URL }}api/Authentication/Login" -Method POST -Body '{"username":"testing@v2kart.com","password":"123456"}' -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "SMOKE TEST PASSED - HTTP $($r.StatusCode)"
            Write-Host $r.Content.Substring(0,[Math]::Min(200,$r.Content.Length))
          } catch {
            Write-Host "Smoke test note: $_"
          }
