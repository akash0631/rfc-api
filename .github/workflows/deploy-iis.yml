name: Build and Deploy to .36 IIS
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - 'Models/**'

jobs:
  build:
    runs-on: windows-latest
    name: Build on GitHub runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: NuGet restore
        shell: cmd
        run: |
          nuget restore Vendor_SRM_Routing_Application.sln
          echo NuGet done: %ERRORLEVEL%

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild compile
        shell: cmd
        run: |
          msbuild Vendor_SRM_Routing_Application.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Build /m /v:minimal
          echo Build done: %ERRORLEVEL%

      - name: Upload compiled bin
        uses: actions/upload-artifact@v4
        with:
          name: iis-bin
          path: |
            **/bin/*.dll
            **/bin/*.pdb
          if-no-files-found: error
          retention-days: 1

  deploy:
    runs-on: [self-hosted, iis]
    name: Deploy to .36 IIS
    needs: build
    steps:
      - name: Download compiled bin
        uses: actions/download-artifact@v4
        with:
          name: iis-bin
          path: bin-artifact

      - name: Copy DLL to IIS bin and recycle pool
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $dest = 'C:\V2RfcTest\bin'
          $dlls = Get-ChildItem -Path 'bin-artifact' -Recurse -Filter '*.dll'
          $copied = 0
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName "$dest\$($dll.Name)" -Force
            Write-Host "Copied: $($dll.Name)"
            $copied++
          }
          Write-Host "Total DLLs copied: $copied"

          # Fix Web.config to SAP Dev
          $wc = 'C:\V2RfcTest\Web.config'
          if (Test-Path $wc) {
            $c = Get-Content $wc -Raw
            $c = $c -replace '192\.168\.144\.170', '192.168.144.174'
            $c = $c -replace 'value=""600""', 'value=""210""'
            Set-Content $wc $c -Encoding UTF8
            Write-Host "Web.config: SAP Dev set"
          }

          # Recycle app pool
          & C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool
          Start-Sleep 8

          # Health check
          try {
            $r = Invoke-WebRequest 'http://localhost:9292/api/ZPO_DD_UPD_RFC/Post' -Method POST -Body '{"PO_NO":"TEST","DELV_DATE":"20260401"}' -ContentType 'application/json' -UseBasicParsing -TimeoutSec 15
            Write-Host "Health OK: $($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length)))"
          } catch {
            Write-Host "Health (may be normal): $_"
          }
          exit 0
