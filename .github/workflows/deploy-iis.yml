name: Build and Deploy to .36 IIS
on:
  workflow_dispatch:
  push:
    paths:
      - 'Controllers/**'
      - 'Models/**'
jobs:
  deploy:
    runs-on: [self-hosted, iis]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: NuGet restore
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          # Find nuget
          $nuget = 'C:\nuget.exe'
          if (-not (Test-Path $nuget)) {
            Write-Host "Downloading nuget.exe..."
            Invoke-WebRequest 'https://dist.nuget.org/win-x86-commandline/latest/nuget.exe' -OutFile $nuget
          }
          & $nuget restore 'Vendor_SRM_Routing_Application.sln' -NonInteractive
          Write-Host "NuGet restore done"

      - name: MSBuild compile
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # Find MSBuild from VS 2019
          $candidates = @(
            'C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\MSBuild\Current\Bin\MSBuild.exe',
            'C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\MSBuild\Current\Bin\MSBuild.exe',
            'C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\MSBuild.exe',
            'C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe'
          )
          $msBuild = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $msBuild = $c; break }
          }
          if (-not $msBuild) {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            if (Test-Path $vswhere) {
              $msBuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
            }
          }
          if (-not $msBuild) { throw "MSBuild not found on this machine" }
          Write-Host "MSBuild: $msBuild"
          & $msBuild 'Vendor_SRM_Routing_Application.sln' /p:Configuration=Release /p:Platform="Any CPU" /t:Build /m /v:minimal
          Write-Host "Build complete"

      - name: Copy DLL to IIS and recycle pool
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $pubDir = 'C:\V2RfcTest'

          # Find freshly compiled DLL from this checkout's build output
          $appDll = Get-ChildItem '.' -Recurse -Filter 'Vendor_SRM_Routing_Application.dll' -ErrorAction SilentlyContinue |
                    Where-Object { $_.DirectoryName -notlike '*obj*' } |
                    Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if ($appDll) {
            $srcBin = Split-Path $appDll.FullName
            Write-Host "Copying from: $srcBin ($($appDll.LastWriteTime.ToString('yyyy-MM-dd HH:mm')))"
            Copy-Item "$srcBin\*.dll" "$pubDir\bin\" -Force -ErrorAction SilentlyContinue
            Copy-Item "$srcBin\*.pdb" "$pubDir\bin\" -Force -ErrorAction SilentlyContinue
            Write-Host "DLL copy complete"
          } else {
            Write-Host "WARNING: No compiled DLL found in checkout — IIS keeps existing DLLs"
          }

          # Fix Web.config to SAP Dev
          $wc = "$pubDir\Web.config"
          if (Test-Path $wc) {
            $c = Get-Content $wc -Raw
            $c = $c -replace '192\.168\.144\.170', '192.168.144.174'
            $c = $c -replace 'value=""600""', 'value=""210""'
            Set-Content $wc $c -Encoding UTF8
            Write-Host "Web.config: SAP Dev enabled"
          }

          # Recycle app pool
          $ap = 'C:\Windows\System32\inetsrv\appcmd.exe'
          if (Test-Path $ap) {
            & $ap recycle apppool /apppool.name:V2RfcTestPool 2>&1 | Write-Host
          }
          Start-Sleep 8

          # Quick health check
          try {
            $r = Invoke-WebRequest 'http://localhost:9292/api/ZPO_DD_UPD_RFC/Post' -Method POST -Body '{"PO_NO":"5100001680","DELV_DATE":"20260401"}' -ContentType 'application/json' -UseBasicParsing -TimeoutSec 15
            Write-Host "Health check OK: $($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length)))"
          } catch {
            Write-Host "Health check failed (may be normal): $_"
          }
          exit 0
