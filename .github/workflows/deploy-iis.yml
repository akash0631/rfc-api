name: Deploy Controllers to IIS (V2DC-ADDVERB)

on:
  push:
    branches: [master]
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - 'SyncController.cs'

jobs:
  deploy-iis:
    name: Build & Deploy to V2DC-ADDVERB IIS
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find MSBuild via vswhere
        id: msbuild
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe`) do set MSBUILD_PATH=%%i
          if "%MSBUILD_PATH%"=="" (
            set MSBUILD_PATH=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          )
          echo msbuild_path=%MSBUILD_PATH%>> %GITHUB_OUTPUT%
          echo Found MSBuild: %MSBUILD_PATH%

      - name: Restore NuGet packages
        shell: cmd
        run: |
          if exist "%PROGRAMDATA%\chocolatey\bin\nuget.exe" (
            "%PROGRAMDATA%\chocolatey\bin\nuget.exe" restore Vendor_SRM_Routing_Application.sln
          ) else if exist "C:\nuget\nuget.exe" (
            C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln
          ) else (
            echo NuGet not found, downloading...
            powershell -Command "New-Item -ItemType Directory -Force -Path C:\nuget; Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile C:\nuget\nuget.exe"
            C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln
          )

      - name: Build solution (Release)
        shell: cmd
        run: |
          set MSBUILD=${{ steps.msbuild.outputs.msbuild_path }}
          if not exist "%MSBUILD%" set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo /verbosity:minimal

      - name: Deploy bin to IIS app folder via robocopy
        shell: cmd
        run: |
          robocopy bin\ "C:\inetpub\wwwroot\Store Tracker\bin\" *.dll *.pdb /XO /NJH /NJS
          if %ERRORLEVEL% LEQ 7 (
            echo Robocopy completed successfully
            exit /b 0
          ) else (
            echo Robocopy failed with code %ERRORLEVEL%
            exit /b %ERRORLEVEL%
          )

      - name: Recycle IIS App Pool to pick up new DLLs
        shell: cmd
        run: |
          powershell -Command "Import-Module WebAdministration; Restart-WebAppPool 'Store Tracker' -ErrorAction SilentlyContinue; Write-Host 'App pool recycled'"

      - name: Trigger sync - pull SAP data to data lake
        shell: cmd
        run: |
          timeout /t 5 /nobreak
          curl -s -X POST http://localhost/api/Sync/run-all -H "Content-Type: application/json"
          echo Sync triggered
