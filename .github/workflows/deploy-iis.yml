name: Build and Deploy to .36 IIS

# HOW IT WORKS:
# 1. Developer NEVER pushes directly to master.
# 2. Developer pushes to 'staging' branch.
# 3. build-check-merge.yml builds on GitHub runner (windows-latest).
#    - If build PASSES  -> auto-merges staging to master.
#    - If build FAILS   -> master is NOT touched. Developer fixes & re-pushes staging.
# 4. Master push (from the merge) triggers THIS workflow.
# 5. Single job runs entirely on the self-hosted .36 runner:
#    - Downloads nuget.exe (since .36 runner may not have nuget in PATH)
#    - NuGet restore -> MSBuild -> copy DLLs -> recycle pool -> health check.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - 'App_Start/**'
      - 'Views/**'
      - '*.cs'
      - '*.csproj'
      - '*.config'

jobs:
  build-and-deploy:
    runs-on: [self-hosted, iis]
    name: Build and Deploy on .36 IIS runner

    steps:
      - name: Fix git safe directory
        shell: cmd
        run: git config --global --add safe.directory *

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - name: Download nuget.exe
        shell: powershell
        run: |
          $nugetPath = "$env:RUNNER_TEMP\nuget.exe"
          if (-not (Test-Path $nugetPath)) {
            Write-Host "Downloading nuget.exe..."
            Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" `
              -OutFile $nugetPath -UseBasicParsing
          } else {
            Write-Host "nuget.exe already cached at $nugetPath"
          }
          Write-Host "NuGet version: $(& $nugetPath help | Select-Object -First 1)"
          $LASTEXITCODE = 0  # nuget.exe help exits with code 1; reset it so this step succeeds
          echo "NUGET_EXE=$nugetPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: NuGet restore
        shell: cmd
        run: |
          "%NUGET_EXE%" restore Vendor_SRM_Routing_Application.sln
          echo NuGet restore exit: %ERRORLEVEL%
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild compile Release
        shell: cmd
        run: |
          msbuild Vendor_SRM_Routing_Application.sln ^
            /p:Configuration=Release ^
            /p:Platform="Any CPU" ^
            /t:Build ^
            /m ^
            /v:minimal
          echo MSBuild exit: %ERRORLEVEL%
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

      - name: Deploy DLLs to IIS bin
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $dest = 'C:\V2RfcTest\bin'

          $dlls = Get-ChildItem -Path '.' -Recurse -Filter '*.dll' |
                  Where-Object { $_.FullName -like '*\bin\*' }
          $copied = 0
          foreach ($dll in $dlls) {
            Copy-Item $dll.FullName "$dest\$($dll.Name)" -Force
            Write-Host "Copied: $($dll.Name)"
            $copied++
          }
          Write-Host "Total DLLs copied: $copied"
          if ($copied -eq 0) { throw "No DLLs found to deploy!" }

      - name: Fix Web.config to SAP Dev
        shell: powershell
        run: |
          $wc = 'C:\V2RfcTest\Web.config'
          if (Test-Path $wc) {
            $c = Get-Content $wc -Raw
            $c = $c -replace '192\.168\.144\.170', '192.168.144.174'
            $c = $c -replace 'value=""600""', 'value=""210""'
            Set-Content $wc $c -Encoding UTF8
            Write-Host "Web.config: SAP Dev (192.168.144.174 / Client 210) set"
          }

      - name: Recycle V2RfcTestPool
        shell: powershell
        run: |
          & C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool
          Start-Sleep 8
          Write-Host "App pool recycled."

      - name: Health check
        shell: powershell
        run: |
          try {
            $r = Invoke-WebRequest `
              'http://localhost:9292/api/ZPO_DD_UPD_RFC/Post' `
              -Method POST `
              -Body '{"PO_NO":"TEST","DELV_DATE":"20260401"}' `
              -ContentType 'application/json' `
              -UseBasicParsing -TimeoutSec 15
            Write-Host "Health OK: $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))"
          } catch {
            Write-Host "Health check (may be normal on first deploy): $_"
          }
          exit 0
