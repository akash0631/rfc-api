name: P4 Scheduled SAP to Data Lake Sync
on:
  schedule:
    # Run daily at 1:30 AM IST (8:00 PM UTC)
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      date_from:
        description: 'Date from (YYYYMMDD) — default: yesterday'
        required: false
      date_to:
        description: 'Date to (YYYYMMDD) — default: today'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync SAP RFCs to Data Lake
    steps:
      - name: Set date range
        id: dates
        run: |
          DATE_TO=$(date +%Y%m%d)
          DATE_FROM=$(date -d "yesterday" +%Y%m%d)
          # Override with inputs if provided
          if [ -n "${{ github.event.inputs.date_from }}" ]; then DATE_FROM="${{ github.event.inputs.date_from }}"; fi
          if [ -n "${{ github.event.inputs.date_to }}" ]; then DATE_TO="${{ github.event.inputs.date_to }}"; fi
          echo "date_from=$DATE_FROM" >> $GITHUB_OUTPUT
          echo "date_to=$DATE_TO" >> $GITHUB_OUTPUT
          echo "Syncing: $DATE_FROM to $DATE_TO"

      - name: Fetch ZADVANCE_PAYMENT_RFC
        run: |
          RESULT=$(curl -s -X POST https://v2-rfc-relay.azurewebsites.net/relay-rfc \
            -H "Content-Type: application/json" \
            -d "{\"rfc\":\"ZADVANCE_PAYMENT_RFC\",\"params\":{\"I_COMPANY_CODE\":\"1000\",\"I_POSTING_DATE_LOW\":\"${{ steps.dates.outputs.date_from }}\",\"I_POSTING_DATE_HIGH\":\"${{ steps.dates.outputs.date_to }}\"},\"targetTable\":\"ET_ZADVANCE_PAYMENT\",\"targetDb\":\"claudetestv2\",\"maxRows\":50000}" \
            --max-time 120)
          echo "ZADVANCE_PAYMENT_RFC: $RESULT" | head -c 300

      - name: Fetch ZFINANCE_DOCUMENT_RFC
        run: |
          RESULT=$(curl -s -X POST https://v2-rfc-relay.azurewebsites.net/relay-rfc \
            -H "Content-Type: application/json" \
            -d "{\"rfc\":\"ZFINANCE_DOCUMENT_RFC\",\"params\":{},\"targetTable\":\"ET_ZFINANCE_DOCUMENT_RFC\",\"targetDb\":\"claudetestv2\",\"maxRows\":50000}" \
            --max-time 120)
          echo "ZFINANCE_DOCUMENT_RFC: $RESULT" | head -c 300

      - name: Fetch Gate Entry RFCs
        run: |
          for RFC in ZWM_GET_GATE_ENTRY_DATA_RFC ZWM_GET_GATE_ENTRY_LIST_RFC ZWM_GET_GATE_ENTRY_PALLATE_RFC; do
            echo "=== $RFC ==="
            curl -s -X POST https://v2-rfc-relay.azurewebsites.net/relay-rfc \
              -H "Content-Type: application/json" \
              -d "{\"rfc\":\"$RFC\",\"params\":{},\"targetTable\":\"ET_${RFC}\",\"targetDb\":\"claudetestv2\",\"maxRows\":50000}" \
              --max-time 120 | head -c 200
            echo ""
          done

      - name: Fetch DC Routing RFCs
        run: |
          for RFC in ZDC_ROUTING_SUB_RFC ZWM_GATE_ENTRY_RFC ZWM_HU_STORE_TT_RFC; do
            echo "=== $RFC ==="
            curl -s -X POST https://v2-rfc-relay.azurewebsites.net/relay-rfc \
              -H "Content-Type: application/json" \
              -d "{\"rfc\":\"$RFC\",\"params\":{},\"targetTable\":\"ET_${RFC}\",\"targetDb\":\"claudetestv2\",\"maxRows\":50000}" \
              --max-time 120 | head -c 200
            echo ""
          done

      - name: Fetch Vehicle Loading RFCs
        run: |
          for RFC in ZWM_HUBWISE_STORE_LIST_RFC ZWM_TRANSPORTER_DETAILS_RFC; do
            echo "=== $RFC ==="
            curl -s -X POST https://v2-rfc-relay.azurewebsites.net/relay-rfc \
              -H "Content-Type: application/json" \
              -d "{\"rfc\":\"$RFC\",\"params\":{},\"targetTable\":\"ET_${RFC}\",\"targetDb\":\"claudetestv2\",\"maxRows\":50000}" \
              --max-time 120 | head -c 200
            echo ""
          done

      - name: Sync summary
        run: |
          echo "=============================="
          echo "SAP → Data Lake sync complete"
          echo "Date range: ${{ steps.dates.outputs.date_from }} → ${{ steps.dates.outputs.date_to }}"
          echo "All results written to claudetestv2 on 192.168.151.46"
          echo "=============================="
