name: Verify and fix .46 IIS final
on:
  workflow_dispatch:
jobs:
  verify:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Find MSBuild and install missing Web targets
        shell: powershell
        run: |
          # Find all MSBuild.exe on .46
          $msbuildPaths = @(
            "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe",
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
            "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe",
            "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe"
          )
          foreach ($p in $msbuildPaths) { if (Test-Path $p) { Write-Host "FOUND: $p" } }
          
          # Check VS versions installed
          Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -ErrorAction SilentlyContinue | Select Name
          Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -ErrorAction SilentlyContinue | Select Name
          
          # The missing targets file — create stub that lets the build proceed
          $targetsDir = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          if (-not (Test-Path $targetsDir)) { New-Item -ItemType Directory -Path $targetsDir -Force }
          
          $targetsFile = "$targetsDir\Microsoft.WebApplication.targets"
          if (-not (Test-Path $targetsFile)) {
            # Copy from v15.0 or v16.0 if available
            $alt = @(
              "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v16.0\WebApplications\Microsoft.WebApplication.targets",
              "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v15.0\WebApplications\Microsoft.WebApplication.targets"
            )
            $copied = $false
            foreach ($a in $alt) {
              if (Test-Path $a) {
                Copy-Item $a $targetsFile
                Write-Host "Copied from: $a"
                $copied = $true
                break
              }
            }
            if (-not $copied) {
              # Write minimal stub targets file
              @'
<?xml version="1.0" encoding="utf-8"?>
<Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
  <PropertyGroup>
    <WebPublishMethod Condition="'$(WebPublishMethod)'==''">FileSystem</WebPublishMethod>
  </PropertyGroup>
  <Target Name="WebPublish" />
  <Target Name="Package" />
</Project>
'@ | Set-Content $targetsFile
              Write-Host "Stub targets written to $targetsFile"
            }
          } else {
            Write-Host "Targets already exists"
          }

      - name: Build RFC app with MSBuild
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0
          echo BUILD: %ERRORLEVEL%
          dir bin\Release /B 2>nul | findstr /V "Microsoft Azure System clr host cor"

      - name: Deploy built app to C:\RfcApp and wire IIS
        shell: powershell
        run: |
          $src = "$env:GITHUB_WORKSPACE\bin\Release"
          $dst = "C:\RfcApp"
          if (-not (Test-Path $dst)) { New-Item -ItemType Directory -Path $dst -Force }
          Write-Host "DLL count in build output: $((Get-ChildItem $src -Filter '*.dll').Count)"
          Copy-Item "$src\*" $dst -Recurse -Force
          # Copy Web.config
          Copy-Item "$env:GITHUB_WORKSPACE\Web.config" $dst -Force -ErrorAction SilentlyContinue
          Write-Host "Deployed. DLL count in C:\RfcApp: $((Get-ChildItem $dst -Filter '*.dll' -Recurse).Count)"
          # Set IIS_PORT=8888 in RFC Collector
          $cfg = "C:\RfcCollector\appsettings.json"
          $json = Get-Content $cfg | ConvertFrom-Json
          $json.IIS_HOST = "127.0.0.1"
          $json.IIS_PORT = "8888"
          $json | ConvertTo-Json -Depth 10 | Set-Content $cfg
          Write-Host "Config: $(Get-Content $cfg)"
          # Recycle and restart
          Import-Module WebAdministration
          Restart-WebAppPool "RfcApiPool" -ErrorAction SilentlyContinue
          Start-Sleep 5
          Restart-Service RfcCollector -Force
          Start-Sleep 10
          Write-Host "RfcCollector: $((Get-Service RfcCollector).Status)"

      - name: Smoke test
        shell: powershell
        run: |
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          $resp = $null
          try { $resp = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 60 } catch { Write-Host "Error: $_" }
          if ($resp) {
            Write-Host "=== FETCH HTTP $($resp.StatusCode) ==="
            Write-Host ($resp.Content.Substring(0,[Math]::Min(2000,$resp.Content.Length)))
          }
