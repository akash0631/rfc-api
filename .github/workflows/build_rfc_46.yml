name: Build RFC app on .46
# v11-184031
on:
  push:
    paths:
      - '.github/workflows/build_rfc_46.yml'
jobs:
  build:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Stub VS17 targets
        shell: powershell
        run: |
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          $f = "$d\Microsoft.WebApplication.targets"
          if (-not (Test-Path $d)) { New-Item -ItemType Directory $d -Force | Out-Null }
          $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish" /><Target Name="Package" /></Project>'
          [System.IO.File]::WriteAllText($f, $xml, [System.Text.Encoding]::UTF8)
          Write-Host "Written: $(Test-Path $f)"

      - name: NuGet restore
        shell: cmd
        run: |
          echo === Check NuGet locations ===
          where nuget 2>nul
          dir C:\nuget.exe 2>nul
          dir "C:\ProgramData\chocolatey\bin\nuget.exe" 2>nul
          dir "C:\actions-runner\_work\_tool" /B 2>nul
          echo === Check local packages folder ===
          dir packages /B 2>nul | find /c "."
          echo === Attempt NuGet restore ===
          nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive 2>&1
          echo NUGET_EXIT: %ERRORLEVEL%

      - name: Build RFC app
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /p:RestorePackages=false /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0
          echo BUILD_EXIT: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 (
            "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /p:RestorePackages=false /nologo /verbosity:normal /p:VisualStudioVersion=17.0 2>&1 | findstr /I "error"
            exit /b 1
          )
          dir bin\Release\Vendor*.dll /B 2>nul
          dir bin\Release\*.dll /B 2>nul | find /c ".dll"

      - name: Deploy and wire
        shell: cmd
        run: |
          if not exist C:\RfcApp mkdir C:\RfcApp
          xcopy /E /Y /I bin\Release C:\RfcApp
          copy /Y Web.config C:\RfcApp\ 2>nul
          dir C:\RfcApp\Vendor*.dll /B 2>nul
          powershell -NoProfile -Command "\$j=Get-Content C:\RfcCollector\appsettings.json|ConvertFrom-Json;\$j.IIS_HOST='127.0.0.1';\$j.IIS_PORT='8888';\$j|ConvertTo-Json -Depth 10|Set-Content C:\RfcCollector\appsettings.json;Write-Host Updated"
          powershell -NoProfile -Command "Import-Module WebAdministration;Restart-WebAppPool RfcApiPool -EA SilentlyContinue;Start-Sleep 5"
          net stop RfcCollector & timeout /t 4 /nobreak & net start RfcCollector
          timeout /t 12 /nobreak
          sc query RfcCollector | findstr STATE
          powershell -NoProfile -Command "\$b='{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}';try{\$r=Invoke-WebRequest http://localhost:9090/fetch -Method POST -Body \$b -ContentType application/json -UseBasicParsing -TimeoutSec 60;Write-Host FETCH-HTTP \$r.StatusCode;Write-Host(\$r.Content.Substring(0,[Math]::Min(2000,\$r.Content.Length)))}catch{Write-Host FETCH-ERROR \$_.Exception.Message}"
