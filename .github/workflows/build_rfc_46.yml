name: Build RFC app on .46
# v7-181743
on:
  push:
    paths:
      - '.github/workflows/build_rfc_46.yml'
jobs:
  build:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Build and push output
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /nologo /verbosity:normal /p:VisualStudioVersion=17.0 > build_output.txt 2>&1
          echo BUILD_EXIT=%ERRORLEVEL% >> build_output.txt
          type build_output.txt

      - name: Push build output to GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "build_output.txt" -Raw -ErrorAction SilentlyContinue
          if (-not $content) { $content = "empty" }
          $b64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($content))
          $h = @{ Authorization = "token $env:GH_TOKEN"; "User-Agent" = "v2"; "Content-Type" = "application/json" }
          $ex = try { Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/build_output.txt" -Headers $h -UseBasicParsing } catch { $null }
          $sha = if ($ex) { ($ex.Content | ConvertFrom-Json).sha } else { "" }
          $body = @{ message = "ci: build output 181743"; content = $b64 }
          if ($sha) { $body.sha = $sha }
          Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/build_output.txt" -Method PUT -Headers $h -Body ($body | ConvertTo-Json) -UseBasicParsing | Out-Null
          Write-Host "Pushed"
