name: Build RFC app on .46
# v5-181050
on:
  push:
    paths:
      - '.github/workflows/build_rfc_46.yml'
jobs:
  build:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Write VS17 targets stub via cmd
        shell: cmd
        run: |
          if not exist "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications" mkdir "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          if not exist "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets" (
            echo ^<?xml version="1.0" encoding="utf-8"?^> > "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
            echo ^<Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"^> >> "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
            echo ^<Target Name="WebPublish" /^> >> "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
            echo ^<Target Name="Package" /^> >> "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
            echo ^</Project^> >> "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
            echo TARGETS: stub written
          ) else (
            echo TARGETS: already present
          )
          type "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"

      - name: Build with MSBuild
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0
          echo BUILD_EXIT: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 (
            "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /nologo /verbosity:normal /p:VisualStudioVersion=17.0 2>&1 | findstr /I "error"
            exit /b 1
          )
          echo === Vendor DLLs in output ===
          dir bin\Release\Vendor*.dll /B 2>nul
          echo === SAP DLLs in output ===
          dir bin\Release\*sap*.dll /B 2>nul

      - name: Deploy to C:\RfcApp and wire RFC Collector
        shell: cmd
        run: |
          if not exist C:\RfcApp mkdir C:\RfcApp
          xcopy /E /Y /I bin\Release C:\RfcApp
          xcopy /Y Web.config C:\RfcApp\ 2>nul
          echo DLLs in C:\RfcApp:
          dir C:\RfcApp\*.dll /B 2>nul | find /c ".dll"
          echo === Updating RFC Collector appsettings ===
          powershell -Command "\$j = Get-Content C:\RfcCollector\appsettings.json | ConvertFrom-Json; \$j.IIS_HOST='127.0.0.1'; \$j.IIS_PORT='8888'; \$j | ConvertTo-Json -Depth 10 | Set-Content C:\RfcCollector\appsettings.json; Write-Host 'Config updated'"
          echo === Recycling IIS app pool ===
          powershell -Command "Import-Module WebAdministration; Restart-WebAppPool RfcApiPool; Start-Sleep 6; Write-Host 'Pool recycled'"
          echo === Restarting RFC Collector ===
          net stop RfcCollector && timeout /t 3 /nobreak && net start RfcCollector
          timeout /t 12 /nobreak
          sc query RfcCollector | findstr STATE

      - name: Smoke test end-to-end
        shell: powershell
        run: |
          Start-Sleep 5
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260316"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "FETCH HTTP $($r.StatusCode):"
            Write-Host ($r.Content.Substring(0,[Math]::Min(2000,$r.Content.Length)))
          } catch {
            Write-Host "FETCH ERROR: $($_.Exception.Message)"
          }
