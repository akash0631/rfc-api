name: MkLogin_606557
on:
  push:
    paths: ['.github/workflows/mklogin_606557.yml']
jobs:
  run:
    runs-on: [self-hosted, iis]
    steps:
      - name: Create FabricReader on .28
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          
          # Step 1: Check if we can connect to .28 with Windows auth
          try {
            Invoke-Sqlcmd -ServerInstance "192.168.151.28" -Database "master" -Query "SELECT @@VERSION" -TrustServerCertificate -ErrorAction Stop | Out-Null
            Write-Host "WIN_AUTH_OK"
          } catch {
            Write-Host "WIN_AUTH_FAIL: $_"
          }
          
          # Step 2: Check SQL auth mode on .28
          try {
            $res = Invoke-Sqlcmd -ServerInstance "192.168.151.28" -Database "master" -Query "SELECT SERVERPROPERTY('IsIntegratedSecurityOnly') as WinOnly" -TrustServerCertificate -ErrorAction Stop
            Write-Host "AUTH_MODE: WinOnly=$($res.WinOnly)"
          } catch {
            Write-Host "AUTH_CHECK_FAIL: $_"
          }
          
          # Step 3: Try create the login
          $sql = "IF NOT EXISTS (SELECT * FROM sys.server_principals WHERE name='FabricReader') BEGIN CREATE LOGIN [FabricReader] WITH PASSWORD='Fabric@V2Retail2026', CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF; PRINT 'CREATED' END ELSE PRINT 'EXISTS'"
          try {
            $r = Invoke-Sqlcmd -ServerInstance "192.168.151.28" -Database "master" -Query $sql -TrustServerCertificate -ErrorAction Stop -Verbose 4>&1
            Write-Host "LOGIN_RESULT: $r"
          } catch {
            Write-Host "LOGIN_CREATE_FAIL: $_"
          }
          
          # Step 4: Grant db access
          $sql2 = "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name='FabricReader') BEGIN CREATE USER [FabricReader] FOR LOGIN [FabricReader]; EXEC sp_addrolemember 'db_datareader','FabricReader'; PRINT 'USER_CREATED' END ELSE PRINT 'USER_EXISTS'"
          try {
            Invoke-Sqlcmd -ServerInstance "192.168.151.28" -Database "DataV2" -Query $sql2 -TrustServerCertificate -ErrorAction Stop -Verbose 4>&1
            Write-Host "GRANT_DONE"
          } catch {
            Write-Host "GRANT_FAIL: $_"
          }
