name: Deploy RFC Portal to Cloudflare Pages
on:
  push:
    branches: [master]
    paths:
      - 'portal/**'
      - 'dab-config.json'
      - 'v2_sap_api_explorer.html'
      - 'rfc_hub.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy rfc_hub.html to portal folder
        run: |
          cp rfc_hub.html portal/rfc_hub.html 2>/dev/null || true
          echo "Portal files:"
          ls portal/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 33b6cfffad5dd935e73e9061a56f1506
          projectName: v2-rfc-portal
          directory: portal
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: master
