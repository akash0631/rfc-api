name: Deploy RFC Portal to Cloudflare Pages
on:
  push:
    branches: [master]
    paths:
      - 'portal/**'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy portal --project-name=v2-rfc-portal --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: bab06c93e17ae71cae3c11b4cc40240b

  sync-iis:
    runs-on: [self-hosted, iis]
    name: Sync default.html on .36
    needs: deploy-pages
    steps:
      - name: Wait for Pages CDN to propagate
        shell: powershell
        run: Start-Sleep 30

      - name: Download latest portal to IIS default.html
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest "https://v2-rfc-portal.pages.dev/rfc_hub" -UseBasicParsing -OutFile "C:\V2RfcTest\default.html"
          $size = (Get-Item "C:\V2RfcTest\default.html").Length
          Write-Host "✅ default.html updated: $size bytes — localhost:9292 and pages.dev now in sync"

