name: Deploy RFC Portal to Cloudflare Pages
on:
  push:
    branches: [master]
    paths:
      - 'portal/**'
      - 'rfc_hub.html'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Copy rfc_hub.html to portal folder
        run: |
          cp rfc_hub.html portal/rfc_hub.html 2>/dev/null || true
          echo "Portal files:"
          ls portal/

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy portal --project-name=v2-rfc-portal --branch=master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: bab06c93e17ae71cae3c11b4cc40240b
