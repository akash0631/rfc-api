name: Build and Deploy HHT API to Azure

on:
  push:
    paths:
      - 'Controllers/HHT/**'          # Any HHT controller change
      - 'Controllers/BaseController.cs'
      - 'Web.config'
      - '.github/workflows/deploy-azure-hht.yml'
  workflow_dispatch:                   # Manual trigger button in GitHub

jobs:
  build-and-deploy:
    runs-on: windows-latest            # Must be Windows — .NET 4.8 + SAP NCo AMD64

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Setup MSBuild ───────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 3. Setup NuGet ─────────────────────────────────────────────────────
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      # ── 4. NuGet Restore ───────────────────────────────────────────────────
      # sapnco_x64 is a local package committed to the repo (not on nuget.org)
      # All other packages restore normally from nuget.org
      - name: NuGet Restore
        run: nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive

      # ── 5. Build & Publish ─────────────────────────────────────────────────
      - name: MSBuild Publish
        run: |
          msbuild Vendor_SRM_Routing_Application.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /p:DeployOnBuild=true `
            /p:PublishProfile=AzurePublish `
            /p:WebPublishMethod=Package `
            /p:PackageAsSingleFile=true `
            /p:PackageLocation="${{ github.workspace }}\publish\package.zip" `
            /p:SkipInvalidConfigurations=true `
            /m /v:minimal
        shell: powershell

      # ── 6. Verify package was created ─────────────────────────────────────
      - name: Verify build output
        shell: powershell
        run: |
          $pkg = "${{ github.workspace }}\publish\package.zip"
          if (Test-Path $pkg) {
            $size = (Get-Item $pkg).Length / 1MB
            Write-Host "✅ Package: $pkg ($([math]::Round($size,1)) MB)"
          } else {
            # Fallback: find any zip in publish dir
            $zips = Get-ChildItem "${{ github.workspace }}\publish" -Filter "*.zip" -Recurse
            if ($zips) {
              $zips | ForEach-Object { Write-Host "Found: $($_.FullName)" }
            } else {
              Write-Error "❌ No package found. Build may have failed."
              exit 1
            }
          }

      # ── 7. Deploy to Azure App Service ────────────────────────────────────
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: '${{ github.workspace }}\publish\*.zip'

      # ── 8. Smoke test ─────────────────────────────────────────────────────
      - name: Smoke test (health check)
        shell: powershell
        run: |
          Start-Sleep 20
          try {
            $r = Invoke-WebRequest `
              "https://v2-hht-api.azurewebsites.net/api/hht/health" `
              -Method GET `
              -UseBasicParsing `
              -TimeoutSec 30
            Write-Host "✅ Health check: $($r.StatusCode) — $($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length)))"
          } catch {
            Write-Host "⚠️  Health check failed (SAP may not be connected yet): $_"
          }
          exit 0
