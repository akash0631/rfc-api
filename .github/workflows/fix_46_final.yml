name: Fix .46 IIS — FINAL
# 071341
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix_46_final.yml'
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Fix IIS and write results to file
        shell: powershell
        run: |
          $out = @()
          $out += "=== $(hostname) @ $(Get-Date) ==="

          # 1. Current state
          $dllCount = (Get-ChildItem C:\RfcApp -Filter "*.dll" -ErrorAction SilentlyContinue).Count
          $out += "C:\RfcApp DLLs: $dllCount"

          # 2. Check work dir for previous build
          $src = "C:\actions-runner\_work\rfc-api\rfc-api\bin\Release"
          $srcCount = (Get-ChildItem $src -Filter "*.dll" -ErrorAction SilentlyContinue).Count
          $out += "Build output DLLs: $srcCount at $src"

          # 3. Copy if needed
          if ($dllCount -eq 0 -and $srcCount -gt 0) {
            if (-not (Test-Path C:\RfcApp)) { New-Item -ItemType Directory C:\RfcApp -Force | Out-Null }
            Copy-Item "$src\*" C:\RfcApp -Recurse -Force
            Copy-Item "$env:GITHUB_WORKSPACE\Web.config" C:\RfcApp\ -Force -ErrorAction SilentlyContinue
            $dllCount = (Get-ChildItem C:\RfcApp -Filter "*.dll" -ErrorAction SilentlyContinue).Count
            $out += "After copy: $dllCount DLLs in C:\RfcApp"
          }

          # 4. Try .36 mount if still empty
          if ($dllCount -eq 0) {
            net use "\\192.168.151.36\C$" "vrl@55555" /user:Administrator /persistent:no
            $src36 = "\\192.168.151.36\C$\actions-runner\_work\rfc-api\rfc-api\bin\Release"
            $src36Count = (Get-ChildItem $src36 -Filter "*.dll" -ErrorAction SilentlyContinue).Count
            $out += ".36 source DLLs: $src36Count"
            if ($src36Count -gt 0) {
              if (-not (Test-Path C:\RfcApp)) { New-Item -ItemType Directory C:\RfcApp -Force | Out-Null }
              Copy-Item "$src36\*" C:\RfcApp -Recurse -Force
              $dllCount = (Get-ChildItem C:\RfcApp -Filter "*.dll" -ErrorAction SilentlyContinue).Count
              $out += "After .36 copy: $dllCount DLLs"
            }
            net use "\\192.168.151.36\C$" /delete /y 2>$null
          }

          # 5. Key DLLs
          $vendor = Get-ChildItem C:\RfcApp -Filter "Vendor*.dll" -ErrorAction SilentlyContinue | Select -First 3 -ExpandProperty Name
          $sap = Get-ChildItem C:\RfcApp -Filter "*sap*" -ErrorAction SilentlyContinue | Select -First 3 -ExpandProperty Name
          $out += "Vendor DLLs: $($vendor -join ', ')"
          $out += "SAP DLLs: $($sap -join ', ')"
          $out += "Web.config: $(Test-Path C:\RfcApp\Web.config)"

          # 6. IIS and app pool
          Import-Module WebAdministration
          Set-ItemProperty "IIS:\AppPools\RfcApiPool" -Name managedRuntimeVersion -Value "v4.0" -ErrorAction SilentlyContinue
          Restart-WebAppPool "RfcApiPool" -ErrorAction SilentlyContinue
          Start-Sleep 6
          $siteState = (Get-Website "RfcApiApp" -ErrorAction SilentlyContinue).State
          $out += "RfcApiApp IIS state: $siteState"

          # 7. appsettings
          $cfg = "C:\RfcCollector\appsettings.json"
          $json = Get-Content $cfg | ConvertFrom-Json
          $json.IIS_HOST = "127.0.0.1"; $json.IIS_PORT = "8888"
          $json | ConvertTo-Json -Depth 10 | Set-Content $cfg
          $out += "appsettings: IIS_HOST=$($json.IIS_HOST) IIS_PORT=$($json.IIS_PORT)"

          # 8. Restart service
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          $svcState = (Get-Service RfcCollector).Status
          $out += "RfcCollector: $svcState"

          # 9. Test IIS health
          try {
            $h = Invoke-WebRequest "http://localhost:8888/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 15
            $out += "IIS Health: HTTP $($h.StatusCode) — $($h.Content)"
          } catch { $out += "IIS Health ERROR: $($_.Exception.Message)" }

          # 10. E2E test
          $body = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":3}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            $out += "FETCH: HTTP $($r.StatusCode)"
            $out += $r.Content.Substring(0,[Math]::Min(500,$r.Content.Length))
          } catch { $out += "FETCH ERROR: $($_.Exception.Message)" }

          # Write results
          $out | Out-File "fix_results.txt" -Encoding UTF8
          Write-Host ($out -join "`n")

      - name: Push results to repo
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "fix_results.txt" -Raw -ErrorAction SilentlyContinue
          if (-not $content) { $content = "no output" }
          $b64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($content))
          $h = @{ Authorization="token $env:GH_TOKEN"; "User-Agent"="v2"; "Content-Type"="application/json" }
          $ex = try { Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/fix_results.txt" -Headers $h -UseBasicParsing } catch { $null }
          $sha = if ($ex) { ($ex.Content | ConvertFrom-Json).sha } else { $null }
          $body = @{ message="ci: fix results 071341"; content=$b64 }
          if ($sha) { $body.sha = $sha }
          Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/fix_results.txt" -Method PUT -Headers $h -Body ($body | ConvertTo-Json) -UseBasicParsing | Out-Null
          Write-Host "Results pushed"
