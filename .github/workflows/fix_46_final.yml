name: Fix .46 — deploy app + wire pipeline
on:
  push:
    paths:
      - '.github/workflows/fix_46_final.yml'
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Probe IIS on all servers and write results
        shell: powershell
        run: |
          $results = @()
          $endpoints = @(
            "http://192.168.151.36:80/api/ZAdvancePaymentRfc/Health",
            "http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health",
            "http://192.168.151.24:80/api/ZAdvancePaymentRfc/Health",
            "http://192.168.151.24:8888/api/ZAdvancePaymentRfc/Health",
            "http://127.0.0.1:80/api/ZAdvancePaymentRfc/Health",
            "http://127.0.0.1:8888/api/ZAdvancePaymentRfc/Health"
          )
          foreach ($ep in $endpoints) {
            try {
              $r = Invoke-WebRequest $ep -UseBasicParsing -TimeoutSec 8
              $results += "$ep -> OK $($r.StatusCode) $($r.Content.Substring(0,50))"
            } catch {
              $results += "$ep -> ERR $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))"
            }
          }
          $out = $results -join "`n"
          Write-Host $out
          Set-Content "probe_results.txt" $out

      - name: Push results to GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "probe_results.txt" -Raw
          $b64 = [Convert]::ToBase64String([System.Text.Encoding]::UTF8.GetBytes($content))
          $h = @{Authorization="token $env:GH_TOKEN";"User-Agent"="v2";"Content-Type"="application/json"}
          $ex = try { (Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/probe_results.txt" -Headers $h -UseBasicParsing).Content | ConvertFrom-Json } catch { $null }
          $body = @{message="probe results";content=$b64}
          if ($ex.sha) { $body.sha = $ex.sha }
          Invoke-WebRequest "https://api.github.com/repos/akash0631/rfc-api/contents/probe_results.txt" -Method PUT -Headers $h -Body ($body|ConvertTo-Json) -UseBasicParsing | Out-Null
          Write-Host "Results pushed"
