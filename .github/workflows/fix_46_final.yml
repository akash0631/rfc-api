name: Fix .46 — deploy app + wire pipeline
on:
  push:
    paths:
      - '.github/workflows/fix_46_final.yml'
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Diagnose then point RFC Collector to working .36 IIS
        shell: powershell
        run: |
          Write-Host "=== Test .36:80 directly ==="
          try {
            $b = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
            $r = Invoke-WebRequest "http://192.168.151.36:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType application/json -UseBasicParsing -TimeoutSec 15
            Write-Host ".36 IIS OK: $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(500,$r.Content.Length)))
          } catch {
            Write-Host ".36 IIS ERR: $($_.Exception.Message)"
          }

          Write-Host "=== Test .36:8888 ==="
          try {
            $r = Invoke-WebRequest "http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host ".36:8888 OK: $($r.StatusCode) $($r.Content)"
          } catch {
            Write-Host ".36:8888 ERR: $($_.Exception.Message)"
          }

          Write-Host "=== Test .24:80 ==="
          try {
            $r = Invoke-WebRequest "http://192.168.151.24:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host ".24:80 OK: $($r.StatusCode) $($r.Content)"
          } catch {
            Write-Host ".24:80 ERR: $($_.Exception.Message)"
          }

          Write-Host "=== Test .24:8888 ==="
          try {
            $r = Invoke-WebRequest "http://192.168.151.24:8888/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host ".24:8888 OK: $($r.StatusCode) $($r.Content)"
          } catch {
            Write-Host ".24:8888 ERR: $($_.Exception.Message)"
          }
