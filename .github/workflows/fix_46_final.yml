name: Fix .46 — deploy app + wire pipeline
on:
  push:
    paths:
      - '.github/workflows/fix_46_final.yml'
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Copy app from .36 + wire + test
        shell: cmd
        run: |
          echo === Mount .36 ===
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Copy compiled bin from .36 actions-runner ===
          if not exist C:\RfcApp mkdir C:\RfcApp
          robocopy "\\192.168.151.36\C$\actions-runner\_work\rfc-api\rfc-api\bin\Release" C:\RfcApp /E /IS /IT /NFL /NDL
          echo ROBOCOPY: %ERRORLEVEL%
          copy /Y "\\192.168.151.36\C$\actions-runner\_work\rfc-api\rfc-api\Web.config" C:\RfcApp\ 2>nul
          dir C:\RfcApp\Vendor*.dll /B 2>nul
          dir C:\RfcApp\*.dll /B 2>nul | find /c ".dll"
          net use \\192.168.151.36\C$ /delete /y 2>nul

          echo === Wire RFC Collector to localhost:8888 ===
          powershell -NoProfile -Command "$j=Get-Content C:\RfcCollector\appsettings.json|ConvertFrom-Json; $j.IIS_HOST='127.0.0.1'; $j.IIS_PORT='8888'; $j|ConvertTo-Json -Depth 10|Set-Content C:\RfcCollector\appsettings.json; Write-Host Config-OK"

          echo === Recycle pool + restart service ===
          powershell -NoProfile -Command "Import-Module WebAdministration; Restart-WebAppPool RfcApiPool -EA SilentlyContinue; Start-Sleep 6"
          net stop RfcCollector
          timeout /t 4 /nobreak
          net start RfcCollector
          timeout /t 14 /nobreak
          sc query RfcCollector | findstr STATE

      - name: Test IIS and end-to-end fetch
        shell: powershell
        run: |
          Start-Sleep 5
          Write-Host "=== IIS :8888 health ==="
          try {
            $r = Invoke-WebRequest http://localhost:8888/api/ZAdvancePaymentRfc/Health -UseBasicParsing -TimeoutSec 10
            Write-Host "IIS OK: $($r.StatusCode) $($r.Content)"
          } catch {
            Write-Host "IIS ERR: $($_.Exception.Message)"
          }
          Write-Host "=== RFC Collector end-to-end ==="
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest http://localhost:9090/fetch -Method POST -Body $b -ContentType application/json -UseBasicParsing -TimeoutSec 60
            Write-Host "FETCH OK: $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(2000,$r.Content.Length)))
          } catch {
            Write-Host "FETCH ERR: $($_.Exception.Message)"
          }
