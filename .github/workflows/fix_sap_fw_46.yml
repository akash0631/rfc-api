name: Fix SAP Firewall (test-vm runner)
on:
  workflow_dispatch:

jobs:
  fix-firewall:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Test SAP port from this machine (.46)
        shell: powershell
        run: |
          Write-Host "=== This machine: $env:COMPUTERNAME ==="
          Write-Host "=== Testing 192.168.144.170:3302 from .46 ==="
          $r = Test-NetConnection -ComputerName 192.168.144.170 -Port 3302 -WarningAction SilentlyContinue
          Write-Host "TcpTestSucceeded: $($r.TcpTestSucceeded)"

      - name: Add firewall rule on .46
        shell: powershell
        run: |
          netsh advfirewall firewall add rule name="SAP RFC 3302" dir=out action=allow protocol=TCP remoteip=192.168.144.170 remoteport=3302
          Write-Host "Rule added on .46"

      - name: PSRemote to Server200 .40 and fix firewall there
        shell: powershell
        run: |
          Write-Host "=== Connecting to 192.168.151.40 (Server 200) ==="
          $cred = New-Object System.Management.Automation.PSCredential(
            "Administrator",
            (ConvertTo-SecureString "vrl@55555" -AsPlainText -Force)
          )
          try {
            $result = Invoke-Command -ComputerName 192.168.151.40 -Credential $cred `
              -ErrorAction Stop `
              -ScriptBlock {
                Write-Host "Connected to: $env:COMPUTERNAME"
                $r = Test-NetConnection -ComputerName 192.168.144.170 -Port 3302 -WarningAction SilentlyContinue
                Write-Host "SAP port from .40: $($r.TcpTestSucceeded)"
                netsh advfirewall firewall add rule name="SAP RFC 3302" dir=out action=allow protocol=TCP remoteip=192.168.144.170 remoteport=3302
                $r2 = Test-NetConnection -ComputerName 192.168.144.170 -Port 3302 -WarningAction SilentlyContinue
                Write-Host "SAP port after rule: $($r2.TcpTestSucceeded)"
                return $r2.TcpTestSucceeded
              }
            Write-Host "Result from .40: $result"
          } catch {
            Write-Host "PSRemote to .40 failed: $_"
            Write-Host "Trying .36..."
            try {
              $result2 = Invoke-Command -ComputerName 192.168.151.36 -Credential $cred `
                -ErrorAction Stop `
                -ScriptBlock {
                  Write-Host "Connected to: $env:COMPUTERNAME"
                  $r = Test-NetConnection -ComputerName 192.168.144.170 -Port 3302 -WarningAction SilentlyContinue
                  Write-Host "SAP port: $($r.TcpTestSucceeded)"
                  netsh advfirewall firewall add rule name="SAP RFC 3302" dir=out action=allow protocol=TCP remoteip=192.168.144.170 remoteport=3302
                  $r2 = Test-NetConnection -ComputerName 192.168.144.170 -Port 3302 -WarningAction SilentlyContinue
                  Write-Host "After rule: $($r2.TcpTestSucceeded)"
                  return $r2.TcpTestSucceeded
                }
              Write-Host "Result from .36: $result2"
            } catch {
              Write-Host "PSRemote to .36 also failed: $_"
            }
          }

      - name: Final SAP test via Azure
        shell: powershell
        run: |
          Start-Sleep 3
          try {
            $body = [System.Text.Encoding]::UTF8.GetBytes("scnrec#PIUSER#vrl@123#0001")
            $req = [System.Net.WebRequest]::Create("https://v2-hht-api.azurewebsites.net/api/hht")
            $req.Method = "POST"
            $req.ContentType = "text/plain"
            $req.ContentLength = $body.Length
            $req.GetRequestStream().Write($body, 0, $body.Length)
            $resp = $req.GetResponse()
            $reader = New-Object System.IO.StreamReader($resp.GetResponseStream())
            $result = $reader.ReadToEnd()
            Write-Host "Azure SAP response: $result"
            if ($result.StartsWith("0") -and -not $result.Contains("not reached")) {
              Write-Host "SAP REACHABLE (0=login failed but SAP responded)"
            } elseif ($result.StartsWith("1")) {
              Write-Host "SAP FULLY WORKING - login success!"
            } else {
              Write-Host "SAP still not reachable through tunnel"
            }
          } catch {
            Write-Host "Test error: $_"
          }
