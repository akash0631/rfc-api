name: Deploy to Test VM (192.168.151.46)

on:
  workflow_dispatch:
    inputs:
      rfc_name:
        description: 'RFC controller name to test after deploy'
        required: false
        default: 'Sync'

jobs:
  deploy-test:
    name: Build & Deploy to Test VM
    runs-on: [self-hosted, test-vm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix WebApplication.targets stub
        shell: powershell
        run: |
          $d = 'C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications'
          if (!(Test-Path $d)) { New-Item -ItemType Directory -Path $d -Force | Out-Null }
          $f = Join-Path $d 'Microsoft.WebApplication.targets'
          if (!(Test-Path $f)) {
            $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish" /><Target Name="Package" /><Target Name="PipelinePreDeployCopyAllFilesToOneFolder" /></Project>'
            [IO.File]::WriteAllText($f, $xml)
            Write-Host "Created stub: $f"
          } else {
            Write-Host "Stub already exists: $f"
          }

      - name: Restore NuGet packages
        shell: cmd
        run: |
          if not exist "C:\nuget\nuget.exe" (
            powershell -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path C:\nuget; Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile C:\nuget\nuget.exe"
          )
          C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln -NonInteractive

      - name: Build (Release)
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn45
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn47
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn
          echo Using Roslyn: %ROSLYN%
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0 /p:CscToolPath="%ROSLYN%" /p:VbcToolPath="%ROSLYN%"
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      - name: Stop IIS App Pool (before copy)
        shell: powershell
        run: |
          try {
            # Create App_Offline.htm to force ASP.NET to release file handles
            if (Test-Path "C:\RfcApp") {
              Set-Content "C:\RfcApp\App_Offline.htm" "<html><body>Deploying...</body></html>" -ErrorAction SilentlyContinue
              Write-Host "App_Offline.htm placed"
            }
            Start-Sleep -Seconds 2
            
            # Stop the IIS site and app pool
            try {
              Import-Module WebAdministration -ErrorAction Stop
              $site = Get-Website | Where-Object { $_.physicalPath -like '*RfcApp*' -or $_.Bindings.Collection.bindingInformation -like '*8888*' } | Select-Object -First 1
              if ($site) {
                Stop-Website $site.name -ErrorAction SilentlyContinue
                Stop-WebAppPool $site.applicationPool -ErrorAction SilentlyContinue
                Write-Host "Stopped site + pool: $($site.name) / $($site.applicationPool)"
              }
            } catch {
              Write-Host "WebAdmin stop warning (non-fatal): $_"
            }
            
            # Stop IIS W3SVC service entirely to release all file handles
            Write-Host "Stopping W3SVC service..."
            & net stop W3SVC /y 2>&1 | ForEach-Object { Write-Host $_ }
            Start-Sleep -Seconds 3
            
            # Kill any remaining w3wp
            Get-Process -Name w3wp -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 2
            Write-Host "IIS stopped"
          } catch {
            Write-Host "Stop step warning (non-fatal): $_"
          }
          # Always exit 0 - failure to stop IIS should not abort deploy
          exit 0

      - name: Copy to IIS
        timeout-minutes: 10
        shell: powershell
        run: |
          # Wait for the source DLL to become accessible (Windows Defender may scan it after build)
          $srcDll = "bin\Release\Vendor_SRM_Routing_Application.dll"
          $maxWait = 120  # seconds
          $waited = 0
          Write-Host "Waiting for source DLL to become accessible..."
          while ($waited -lt $maxWait) {
            try {
              $fs = [System.IO.File]::Open($srcDll, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::None)
              $fs.Close()
              Write-Host "Source DLL is accessible after ${waited}s"
              break
            } catch {
              Start-Sleep -Seconds 2
              $waited += 2
            }
          }
          if ($waited -ge $maxWait) {
            Write-Host "WARNING: Source DLL still locked after ${maxWait}s, attempting copy anyway"
          }
          
          if (-not (Test-Path "C:\RfcApp\bin")) { New-Item -ItemType Directory "C:\RfcApp\bin" -Force | Out-Null }
          
          # Fix permissions and clear read-only
          & icacls "C:\RfcApp\bin" /grant "Administrators:(OI)(CI)F" /T /C /Q 2>&1 | Out-Null
          
          # Delete destination DLL first to release any file locks on destination
          $destDll = "C:\RfcApp\bin\Vendor_SRM_Routing_Application.dll"
          if (Test-Path $destDll) {
            Write-Host "Removing old destination DLL..."
            $removed = $false
            for ($i = 0; $i -lt 10; $i++) {
              try {
                Remove-Item $destDll -Force -ErrorAction Stop
                Write-Host "Old DLL removed on attempt $($i+1)"
                $removed = $true
                break
              } catch {
                Write-Host "Attempt $($i+1) to remove old DLL failed: $_"
                Start-Sleep -Seconds 3
              }
            }
            if (-not $removed) {
              Write-Host "ERROR: Could not remove old DLL after 10 attempts"
              exit 1
            }
          }
          
          # Copy the DLL using robocopy /B (backup mode) - output visible in log
          robocopy "bin\Release" "C:\RfcApp\bin" "Vendor_SRM_Routing_Application.dll" /B /NJH /NJS /R:3 /W:2
          if ($LASTEXITCODE -gt 7) {
            Write-Host "ERROR: robocopy /B failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "DLL copied successfully"
          
          # Copy PDB (optional, non-fatal)
          Copy-Item "bin\Release\Vendor_SRM_Routing_Application.pdb" "C:\RfcApp\bin\" -Force -ErrorAction SilentlyContinue
          
          # First-time setup: copy all dependencies if not already present
          if (-not (Test-Path "C:\RfcApp\bin\System.Web.Http.dll")) {
            Write-Host "First-time deploy detected - copying all dependencies..."
            robocopy "bin\Release" "C:\RfcApp\bin" /E /NJH /NJS /NFL /NDL /NP /XF sapnco_utils.dll | Out-Null
            # Copy native SAP NCo DLLs to System32
            Copy-Item "packages\sapnco_x64.3.0.18\lib\sapnco_utils.dll" "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            Get-ChildItem "packages\sapnco_x64.3.0.18\lib" -Filter "lib*.dll" | Copy-Item -Destination "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            Get-ChildItem "packages\sapnco_x64.3.0.18\lib" -Filter "*icu*.dll" | Copy-Item -Destination "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "Incremental deploy - NuGet deps already in place"
          }
          
          # Safety: remove sapnco_utils.dll from bin if it got there
          Remove-Item "C:\RfcApp\bin\sapnco_utils.dll" -Force -ErrorAction SilentlyContinue
          
          # Update config and static files
          Copy-Item "Web.config" "C:\RfcApp\Web.config" -Force
          if (Test-Path "Global.asax") { Copy-Item "Global.asax" "C:\RfcApp\Global.asax" -Force }
          robocopy "Views" "C:\RfcApp\Views" /E /NJH /NJS /NFL /NDL /NP | Out-Null
          robocopy "Scripts" "C:\RfcApp\Scripts" /E /NJH /NJS /NFL /NDL /NP | Out-Null
          robocopy "Content" "C:\RfcApp\Content" /E /NJH /NJS /NFL /NDL /NP | Out-Null
          Write-Host "Deployed to C:\RfcApp"

      - name: Recycle IIS App Pool
        shell: powershell
        run: |
          try {
            # Remove App_Offline.htm so the site comes back online
            if (Test-Path "C:\RfcApp\App_Offline.htm") {
              Remove-Item "C:\RfcApp\App_Offline.htm" -Force
              Write-Host "Removed App_Offline.htm"
            }
            # Start W3SVC service (we stopped it fully in the Stop step)
            Write-Host "Starting W3SVC service..."
            & net start W3SVC 2>&1 | Write-Host
            Start-Sleep -Seconds 3
            
            Import-Module WebAdministration -ErrorAction Stop
            $site = Get-Website | Where-Object { $_.physicalPath -like '*RfcApp*' -or $_.Bindings.Collection.bindingInformation -like '*8888*' } | Select-Object -First 1
            if ($site) {
              Start-WebAppPool $site.applicationPool -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
              Restart-WebAppPool $site.applicationPool
              Write-Host "Recycled: $($site.applicationPool) (site: $($site.name))"
            } else {
              Write-Host "Site not found via WebAdmin, using appcmd fallback"
              & "$env:windir\System32\inetsrv\appcmd.exe" start apppool /apppool.name:RfcApiPool
              & "$env:windir\System32\inetsrv\appcmd.exe" recycle apppool /apppool.name:RfcApiPool
            }
          } catch {
            Write-Host "IIS recycle warning (non-fatal): $_"
          }

      - name: Health check
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          $rfc = '${{ inputs.rfc_name }}'
          # Main app must respond
          try {
            $r = Invoke-WebRequest -Uri 'http://localhost:8888/' -UseBasicParsing -TimeoutSec 15
            Write-Host "OK  HTTP $($r.StatusCode)  http://localhost:8888/"
          } catch {
            Write-Host "FAIL http://localhost:8888/ - $_"
            exit 1
          }
          # Informational: RFC endpoint (may vary per deployment)
          if ($rfc) {
            try { $a = Invoke-WebRequest "http://localhost:8888/api/$rfc" -UseBasicParsing -TimeoutSec 5; Write-Host "INFO api/$rfc => $($a.StatusCode)" } catch { Write-Host "INFO api/$rfc not reachable (non-fatal - check rfc_name input)" }
          }
          # Informational: swagger UI
          try { $s = Invoke-WebRequest "http://localhost:8888/swagger/ui/index" -UseBasicParsing -TimeoutSec 5; Write-Host "INFO swagger => $($s.StatusCode)" } catch { Write-Host "INFO swagger not reachable (non-fatal)" }

      - name: Summary
        shell: cmd
        run: |
          echo.
          echo ===== DEPLOY COMPLETE =====
          echo Server:  http://192.168.151.46
          echo Swagger: http://192.168.151.46/swagger
          echo RFC API: http://192.168.151.46/api/${{ inputs.rfc_name }}
          echo ===========================
