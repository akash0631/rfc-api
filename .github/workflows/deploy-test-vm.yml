name: Deploy to Test VM (192.168.151.46)

on:
  workflow_dispatch:
    inputs:
      rfc_name:
        description: 'RFC controller name to test after deploy'
        required: false
        default: 'Sync'

jobs:
  deploy-test:
    name: Build & Deploy to Test VM
    runs-on: [self-hosted, test-vm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Defender exclusions
        shell: powershell
        run: |
          try {
            # Exclude runner work dir and IIS deploy dir from real-time scanning
            Add-MpPreference -ExclusionPath "C:\actions-runner\_work" -ErrorAction SilentlyContinue
            Add-MpPreference -ExclusionPath "C:\RfcApp\bin" -ErrorAction SilentlyContinue
            Write-Host "Defender exclusions added for runner work dir and RfcApp bin"
          } catch {
            Write-Host "Could not set Defender exclusions (non-fatal): $_"
          }

      - name: Fix WebApplication.targets stub
        shell: powershell
        run: |
          $d = 'C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications'
          if (!(Test-Path $d)) { New-Item -ItemType Directory -Path $d -Force | Out-Null }
          $f = Join-Path $d 'Microsoft.WebApplication.targets'
          if (!(Test-Path $f)) {
            $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish" /><Target Name="Package" /><Target Name="PipelinePreDeployCopyAllFilesToOneFolder" /></Project>'
            [IO.File]::WriteAllText($f, $xml)
            Write-Host "Created stub: $f"
          } else {
            Write-Host "Stub already exists: $f"
          }

      - name: Restore NuGet packages
        shell: cmd
        run: |
          if not exist "C:\nuget\nuget.exe" (
            powershell -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path C:\nuget; Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile C:\nuget\nuget.exe"
          )
          C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln -NonInteractive

      - name: Build (Release)
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn45
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn47
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn
          echo Using Roslyn: %ROSLYN%
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0 /p:CscToolPath="%ROSLYN%" /p:VbcToolPath="%ROSLYN%"
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      - name: Stop IIS App Pool (before copy)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          # Disable Defender real-time scanning so it releases DLL file handles
          try { Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Write-Host "Defender RT disabled" } catch { }
          # Create App_Offline.htm to force ASP.NET to release file handles
          Set-Content "C:\RfcApp\App_Offline.htm" "<html><body>Deploying...</body></html>" -ErrorAction SilentlyContinue
          Write-Host "App_Offline.htm placed"
          Start-Sleep -Seconds 2
          # Stop the IIS site and app pool
          try {
            Import-Module WebAdministration -ErrorAction Stop
            $site = Get-Website | Where-Object { $_.physicalPath -like '*RfcApp*' -or $_.Bindings.Collection.bindingInformation -like '*8888*' } | Select-Object -First 1
            if ($site) {
              Stop-Website $site.name -ErrorAction SilentlyContinue
              Stop-WebAppPool $site.applicationPool -ErrorAction SilentlyContinue
              Write-Host "Stopped site + pool: $($site.name) / $($site.applicationPool)"
            }
          } catch { Write-Host "WebAdmin stop warning: $_" }
          # Stop IIS W3SVC service entirely to release all file handles
          Write-Host "Stopping W3SVC service..."
          & net stop W3SVC /y 2>&1 | Write-Host
          Start-Sleep -Seconds 8
          Get-Process -Name w3wp -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 4
          Write-Host "IIS stopped"
          exit 0

      - name: Remove stale .old.dll
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $binDir = "C:\RfcApp\bin"
          $stale  = Get-ChildItem $binDir -Filter "*.old*" -ErrorAction SilentlyContinue
          if (-not $stale) { Write-Host "No stale .old* files - nothing to clean"; exit 0 }
          foreach ($f in $stale) {
            Write-Host "=== Stale: $($f.FullName) ==="
            & icacls $f.FullName 2>&1 | Write-Host   # Print ACL for diagnosis
            # Reset ACL (removes all DENY entries, inherits from parent)
            & takeown /F $f.FullName /A 2>&1 | Write-Host
            & icacls $f.FullName /reset /C /Q 2>&1 | Write-Host
            & icacls $f.FullName /grant:r "BUILTIN\Administrators:(F)" /C /Q 2>&1 | Write-Host
            # Method 1: PowerShell
            Remove-Item $f.FullName -Force -ErrorAction SilentlyContinue
            if (-not (Test-Path $f.FullName)) { Write-Host "  -> Method1 (Remove-Item) SUCCESS"; continue }
            # Method 2: cmd del
            & cmd /c ('del /F /Q "' + $f.FullName + '"') 2>&1 | Write-Host
            if (-not (Test-Path $f.FullName)) { Write-Host "  -> Method2 (cmd del) SUCCESS"; continue }
            # Method 3: .NET Delete
            try { [System.IO.File]::Delete($f.FullName); if (-not (Test-Path $f.FullName)) { Write-Host "  -> Method3 (.NET Delete) SUCCESS"; continue } } catch { Write-Host "  Method3 error: $_" }
            # Method 4: SYSTEM scheduled task (runs with SYSTEM account - highest privilege)
            Write-Host "  Trying SYSTEM scheduled task..."
            $tid = "CleanDll_$(Get-Random)"; $ttime = (Get-Date).AddSeconds(5).ToString('HH:mm')
            & schtasks /create /tn $tid /tr ('cmd.exe /c del /F /Q /A-R "' + $f.FullName + '"') /sc once /st $ttime /ru SYSTEM /f 2>&1 | Write-Host
            Start-Sleep -Seconds 12
            & schtasks /delete /tn $tid /f 2>&1 | Out-Null
            if (-not (Test-Path $f.FullName)) { Write-Host "  -> Method4 (SYSTEM task) SUCCESS"; continue }
            # Method 5: Rename to .bak (prevents ASP.NET auto-loading it)
            Rename-Item $f.FullName "$($f.FullName).bak" -Force -ErrorAction SilentlyContinue
            if (-not (Test-Path $f.FullName)) { Write-Host "  -> Method5 (renamed to .bak) SUCCESS"; continue }
            Write-Host "  -> ALL METHODS FAILED for $($f.Name)"
          }

      - name: Copy to IIS
        timeout-minutes: 10
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $binDir  = "C:\RfcApp\bin"
          $destDll = "$binDir\Vendor_SRM_Routing_Application.dll"
          $srcDll  = "bin\Release\Vendor_SRM_Routing_Application.dll"

          # --- STEP 1: Fix permissions on bin folder ---
          if (-not (Test-Path $binDir)) { New-Item -ItemType Directory $binDir -Force | Out-Null }
          & icacls $binDir /grant "Administrators:(OI)(CI)F" /T /C /Q 2>&1 | Out-Null

          # --- STEP 2: Copy DLL via robocopy /B (backup mode - bypasses share violations & Defender locks) ---
          Write-Host "Copying DLL via robocopy /B..."
          robocopy "bin\Release" $binDir "Vendor_SRM_Routing_Application.dll" /B /NJH /NJS /R:5 /W:5 2>&1 | Write-Host
          $rc = $LASTEXITCODE
          if ($rc -gt 3) {
            Write-Host "robocopy exit $rc - trying plain copy fallback..."
            Copy-Item $srcDll $destDll -Force -ErrorAction Stop
          }
          if (-not (Test-Path $destDll)) { Write-Host "ERROR: DLL not found at destination"; exit 1 }
          Write-Host "DLL deployed: $destDll"
          Copy-Item "bin\Release\Vendor_SRM_Routing_Application.pdb" $binDir -Force -ErrorAction SilentlyContinue

          # --- STEP 3: First-time setup (only when NuGet deps are missing) ---
          if (-not (Test-Path "$binDir\System.Web.Http.dll")) {
            Write-Host "First-time deploy - copying all dependencies..."
            robocopy "bin\Release" $binDir /E /NJH /NJS /NFL /NDL /NP /XF sapnco_utils.dll | Out-Null
            Copy-Item "packages\sapnco_x64.3.0.18\lib\sapnco_utils.dll" "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            Get-ChildItem "packages\sapnco_x64.3.0.18\lib" -Filter "lib*.dll" | Copy-Item -Destination "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
            Get-ChildItem "packages\sapnco_x64.3.0.18\lib" -Filter "*icu*.dll" | Copy-Item -Destination "C:\Windows\System32\" -Force -ErrorAction SilentlyContinue
          } else {
            Write-Host "Incremental deploy - NuGet deps already in place"
          }
          Remove-Item "$binDir\sapnco_utils.dll" -Force -ErrorAction SilentlyContinue

          # --- STEP 4: Config and static files ---
          Copy-Item "Web.config" "C:\RfcApp\Web.config" -Force
          if (Test-Path "Global.asax") { Copy-Item "Global.asax" "C:\RfcApp\Global.asax" -Force }
          robocopy "Views"   "C:\RfcApp\Views"   /E /NJH /NJS /NFL /NDL /NP | Out-Null
          robocopy "Scripts" "C:\RfcApp\Scripts" /E /NJH /NJS /NFL /NDL /NP | Out-Null
          robocopy "Content" "C:\RfcApp\Content" /E /NJH /NJS /NFL /NDL /NP | Out-Null
          Write-Host "Deployed to C:\RfcApp"
          exit 0

      - name: Recycle IIS App Pool
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          # Re-enable Defender
          try { Set-MpPreference -DisableRealtimeMonitoring $false -ErrorAction SilentlyContinue } catch { }
          # Remove App_Offline.htm
          if (Test-Path "C:\RfcApp\App_Offline.htm") { Remove-Item "C:\RfcApp\App_Offline.htm" -Force -ErrorAction SilentlyContinue; Write-Host "Removed App_Offline.htm" }
          # Start W3SVC
          Write-Host "Starting W3SVC..."
          & net start W3SVC 2>&1 | Write-Host
          Start-Sleep -Seconds 4
          # Start site + pool (no Restart - causes Access Denied on fresh start)
          try {
            Import-Module WebAdministration -ErrorAction Stop
            $site = Get-Website | Where-Object { $_.physicalPath -like '*RfcApp*' -or $_.Bindings.Collection.bindingInformation -like '*8888*' } | Select-Object -First 1
            if ($site) {
              Start-WebAppPool $site.applicationPool -ErrorAction SilentlyContinue
              Start-Website $site.name -ErrorAction SilentlyContinue
              Write-Host "Started pool+site: $($site.applicationPool) / $($site.name)"
            } else {
              & "$env:windir\System32\inetsrv\appcmd.exe" start apppool /apppool.name:RfcApiPool 2>&1 | Write-Host
              & "$env:windir\System32\inetsrv\appcmd.exe" start site /site.name:RfcApiApp 2>&1 | Write-Host
              Write-Host "Started via appcmd fallback"
            }
          } catch {
            Write-Host "IIS start warning (non-fatal): $_"
          }

      - name: Health check
        if: always()
        shell: powershell
        run: |
          Start-Sleep -Seconds 8
          $rfc = '${{ inputs.rfc_name }}'
          try {
            $r = Invoke-WebRequest -Uri 'http://localhost:8888/' -UseBasicParsing -TimeoutSec 20
            Write-Host "OK  HTTP $($r.StatusCode)  http://localhost:8888/"
          } catch {
            Write-Host "WARN http://localhost:8888/ not reachable: $_"
          }
          if ($rfc) {
            try { $a = Invoke-WebRequest "http://localhost:8888/api/$rfc" -UseBasicParsing -TimeoutSec 8; Write-Host "OK  api/$rfc => $($a.StatusCode)" } catch { Write-Host "INFO api/${rfc}: $($_.Exception.Message.Split([char]10)[0])" }
          }
          try { $s = Invoke-WebRequest "http://localhost:8888/swagger/ui/index" -UseBasicParsing -TimeoutSec 8; Write-Host "OK  swagger => $($s.StatusCode)" } catch { Write-Host "INFO swagger: $($_.Exception.Message.Split([char]10)[0])" }

      - name: Summary
        if: always()
        shell: cmd
        run: |
          echo.
          echo ===== DEPLOY COMPLETE =====
          echo Server:  http://192.168.151.46
          echo Swagger: http://192.168.151.46/swagger
          echo RFC API: http://192.168.151.46/api/${{ inputs.rfc_name }}
          echo ===========================
