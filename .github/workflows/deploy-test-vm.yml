name: Deploy to Test VM (192.168.151.46)

on:
  workflow_dispatch:
    inputs:
      rfc_name:
        description: 'RFC Name that was deployed'
        required: false
        default: ''

jobs:
  deploy-test:
    name: Build & Deploy to Test VM
    runs-on: [self-hosted, test-vm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix WebApplication.targets stub (MUST run before MSBuild)
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -NonInteractive -Command ^
            "$targetDir = 'C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications'; ^
             if (!(Test-Path $targetDir)) { New-Item -ItemType Directory -Path $targetDir -Force | Out-Null }; ^
             $tf = Join-Path $targetDir 'Microsoft.WebApplication.targets'; ^
             if (!(Test-Path $tf)) { ^
               $xml = '<?xml version=""1.0"" encoding=""utf-8""?>' + [char]10 + '<Project xmlns=""http://schemas.microsoft.com/developer/msbuild/2003"">' + [char]10 + '  <Target Name=""WebPublish"" />' + [char]10 + '  <Target Name=""Package"" />' + [char]10 + '</Project>'; ^
               [System.IO.File]::WriteAllText($tf, $xml); ^
               Write-Host ('Created: ' + $tf) ^
             } else { Write-Host ('Exists: ' + $tf) }"

      - name: Restore NuGet packages
        shell: cmd
        run: |
          if not exist "C:\nuget\nuget.exe" (
            powershell -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path C:\nuget; Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile C:\nuget\nuget.exe"
          )
          C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln -NonInteractive

      - name: Build (Release)
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      - name: Create IIS folder if not exists
        shell: cmd
        run: |
          if not exist "C:\inetpub\wwwroot\Store Tracker\bin\" (
            mkdir "C:\inetpub\wwwroot\Store Tracker\bin"
            echo Created IIS folder
          ) else (
            echo IIS folder exists
          )

      - name: Copy DLLs to IIS
        shell: cmd
        run: |
          robocopy bin\Release\ "C:\inetpub\wwwroot\Store Tracker\bin\" *.dll *.pdb /XO /NJH /NJS
          if %ERRORLEVEL% LEQ 7 exit /b 0

      - name: Copy Web files to IIS root
        shell: cmd
        run: |
          copy /Y Web.config "C:\inetpub\wwwroot\Store Tracker\Web.config"
          if exist Global.asax copy /Y Global.asax "C:\inetpub\wwwroot\Store Tracker\Global.asax"

      - name: Recycle IIS App Pool (auto-detect)
        shell: cmd
        run: |
          powershell -ExecutionPolicy Bypass -NonInteractive -Command ^
            "try { Import-Module WebAdministration -ErrorAction Stop; ^
             $site = Get-Website | Where-Object { $_.physicalPath -like '*Store Tracker*' -or $_.name -like '*Store*' -or $_.name -like '*Tracker*' } | Select-Object -First 1; ^
             if ($site) { Restart-WebAppPool $site.applicationPool; Write-Host ('Recycled: ' + $site.applicationPool) } ^
             else { $pools = Get-ChildItem IIS:\AppPools; $p = ($pools | Where-Object { $_.name -like '*Default*' } | Select-Object -First 1).name; Restart-WebAppPool $p; Write-Host ('Recycled: ' + $p) } ^
            } catch { Write-Host ('appcmd fallback: ' + $_); & $env:windir\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:DefaultAppPool }"

      - name: Health check
        shell: cmd
        run: |
          timeout /t 8 /nobreak > nul
          powershell -ExecutionPolicy Bypass -NonInteractive -Command ^
            "$rfc = '${{ github.event.inputs.rfc_name }}'; ^
             $urls = @('http://localhost/', 'http://localhost/swagger'); ^
             if ($rfc) { $urls += 'http://localhost/api/' + $rfc }; ^
             foreach ($url in $urls) { ^
               try { $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 8; Write-Host ('OK ' + $url + ' HTTP ' + $r.StatusCode) } ^
               catch { Write-Host ('NO ' + $url + ' ' + $_.Exception.Message.Split([char]10)[0]) } ^
             }; ^
             Write-Host ''; ^
             Write-Host '=== DEPLOY COMPLETE ==='; ^
             Write-Host ('API: http://192.168.151.46/api/' + $rfc)"