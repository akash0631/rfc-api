name: Deploy to Test VM (192.168.151.46)

on:
  workflow_dispatch:
    inputs:
      rfc_name:
        description: 'RFC controller name to test after deploy'
        required: false
        default: 'Sync'

jobs:
  deploy-test:
    name: Build & Deploy to Test VM
    runs-on: [self-hosted, test-vm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix WebApplication.targets stub
        shell: powershell
        run: |
          $d = 'C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications'
          if (!(Test-Path $d)) { New-Item -ItemType Directory -Path $d -Force | Out-Null }
          $f = Join-Path $d 'Microsoft.WebApplication.targets'
          if (!(Test-Path $f)) {
            $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish" /><Target Name="Package" /><Target Name="PipelinePreDeployCopyAllFilesToOneFolder" /></Project>'
            [IO.File]::WriteAllText($f, $xml)
            Write-Host "Created stub: $f"
          } else {
            Write-Host "Stub already exists: $f"
          }

      - name: Restore NuGet packages
        shell: cmd
        run: |
          if not exist "C:\nuget\nuget.exe" (
            powershell -ExecutionPolicy Bypass -Command "New-Item -ItemType Directory -Force -Path C:\nuget; Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile C:\nuget\nuget.exe"
          )
          C:\nuget\nuget.exe restore Vendor_SRM_Routing_Application.sln -NonInteractive

      - name: Build (Release)
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn45
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn47
          if not exist "%ROSLYN%\csc.exe" set ROSLYN=packages\Microsoft.CodeDom.Providers.DotNetCompilerPlatform.2.0.1\tools\Roslyn
          echo Using Roslyn: %ROSLYN%
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0 /p:CscToolPath="%ROSLYN%" /p:VbcToolPath="%ROSLYN%"
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%

      - name: Copy to IIS
        shell: cmd
        run: |
          if not exist "C:\RfcApp\bin" mkdir "C:\RfcApp\bin"
          rem --- Remove native DLL from bin if it was incorrectly placed there before ---
          if exist "C:\RfcApp\bin\sapnco_utils.dll" del /F "C:\RfcApp\bin\sapnco_utils.dll"
          robocopy bin\Release "C:\RfcApp\bin" *.dll *.pdb /XO /NJH /NJS
          if %ERRORLEVEL% GTR 7 exit /b %ERRORLEVEL%
          rem --- sapnco.dll (managed) goes in bin so .NET finds it ---
          copy /Y packages\sapnco_x64.3.0.18\lib\sapnco.dll "C:\RfcApp\bin\sapnco.dll"
          rem --- sapnco_utils.dll is a NATIVE DLL - must NOT be in bin (ASP.NET tries to load it as managed assembly and fails)
          rem --- Put it in the app root so Windows native loader finds it via LoadLibrary, not ASP.NET compilation scanner ---
          copy /Y packages\sapnco_x64.3.0.18\lib\sapnco_utils.dll "C:\RfcApp\sapnco_utils.dll"
          rem --- Also copy to System32 so it's always findable by the IIS worker process ---
          copy /Y packages\sapnco_x64.3.0.18\lib\sapnco_utils.dll "C:\Windows\System32\sapnco_utils.dll"
          rem --- Copy any other native DLLs from the NCo package (libsapucum.dll, ICU, etc.) ---
          for %%f in (packages\sapnco_x64.3.0.18\lib\lib*.dll packages\sapnco_x64.3.0.18\lib\*icu*.dll) do (
            echo Copying native dep: %%f
            copy /Y "%%f" "C:\Windows\System32\" 2>nul
          )
          copy /Y Web.config "C:\RfcApp\Web.config"
          if exist Global.asax copy /Y Global.asax "C:\RfcApp\Global.asax"
          xcopy /Y /E /I Views "C:\RfcApp\Views" >nul 2>&1
          echo Deployed to C:\RfcApp

      - name: Recycle IIS App Pool
        shell: powershell
        run: |
          try {
            Import-Module WebAdministration -ErrorAction Stop
            $site = Get-Website | Where-Object { $_.physicalPath -like '*RfcApp*' -or $_.Bindings.Collection.bindingInformation -like '*8888*' } | Select-Object -First 1
            if ($site) {
              Restart-WebAppPool $site.applicationPool
              Write-Host "Recycled: $($site.applicationPool) (site: $($site.name))"
            } else {
              Write-Host "Site not found via WebAdmin, using appcmd fallback"
              & "$env:windir\System32\inetsrv\appcmd.exe" recycle apppool /apppool.name:DefaultAppPool
            }
          } catch {
            Write-Host "IIS recycle warning (non-fatal): $_"
          }

      - name: Health check
        shell: powershell
        run: |
          Start-Sleep -Seconds 5
          $rfc = '${{ inputs.rfc_name }}'
          $urls = @('http://localhost:8888/', 'http://localhost:8888/swagger')
          if ($rfc) { $urls += "http://localhost:8888/api/$rfc" }
          foreach ($url in $urls) {
            try {
              $r = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 10
              Write-Host "OK  HTTP $($r.StatusCode)  $url"
            } catch {
              Write-Host "ERR $url - $_"
            }
          }

      - name: Summary
        shell: cmd
        run: |
          echo.
          echo ===== DEPLOY COMPLETE =====
          echo Server:  http://192.168.151.46
          echo Swagger: http://192.168.151.46/swagger
          echo RFC API: http://192.168.151.46/api/${{ inputs.rfc_name }}
          echo ===========================
