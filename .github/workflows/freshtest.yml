name: FreshTestSetup
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/freshtest.yml'
jobs:
  setup:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Copy Web.config from VS project and check 500 error
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application

          echo === Copy Web.config from VS project directly (no modification) ===
          copy /Y "%VSPROJ%\Web.config" C:\V2RfcTest\Web.config
          echo Copied

          echo === Show connection strings in Web.config ===
          findstr /I "connectionString\|AppServerHost\|Client" C:\V2RfcTest\Web.config | findstr /V "<!--"

          echo === Recycle pool ===
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcTestPool
          timeout /t 15 /nobreak

          echo === Test with customErrors off enabled ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9292/' -UseBasicParsing -TimeoutSec 10;Write-Host 'ROOT:' $r.StatusCode}catch{if($_.Exception.Response){$s=New-Object System.IO.StreamReader($_.Exception.Response.GetResponseStream());$b=$s.ReadToEnd();Write-Host 'ERROR:' $b.Substring(0,[Math]::Min(800,$b.Length))}else{Write-Host 'ERR:' $_.Exception.Message}}"

          echo === Windows event log last error ===
          powershell -NoProfile -Command "Get-EventLog -LogName Application -EntryType Error -Newest 2 -EA SilentlyContinue | ForEach-Object { Write-Host $_.TimeGenerated $_.Source; Write-Host $_.Message.Substring(0,[Math]::Min(300,$_.Message.Length)) }"
