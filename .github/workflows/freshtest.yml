name: FreshTestSetup
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/freshtest.yml'
jobs:
  setup:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - name: Build to C:\V2RfcTest on port 9292 - clean new site
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application
          set OUT=C:\V2RfcTest
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe
          if not exist %OUT%\bin mkdir %OUT%\bin
          "%MSBUILD%" "%VSPROJ%\Vendor_SRM_Routing_Application.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=%OUT%\bin\ /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 exit /b 1
          dir %OUT%\bin\Vendor*.dll /B 2>nul
          C:\Windows\System32\inetsrv\appcmd.exe delete apppool /apppool.name:V2RfcTestPool 2>nul
          C:\Windows\System32\inetsrv\appcmd.exe add apppool /name:V2RfcTestPool /managedRuntimeVersion:v4.0 /managedPipelineMode:Integrated
          C:\Windows\System32\inetsrv\appcmd.exe delete site /site.name:V2RfcTest 2>nul
          C:\Windows\System32\inetsrv\appcmd.exe add site /name:V2RfcTest /bindings:"http/*:9292:" /physicalPath:%OUT%
          C:\Windows\System32\inetsrv\appcmd.exe set site /site.name:V2RfcTest "/[path='/'].applicationPool:V2RfcTestPool"
          C:\Windows\System32\inetsrv\appcmd.exe start site /site.name:V2RfcTest
          netsh advfirewall firewall delete rule name="V2RfcTest-9292" >nul 2>&1
          netsh advfirewall firewall add rule name="V2RfcTest-9292" dir=in action=allow protocol=TCP localport=9292 profile=any
          netstat -ano | findstr ":9292"

      - name: Write Web.config and test
        shell: powershell
        run: |
          $cfg = '<?xml version="1.0" encoding="utf-8"?><configuration><appSettings><add key="webpages:Version" value="3.0.0.0"/><add key="webpages:Enabled" value="false"/><add key="ClientValidationEnabled" value="true"/><add key="UnobtrusiveJavaScriptEnabled" value="true"/><add key="Name" value="Connection Name"/><add key="AppServerHost" value="192.168.144.174"/><add key="Client" value="210"/><add key="User" value="POWERBI"/><add key="Password" value="India@123456"/><add key="SystemNumber" value="00"/><add key="Language" value="EN"/></appSettings><system.web><compilation debug="false" targetFramework="4.8"/><httpRuntime targetFramework="4.8" maxRequestLength="2147483647"/><customErrors mode="Off"/></system.web><system.webServer><handlers><remove name="ExtensionlessUrlHandler-Integrated-4.0"/><remove name="OPTIONSVerbHandler"/><remove name="TRACEVerbHandler"/><add name="ExtensionlessUrlHandler-Integrated-4.0" path="*." verb="*" type="System.Web.Handlers.TransferRequestHandler" preCondition="integratedMode,runtimeVersionv4.0"/></handlers></system.webServer></configuration>'
          [System.IO.File]::WriteAllText("C:\V2RfcTest\Web.config", $cfg, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config: SAP Dev 192.168.144.174 / client 210"
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
          Start-Sleep 15
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try { $r=Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10; Write-Host "HEALTH: $($r.StatusCode) $($r.Content)" } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try { $r2=Invoke-WebRequest "http://localhost:9292/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30; Write-Host "EXECUTE: $($r2.StatusCode)"; Write-Host $r2.Content } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
