name: Fix DataV2 AppPool (Data Lake)

on:
  workflow_dispatch:

jobs:
  fix-apppool:
    runs-on: iis
    steps:
      - name: Set V2RfcTestPool to run as V2RD domain account
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "V2RfcTestPool"
          Set-ItemProperty "IIS:\AppPools\$pool" -Name processModel -Value @{
            userName   = "V2RD\akash.agarwal"
            password   = "vrl@99999"
            identityType = "SpecificUser"
          }
          Restart-WebAppPool -Name $pool
          Start-Sleep -Seconds 5
          $p = Get-ItemProperty "IIS:\AppPools\$pool" -Name processModel
          Write-Host "Identity: $($p.userName)"
          Write-Host "Done - IIS now connects to Server 28 as V2RD domain account"
