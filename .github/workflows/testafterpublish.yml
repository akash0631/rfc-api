name: TestAfterPublish
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Stub VS17 targets
        shell: powershell
        run: |
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          if (-not (Test-Path $d)) { New-Item $d -ItemType Directory -Force | Out-Null }
          $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>'
          [System.IO.File]::WriteAllText("$d\Microsoft.WebApplication.targets", $xml, [System.Text.Encoding]::UTF8)
          Write-Host "Stubbed"

      - name: Build using VS on .36 (MSBuild with VS2022 path)
        shell: cmd
        run: |
          echo === Try VS2022 MSBuild (has NuGet packages available) ===
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe
          if not exist "%MSBUILD%" set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe
          if not exist "%MSBUILD%" set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Professional\MSBuild\Current\Bin\MSBuild.exe
          echo Using: %MSBUILD%

          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj ^
            /p:Configuration=Release /p:Platform=AnyCPU ^
            /p:OutputPath=bin\Release\ ^
            /p:VisualStudioVersion=17.0 ^
            /p:ResolveNuGetPackages=true ^
            /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%

          if %ERRORLEVEL% EQU 0 (
            echo BUILD SUCCEEDED
            dir bin\Release\Vendor*.dll /B 2>nul
            robocopy bin\Release C:\V2RfcApi\bin /E /IS /IT /NFL /NDL
            copy /Y Web.config C:\V2RfcApi\Web.config
            echo DEPLOYED
          ) else (
            echo BUILD FAILED - check errors above
            exit /b 1
          )

      - name: Fix Client + test
        shell: cmd
        run: |
          powershell -NoProfile -Command "$lines=Get-Content 'C:\V2RfcApi\Web.config';$f=$false;$out=$lines|ForEach-Object{if(-not $f -and $_ -match 'key="Client"' -and $_ -notmatch '<!--' -and $_ -notmatch 'Validation'){$_=$_ -replace 'value="600"','value="210"';$f=$true;Write-Host 'FIXED:' $_.Trim()};$_};$out|Set-Content 'C:\V2RfcApi\Web.config' -Encoding UTF8"
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 15;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode;Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
