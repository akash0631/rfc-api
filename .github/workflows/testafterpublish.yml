name: TestAfterPublish
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Copy new controllers to local VS project and build
        shell: cmd
        run: |
          set VSPROJ=D:\V2 Projects\Vendor_SRM_Routing_Application
          set REPO=C:\actions-runner\_work\rfc-api\rfc-api

          echo === Copy new controllers from GitHub repo to local VS project ===
          robocopy "%REPO%\Controllers" "%VSPROJ%\Controllers" /E /IS /IT /NFL
          echo ROBOCOPY: %ERRORLEVEL%

          echo === Build using VS2022 MSBuild from LOCAL project (has all packages) ===
          set MSBUILD=C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe
          "%MSBUILD%" "%VSPROJ%\Vendor_SRM_Routing_Application.csproj" ^
            /p:Configuration=Release /p:Platform=AnyCPU ^
            /p:OutputPath=C:\V2RfcApi\bin\ ^
            /p:VisualStudioVersion=17.0 ^
            /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 exit /b 1

          echo === Copy Web.config from local project ===
          copy /Y "%VSPROJ%\Web.config" C:\V2RfcApi\Web.config

          echo === DLLs deployed ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

      - name: Fix Client 210 + recycle + test
        shell: cmd
        run: |
          powershell -NoProfile -Command "$lines=Get-Content 'C:\V2RfcApi\Web.config';$f=$false;$out=$lines|ForEach-Object{if(-not $f -and $_ -match 'key="Client"' -and $_ -notmatch '<!--' -and $_ -notmatch 'Validation'){$_=$_ -replace 'value="600"','value="210"';$f=$true;Write-Host 'FIXED:' $_.Trim()};$_};$out|Set-Content 'C:\V2RfcApi\Web.config' -Encoding UTF8;Write-Host Saved"
          powershell -NoProfile -Command "Get-Content 'C:\V2RfcApi\Web.config' | Select-String 'AppServerHost|key.*Client' | Select -First 4"
          C:\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          timeout /t 15 /nobreak
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 15;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"
          powershell -NoProfile -Command "$b='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}';try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Execute' -Method POST -Body $b -ContentType 'application/json' -UseBasicParsing -TimeoutSec 30;Write-Host 'EXECUTE:' $r.StatusCode;Write-Host $r.Content}catch{Write-Host 'EXECUTE_ERR:' $_.Exception.Message}"
