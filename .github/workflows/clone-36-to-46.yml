name: Clone .36 to .46
on:
  workflow_dispatch:
jobs:
  clone:
    runs-on: [self-hosted, test-vm]
    timeout-minutes: 20
    steps:
      - name: Step 1 - Verify MSDeploy
        shell: cmd
        run: |
          dir "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" 2>nul && echo MSDEPLOY_OK || echo MSDEPLOY_MISSING

      - name: Step 2 - Pull from .36 via MSDeploy (cmd shell - no quoting issues)
        shell: cmd
        run: |
          if not exist C:\mirror mkdir C:\mirror
          echo Pulling Store Tracker from .36...
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -verb:sync -source:apphostconfig="Store Tracker",computername="https://V2DC-ADDVERB:8172/msdeploy.axd",username="V2DC-ADDVERB\Administrator",password="vrl@55555",authtype="Basic",includeAcls="False" -dest:package="C:\mirror\StoreTracker.zip" -allowUntrusted
          echo MSDeploy exit: %ERRORLEVEL%
          if exist C:\mirror\StoreTracker.zip (
            echo SUCCESS - Package created
            dir C:\mirror\StoreTracker.zip
          ) else (
            echo FAILED - No package
          )

      - name: Step 3 - Copy SAP NCo DLLs from .36 file share
        shell: cmd
        run: |
          echo Connecting to .36 file share...
          net use \\192.168.151.36\C$ vrl@55555 /user:V2DC-ADDVERB\Administrator
          echo Net use exit: %ERRORLEVEL%
          echo.
          echo Searching for SAP NCo DLLs on .36...
          dir \\192.168.151.36\C$\Windows\System32\sapnco*.dll 2>nul
          dir \\192.168.151.36\C$\Windows\System32\rscp4n.dll 2>nul
          echo.
          echo Checking Store Tracker bin on .36...
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco*.dll" 2>nul
          echo.
          echo Copying NCo DLLs...
          copy /Y \\192.168.151.36\C$\Windows\System32\sapnco.dll C:\Windows\System32\ 2>nul && echo Copied sapnco.dll || echo sapnco.dll not found in System32
          copy /Y \\192.168.151.36\C$\Windows\System32\sapnco_utils.dll C:\Windows\System32\ 2>nul && echo Copied sapnco_utils.dll || echo sapnco_utils.dll not found
          copy /Y \\192.168.151.36\C$\Windows\System32\rscp4n.dll C:\Windows\System32\ 2>nul && echo Copied rscp4n.dll || echo rscp4n.dll not found
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco.dll" C:\Windows\System32\ 2>nul && echo Copied sapnco.dll from bin || echo sapnco.dll not in bin
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco_utils.dll" C:\Windows\System32\ 2>nul && echo Copied sapnco_utils.dll from bin || echo not in bin
          net use \\192.168.151.36\C$ /delete /y 2>nul
          echo.
          echo NCo DLLs now on .46:
          dir C:\Windows\System32\sapnco*.dll 2>nul || echo NONE

      - name: Step 4 - Deploy package to .46 IIS
        shell: cmd
        run: |
          if not exist C:\mirror\StoreTracker.zip (
            echo No package found - skipping IIS deploy
            exit 0
          )
          echo Deploying to .46 Store Tracker IIS site...
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" -verb:sync -source:package="C:\mirror\StoreTracker.zip" -dest:apphostconfig="Store Tracker" "-setParam:name=IIS Web Application Name,value=Store Tracker" -allowUntrusted
          echo Deploy exit: %ERRORLEVEL%

      - name: Step 5 - Test .46 RFC endpoint
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Start-Sleep 5
          try {
            $b = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260315"}'
            $r = Invoke-WebRequest "http://localhost/api/ZADVANCE_PAYMENT_RFC" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "RFC .46: HTTP $($r.StatusCode) - $($r.Content.Substring(0,[Math]::Min(200,$r.Content.Length)))"
          } catch { Write-Host "RFC: $_" }
          try {
            $r = Invoke-WebRequest "http://localhost/swagger" -UseBasicParsing -TimeoutSec 8
            Write-Host "Swagger .46: HTTP $($r.StatusCode)"
          } catch { Write-Host "Swagger: $_" }
