name: Clone .36 to .46
on:
  workflow_dispatch:
jobs:
  clone:
    runs-on: [self-hosted, test-vm]
    timeout-minutes: 20
    steps:
      - name: Pull app files from .36 and copy NCo DLLs
        shell: cmd
        run: |
          if not exist C:\mirror mkdir C:\mirror
          echo === Pulling app content from .36 (skip SSL bindings) ===
          "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
            -verb:sync ^
            -source:apphostconfig="Store Tracker",computername="https://V2DC-ADDVERB:8172/msdeploy.axd",username="V2DC-ADDVERB\Administrator",password="vrl@55555",authtype="Basic",includeAcls="False" ^
            -dest:package="C:\mirror\StoreTracker.zip" ^
            -allowUntrusted ^
            -skip:objectName=binding ^
            -skip:objectName=sslCert ^
            -skip:objectName=sslBinding
          echo MSDeploy pull exit: %ERRORLEVEL%
          if exist C:\mirror\StoreTracker.zip (
            echo SUCCESS
            dir C:\mirror\StoreTracker.zip
          ) else (
            echo FAILED - trying iisApp provider instead...
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
              -verb:sync ^
              -source:iisApp="Store Tracker",computername="https://V2DC-ADDVERB:8172/msdeploy.axd",username="V2DC-ADDVERB\Administrator",password="vrl@55555",authtype="Basic",includeAcls="False" ^
              -dest:package="C:\mirror\StoreTracker.zip" ^
              -allowUntrusted
            echo iisApp pull exit: %ERRORLEVEL%
          )

      - name: Copy SAP NCo DLLs from .36
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:V2DC-ADDVERB\Administrator
          echo Net use: %ERRORLEVEL%
          echo === NCo DLLs on .36 System32 ===
          dir \\192.168.151.36\C$\Windows\System32\sapnco*.dll 2>nul || echo NOT_FOUND_IN_SYSTEM32
          echo === NCo DLLs on .36 bin ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco*.dll" 2>nul || echo NOT_FOUND_IN_BIN
          echo.
          echo === Copying NCo DLLs ===
          copy /Y \\192.168.151.36\C$\Windows\System32\sapnco.dll C:\Windows\System32\ 2>nul && echo OK: sapnco.dll
          copy /Y \\192.168.151.36\C$\Windows\System32\sapnco_utils.dll C:\Windows\System32\ 2>nul && echo OK: sapnco_utils.dll
          copy /Y \\192.168.151.36\C$\Windows\System32\rscp4n.dll C:\Windows\System32\ 2>nul && echo OK: rscp4n.dll
          copy /Y \\192.168.151.36\C$\Windows\System32\icudt51l.dll C:\Windows\System32\ 2>nul && echo OK: icudt51l.dll
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco.dll" C:\Windows\System32\ 2>nul && echo OK: bin\sapnco.dll
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\sapnco_utils.dll" C:\Windows\System32\ 2>nul && echo OK: bin\sapnco_utils.dll
          echo.
          echo === Store Tracker bin on .36 (all DLLs) ===
          dir "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin\*.dll" /B 2>nul
          echo.
          net use \\192.168.151.36\C$ /delete /y 2>nul
          echo === NCo on .46 ===
          dir C:\Windows\System32\sapnco*.dll 2>nul || echo NONE_ON_.46

      - name: Deploy to .46 IIS
        shell: cmd
        run: |
          if not exist C:\mirror\StoreTracker.zip (
            echo No package - deploying from file share directly...
            net use \\192.168.151.36\C$ vrl@55555 /user:V2DC-ADDVERB\Administrator
            xcopy /E /Y /I "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker" "C:\inetpub\wwwroot\Store Tracker"
            net use \\192.168.151.36\C$ /delete /y 2>nul
            echo Xcopy exit: %ERRORLEVEL%
          ) else (
            echo Deploying package to .46 Store Tracker IIS...
            "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe" ^
              -verb:sync ^
              -source:package="C:\mirror\StoreTracker.zip" ^
              -dest:apphostconfig="Store Tracker" ^
              "-setParam:name=IIS Web Application Name,value=Store Tracker" ^
              -allowUntrusted
            echo Deploy exit: %ERRORLEVEL%
          )
          echo.
          echo Store Tracker bin on .46:
          dir "C:\inetpub\wwwroot\Store Tracker\bin" /B 2>nul | head -20

      - name: Test RFC on .46
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          Start-Sleep 5
          try {
            $b = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260315"}'
            $r = Invoke-WebRequest "http://localhost/api/ZADVANCE_PAYMENT_RFC" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "RFC on .46: HTTP $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(300,$r.Content.Length)))
          } catch { Write-Host "RFC: $_" }
          try {
            $r = Invoke-WebRequest "http://localhost/swagger" -UseBasicParsing -TimeoutSec 8
            Write-Host "Swagger: HTTP $($r.StatusCode)"
          } catch { Write-Host "Swagger: $_" }
