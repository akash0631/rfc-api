name: Deploy RFC Collector to .46

on:
  workflow_dispatch:
  push:
    paths:
      - 'rfc-collector/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish win-x64 self-contained
        run: |
          dotnet publish rfc-collector/RfcCollector/RfcCollector.csproj \
            -c Release -r win-x64 --self-contained true \
            -o ${{ github.workspace }}/publish
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfc-collector-win-x64
          path: publish/
          retention-days: 7

  deploy:
    needs: build
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rfc-collector-win-x64
          path: C:\RfcCollector\

      - name: Stop existing and start new
        shell: powershell
        run: |
          # Stop gracefully
          Stop-Process -Name RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          # Write start script with env vars baked in
          $script = "@echo off`nset IIS_HOST=192.168.151.36`nset IIS_PORT=80`nset SQL_SERVER=192.168.151.46`nset SQL_USER=sa`nset SQL_PASS=vrl@55555`nset SQL_DB=claudetestv2`nset ASPNETCORE_URLS=http://0.0.0.0:9090`nC:\RfcCollector\RfcCollector.exe >> C:\RfcCollector\rfc-collector.log 2>&1"
          $script | Out-File -FilePath "C:\RfcCollector\start.bat" -Encoding ASCII

          # Start detached
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c C:\RfcCollector\start.bat" -WindowStyle Hidden
          Start-Sleep -Seconds 6

          # Health check
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8
            Write-Host "HEALTH OK: $($r.StatusCode)"
            Write-Host $r.Content
          } catch {
            Write-Host "Health check failed: $_"
            Write-Host "Check logs at C:\RfcCollector\rfc-collector.log"
            # Show log tail
            if (Test-Path "C:\RfcCollector\rfc-collector.log") {
              Get-Content "C:\RfcCollector\rfc-collector.log" | Select-Object -Last 20
            }
          }

      - name: Summary
        shell: powershell
        run: |
          Write-Host "=== RFC Collector Deployed to VM-CRM (.46) ==="
          Write-Host "Health:  http://192.168.151.46:9090/"
          Write-Host "Swagger: http://192.168.151.46:9090/swagger"
          Write-Host "Fetch:   POST http://192.168.151.46:9090/fetch"
          Write-Host "Tables:  GET  http://192.168.151.46:9090/tables"
          Write-Host "SQL:     POST http://192.168.151.46:9090/sql"
          Write-Host "DB:      claudetestv2 @ 192.168.151.46"
          Write-Host "Via IIS: 192.168.151.36:80"
