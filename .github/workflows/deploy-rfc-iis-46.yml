name: Copy NCo from .36 and Deploy to .46
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mount .36 and copy SAP NCo + IIS bin
        shell: cmd
        run: |
          net use \\192.168.151.36\c$ /user:Administrator vrl@55555 /persistent:no
          if %ERRORLEVEL% NEQ 0 (
            net use \\192.168.151.36\c$ /user:Administrator Vrl@55555 /persistent:no
          )
          echo Mount result: %ERRORLEVEL%
          
          if not exist C:\RfcApp\bin mkdir C:\RfcApp\bin
          
          rem Copy SAP NCo DLLs from .36 - try multiple locations
          xcopy "\\192.168.151.36\c$\Windows\Microsoft.NET\assembly\GAC_64\sapnco" "C:\NCo\" /E /I /Y 2>nul
          xcopy "\\192.168.151.36\c$\Windows\Microsoft.NET\assembly\GAC_MSIL\sapnco" "C:\NCo\" /E /I /Y 2>nul
          xcopy "\\192.168.151.36\c$\Windows\System32\sapnco.dll" "C:\RfcApp\bin\" /Y 2>nul
          xcopy "\\192.168.151.36\c$\Windows\System32\sapnco3.dll" "C:\RfcApp\bin\" /Y 2>nul
          
          rem Copy entire IIS bin from .36 (compiled DLLs + NCo)
          xcopy "\\192.168.151.36\c$\inetpub\wwwroot\Store Tracker\bin\*.*" "C:\RfcApp\bin\" /Y /I 2>nul
          xcopy "\\192.168.151.36\c$\inetpub\wwwroot\Store Tracker\*.*" "C:\RfcApp\" /Y /I 2>nul
          
          rem Copy web.config if found
          xcopy "\\192.168.151.36\c$\inetpub\wwwroot\Store Tracker\Web.config" "C:\RfcApp\" /Y 2>nul
          
          dir C:\RfcApp\bin | find "sap"
          dir C:\RfcApp\bin | find "SAP"
          dir C:\RfcApp\bin
          
          net use \\192.168.151.36\c$ /delete

      - name: Check what we have and list SAP DLLs
        shell: powershell
        run: |
          Write-Host "=== RfcApp bin DLLs ==="
          Get-ChildItem "C:\RfcApp\bin" -Filter "*.dll" | Select Name, Length | Sort Name

          Write-Host "=== SAP DLLs ==="
          Get-ChildItem "C:\RfcApp\bin" -Filter "*sap*" -ErrorAction SilentlyContinue | Select Name, Length
          Get-ChildItem "C:\RfcApp\bin" -Filter "*SAP*" -ErrorAction SilentlyContinue | Select Name, Length
          
          Write-Host "=== NCo folder ==="
          Get-ChildItem "C:\NCo" -Recurse -ErrorAction SilentlyContinue | Select FullName, Length

          Write-Host "=== Web.config present? ==="
          Test-Path "C:\RfcApp\Web.config"
          if (Test-Path "C:\RfcApp\Web.config") { Get-Content "C:\RfcApp\Web.config" | Select-Object -First 20 }

      - name: Setup IIS site and test RFC
        shell: powershell
        run: |
          Import-Module WebAdministration
          
          # Ensure site exists
          if (-not (Get-Website "RfcApiApp" -ErrorAction SilentlyContinue)) {
            if (-not (Test-Path "IIS:\AppPools\RfcApiPool")) {
              New-WebAppPool -Name "RfcApiPool"
              Set-ItemProperty "IIS:\AppPools\RfcApiPool" -Name managedRuntimeVersion -Value "v4.0"
            }
            New-Website -Name "RfcApiApp" -Port 8888 -PhysicalPath "C:\RfcApp" -ApplicationPool "RfcApiPool"
          }
          Start-Website "RfcApiApp" -ErrorAction SilentlyContinue
          Restart-WebAppPool "RfcApiPool" -ErrorAction SilentlyContinue
          Start-Sleep 8
          
          Get-Website "RfcApiApp" | Select Name, State, PhysicalPath
          
          # Open firewall
          if (-not (Get-NetFirewallRule -DisplayName "RfcApp-8888" -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -DisplayName "RfcApp-8888" -Direction Inbound -Protocol TCP -LocalPort 8888 -Action Allow
          }
          
          # Test
          $body = ConvertTo-Json @{I_COMPANY_CODE="1000"; I_POSTING_DATE_LOW="20260101"; I_POSTING_DATE_HIGH="20260316"}
          try {
            $r = Invoke-WebRequest -Uri "http://localhost:8888/api/ZADVANCE_PAYMENT_RFC" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "RFC TEST HTTP $($r.StatusCode): $($r.Content.Substring(0, [Math]::Min(300, $r.Content.Length)))"
          } catch {
            Write-Host "RFC test failed: $_"
            # Show IIS error
            Get-EventLog -LogName Application -Newest 3 -EntryType Error -ErrorAction SilentlyContinue | Select Message
          }
