name: Quick Audit .46
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: [self-hosted, test-vm]
    timeout-minutes: 3
    steps:
      - name: Audit .46
        shell: cmd
        run: |
          echo === IIS SITES ===
          C:\Windows\System32\inetsrv\appcmd.exe list site
          echo === APP POOLS ===
          C:\Windows\System32\inetsrv\appcmd.exe list apppool
          echo === .NET Framework ===
          dir "C:\Windows\Microsoft.NET\Framework64" /B
          echo === SAP NCo GAC ===
          dir "C:\Windows\assembly\GAC_64\sapnco" 2>nul || echo NCo_NOT_in_GAC
          echo === SAP NCo System32 ===
          dir "C:\Windows\System32\sapnco*.dll" 2>nul || echo NCo_NOT_in_System32
          echo === SAP NCo Installer ===
          dir "C:\Program Files\SAP" 2>nul || echo SAP_dir_not_found
          echo === inetpub wwwroot ===
          dir "C:\inetpub\wwwroot" /B
          echo === RFC Collector service ===
          sc query RfcCollector
          echo === DONE ===
