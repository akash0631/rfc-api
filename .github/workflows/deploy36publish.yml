name: Deploy36Publish
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Stub VS17 WebApplication targets
        shell: powershell
        run: |
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          if (-not (Test-Path $d)) { New-Item $d -ItemType Directory -Force | Out-Null }
          $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>'
          [System.IO.File]::WriteAllText("$d\Microsoft.WebApplication.targets", $xml, [System.Text.Encoding]::UTF8)
          Write-Host "Targets stubbed: $(Test-Path $d\Microsoft.WebApplication.targets)"

      - name: NuGet restore
        shell: cmd
        run: |
          nuget restore Vendor_SRM_Routing_Application.sln -NonInteractive
          echo NuGet: %ERRORLEVEL%

      - name: MSBuild publish to C:\V2RfcApi ONLY
        shell: cmd
        run: |
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj ^
            /p:Configuration=Release ^
            /p:Platform=AnyCPU ^
            /p:DeployOnBuild=true ^
            /p:PublishMethod=FileSystem ^
            /p:PublishUrl=C:\V2RfcApi ^
            /p:DeleteExistingFiles=false ^
            /p:VisualStudioVersion=17.0 ^
            /nologo /verbosity:minimal
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 (
            echo === BUILD FAILED — trying simple output copy ===
            "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
            echo BUILD2: %ERRORLEVEL%
            if %ERRORLEVEL% EQU 0 (
              robocopy bin\Release C:\V2RfcApi\bin /E /IS /IT /NFL /NDL
              copy /Y Web.config C:\V2RfcApi\Web.config 2>nul
              copy /Y Global.asax C:\V2RfcApi\Global.asax 2>nul
              echo Deployed via robocopy
            )
          )
          echo === DLLs in C:\V2RfcApi\bin ===
          dir C:\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir C:\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

      - name: Fix Web.config + recycle + test
        shell: powershell
        run: |
          # Fix SAP host
          $c = Get-Content "C:\V2RfcApi\Web.config" -Raw
          $c = $c -replace '192.168.144.170','192.168.144.174'
          [System.IO.File]::WriteAllText("C:\V2RfcApi\Web.config", $c, [System.Text.Encoding]::UTF8)
          Write-Host "Web.config: SAP host set to Dev"

          # Recycle ONLY our new pool
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 15

          # Test
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }

          try {
            $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "=== EXECUTE SUCCESS ==="
            Write-Host "HTTP: $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }

          Write-Host "=== All live sites still running ==="
          Get-Website | Where-Object {$_.State -eq "Started"} | Select Name | Format-Table
