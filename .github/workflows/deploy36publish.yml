name: Deploy36Publish
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: [self-hosted, Windows, X64, iis]
    steps:
      - uses: actions/checkout@v4

      - name: Find VS published output and deploy to C:\V2RfcApi
        shell: cmd
        run: |
          echo === Find where VS already published on .36 ===
          dir "C:\Users\Administrator\AppData\Local\Temp" /B 2>nul | findstr /I "publish"
          dir "D:\V2_Vendor_SRM_Application" /B 2>nul
          dir "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC\bin" /B 2>nul | find /c ".dll"

          echo === Check VS solution publish profiles ===
          dir Properties\PublishProfiles /B 2>nul
          type Properties\PublishProfiles\*.pubxml 2>nul | findstr "publishUrl\|LastUsedBuildConfiguration"

          echo === Check NuGet packages folder ===
          dir packages /B 2>nul | find /c ""
          dir "%USERPROFILE%\.nuget\packages" /B 2>nul | find /c ""

      - name: Stub targets + try build with packages from cache
        shell: powershell
        run: |
          # Stub targets
          $d = "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          if (-not (Test-Path $d)) { New-Item $d -ItemType Directory -Force | Out-Null }
          $xml = '<?xml version="1.0" encoding="utf-8"?><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project>'
          [System.IO.File]::WriteAllText("$d\Microsoft.WebApplication.targets", $xml, [System.Text.Encoding]::UTF8)

          # Try build skipping package restore — use existing packages
          $msbuild = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe"
          & $msbuild Vendor_SRM_Routing_Application.csproj `
            /p:Configuration=Release /p:Platform=AnyCPU `
            /p:OutputPath=bin\Release\ `
            /p:VisualStudioVersion=17.0 `
            /p:RestorePackages=false `
            /nologo /verbosity:minimal
          Write-Host "Build exit: $LASTEXITCODE"

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Build succeeded — deploying to C:\V2RfcApi\bin"
            Copy-Item "bin\Release\*" "C:\V2RfcApi\bin\" -Recurse -Force
            Copy-Item "Web.config" "C:\V2RfcApi\" -Force -EA SilentlyContinue
            Copy-Item "Global.asax" "C:\V2RfcApi\" -Force -EA SilentlyContinue
            Write-Host "Deployed DLLs: $((Get-ChildItem 'C:\V2RfcApi\bin' -Filter '*.dll').Count)"
            (Get-ChildItem "C:\V2RfcApi\bin" -Filter "Vendor*.dll").Name
          } else {
            Write-Host "Build failed — checking if D:\V2_Vendor_SRM_Application has compiled output"
            $live = "D:\V2_Vendor_SRM_Application\Published_Vendor_Application_MVC"
            if (Test-Path $live) {
              $dlls = (Get-ChildItem "$live\bin" -Filter "*.dll" -EA SilentlyContinue).Count
              Write-Host "Live path DLLs: $dlls"
              if ($dlls -gt 0) {
                Copy-Item "$live\bin\*" "C:\V2RfcApi\bin\" -Recurse -Force
                Copy-Item "$live\Web.config" "C:\V2RfcApi\" -Force
                Write-Host "Copied from live path"
              }
            }
          }

      - name: Fix Web.config + recycle + test
        shell: powershell
        run: |
          $c = Get-Content "C:\V2RfcApi\Web.config" -Raw
          $c = $c -replace '192.168.144.170','192.168.144.174'
          [System.IO.File]::WriteAllText("C:\V2RfcApi\Web.config", $c, [System.Text.Encoding]::UTF8)
          Import-Module WebAdministration -EA SilentlyContinue
          Restart-WebAppPool "V2RfcApiPool" -EA SilentlyContinue
          Start-Sleep 15

          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 30
            Write-Host "=== EXECUTE: $($r2.StatusCode) ==="; Write-Host $r2.Content
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }
