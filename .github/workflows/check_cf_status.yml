name: CHECK_CF_STATUS
on:
  push:
    paths:
      - '.github/workflows/check_cf_status.yml'
jobs:
  check:
    runs-on: [self-hosted, iis]
    steps:
      - name: Check cloudflared status
        shell: powershell
        run: |
          $cfPath = "C:\cloudflared\cloudflared.exe"
          Write-Host "=== Checking cloudflared ==="
          if (Test-Path $cfPath) {
            Write-Host "EXISTS: $cfPath"
            & $cfPath --version
          } else {
            Write-Host "NOT FOUND: $cfPath"
            # Check if download is in progress
            $dlPath = "C:\cloudflared"
            if (Test-Path $dlPath) {
              Write-Host "Dir exists, contents:"
              Get-ChildItem $dlPath | Select Name, Length, LastWriteTime
            } else {
              Write-Host "Dir does not exist either"
            }
          }
          
          # Check running processes
          Write-Host "=== cloudflared processes ==="
          Get-Process cloudflared -ErrorAction SilentlyContinue
          
          # Check tunnel URL file
          if (Test-Path "C:\cloudflared\tunnel_url.txt") {
            Write-Host "=== TUNNEL URL ==="
            Get-Content "C:\cloudflared\tunnel_url.txt"
          }
          
          # Test .36:9292 health
          Write-Host "=== IIS :9292 health ==="
          try {
            $r = Invoke-WebRequest "http://localhost:9292/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body '{"PO_NO":"TEST","DELV_DATE":"20260401"}' -ContentType "application/json" -UseBasicParsing -TimeoutSec 10
            Write-Host "IIS OK: $($r.Content.Substring(0, [Math]::Min(100,$r.Content.Length)))"
          } catch { Write-Host "IIS: $_" }
