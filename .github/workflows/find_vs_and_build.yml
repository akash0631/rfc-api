name: FIND_VS_AND_BUILD
on:
  push:
    paths:
      - '.github/workflows/find_vs_and_build.yml'
jobs:
  build:
    runs-on: [self-hosted, iis]
    steps:
      - name: Find VS, update CS files, build
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          
          # Find devenv.exe (full Visual Studio)
          Write-Host "=== Searching for VS installations ==="
          $devenvPaths = @(
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\devenv.exe",
            "C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\IDE\devenv.exe",
            "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\IDE\devenv.exe",
            "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\Common7\IDE\devenv.exe",
            "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\Common7\IDE\devenv.exe",
            "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\Common7\IDE\devenv.exe"
          )
          $devenv = $null
          foreach ($p in $devenvPaths) {
            if (Test-Path $p) { $devenv = $p; Write-Host "FOUND devenv: $p"; break }
          }
          
          # Find ALL MSBuild versions
          Write-Host "=== All MSBuild ==="
          Get-ChildItem "C:\Program Files","C:\Program Files (x86)" -Recurse -Filter "MSBuild.exe" -ErrorAction SilentlyContinue | 
            Select FullName | ForEach-Object { Write-Host $_.FullName }
          
          # Check if WebApplication.targets exists anywhere
          Write-Host "=== WebApplication.targets ==="
          Get-ChildItem "C:\","D:\" -Recurse -Filter "Microsoft.WebApplication.targets" -ErrorAction SilentlyContinue | 
            Select FullName | ForEach-Object { Write-Host $_.FullName }
          
          # Update the CS files in the project source with latest from GitHub
          Write-Host "=== Updating source files ==="
          $projSrc = "D:\V2 Projects\Vendor_SRM_Routing_Application"
          
          # Download updated controllers from GitHub
          $files = @{
            "Controllers\Finance\ZPO_QTY_UPD_RFCController.cs" = "https://raw.githubusercontent.com/akash0631/rfc-api/master/Controllers/Finance/ZPO_QTY_UPD_RFCController.cs";
            "Controllers\Finance\ZPO_COST_UPD_RFCController.cs" = "https://raw.githubusercontent.com/akash0631/rfc-api/master/Controllers/Finance/ZPO_COST_UPD_RFCController.cs"
          }
          
          foreach ($file in $files.GetEnumerator()) {
            $destPath = Join-Path $projSrc $file.Key
            Write-Host "Downloading $($file.Key) → $destPath"
            try {
              Invoke-WebRequest $file.Value -OutFile $destPath -UseBasicParsing
              Write-Host "Updated: $destPath"
            } catch { Write-Host "Error: $_" }
          }
          
          # Try build with devenv if found
          if ($devenv) {
            Write-Host "=== Building with devenv ==="
            $sln = "$projSrc\Vendor_SRM_Routing_Application.sln"
            $result = & $devenv $sln /Build "Release" 2>&1
            Write-Host "Build result: $($result | Select -Last 5)"
          }
          
          Write-Host "Done."
          exit 0
