name: Fix and Start RfcCollector Service
on:
  workflow_dispatch:

jobs:
  fix-service:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Configure env vars, start service, health check
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"

          sc.exe stop RfcCollector
          Start-Sleep -Seconds 3

          $env1 = "IIS_HOST=192.168.151.36"
          $env2 = "IIS_PORT=80"
          $env3 = "SQL_SERVER=192.168.151.46"
          $env4 = "SQL_USER=sa"
          $env5 = "SQL_PASS=vrl@55555"
          $env6 = "SQL_DB=claudetestv2"
          $env7 = "ASPNETCORE_URLS=http://0.0.0.0:9090"
          [string[]]$envVars = $env1, $env2, $env3, $env4, $env5, $env6, $env7
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector" -Name Environment -Value $envVars -Type MultiString
          Write-Host "Registry env vars written OK"

          sc.exe start RfcCollector
          Start-Sleep -Seconds 15

          sc.exe query RfcCollector
          netstat -ano | findstr "9090"

          $ok = $false
          $attempt = 1
          while ($attempt -le 8) {
            try {
              $resp = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 5
              Write-Host "HEALTHY HTTP $($resp.StatusCode): $($resp.Content)"
              $ok = $true
              $attempt = 99
            } catch {
              Write-Host "Attempt $attempt not ready"
              Start-Sleep -Seconds 4
              $attempt++
            }
          }

          if (-not $ok) {
            Write-Host "App did not start. Checking event log:"
            Get-EventLog -LogName System -Newest 5 -EntryType Error -ErrorAction SilentlyContinue
          }

          if (-not (Get-NetFirewallRule -DisplayName "RfcCollector-9090" -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -DisplayName "RfcCollector-9090" -Direction Inbound -Protocol TCP -LocalPort 9090 -Action Allow
            Write-Host "Firewall rule created"
          }
          Write-Host "Complete"
