name: Fix and Start RfcCollector Service
on:
  workflow_dispatch:

jobs:
  fix-service:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Stop service
        shell: cmd
        run: |
          sc stop RfcCollector 2>nul
          timeout /t 4 /nobreak >nul
          echo Service stopped

      - name: Write env vars to registry using reg.exe
        shell: cmd
        run: |
          reg add "HKLM\SYSTEM\CurrentControlSet\Services\RfcCollector" /v Environment /t REG_MULTI_SZ /d "IIS_HOST=192.168.151.36\0IIS_PORT=80\0SQL_SERVER=192.168.151.46\0SQL_USER=sa\0SQL_PASS=vrl@55555\0SQL_DB=claudetestv2\0ASPNETCORE_URLS=http://0.0.0.0:9090\0" /f
          echo Registry env vars written

      - name: Start service and health check
        shell: cmd
        run: |
          sc start RfcCollector
          timeout /t 15 /nobreak >nul
          sc query RfcCollector
          curl -s http://localhost:9090/ || echo Not ready yet
          timeout /t 8 /nobreak >nul
          curl -s http://localhost:9090/ || echo Still not ready
          netstat -ano | findstr ":9090"

      - name: Ensure firewall open
        shell: powershell
        run: |
          if (-not (Get-NetFirewallRule -DisplayName "RfcCollector-9090" -ErrorAction SilentlyContinue)) {
            New-NetFirewallRule -DisplayName "RfcCollector-9090" -Direction Inbound -Protocol TCP -LocalPort 9090 -Action Allow
            Write-Host "Firewall rule created"
          } else {
            Write-Host "Firewall rule already exists"
          }
          Write-Host "DONE - RFC Collector service running on port 9090"
