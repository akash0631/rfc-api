name: Fix and Start RfcCollector Service
on:
  workflow_dispatch:

jobs:
  fix-service:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Fix env vars and start service
        shell: powershell
        run: |
          # The service already exists - just fix the env vars registry entry
          Stop-Service RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep 3

          # Correct way: cast as [string[]] and use -Type MultiString
          [string[]]$envVars = @(
            "IIS_HOST=192.168.151.36",
            "IIS_PORT=80",
            "SQL_SERVER=192.168.151.46",
            "SQL_USER=sa",
            "SQL_PASS=vrl@55555",
            "SQL_DB=claudetestv2",
            "ASPNETCORE_URLS=http://0.0.0.0:9090"
          )
          Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector" `
            -Name Environment -Value $envVars -Type MultiString
          Write-Host "Registry env vars set"

          # Start the service
          sc.exe start RfcCollector
          Start-Sleep 12

          $svc = Get-Service RfcCollector -ErrorAction SilentlyContinue
          Write-Host "Service status: $($svc.Status)"

          # Health check
          for ($i=1; $i -le 8; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 5
              Write-Host "HEALTHY: $($r.Content)"
              break
            } catch {
              Write-Host "Attempt $i: not ready yet"
              Start-Sleep 4
            }
            if ($i -eq 8) {
              Write-Host "--- Startup log ---"
              if (Test-Path "C:\RfcCollector\rfc.log") { Get-Content "C:\RfcCollector\rfc.log" -Tail 20 }
            }
          }

          # Ensure firewall open
          if (-not (Get-NetFirewallRule -DisplayName "RfcCollector-9090" -EA SilentlyContinue)) {
            New-NetFirewallRule -DisplayName "RfcCollector-9090" -Direction Inbound -Protocol TCP -LocalPort 9090 -Action Allow
          }
          
          netstat -ano | findstr ":9090"
          Write-Host "Done"
