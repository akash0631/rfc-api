name: SETUP_CF_TUNNEL_36
on:
  push:
    paths:
      - '.github/workflows/setup_cf_tunnel.yml'
jobs:
  setup:
    runs-on: [self-hosted, iis]
    steps:
      - name: Check/Install cloudflared and setup tunnel
        shell: powershell
        run: |
          # Check if cloudflared exists
          $cfPath = "C:\cloudflared\cloudflared.exe"
          if (-not (Test-Path $cfPath)) {
            Write-Host "=== Installing cloudflared ==="
            New-Item -ItemType Directory -Force -Path "C:\cloudflared" | Out-Null
            Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cfPath
            Write-Host "cloudflared installed"
          } else {
            Write-Host "cloudflared already present"
          }
          & $cfPath --version

      - name: Start Quick Tunnel and capture URL
        shell: powershell
        run: |
          $cfPath = "C:\cloudflared\cloudflared.exe"
          # Start a quick tunnel (no account needed) pointing to localhost:9292
          # Run in background and capture the URL from output
          $logFile = "C:\cloudflared\tunnel.log"
          
          # Kill any existing cloudflared
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep 2
          
          # Start tunnel in background
          $proc = Start-Process -FilePath $cfPath -ArgumentList "tunnel","--url","http://localhost:9292","--logfile",$logFile,"--no-autoupdate" -WindowStyle Hidden -PassThru
          Write-Host "cloudflared PID: $($proc.Id)"
          
          # Wait for URL to appear in log
          $url = ""
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep 2
            if (Test-Path $logFile) {
              $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
              $match = [regex]::Match($content, 'https://[a-z0-9\-]+\.trycloudflare\.com')
              if ($match.Success) {
                $url = $match.Value
                break
              }
            }
          }
          
          if ($url) {
            Write-Host "=== TUNNEL URL: $url ==="
            # Save URL to a file for retrieval
            $url | Out-File "C:\cloudflared\tunnel_url.txt" -Force
            Write-Host "Saved to C:\cloudflared\tunnel_url.txt"
            
            # Test the tunnel
            Start-Sleep 3
            try {
              $body = '{"PO_NO":"4500001234","DELV_DATE":"20260401"}'
              $r = Invoke-WebRequest "$url/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
              Write-Host "=== SAP TEST VIA TUNNEL ==="
              Write-Host "Status: $($r.StatusCode)"
              Write-Host "Response: $($r.Content)"
            } catch {
              Write-Host "Test error: $_"
            }
          } else {
            Write-Host "ERROR: Could not get tunnel URL"
            if (Test-Path $logFile) { Get-Content $logFile | Select -Last 20 }
            exit 1
          }
