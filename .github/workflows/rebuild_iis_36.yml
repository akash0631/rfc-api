name: REBUILD_IIS_36
on:
  push:
    paths:
      - '.github/workflows/rebuild_iis_36.yml'
jobs:
  rebuild:
    runs-on: [self-hosted, iis]
    steps:
      - name: Rebuild and publish ASP.NET to C:\V2RfcTest
        shell: powershell
        run: |
          $ErrorActionPreference = "Continue"
          $projDir = "D:\V2 Projects\Vendor_SRM_Routing_Application"
          $pubDir = "C:\V2RfcTest"
          
          # Find MSBuild
          $msbuild = $null
          $paths = @(
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
            "C:\Program Files (x86)\Microsoft Visual Studio\2019\BuildTools\MSBuild\Current\Bin\MSBuild.exe",
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) { $msbuild = $p; break }
          }
          if (-not $msbuild) {
            # Try vswhere
            $vs = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe 2>&1
            if ($vs) { $msbuild = $vs.Trim() }
          }
          Write-Host "MSBuild: $msbuild"
          
          if ($msbuild -and (Test-Path "$projDir\Vendor_SRM_Routing_Application.sln")) {
            Write-Host "=== Building ==="
            & $msbuild "$projDir\Vendor_SRM_Routing_Application.sln" /p:Configuration=Release /p:PublishUrl="$pubDir" /p:DeployOnBuild=true /t:Publish /v:minimal 2>&1 | Select-Object -Last 20
            Write-Host "Build exit: $LASTEXITCODE"
          } else {
            Write-Host "MSBuild not found or project missing. Checking alternate publish..."
            # Copy from VS published folder if exists
            $publishedDir = "$projDir\bin\Release"
            if (Test-Path $publishedDir) {
              Write-Host "Copying from $publishedDir to $pubDir"
              Copy-Item "$publishedDir\*" $pubDir -Recurse -Force
            }
          }
          
          # Fix Web.config - point to SAP Dev
          $webConfig = "$pubDir\Web.config"
          if (Test-Path $webConfig) {
            (Get-Content $webConfig) -replace '192\.168\.144\.170', '192.168.144.174' -replace 'value="600"', 'value="210"' | Set-Content $webConfig
            Write-Host "Web.config fixed to Dev"
          }
          
          # Recycle app pool
          $appcmd = "C:\Windows\System32\inetsrv\appcmd.exe"
          if (Test-Path $appcmd) {
            & $appcmd recycle apppool /apppool.name:V2RfcTestPool 2>&1 | Write-Host
            Write-Host "App pool recycled"
          }
          
          Start-Sleep 5
          
          # Test all 3 controllers
          $tests = @(
            @{url="http://localhost:9292/api/ZPO_DD_UPD_RFC/Post"; body='{"PO_NO":"4500001234","DELV_DATE":"20260401"}'},
            @{url="http://localhost:9292/api/ZPO_MODIFICATION/Execute"; body='{"IM_PO_NO":"","IM_DEL_CHG_DATE_LOW":"20260101","IM_DEL_CHG_DATE_HIGH":"20260320"}'},
            @{url="http://localhost:9292/api/ZADVANCE_PAYMENT_RFC/Post"; body='{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260101","I_POSTING_DATE_HIGH":"20260320"}'}
          )
          
          foreach ($t in $tests) {
            try {
              $r = Invoke-WebRequest $t.url -Method POST -Body $t.body -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
              Write-Host "=== $($t.url.Split('/')[-1]): HTTP $($r.StatusCode) - $($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length))) ==="
            } catch { Write-Host "=== $($t.url.Split('/')[-1]): $_" }
          }
          
          exit 0
