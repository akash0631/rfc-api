name: GET_TUNNEL_URL
on:
  push:
    paths:
      - '.github/workflows/get_tunnel_url.yml'
jobs:
  get_url:
    runs-on: [self-hosted, iis]
    steps:
      - name: Get tunnel URL and test SAP
        shell: powershell
        run: |
          # Check if tunnel process is running
          $procs = Get-Process cloudflared -ErrorAction SilentlyContinue
          Write-Host "cloudflared processes: $($procs.Count)"
          
          # Check tunnel URL file
          $urlFile = "C:\cloudflared\tunnel_url.txt"
          $logFile = "C:\cloudflared\tunnel.log"
          
          if (Test-Path $urlFile) {
            $url = (Get-Content $urlFile).Trim()
            Write-Host "=== STORED TUNNEL URL: $url ==="
          }
          
          # Read log file and search for URL  
          if (Test-Path $logFile) {
            Write-Host "=== TUNNEL LOG (last 30 lines) ==="
            Get-Content $logFile | Select-Object -Last 30
          }
          
          # Try different log file location
          $altLog = "C:\cloudflared\tunnel_std.log"
          if (Test-Path $altLog) {
            Get-Content $altLog | Select-Object -Last 20
          }
          
          # Kill old cloudflared and restart capturing stdout properly
          Write-Host "=== Restarting cloudflared with stdout capture ==="
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force
          Start-Sleep 3
          
          $cfPath = "C:\cloudflared\cloudflared.exe"
          & $cfPath tunnel --url http://localhost:9292 --logfile "C:\cloudflared\tunnel.log" --no-autoupdate 2>&1 | ForEach-Object {
            $_ | Add-Content "C:\cloudflared\tunnel_std.log"
            Write-Host $_
            if ($_ -match 'trycloudflare\.com') {
              $match = [regex]::Match($_, 'https://[a-z0-9\-]+\.trycloudflare\.com')
              if ($match.Success) {
                $url = $match.Value
                Write-Host "=== GOT TUNNEL URL: $url ==="
                $url | Out-File "C:\cloudflared\tunnel_url.txt" -Force
              }
            }
          } &
          
          # Wait and check log
          Start-Sleep 15
          Write-Host "=== Log after 15s ==="
          Get-Content "C:\cloudflared\tunnel.log" -ErrorAction SilentlyContinue | Select-Object -Last 20
          
          # Parse URL from log
          $logContent = Get-Content "C:\cloudflared\tunnel.log" -Raw -ErrorAction SilentlyContinue
          if ($logContent) {
            $match = [regex]::Match($logContent, '"https://[a-z0-9\-]+\.trycloudflare\.com"')
            if ($match.Success) {
              $url = $match.Value.Trim('"')
              Write-Host "=== TUNNEL URL FROM LOG: $url ==="
              $url | Out-File "C:\cloudflared\tunnel_url.txt" -Force
              
              # Test SAP via tunnel
              Start-Sleep 5
              try {
                $body = '{"PO_NO":"4500001234","DELV_DATE":"20260401"}'
                $r = Invoke-WebRequest "$url/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
                Write-Host "=== SAP VIA TUNNEL: $($r.Content) ==="
              } catch { Write-Host "SAP test: $_" }
            } else {
              Write-Host "URL not found in log yet"
              Write-Host $logContent
            }
          }
