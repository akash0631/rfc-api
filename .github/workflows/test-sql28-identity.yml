name: Test SQL28 Identity

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: iis
    steps:
      - name: Who am I and can I reach SQL28
        shell: powershell
        run: |
          Write-Host "=== RUNNER IDENTITY ==="
          Write-Host "User: $env:USERNAME"
          Write-Host "Domain: $env:USERDOMAIN"
          Write-Host "Computer: $env:COMPUTERNAME"

          Write-Host "=== SQL TEST - Integrated Security ==="
          Add-Type -AssemblyName System.Data
          $cs = "Server=192.168.151.28;Database=DataV2;Integrated Security=True;Connection Timeout=15;"
          $conn = New-Object System.Data.SqlClient.SqlConnection($cs)
          try {
            $conn.Open()
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = "SELECT @@SERVERNAME AS SRV, SUSER_NAME() AS LOGIN"
            $r = $cmd.ExecuteReader()
            while ($r.Read()) {
              Write-Host "SUCCESS: $($r['SRV']) as $($r['LOGIN'])"
            }
            $conn.Close()
          } catch {
            Write-Host "FAILED Integrated: $_"
          }

          Write-Host "=== SQL TEST - sa with vrl@99999 ==="
          $cs2 = "Server=192.168.151.28;Database=DataV2;User Id=sa;Password=vrl@99999;Connection Timeout=15;"
          $conn2 = New-Object System.Data.SqlClient.SqlConnection($cs2)
          try {
            $conn2.Open()
            $cmd2 = $conn2.CreateCommand()
            $cmd2.CommandText = "SELECT @@SERVERNAME AS SRV, SUSER_NAME() AS LOGIN"
            $r2 = $cmd2.ExecuteReader()
            while ($r2.Read()) {
              Write-Host "SUCCESS sa: $($r2['SRV']) as $($r2['LOGIN'])"
            }
            $conn2.Close()
          } catch {
            Write-Host "FAILED sa: $_"
          }

          Write-Host "=== IIS AppPool current state ==="
          Import-Module WebAdministration
          $p = Get-ItemProperty "IIS:\AppPools\V2RfcTestPool" -Name processModel
          Write-Host "Pool identity: $($p.userName) / $($p.identityType)"
          Write-Host "Pool state: $((Get-WebAppPoolState -Name V2RfcTestPool).Value)"
