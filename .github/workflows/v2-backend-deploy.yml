name: Deploy v2ArticleCreation Backend

on:
  repository_dispatch:
    types: [deploy-v2-backend]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v2ArticleCreation
        uses: actions/checkout@v4
        with:
          repository: akash0631/v2ArticleCreation
          token: ${{ secrets.PIPELINE_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps & build
        working-directory: Backend
        run: |
          npm install --production=false
          npx prisma generate
          npx tsc --skipLibCheck
          npm run postbuild
          npm prune --production
          echo "node_modules: $(du -sh node_modules/)"
          echo "dist/: $(du -sh dist/)"

      - name: Package (include node_modules)
        working-directory: Backend
        run: |
          zip -r /tmp/backend-deploy.zip dist/ node_modules/ prisma/schema.prisma package.json
          echo "Package: $(du -sh /tmp/backend-deploy.zip)"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check + move to dab-plan (P2v3)
        run: |
          PLAN=$(az webapp show --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query appServicePlanId -o tsv)
          echo "Current plan: $PLAN"
          if [[ "$PLAN" != *"dab-plan"* ]]; then
            echo "Moving to dab-plan..."
            az webapp update --name v2-article-backend --resource-group dab-rg \
              --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              --set serverFarmId="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/dab-rg/providers/Microsoft.Web/serverfarms/dab-plan"
            echo "✅ Moved to dab-plan (P2v3)"
          else
            echo "✅ Already on dab-plan"
          fi

      - name: Set startup command & app settings
        run: |
          az webapp config set \
            --name v2-article-backend --resource-group dab-rg \
            --startup-file "node --max-old-space-size=512 dist/index.js" \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          az webapp config appsettings set \
            --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --settings \
              NODE_ENV=production PORT=8080 \
              FRONTEND_URL="https://articles.v2retail.net" \
              CORS_ORIGINS="https://articles.v2retail.net,https://v2-article-creation.pages.dev" \
              ENABLE_REDIS=false VLM_FUSION_MODE=default \
              DEVELOPMENT_MODE=false DEBUG_API_ENDPOINTS=false \
              DEBUG_VLM_PIPELINE=false SENTRY_ENABLED=false \
              ENABLE_RATE_LIMITING=true \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              DIRECT_URL="${{ secrets.DIRECT_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          echo "✅ Settings applied"

      - name: Deploy zip
        run: |
          az webapp deploy \
            --name v2-article-backend --resource-group dab-rg \
            --src-path /tmp/backend-deploy.zip --type zip --async true \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} || true
          echo "✅ ZIP uploaded"

      - name: Restart & wait
        run: |
          sleep 10
          az webapp restart --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          echo "Waiting 60s..."
          sleep 60

      - name: Health check + runtime logs
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://v2-article-backend.azurewebsites.net/api/health)
          BODY=$(curl -s https://v2-article-backend.azurewebsites.net/api/health)
          echo "HTTP $HTTP: $BODY"

          CREDS=$(az webapp deployment list-publishing-credentials \
            --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query "{user:publishingUserName, pass:publishingPassword}" -o json)
          KU=$(echo $CREDS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user']+':'+d['pass'])")
          
          LOG_URL=$(curl -s -u "$KU" \
            "https://v2-article-backend.scm.azurewebsites.net/api/logs/docker" | \
            python3 -c "
import sys,json
try:
  logs=json.load(sys.stdin)
  for log in reversed(logs):
    h=log.get('href','')
    if h.endswith('.log') and 'docker' in h: print(h); break
except: pass
")
          echo "Log: $LOG_URL"
          [ -n "$LOG_URL" ] && curl -s -u "$KU" "$LOG_URL" | tail -80
          
          [ "$HTTP" = "200" ] && echo "✅ BACKEND LIVE" || echo "⚠️ Still down - see logs above"
