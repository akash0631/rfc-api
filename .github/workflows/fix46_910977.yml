name: Fix46_910977
on:
  push:
    paths:
      - '.github/workflows/fix46_910977.yml'
jobs:
  run:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find correct System.Web.Http version and fix
        shell: cmd
        run: |
          echo === Find correct DLL versions in VS packages ===
          powershell -NoProfile -Command "& {$cred=New-Object PSCredential('V2DC-ADDVERB\Administrator',(ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force));$s=New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop;Invoke-Command -Session $s -ScriptBlock {$pkg='D:\V2 Projects\Vendor_SRM_Routing_Application\packages';$dll=Get-ChildItem $pkg -Filter 'System.Web.Http.dll' -Recurse;$dll|Select FullName,@{n='Ver';e={[System.Reflection.AssemblyName]::GetAssemblyName($_.FullName).Version}};Write-Host '---';$d2=Get-ChildItem $pkg -Filter 'Microsoft.Web.Infrastructure.dll' -Recurse;$d2|Select FullName,@{n='Ver';e={[System.Reflection.AssemblyName]::GetAssemblyName($_.FullName).Version}}};Remove-PSSession $s}"
