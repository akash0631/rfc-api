name: Build Check then Merge to Master

# HOW IT WORKS:
# 1. Developer pushes to 'staging' branch (NEVER directly to master).
# 2. This workflow runs a full MSBuild compile on GitHub's cloud runner (windows-latest).
#    - If build PASSES  -> automatically merges staging -> master.
#      The master push then triggers deploy-iis.yml which builds & deploys on .36 IIS.
#    - If build FAILS   -> merge is BLOCKED. master stays 100% clean.
#      Developer fixes the error and pushes to staging again.
#
# WHY NO ARTIFACT UPLOAD:
#   deploy-iis.yml now runs build + deploy in one single job on the self-hosted .36 runner.
#   No cross-runner artifact transfer needed — avoids SSL issues with GitHub API on .36.

on:
  push:
    branches:
      - staging
    paths:
      - 'Controllers/**'
      - 'Models/**'
      - 'App_Start/**'
      - 'Views/**'
      - '*.cs'
      - '*.csproj'
      - '*.config'
  workflow_dispatch:

jobs:
  build-check:
    name: Build Check on staging
    runs-on: windows-latest

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: NuGet restore
        shell: cmd
        run: |
          nuget restore Vendor_SRM_Routing_Application.sln
          echo NuGet restore exit: %ERRORLEVEL%
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild compile Release
        shell: cmd
        run: |
          msbuild Vendor_SRM_Routing_Application.sln ^
            /p:Configuration=Release ^
            /p:Platform="Any CPU" ^
            /t:Build ^
            /m ^
            /v:minimal
          echo MSBuild exit: %ERRORLEVEL%
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

  merge-to-master:
    name: Merge staging to master (only if build passed)
    runs-on: ubuntu-latest
    needs: build-check
    permissions:
      contents: write

    steps:
      - name: Checkout repo full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Merge staging into master
        run: |
          git fetch origin staging master
          git checkout master
          git merge --no-ff origin/staging -m "ci: auto-merge staging to master after build passed [skip worker]"
          git push origin master

      - name: Done
        run: |
          echo "staging merged into master successfully."
          echo "deploy-iis.yml will now trigger build + deploy on .36 IIS runner."
