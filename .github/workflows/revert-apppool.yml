name: Revert AppPool to LocalSystem

on:
  workflow_dispatch:

jobs:
  revert:
    runs-on: iis
    steps:
      - name: Revert app pool to LocalSystem and restart IIS
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "V2RfcTestPool"
          
          # Revert to LocalSystem
          Set-ItemProperty "IIS:\AppPools\$pool" -Name processModel -Value @{
            identityType = "LocalSystem"
          }
          
          # Restart app pool
          Restart-WebAppPool -Name $pool
          Start-Sleep -Seconds 3
          
          # Also restart IIS completely
          iisreset /restart
          Start-Sleep -Seconds 10
          
          $p = Get-ItemProperty "IIS:\AppPools\$pool" -Name processModel
          Write-Host "Identity type: $($p.identityType)"
          Write-Host "IIS restarted and app pool back to LocalSystem"
