name: Fix AppPool and Test SQL28

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: iis
    steps:
      - name: Fix IIS AppPool to local Administrator
        shell: powershell
        run: |
          Import-Module WebAdministration
          $pool = "V2RfcTestPool"
          Set-ItemProperty "IIS:\AppPools\$pool" -Name processModel -Value @{
            userName     = ".\Administrator"
            password     = "vrl@99999"
            identityType = "SpecificUser"
          }
          Restart-WebAppPool -Name $pool
          Start-Sleep -Seconds 5
          $p = Get-ItemProperty "IIS:\AppPools\$pool" -Name processModel
          Write-Host "Pool identity: $($p.userName)"
          Write-Host "Pool state: $((Get-WebAppPoolState -Name $pool).Value)"

      - name: Test SQL Server 28 connection
        shell: powershell
        run: |
          $connStrings = @(
            "Server=192.168.151.28;Database=DataV2;Integrated Security=True;Connection Timeout=15;",
            "Server=192.168.151.28;Database=DataV2;User Id=.\Administrator;Password=vrl@99999;Connection Timeout=15;",
            "Server=192.168.151.28;Database=DataV2;User Id=Administrator;Password=vrl@99999;Connection Timeout=15;"
          )
          foreach ($cs in $connStrings) {
            try {
              $conn = New-Object System.Data.SqlClient.SqlConnection($cs)
              $conn.Open()
              $cmd = $conn.CreateCommand()
              $cmd.CommandText = "SELECT @@SERVERNAME AS SRV, SUSER_NAME() AS LOGIN, DB_NAME() AS DB"
              $r = $cmd.ExecuteReader()
              while ($r.Read()) {
                Write-Host "SUCCESS with: $($cs.Split(';')[2])"
                Write-Host "  Server: $($r['SRV']), Login: $($r['LOGIN']), DB: $($r['DB'])"
              }
              $conn.Close()
              break
            } catch {
              Write-Host "FAILED: $($cs.Split(';')[2]) — $_"
            }
          }

      - name: List existing Server 28 views
        shell: powershell
        run: |
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection(
              "Server=192.168.151.28;Database=DataV2;Integrated Security=True;Connection Timeout=15;"
            )
            $conn.Open()
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = "SELECT TABLE_NAME FROM INFORMATION_SCHEMA.VIEWS WHERE TABLE_NAME LIKE 'VIEW_%' OR TABLE_NAME LIKE 'VW_%' OR TABLE_NAME LIKE 'vw_%' OR TABLE_NAME LIKE 'V2_%' ORDER BY TABLE_NAME"
            $r = $cmd.ExecuteReader()
            $views = @()
            while ($r.Read()) { $views += $r['TABLE_NAME'] }
            $conn.Close()
            Write-Host "Existing views ($($views.Count)):"
            $views | ForEach-Object { Write-Host "  $_" }
          } catch {
            Write-Host "Could not list views: $_"
          }
