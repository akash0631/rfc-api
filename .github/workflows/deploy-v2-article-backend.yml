name: Deploy v2ArticleCreation Backend

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v2ArticleCreation
        uses: actions/checkout@v4
        with:
          repository: akash0631/v2ArticleCreation
          token: ${{ secrets.PIPELINE_GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps & build
        working-directory: Backend
        run: |
          npm install --production=false
          npx prisma generate
          npx tsc --skipLibCheck
          npm run postbuild
          npm prune --production
          echo "node_modules: $(du -sh node_modules/)"
          echo "dist/: $(du -sh dist/)"

      - name: Package (include node_modules)
        working-directory: Backend
        run: |
          zip -r /tmp/backend-deploy.zip dist/ node_modules/ prisma/schema.prisma package.json
          echo "Package: $(du -sh /tmp/backend-deploy.zip)"

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Check current app service plan
        run: |
          echo "=== APP SERVICE PLAN ==="
          az webapp show \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query "{plan:appServicePlanId, state:state, linuxFx:siteConfig.linuxFxVersion}" -o json

      - name: Move app to dab-plan (P2v3) if on F1
        run: |
          PLAN_ID=$(az webapp show \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query appServicePlanId -o tsv)
          echo "Current plan: $PLAN_ID"
          
          # If not already on dab-plan, move it
          if [[ "$PLAN_ID" != *"dab-plan"* ]]; then
            echo "Moving to dab-plan..."
            az webapp update \
              --name v2-article-backend \
              --resource-group dab-rg \
              --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              --set serverFarmId="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/dab-rg/providers/Microsoft.Web/serverfarms/dab-plan"
            echo "✅ Moved to dab-plan"
          else
            echo "✅ Already on dab-plan"
          fi

      - name: Set startup command & app settings
        run: |
          az webapp config set \
            --name v2-article-backend \
            --resource-group dab-rg \
            --startup-file "node --max-old-space-size=512 dist/index.js" \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

          az webapp config appsettings set \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --settings \
              NODE_ENV=production \
              PORT=8080 \
              FRONTEND_URL="https://articles.v2retail.net" \
              CORS_ORIGINS="https://articles.v2retail.net,https://v2-article-creation.pages.dev" \
              ENABLE_REDIS=false \
              VLM_FUSION_MODE=default \
              DEVELOPMENT_MODE=false \
              DEBUG_API_ENDPOINTS=false \
              DEBUG_VLM_PIPELINE=false \
              SENTRY_ENABLED=false \
              ENABLE_RATE_LIMITING=true \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              DIRECT_URL="${{ secrets.DIRECT_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          echo "✅ Settings applied"

      - name: Deploy zip (ignore startup failure)
        run: |
          az webapp deploy \
            --name v2-article-backend \
            --resource-group dab-rg \
            --src-path /tmp/backend-deploy.zip \
            --type zip \
            --async true \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} || true
          echo "✅ ZIP uploaded"

      - name: Restart & wait
        run: |
          sleep 10
          az webapp restart \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          echo "Waiting 60s..."
          sleep 60

      - name: Health check + print runtime logs
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://v2-article-backend.azurewebsites.net/api/health)
          BODY=$(curl -s https://v2-article-backend.azurewebsites.net/api/health)
          echo "HTTP $HTTP: $BODY"

          echo "=== GETTING RUNTIME LOGS ==="
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query "{user:publishingUserName, pass:publishingPassword}" -o json)
          KUDU_USER=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['user'])")
          KUDU_PASS=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['pass'])")

          LOG_URL=$(curl -s -u "$KUDU_USER:$KUDU_PASS" \
            "https://v2-article-backend.scm.azurewebsites.net/api/logs/docker" | \
            python3 -c "
import sys, json
try:
    logs = json.load(sys.stdin)
    for log in reversed(logs):
        href = log.get('href','')
        if 'docker' in href and href.endswith('.log'):
            print(href)
            break
except: pass
")
          echo "Log: $LOG_URL"
          if [ -n "$LOG_URL" ]; then
            curl -s -u "$KUDU_USER:$KUDU_PASS" "$LOG_URL" | tail -60
          fi

          [ "$HTTP" = "200" ] && echo "✅ BACKEND LIVE" || echo "⚠️ Still failing - see logs above"
