name: Fix46_910611
on:
  push:
    paths:
      - '.github/workflows/fix46_910611.yml'
jobs:
  run:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Remote PS into .36 and fix V2RfcTest
        shell: powershell
        run: |
          $cred = New-Object System.Management.Automation.PSCredential(
            "V2DC-ADDVERB\Administrator",
            (ConvertTo-SecureString "vrl@55555" -AsPlainText -Force)
          )
          $session = New-PSSession -ComputerName "192.168.151.36" -Credential $cred -EA SilentlyContinue
          if ($session) {
            Write-Host "Connected to .36 successfully"
            Invoke-Command -Session $session -ScriptBlock {
              $LIVE = "D:\V2 Published\FMS_PUTWAY\bin"
              $OUT  = "C:\V2RfcTest"
              $VSPROJ = "D:\V2 Projects\Vendor_SRM_Routing_Application"
              $MSBUILD = "C:\Program Files\Microsoft Visual Studio\2022\Community\MSBuild\Current\Bin\MSBuild.exe"

              Write-Host "=== Copy ALL DLLs from live FMS_PUTWAY ==="
              $count = 0
              Get-ChildItem $LIVE -Filter "*.dll" | Where-Object {$_.Name -ne "Vendor_SRM_Routing_Application.dll"} | ForEach-Object {
                Copy-Item $_.FullName "$OUT\bin\" -Force; $count++
              }
              Write-Host "Copied $count DLLs — Total: $((Get-ChildItem "$OUT\bin" -Filter "*.dll").Count)"
              (Get-ChildItem "$OUT\bin" -Filter "Vendor*.dll").Name

              Write-Host "=== Copy Global.asax ==="
              Copy-Item "$VSPROJ\Global.asax" "$OUT\" -Force

              Write-Host "=== Sync controllers + build ==="
              robocopy "C:\actions-runner\_work\rfc-api\rfc-api\Controllers" "$VSPROJ\Controllers" /E /IS /IT /NFL /NDL
              & $MSBUILD "$VSPROJ\Vendor_SRM_Routing_Application.csproj" /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath="$OUT\bin\" /p:VisualStudioVersion=17.0 /nologo /verbosity:minimal
              Write-Host "Build exit: $LASTEXITCODE"

              Write-Host "=== Recycle ==="
              Import-Module WebAdministration -EA SilentlyContinue
              Restart-WebAppPool "V2RfcTestPool" -EA SilentlyContinue
              Start-Sleep 15

              Write-Host "=== Test ==="
              try {
                $r = Invoke-WebRequest "http://localhost:9292/api/ZpoDdUpdRfc/Health" -UseBasicParsing -TimeoutSec 10
                Write-Host "ZpoDdUpdRfc: $($r.StatusCode) $($r.Content)"
              } catch { Write-Host "ZpoDdUpdRfc ERR: $($_.Exception.Message)" }
              try {
                $r2 = Invoke-WebRequest "http://localhost:9292/api/ZpoModificationRfc/Health" -UseBasicParsing -TimeoutSec 10
                Write-Host "ZpoModificationRfc: $($r2.StatusCode) $($r2.Content)"
              } catch { Write-Host "ZpoModificationRfc ERR: $($_.Exception.Message)" }
            }
            Remove-PSSession $session
          } else {
            Write-Host "PSRemoting failed — trying net use"
            cmd /c "net use \\192.168.151.36\C$ /user:V2DC-ADDVERB\Administrator vrl@55555"
            Write-Host "Net use: $LASTEXITCODE"
          }
