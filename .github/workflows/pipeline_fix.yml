name: Audit .46 split steps
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: IIS sites and DLL counts
        shell: powershell
        run: |
          Import-Module WebAdministration -EA SilentlyContinue
          Get-Website | ForEach-Object {
            $p = $_.PhysicalPath
            $port = ($_.Bindings.Collection[0].bindingInformation -split ':')[1]
            $dlls = (Get-ChildItem "$p\bin" -Filter "*.dll" -EA SilentlyContinue).Count
            $vendor = (Get-ChildItem "$p\bin" -Filter "Vendor*.dll" -EA SilentlyContinue).Count
            $web = Test-Path "$p\Web.config"
            Write-Host "SITE|$($_.Name)|$($_.State)|:$port|$p|DLLs:$dlls|Vendor:$vendor|Web.config:$web"
          }

      - name: Test IIS routes on all ports
        shell: powershell
        run: |
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($port in @(80, 8888)) {
            foreach ($path in @("/api/ZAdvancePaymentRfc/Execute", "/api/ZAdvancePaymentRfc/Health", "/swagger", "/")) {
              $url = "http://localhost:$port$path"
              try {
                $m = if ($path -like "*/Execute") {"POST"} else {"GET"}
                $b = if ($m -eq "POST") {$body} else {$null}
                $r = Invoke-WebRequest $url -Method $m -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 6
                Write-Host "OK|$url|$($r.StatusCode)|$($r.Content.Substring(0,[Math]::Min(150,$r.Content.Length)))"
              } catch {
                $code = try{$_.Exception.Response.StatusCode.value__}catch{0}
                Write-Host "FAIL|$url|$code|$($_.Exception.Message.Substring(0,[Math]::Min(60,$_.Exception.Message.Length)))"
              }
            }
          }

      - name: RFC Collector config and fetch test
        shell: powershell
        run: |
          Write-Host "CONFIG:"
          Get-Content "C:\RfcCollector\appsettings.json"
          Write-Host "SERVICE: $((Get-Service RfcCollector -EA SilentlyContinue).Status)"
          Write-Host "EXE_DATE: $((Get-Item 'C:\RfcCollector\RfcCollector.exe' -EA SilentlyContinue).LastWriteTime)"
          try { $h = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8; Write-Host "HEALTH: $($h.Content)" } catch { Write-Host "HEALTH_ERR: $($_.Exception.Message)" }
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":3}'
          try { $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 45; Write-Host "FETCH|$($r.StatusCode)|$($r.Content.Substring(0,[Math]::Min(600,$r.Content.Length)))" } catch { Write-Host "FETCH_ERR: $($_.Exception.Message)" }

      - name: SQL claudetestv2 tables
        shell: powershell
        run: |
          $cs = "Server=192.168.151.46,1433;Database=claudetestv2;User Id=sa;Password=vrl@55555;TrustServerCertificate=true;"
          try {
            $conn = New-Object System.Data.SqlClient.SqlConnection($cs)
            $conn.Open()
            $cmd = $conn.CreateCommand()
            $cmd.CommandText = "SELECT TABLE_NAME, (SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS c WHERE c.TABLE_NAME=t.TABLE_NAME) as COLS FROM INFORMATION_SCHEMA.TABLES t ORDER BY TABLE_NAME"
            $r = $cmd.ExecuteReader()
            while ($r.Read()) { Write-Host "TABLE|$($r[0])|cols:$($r[1])" }
            $conn.Close()
            Write-Host "SQL_OK"
          } catch { Write-Host "SQL_ERR: $($_.Exception.Message)" }

      - name: SAP NCo check
        shell: powershell
        run: |
          @(
            "C:\Windows\System32\sapnco.dll",
            "C:\Windows\System32\sapnco_utils.dll",
            "C:\Windows\assembly\GAC_64\sapnco",
            "C:\Windows\Microsoft.NET\assembly\GAC_64\sapnco"
          ) | ForEach-Object { Write-Host "NCo|$_|$(Test-Path $_)" }
