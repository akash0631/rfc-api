name: Wire .46 Collector to .24 IIS
on:
  workflow_dispatch:
jobs:
  wire:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Test .24 IIS reachability and routes from .46
        shell: powershell
        run: |
          Write-Host "=== Testing .24 IIS from .46 ==="
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($route in @(
            "http://192.168.151.24:80/",
            "http://192.168.151.24:80/api/ZAdvancePaymentRfc/Health",
            "http://192.168.151.24:80/api/ZAdvancePaymentRfc/Execute",
            "http://192.168.151.24:80/swagger",
            "http://192.168.151.24:8888/api/ZAdvancePaymentRfc/Health",
            "http://192.168.151.24:8888/api/ZAdvancePaymentRfc/Execute"
          )) {
            try {
              $m = if ($route -like "*/Execute") {"POST"} else {"GET"}
              $b = if ($m -eq "POST") {$body} else {$null}
              $r = Invoke-WebRequest $route -Method $m -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 8
              Write-Host "✅ $route → $($r.StatusCode): $($r.Content.Substring(0,[Math]::Min(100,$r.Content.Length)))"
            } catch {
              Write-Host "❌ $route → $($_.Exception.Message.Substring(0,[Math]::Min(80,$_.Exception.Message.Length)))"
            }
          }

      - name: Wire RFC Collector to .24 IIS if reachable
        shell: powershell
        run: |
          # Check if .24:80 responds
          $reachable24_80 = $false
          $reachable24_8888 = $false
          
          try { Invoke-WebRequest "http://192.168.151.24:80/" -UseBasicParsing -TimeoutSec 5 | Out-Null; $reachable24_80 = $true } catch {}
          try { Invoke-WebRequest "http://192.168.151.24:8888/" -UseBasicParsing -TimeoutSec 5 | Out-Null; $reachable24_8888 = $true } catch {}
          
          Write-Host ".24:80 reachable: $reachable24_80"
          Write-Host ".24:8888 reachable: $reachable24_8888"
          
          # Try .36 too
          $reachable36 = $false
          try { Invoke-WebRequest "http://192.168.151.36:80/" -UseBasicParsing -TimeoutSec 5 | Out-Null; $reachable36 = $true } catch {}
          Write-Host ".36:80 reachable: $reachable36"
          
          # Test actual RFC route on each
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          foreach ($host in @("192.168.151.24","192.168.151.36")) {
            foreach ($port in @(80, 8888)) {
              try {
                $r = Invoke-WebRequest "http://${host}:${port}/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 10
                Write-Host "✅ $host:$port/api/ZAdvancePaymentRfc/Execute → HTTP $($r.StatusCode)"
                Write-Host $r.Content.Substring(0,[Math]::Min(200,$r.Content.Length))
              } catch {
                Write-Host "❌ ${host}:${port} → $($_.Exception.Message.Substring(0,[Math]::Min(60,$_.Exception.Message.Length)))"
              }
            }
          }
          
          # Set the best working host in appsettings
          # Priority: .24:80 → .24:8888 → .36:80 → .36:8888 → localhost:80
          $bestHost = "127.0.0.1"
          $bestPort = "80"
          
          foreach ($combo in @("192.168.151.24:80","192.168.151.24:8888","192.168.151.36:80","192.168.151.36:8888")) {
            $h,$p = $combo -split ':'
            try {
              $r = Invoke-WebRequest "http://${h}:${p}/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 6
              if ($r.StatusCode -eq 200) { $bestHost=$h; $bestPort=$p; Write-Host "Best IIS: $h:$p"; break }
            } catch {}
          }
          
          Write-Host "Using IIS: $bestHost:$bestPort"
          $cfg = @{ Logging=@{LogLevel=@{Default="Information"}}; AllowedHosts="*"; IIS_HOST=$bestHost; IIS_PORT=$bestPort }
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          
          Import-Module WebAdministration
          Get-ChildItem IIS:\AppPools | ForEach-Object { Restart-WebAppPool $_.Name -EA SilentlyContinue }
          Start-Sleep 5
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          Write-Host "RfcCollector: $((Get-Service RfcCollector).Status)"

      - name: Full pipeline test
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":3}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "=== PIPELINE RESULT ==="
            Write-Host "HTTP: $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(800,$r.Content.Length)))
          } catch { Write-Host "Pipeline error: $($_.Exception.Message)" }
