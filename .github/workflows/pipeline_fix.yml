name: Fix .46 pipeline — NCo + Collector config
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Recycle IIS and verify NCo
        shell: powershell
        run: |
          Write-Host "sapnco.dll in System32: $(Test-Path 'C:\Windows\System32\sapnco.dll')"
          Write-Host "sapnco_utils.dll in System32: $(Test-Path 'C:\Windows\System32\sapnco_utils.dll')"
          Write-Host "Collector config:"
          Get-Content "C:\RfcCollector\appsettings.json"
          Write-Host "Collector service: $((Get-Service RfcCollector).Status)"
          Import-Module WebAdministration
          Get-ChildItem IIS:\AppPools | ForEach-Object {
            Restart-WebAppPool $_.Name -EA SilentlyContinue
            Write-Host "Recycled: $($_.Name)"
          }
          Start-Sleep 10
          Get-Website | Select Name, State | Format-Table

      - name: Test IIS :80 health
        shell: powershell
        run: |
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "Health HTTP $($r.StatusCode): $($r.Content)"
          } catch { Write-Host "Health error: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "Execute HTTP $($r2.StatusCode): $($r2.Content.Substring(0,[Math]::Min(300,$r2.Content.Length)))"
          } catch { Write-Host "Execute error: $($_.Exception.Message)" }

      - name: Full pipeline end-to-end
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "PIPELINE_OK|HTTP:$($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(1000,$r.Content.Length)))
          } catch { Write-Host "PIPELINE_ERR: $($_.Exception.Message)" }
