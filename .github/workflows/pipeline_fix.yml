name: Fix .46 pipeline — NCo + Collector config
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find sapnco.dll on .46 and install to System32
        shell: powershell
        run: |
          Write-Host "=== Searching .46 for sapnco.dll ==="
          $found = Get-ChildItem "C:\" -Filter "sapnco.dll" -Recurse -EA SilentlyContinue | Select -First 5
          $found | ForEach-Object { Write-Host "Found: $($_.FullName)" }

          # Check IIS bin directories
          @(
            "C:\inetpub\wwwroot\Store Tracker\bin\sapnco.dll",
            "C:\RfcApp\sapnco.dll",
            "C:\RfcApp\bin\sapnco.dll",
            "C:\RfcCollector\sapnco.dll"
          ) | ForEach-Object { Write-Host "$_ : $(Test-Path $_)" }

          # If found in IIS bin, copy to System32 + GAC
          $stBin = "C:\inetpub\wwwroot\Store Tracker\bin\sapnco.dll"
          if (Test-Path $stBin) {
            Write-Host "Found in Store Tracker bin — copying to System32..."
            Copy-Item $stBin "C:\Windows\System32\sapnco.dll" -Force
            Write-Host "System32 copy: $(Test-Path 'C:\Windows\System32\sapnco.dll')"
          }

          # Also check the RfcApp
          $rfcBin = "C:\RfcApp\sapnco.dll"
          if (Test-Path $rfcBin) {
            Write-Host "Found in RfcApp — copying to System32..."
            Copy-Item $rfcBin "C:\Windows\System32\sapnco.dll" -Force
          }

          Write-Host "=== sapnco_utils.dll ==="
          $utils = Get-ChildItem "C:\" -Filter "sapnco_utils.dll" -Recurse -EA SilentlyContinue | Select -First 3
          $utils | ForEach-Object { Write-Host "Found: $($_.FullName)" }

          # Final state
          Write-Host "System32\sapnco.dll: $(Test-Path 'C:\Windows\System32\sapnco.dll')"
          Write-Host "System32\sapnco_utils.dll: $(Test-Path 'C:\Windows\System32\sapnco_utils.dll')"

      - name: Point RFC Collector to localhost:80 and restart
        shell: powershell
        run: |
          $cfg = @{
            Logging    = @{ LogLevel = @{ Default = "Information"; "Microsoft.AspNetCore" = "Warning" } }
            AllowedHosts = "*"
            IIS_HOST   = "127.0.0.1"
            IIS_PORT   = "80"
            SQL_SERVER = "192.168.151.46"
            SQL_USER   = "sa"
            SQL_PASS   = "vrl@55555"
            SQL_DB     = "claudetestv2"
          }
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Write-Host "Config written:"
          Get-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          Write-Host "Service: $((Get-Service RfcCollector).Status)"
          $h = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8 -EA SilentlyContinue
          Write-Host "Collector health: $($h.Content)"

      - name: Recycle IIS app pools
        shell: powershell
        run: |
          Import-Module WebAdministration
          Get-ChildItem IIS:\AppPools | ForEach-Object {
            Restart-WebAppPool $_.Name -EA SilentlyContinue
            Write-Host "Recycled: $($_.Name)"
          }
          Start-Sleep 8
          Get-Website | Select Name, State | Format-Table

      - name: Test IIS :80 directly
        shell: powershell
        run: |
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
            Write-Host "IIS :80 Execute: HTTP $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(300,$r.Content.Length)))
          } catch { Write-Host "IIS :80 error: $($_.Exception.Message)" }

          # Also test health
          try {
            $h = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 8
            Write-Host "Health: $($h.Content)"
          } catch { Write-Host "Health error: $($_.Exception.Message)" }

      - name: Full end-to-end pipeline test
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "=== PIPELINE SUCCESS ==="
            Write-Host "HTTP: $($r.StatusCode)"
            Write-Host ($r.Content.Substring(0,[Math]::Min(1000,$r.Content.Length)))
          } catch { Write-Host "Pipeline error: $($_.Exception.Message)" }
