name: E2E pipeline test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Confirm config + restart collector
        shell: powershell
        run: |
          Write-Host "=== Current appsettings ==="
          Get-Content "C:\RfcCollector\appsettings.json"
          # Ensure correct config
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "127.0.0.1"
          $cfg.IIS_PORT = "80"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          $h = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8
          Write-Host "Collector health: $($h.Content)"

      - name: Test IIS :80 directly with company 1100
        shell: powershell
        run: |
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://localhost:80/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "IIS EXECUTE: HTTP $($r.StatusCode)"
            Write-Host $r.Content
          } catch { Write-Host "IIS ERR: $($_.Exception.Message)" }

      - name: Full RFC Collector pipeline test
        shell: powershell
        run: |
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "FETCH: HTTP $($r.StatusCode)"
            Write-Host $r.Content
          } catch { Write-Host "FETCH ERR: $($_.Exception.Message)" }
