name: GatewayStatus_603895
on:
  push:
    paths: ['.github/workflows/gateway_status_603895.yml']
jobs:
  run:
    runs-on: [self-hosted, iis]
    steps:
      - name: Check gateway registration status
        shell: powershell
        run: |
          # Check service
          $svc = Get-Service -Name "PBIEgwService" -ErrorAction SilentlyContinue
          Write-Host "Service status: $($svc.Status)"

          # Check gateway config file for registration info
          $configPaths = @(
            "$env:LOCALAPPDATA\Microsoft\On-premises data gateway\Gateway.bin",
            "$env:ProgramData\Microsoft\On-premises data gateway\Gateway.bin",
            "$env:LOCALAPPDATA\Microsoft\On-premises data gateway\GatewayConfiguration.json",
            "$env:ProgramData\Microsoft\On-premises data gateway\GatewayConfiguration.json",
            "$env:ProgramData\Microsoft\On-premises data gateway"
          )
          foreach ($p in $configPaths) {
            if (Test-Path $p) {
              Write-Host "FOUND: $p"
              if ($p -like "*.json") {
                Get-Content $p | Select-Object -First 20
              } elseif ((Get-Item $p).PSIsContainer) {
                Get-ChildItem $p | Select-Object Name, LastWriteTime
              }
            }
          }

          # Check registry for gateway info
          $reg = Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\On-premises data gateway" -ErrorAction SilentlyContinue
          if ($reg) {
            Write-Host "Registry: $($reg | ConvertTo-Json -Depth 2)"
          }
          
          # Check installed version
          Get-ItemProperty HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\* | 
            Where-Object { $_.DisplayName -like '*Gateway*' -or $_.DisplayName -like '*gateway*' } | 
            Select-Object DisplayName, DisplayVersion, InstallDate
