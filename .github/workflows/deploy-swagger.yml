name: Deploy Swagger to Azure Static Web Apps

on:
  push:
    branches: [master]
    paths:
      - 'v2_sap_api_explorer.html'
      - 'dab-config.json'
  workflow_dispatch:

jobs:
  deploy-swagger:
    runs-on: ubuntu-latest
    name: Deploy Swagger UI
    # Skip if AZURE_STATIC_WEB_APPS_API_TOKEN is not set
    if: secrets.AZURE_STATIC_WEB_APPS_API_TOKEN != ''
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          output_location: ""
          skip_app_build: true

  update-dab-config:
    runs-on: ubuntu-latest
    name: Restart DAB App to pick up new config
    # Runs independently - does NOT need deploy-swagger to succeed
    if: secrets.AZURE_CREDENTIALS != ''
    steps:
      - name: Restart Azure App Service (my-dab-app)
        uses: azure/CLI@v1
        with:
          azcliversion: 2.30.0
          inlineScript: |
            az webapp restart \
              --name my-dab-app \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}