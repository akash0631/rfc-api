name: Fix Plan and Deploy v2 Backend

on:
  repository_dispatch:
    types: [fix-and-deploy-v2-backend]

jobs:
  fix-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Move app to dab-plan (P2v3) + configure
        run: |
          SUB="${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          
          echo "=== Current plan ==="
          az webapp show --name v2-article-backend --resource-group dab-rg \
            --subscription $SUB \
            --query "{plan:appServicePlanId, state:state}" -o json

          echo "=== Moving to dab-plan ==="
          az webapp update \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription $SUB \
            --set serverFarmId="/subscriptions/$SUB/resourceGroups/dab-rg/providers/Microsoft.Web/serverfarms/dab-plan"
          echo "✅ Moved to dab-plan"

          echo "=== Setting startup command ==="
          az webapp config set \
            --name v2-article-backend \
            --resource-group dab-rg \
            --subscription $SUB \
            --startup-file "node --max-old-space-size=512 dist/index.js" \
            --linux-fx-version "NODE|22-lts"

          echo "=== Setting app settings ==="
          az webapp config appsettings set \
            --name v2-article-backend --resource-group dab-rg --subscription $SUB \
            --settings \
              NODE_ENV=production PORT=8080 \
              FRONTEND_URL="https://articles.v2retail.net" \
              CORS_ORIGINS="https://articles.v2retail.net,https://v2-article-creation.pages.dev" \
              ENABLE_REDIS=false VLM_FUSION_MODE=default \
              DEVELOPMENT_MODE=false DEBUG_API_ENDPOINTS=false \
              DEBUG_VLM_PIPELINE=false SENTRY_ENABLED=false \
              ENABLE_RATE_LIMITING=true \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              DIRECT_URL="${{ secrets.DIRECT_URL }}" \
              OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          echo "✅ Settings done"

      - name: Checkout v2ArticleCreation
        uses: actions/checkout@v4
        with:
          repository: akash0631/v2ArticleCreation
          token: ${{ secrets.PIPELINE_GITHUB_TOKEN }}

      - name: Setup Node 22 & build
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build
        working-directory: Backend
        run: |
          npm install --production=false
          npx prisma generate
          npx tsc --skipLibCheck
          npm run postbuild
          npm prune --production
          echo "dist: $(du -sh dist/) | node_modules: $(du -sh node_modules/)"

      - name: Package & deploy
        working-directory: Backend
        run: |
          zip -r /tmp/v2-backend.zip dist/ node_modules/ prisma/schema.prisma package.json
          echo "Zip: $(du -sh /tmp/v2-backend.zip)"
          
          az webapp deploy \
            --name v2-article-backend --resource-group dab-rg \
            --src-path /tmp/v2-backend.zip --type zip --async true \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} || true
          echo "✅ Deployed"

      - name: Restart
        run: |
          az webapp restart --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          echo "Restarted. Waiting 60s..."
          sleep 60

      - name: Health check + show runtime logs
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://v2-article-backend.azurewebsites.net/api/health)
          BODY=$(curl -s https://v2-article-backend.azurewebsites.net/api/health)
          echo "HTTP $HTTP: $BODY"

          # Get kudu logs
          CREDS=$(az webapp deployment list-publishing-credentials \
            --name v2-article-backend --resource-group dab-rg \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --query "{user:publishingUserName, pass:publishingPassword}" -o json)
          KU=$(echo $CREDS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['user']+':'+d['pass'])")
          
          echo "=== Runtime logs ==="
          LOG_URL=$(curl -s -u "$KU" \
            "https://v2-article-backend.scm.azurewebsites.net/api/logs/docker" | \
            python3 -c "
import sys,json
try:
  logs=json.load(sys.stdin)
  for log in reversed(logs):
    h=log.get('href','')
    if h.endswith('.log') and 'docker' in h: print(h); break
except Exception as e: print('err:',e)
")
          echo "Log URL: $LOG_URL"
          [ -n "$LOG_URL" ] && curl -s -u "$KU" "$LOG_URL" | tail -100

          [ "$HTTP" = "200" ] && echo "✅ BACKEND LIVE!" || echo "⚠️ HTTP $HTTP"
