name: Sync Portal HTML to IIS .36
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'portal/**'

jobs:
  sync:
    runs-on: [self-hosted, iis]
    name: Copy portal HTML to C:\V2RfcTest\default.html
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy portal HTML to IIS default.html
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item "$env:GITHUB_WORKSPACE\portal\rfc_hub.html" "C:\V2RfcTest\default.html" -Force
          $size = (Get-Item "C:\V2RfcTest\default.html").Length
          Write-Host "✅ default.html updated from repo: $size bytes"
          Write-Host "   sap-api.v2retail.net now serves the latest portal"
