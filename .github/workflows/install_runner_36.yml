name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find compiled RFC app on D drive of .36
        shell: cmd
        run: |
          net use \\192.168.151.36\D$ vrl@55555 /user:Administrator /persistent:no
          echo D NET_USE: %ERRORLEVEL%

          echo === V2RETAIL_PUBLISHED ===
          dir \\192.168.151.36\D$\V2RETAIL_PUBLISHED\ /B 2>nul
          dir \\192.168.151.36\D$\V2RETAIL_PUBLISHED\Vendor*.dll /B 2>nul

          echo === V2_Published ===
          dir "\\192.168.151.36\D$\V2 Published\" /B 2>nul
          dir "\\192.168.151.36\D$\V2 Published\Vendor*.dll" /B 2>nul

          echo === V2_Vendor_PPT_SRM (likely our app) ===
          dir \\192.168.151.36\D$\V2_Vendor_PPT_SRM\ /B 2>nul
          dir \\192.168.151.36\D$\V2_Vendor_PPT_SRM\Vendor*.dll /B /S 2>nul
          dir \\192.168.151.36\D$\V2_Vendor_PPT_SRM\bin\*.dll /B 2>nul | find /c ".dll"

          echo === NewCodeOn(261123) ===
          dir "\\192.168.151.36\D$\NewCodeOn(261123)\" /B 2>nul
          dir "\\192.168.151.36\D$\NewCodeOn(261123)\Vendor*.dll" /B /S 2>nul

          echo === V2retail folder ===
          dir \\192.168.151.36\D$\V2retail\ /B 2>nul

          echo === V2 Projects ===
          dir "\\192.168.151.36\D$\V2 Projects\" /B 2>nul

          echo === Store Tracker IIS physical path ===
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe list vdir
          net use \\192.168.151.36\C$ /delete /y 2>nul

          net use \\192.168.151.36\D$ /delete /y 2>nul
