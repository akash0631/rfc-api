name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Read-only diagnostic of .36 — touch nothing
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === IIS sites and pools on .36 ===
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe list sites
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe list apppools

          echo === V2RfcApi folder contents ===
          dir \\192.168.151.36\C$\V2RfcApi\ /B 2>nul
          dir \\192.168.151.36\C$\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"
          dir \\192.168.151.36\C$\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir \\192.168.151.36\C$\V2RfcApi\bin\sapnco* /B 2>nul
          dir \\192.168.151.36\C$\V2RfcApi\Web.config 2>nul

          echo === Windows Event Log last 5 app pool errors on .36 ===
          powershell -NoProfile -Command "Get-WinEvent -ComputerName 192.168.151.36 -Credential (New-Object PSCredential('Administrator',(ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force))) -FilterHashtable @{LogName='Application';Level=2;StartTime=(Get-Date).AddHours(-2)} -MaxEvents 5 -EA SilentlyContinue | Select TimeCreated,Id,Message | Format-List" 2>nul

          echo === Test .36:9191 from .46 ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://192.168.151.36:9191/' -UseBasicParsing -TimeoutSec 8;Write-Host 'ROOT:' $r.StatusCode $r.Content.Substring(0,100)}catch{Write-Host 'ROOT_ERR:' $_.Exception.Message}"
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 8;Write-Host 'HEALTH:' $r.StatusCode $r.Content}catch{Write-Host 'HEALTH_ERR:' $_.Exception.Message}"

          echo === Test .36:8888 (existing RfcApiApp — should still work) ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 8;Write-Host '8888_HEALTH:' $r.StatusCode $r.Content}catch{Write-Host '8888_HEALTH_ERR:' $_.Exception.Message}"

          echo === Test .36:80 (Store Tracker — must stay untouched) ===
          powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://192.168.151.36:80/' -UseBasicParsing -TimeoutSec 8;Write-Host '80_ROOT:' $r.StatusCode}catch{Write-Host '80_ROOT_ERR:' $_.Exception.Message}"

          echo === SAP NCo on .36 ===
          dir \\192.168.151.36\C$\Windows\System32\sapnco.dll 2>nul && echo sapnco.dll PRESENT || echo sapnco.dll MISSING
          dir \\192.168.151.36\C$\Windows\System32\sapnco_utils.dll 2>nul && echo sapnco_utils.dll PRESENT || echo sapnco_utils.dll MISSING

          net use \\192.168.151.36\C$ /delete /y 2>nul
