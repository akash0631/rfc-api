name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: PSRemote into .36 full diagnostics
        shell: powershell
        run: |
          Set-Item WSMan:\localhost\Client\TrustedHosts -Value "192.168.151.36" -Force
          $cred = New-Object PSCredential("Administrator", (ConvertTo-SecureString "vrl@55555" -AsPlainText -Force))
          $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop
          Write-Host "Connected to .36"
          Invoke-Command -Session $s -ScriptBlock {
            Import-Module WebAdministration -EA SilentlyContinue
            Write-Host "=== IIS Sites ==="
            Get-Website | Select Name, State, @{n='Port';e={($_.Bindings.Collection[0].bindingInformation -split ':')[1]}} | Format-Table
            Write-Host "=== App Pools ==="
            Get-ChildItem IIS:\AppPools | Select Name, State | Format-Table
            Write-Host "=== sapnco ==="
            Write-Host "sapnco.dll: $(Test-Path 'C:\Windows\System32\sapnco.dll')"
            Write-Host "sapnco_utils.dll: $(Test-Path 'C:\Windows\System32\sapnco_utils.dll')"
            Write-Host "=== V2RfcApi bin ==="
            $dlls = Get-ChildItem "C:\V2RfcApi\bin" -Filter "*.dll" -EA SilentlyContinue
            Write-Host "DLL count: $($dlls.Count)"
            $dlls | Where-Object {$_.Name -like "Vendor*"} | Select Name
            Write-Host "=== Test localhost 9191 ==="
            $b = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
            try { $r = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 20; Write-Host "9191: HTTP $($r.StatusCode) $($r.Content)" } catch { Write-Host "9191 ERR: $($_.Exception.Message)" }
            Write-Host "=== Test localhost 8888 ==="
            try { $r2 = Invoke-WebRequest "http://localhost:8888/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 20; Write-Host "8888: HTTP $($r2.StatusCode) $($r2.Content)" } catch { Write-Host "8888 ERR: $($_.Exception.Message)" }
            Write-Host "=== Event Log errors (IIS/ASP/WAS) ==="
            Get-EventLog Application -Newest 100 -EA SilentlyContinue | Where-Object { $_.EntryType -eq "Error" -and ($_.Source -match "IIS|ASP|WAS|W3SVC|MSMQ") } | Select -First 5 | ForEach-Object { Write-Host "$($_.TimeGenerated) [$($_.Source)]: $($_.Message.Substring(0,[Math]::Min(250,$_.Message.Length)))" }
          }
          Remove-PSSession $s
