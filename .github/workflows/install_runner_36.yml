name: Install GitHub Actions runner on .36
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find compiled app on .36 and populate V2RfcApi
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Find all DLL locations on .36 ===
          dir \\192.168.151.36\C$\inetpub\wwwroot /B 2>nul
          dir \\192.168.151.36\C$\RfcApp\*.dll /B 2>nul | find /c ".dll"
          dir \\192.168.151.36\C$\RfcApp\Vendor*.dll /B 2>nul

          echo === Copy from RfcApp on .36 to V2RfcApi ===
          robocopy \\192.168.151.36\C$\RfcApp \\192.168.151.36\C$\V2RfcApi /E /IS /IT /NFL /NDL
          echo ROBOCOPY from RfcApp: %ERRORLEVEL%

          echo === DLL count in V2RfcApi after copy ===
          dir \\192.168.151.36\C$\V2RfcApi\*.dll /B 2>nul | find /c ".dll"
          dir \\192.168.151.36\C$\V2RfcApi\Vendor*.dll /B 2>nul

          echo === Recycle V2RfcApiPool ===
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test V2RfcApi :9191 from .46
        shell: powershell
        run: |
          Start-Sleep 10
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH OK: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "EXECUTE OK: $($r2.StatusCode) $($r2.Content)"
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }

      - name: Configure runner on .36 and update RFC Collector
        shell: powershell
        env:
          V2_PAT: ${{ secrets.V2_GH_PAT }}
        run: |
          $tok = (Invoke-RestMethod "https://api.github.com/repos/akash0631/rfc-api/actions/runners/registration-token" `
            -Method POST -Headers @{Authorization="token $env:V2_PAT";"User-Agent"="v2"}).token
          Write-Host "Token: $($tok.Substring(0,8))..."

          # Write config bat to .36 via share
          $net = "\\192.168.151.36\C$"
          net use $net "vrl@55555" /user:Administrator /persistent:no 2>$null

          $bat = "@echo off`r`ncd C:\actions-runner`r`ncall config.cmd --url https://github.com/akash0631/rfc-api --token $tok --name V2DC-ADDVERB --labels self-hosted,Windows,X64,iis --runasservice --windowslogonaccount `"NT AUTHORITY\SYSTEM`" --unattended`r`necho DONE > C:\runner_config_done.txt"
          [System.IO.File]::WriteAllText("$net\actions-runner\do_config.bat", $bat)
          Write-Host "Config bat written"

          # Run via schtasks
          schtasks /create /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "V2RunnerConfig" /tr "C:\actions-runner\do_config.bat" /sc once /st 00:00 /ru SYSTEM /f
          schtasks /run /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "V2RunnerConfig"
          Write-Host "Config task running on .36..."
          Start-Sleep 90

          # Check if done
          $done = Test-Path "$net\runner_config_done.txt"
          Write-Host "Config done file: $done"

          # Update RFC Collector to use .36:9191
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "192.168.151.36"; $cfg.IIS_PORT = "9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          $h = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8
          Write-Host "Collector: $($h.Content)"

          # Full pipeline test
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r2 = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "=== PIPELINE: HTTP $($r2.StatusCode) ==="
            Write-Host $r2.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
