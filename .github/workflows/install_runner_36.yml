name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Fix NCo in System32 and open firewall on .36
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Copy sapnco DLLs from V2RfcApi bin to System32 on .36 ===
          copy /Y \\192.168.151.36\C$\V2RfcApi\bin\sapnco.dll \\192.168.151.36\C$\Windows\System32\sapnco.dll
          copy /Y \\192.168.151.36\C$\V2RfcApi\bin\sapnco_utils.dll \\192.168.151.36\C$\Windows\System32\sapnco_utils.dll
          echo NCo copy: %ERRORLEVEL%
          dir \\192.168.151.36\C$\Windows\System32\sapnco.dll 2>nul && echo sapnco PRESENT || echo sapnco MISSING

          echo === Open firewall ports on .36 ===
          netsh -r 192.168.151.36 -u Administrator -p vrl@55555 advfirewall firewall add rule name="V2RfcApi-9191" dir=in action=allow protocol=TCP localport=9191 profile=any 2>nul
          netsh -r 192.168.151.36 -u Administrator -p vrl@55555 advfirewall firewall add rule name="RfcApiApp-8888" dir=in action=allow protocol=TCP localport=8888 profile=any 2>nul
          echo Firewall rules added: %ERRORLEVEL%

          echo === Recycle V2RfcApiPool ===
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe recycle apppool /apppool.name:V2RfcApiPool
          echo Recycle: %ERRORLEVEL%

          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test all ports after fix
        shell: powershell
        run: |
          Start-Sleep 12
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'

          foreach ($test in @(
            @{url="http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health"; method="GET"; label="9191 Health"},
            @{url="http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute"; method="POST"; label="9191 Execute"},
            @{url="http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health"; method="GET"; label="8888 Health (existing)"}
          )) {
            try {
              $b = if ($test.method -eq "POST") {$body} else {$null}
              $r = Invoke-WebRequest $test.url -Method $test.method -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
              $c = $r.Content; if ($c.Length -gt 300) { $c = $c.Substring(0,300) }
              Write-Host "OK $($test.label): HTTP $($r.StatusCode) $c"
            } catch { Write-Host "ERR $($test.label): $($_.Exception.Message)" }
          }

      - name: Full end-to-end pipeline test
        shell: powershell
        run: |
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "192.168.151.36"; $cfg.IIS_PORT = "9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force; Start-Sleep 12
          Write-Host "Collector: $((Invoke-WebRequest 'http://localhost:9090/' -UseBasicParsing).Content)"

          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "=== PIPELINE RESULT: HTTP $($r.StatusCode) ==="
            Write-Host $r.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
