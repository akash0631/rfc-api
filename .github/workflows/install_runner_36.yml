name: Install GitHub Actions runner on .36
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Get runner registration token
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $r = Invoke-RestMethod "https://api.github.com/repos/akash0631/rfc-api/actions/runners/registration-token" `
            -Method POST -Headers @{Authorization="token $env:GH_TOKEN";"User-Agent"="v2"}
          Write-Host "TOKEN:$($r.token)"
          $r.token | Set-Content "C:\runner_token.txt"

      - name: Copy runner installer to .36 and run it
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%
          echo === Creating actions-runner folder on .36 ===
          mkdir \\192.168.151.36\C$\actions-runner 2>nul
          echo === Downloading runner directly on .36 via PowerShell ===
          set TOKEN=
          for /f "tokens=*" %%i in (C:\runner_token.txt) do set TOKEN=%%i
          echo Token starts with: %TOKEN:~0,8%
          powershell -NoProfile -Command "Invoke-WebRequest 'https://github.com/actions/runner/releases/download/v2.322.0/actions-runner-win-x64-2.322.0.zip' -OutFile '\\192.168.151.36\C$\actions-runner\runner.zip' -UseBasicParsing; Write-Host 'Download done'"
          dir \\192.168.151.36\C$\actions-runner\runner.zip
          echo === Extracting ===
          powershell -NoProfile -Command "Expand-Archive '\\192.168.151.36\C$\actions-runner\runner.zip' -DestinationPath '\\192.168.151.36\C$\actions-runner' -Force; Write-Host 'Extract done'"
          dir \\192.168.151.36\C$\actions-runner\config.cmd 2>nul
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Configure and install runner service on .36
        shell: cmd
        run: |
          set TOKEN=
          for /f "tokens=*" %%i in (C:\runner_token.txt) do set TOKEN=%%i
          echo Configuring runner on .36 with token %TOKEN:~0,8%...
          powershell -NoProfile -Command "$cred=New-Object PSCredential('Administrator',(ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force)); $s=New-PSSession -ComputerName 192.168.151.36 -Credential $cred; Invoke-Command -Session $s -ArgumentList '%TOKEN%' -ScriptBlock { param($t); Set-Location 'C:\actions-runner'; & '.\config.cmd' --url 'https://github.com/akash0631/rfc-api' --token $t --name 'V2DC-ADDVERB' --labels 'self-hosted,Windows,X64,iis' --runasservice --windowslogonaccount 'NT AUTHORITY\SYSTEM' --unattended; Write-Host 'Config exit:' $LASTEXITCODE }; Remove-PSSession $s"
          echo Config done
          powershell -NoProfile -Command "$cred=New-Object PSCredential('Administrator',(ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force)); $s=New-PSSession -ComputerName 192.168.151.36 -Credential $cred; Invoke-Command -Session $s -ScriptBlock { Get-Service -DisplayName '*actions.runner*' -EA SilentlyContinue | ForEach-Object { Start-Service $_.Name -EA SilentlyContinue; Write-Host 'Started:' $_.Name $_.Status } }; Remove-PSSession $s"

      - name: Verify runner online on GitHub
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Start-Sleep 30
          $r = Invoke-RestMethod "https://api.github.com/repos/akash0631/rfc-api/actions/runners" -Headers @{Authorization="token $env:GH_TOKEN";"User-Agent"="v2"}
          $r.runners | Select name,status,busy | Format-Table
          del C:\runner_token.txt -EA SilentlyContinue
