name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Open firewall on .36 via schtasks + test all ports
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Write firewall script to .36 ===
          echo @echo off > \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall delete rule name="V2RfcApi-9191" >> \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall delete rule name="RfcApiApp-8888" >> \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall add rule name="V2RfcApi-9191" dir=in action=allow protocol=TCP localport=9191 profile=any >> \\192.168.151.36\C$\fw_open.bat
          echo netsh advfirewall firewall add rule name="RfcApiApp-8888" dir=in action=allow protocol=TCP localport=8888 profile=any >> \\192.168.151.36\C$\fw_open.bat
          echo echo DONE > C:w_done.txt >> \\192.168.151.36\C$\fw_open.bat

          echo === Run firewall script via schtasks ===
          schtasks /create /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "OpenFirewall" /tr "C:\fw_open.bat" /sc once /st 00:00 /ru SYSTEM /f
          schtasks /run /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "OpenFirewall"
          echo Schtasks: %ERRORLEVEL%

          net use \\192.168.151.36\C$ /delete /y 2>nul
          timeout /t 15 /nobreak

          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo === Check fw_done.txt ===
          type \\192.168.151.36\C$\fw_done.txt 2>nul || echo NOT_DONE_YET
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test all ports and run full pipeline
        shell: powershell
        run: |
          Start-Sleep 12
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'

          Write-Host "=== Port tests ==="
          foreach ($test in @(
            @{url="http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health"; method="GET"; label="9191_HEALTH"},
            @{url="http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute"; method="POST"; label="9191_EXECUTE"},
            @{url="http://192.168.151.36:8888/api/ZAdvancePaymentRfc/Health"; method="GET"; label="8888_HEALTH"}
          )) {
            try {
              $b = if ($test.method -eq "POST") {$body} else {$null}
              $r = Invoke-WebRequest $test.url -Method $test.method -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 15
              Write-Host "$($test.label): HTTP $($r.StatusCode) $($r.Content)"
            } catch { Write-Host "$($test.label)_ERR: $($_.Exception.Message)" }
          }

          Write-Host "=== Wiring RFC Collector to .36:9191 ==="
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "192.168.151.36"; $cfg.IIS_PORT = "9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force; Start-Sleep 12
          Write-Host "Collector: $((Invoke-WebRequest 'http://localhost:9090/' -UseBasicParsing).Content)"

          Write-Host "=== Full pipeline test ==="
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "PIPELINE: HTTP $($r.StatusCode)"
            Write-Host $r.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
