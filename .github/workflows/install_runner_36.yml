name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Enable TrustedHosts and PSRemote into .36 for diagnostics
        shell: powershell
        run: |
          # Add .36 to TrustedHosts on .46 so PSRemoting works
          Set-Item WSMan:\localhost\Client\TrustedHosts -Value "192.168.151.36" -Force
          Write-Host "TrustedHosts set"

          $cred = New-Object PSCredential("Administrator", (ConvertTo-SecureString "vrl@55555" -AsPlainText -Force))
          $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop
          Write-Host "Connected to .36 ✅"

          Invoke-Command -Session $s -ScriptBlock {
            Write-Host "=== RUNNING ON .36 ==="
            Write-Host "=== IIS Sites and Pools ==="
            Import-Module WebAdministration -EA SilentlyContinue
            Get-Website | Select Name, State, @{n='Port';e={($_.Bindings.Collection[0].bindingInformation -split ':')[1]}} | Format-Table
            Get-ChildItem IIS:\AppPools | Select Name, State | Format-Table

            Write-Host "=== sapnco on .36 ==="
            Test-Path "C:\Windows\System32\sapnco.dll"
            Test-Path "C:\Windows\System32\sapnco_utils.dll"

            Write-Host "=== V2RfcApi bin ==="
            (Get-ChildItem "C:\V2RfcApiin" -Filter "*.dll" -EA SilentlyContinue).Count
            Get-ChildItem "C:\V2RfcApiin" -Filter "Vendor*.dll" -EA SilentlyContinue | Select Name

            Write-Host "=== Test localhost:9191 ==="
            try {
              $r = Invoke-WebRequest "http://localhost:9191/" -UseBasicParsing -TimeoutSec 8
              Write-Host "9191 root: HTTP $($r.StatusCode)"
            } catch { Write-Host "9191 root: $($_.Exception.Message)" }
            try {
              $b = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
              $r2 = Invoke-WebRequest "http://localhost:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
              Write-Host "9191 Execute: HTTP $($r2.StatusCode) $($r2.Content.Substring(0,[Math]::Min(300,$r2.Content.Length)))"
            } catch { Write-Host "9191 Execute: $($_.Exception.Message)" }

            Write-Host "=== Test localhost:8888 (existing RfcApiApp) ==="
            try {
              $b = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
              $r3 = Invoke-WebRequest "http://localhost:8888/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
              Write-Host "8888 Execute: HTTP $($r3.StatusCode) $($r3.Content.Substring(0,[Math]::Min(300,$r3.Content.Length)))"
            } catch { Write-Host "8888 Execute: $($_.Exception.Message)" }

            Write-Host "=== Last 5 IIS errors in Event Log ==="
            Get-EventLog Application -Newest 50 -EA SilentlyContinue |
              Where-Object { $_.EntryType -eq 'Error' -and ($_.Source -like '*IIS*' -or $_.Source -like '*ASP*' -or $_.Source -like '*WAS*' -or $_.Source -like '*W3SVC*') } |
              Select -First 5 | ForEach-Object { Write-Host "$($_.TimeGenerated) $($_.Source): $($_.Message.Substring(0,[Math]::Min(200,$_.Message.Length)))" }
          }

          Remove-PSSession $s
