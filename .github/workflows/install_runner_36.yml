name: Install GitHub Actions runner on .36
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: [self-hosted, test-vm]
    steps:
      - uses: actions/checkout@v4

      - name: Build RFC app on .46 runner
        shell: cmd
        run: |
          echo === Stub VS17 targets ===
          if not exist "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications" mkdir "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications"
          echo ^<?xml version="1.0" encoding="utf-8"?^><Project xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><Target Name="WebPublish"/><Target Name="Package"/></Project> > "C:\Program Files (x86)\MSBuild\Microsoft\VisualStudio\v17.0\WebApplications\Microsoft.WebApplication.targets"
          echo === NuGet restore ===
          nuget restore Vendor_SRM_Routing_Application.sln 2>&1
          echo === Build ===
          set MSBUILD=C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe
          "%MSBUILD%" Vendor_SRM_Routing_Application.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\ /m /nologo /verbosity:minimal /p:VisualStudioVersion=17.0
          echo BUILD: %ERRORLEVEL%
          if %ERRORLEVEL% NEQ 0 exit /b 1
          dir bin\Release\Vendor*.dll /B 2>nul
          dir bin\Release\*.dll /B 2>nul | find /c ".dll"

      - name: Deploy to NEW site V2RfcApi on .36:9191
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Create C:\V2RfcApi on .36 ===
          mkdir \\192.168.151.36\C$\V2RfcApi 2>nul
          mkdir \\192.168.151.36\C$\V2RfcApi\bin 2>nul

          echo === Deploy built DLLs to .36 ===
          robocopy bin\Release \\192.168.151.36\C$\V2RfcApi\bin /E /IS /IT /NFL /NDL
          echo ROBOCOPY: %ERRORLEVEL%
          copy /Y Web.config \\192.168.151.36\C$\V2RfcApi\ 2>nul
          copy /Y Global.asax \\192.168.151.36\C$\V2RfcApi\ 2>nul

          echo === DLLs deployed ===
          dir \\192.168.151.36\C$\V2RfcApi\bin\Vendor*.dll /B 2>nul
          dir \\192.168.151.36\C$\V2RfcApi\bin\*.dll /B 2>nul | find /c ".dll"

          echo === Create IIS site V2RfcApi on .36:9191 ===
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe delete site /site.name:V2RfcApi 2>nul
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe delete apppool /apppool.name:V2RfcApiPool 2>nul
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe add apppool /name:V2RfcApiPool /managedRuntimeVersion:v4.0 /managedPipelineMode:Integrated
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe add site /name:V2RfcApi /bindings:http/*:9191: /physicalPath:C:\V2RfcApi
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe set site /site.name:V2RfcApi /[path='/'].applicationPool:V2RfcApiPool
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe start site /site.name:V2RfcApi
          echo Site created: %ERRORLEVEL%

          echo === Open firewall 9191 on .36 ===
          netsh -r 192.168.151.36 -u Administrator -p vrl@55555 advfirewall firewall add rule name="V2RfcApi-9191" dir=in action=allow protocol=TCP localport=9191 2>nul

          echo === All sites on .36 ===
          \\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe list sites
          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test .36:9191 from .46 and wire RFC Collector
        shell: powershell
        run: |
          Start-Sleep 12
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'

          Write-Host "=== Testing .36:9191 ==="
          try {
            $r = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH: HTTP $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }

          try {
            $r2 = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "EXECUTE: HTTP $($r2.StatusCode) $($r2.Content.Substring(0,[Math]::Min(400,$r2.Content.Length)))"
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }

          Write-Host "=== Wiring RFC Collector on .46 to .36:9191 ==="
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "192.168.151.36"; $cfg.IIS_PORT = "9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          Write-Host "Collector: $((Invoke-WebRequest 'http://localhost:9090/' -UseBasicParsing -TimeoutSec 8).Content)"

          Write-Host "=== Full pipeline test company 1100 ==="
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r3 = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "PIPELINE: HTTP $($r3.StatusCode)"
            Write-Host $r3.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
