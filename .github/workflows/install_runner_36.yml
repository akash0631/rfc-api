name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Write event log and test results to file on .36
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no

          echo === Write diagnostic script to .36 ===
          echo @echo off > \\192.168.151.36\C$\diag.bat
          echo cd /d C:\ >> \\192.168.151.36\C$\diag.bat
          echo echo === SITE AND POOL STATUS === > C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo C:\Windows\System32\inetsrv\appcmd.exe list sites >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo C:\Windows\System32\inetsrv\appcmd.exe list apppools >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo echo === TEST LOCALHOST:9191 === >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:9191/api/ZAdvancePaymentRfc/Health' -UseBasicParsing -TimeoutSec 10;Write-Host 'OK' $r.StatusCode $r.Content}catch{Write-Host 'ERR' $_.Exception.Message}" >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo echo === TEST LOCALHOST:8888 === >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo powershell -NoProfile -Command "try{$r=Invoke-WebRequest 'http://localhost:8888/' -UseBasicParsing -TimeoutSec 8;Write-Host 'OK' $r.StatusCode}catch{Write-Host 'ERR' $_.Exception.Message}" >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo echo === LAST 10 APP ERRORS === >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo powershell -NoProfile -Command "Get-EventLog Application -Newest 20 -EntryType Error,Warning -EA SilentlyContinue | Where-Object {$_.Source -like '*IIS*' -or $_.Source -like '*ASP*' -or $_.Source -like '*W3SVC*' -or $_.Source -like '*WAS*'} | Select TimeGenerated,Source,Message | Format-List | Out-String" >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo echo === SAPNCO ON .36 === >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo if exist C:\Windows\System32\sapnco.dll echo sapnco.dll PRESENT >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo if not exist C:\Windows\System32\sapnco.dll echo sapnco.dll MISSING >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo if exist C:\Windows\System32\sapnco_utils.dll echo sapnco_utils.dll PRESENT >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo echo === V2RfcApi bin DLL count === >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat
          echo dir C:\V2RfcApi\bin\*.dll /B >> C:\diag_out.txt 2^>^&1 >> \\192.168.151.36\C$\diag.bat
          echo echo DONE >> C:\diag_out.txt >> \\192.168.151.36\C$\diag.bat

          schtasks /create /s 192.168.151.36 /u Administrator /p vrl@55555 /tn V2Diag /tr C:\diag.bat /sc once /st 00:00 /ru SYSTEM /f 2>nul
          schtasks /run /s 192.168.151.36 /u Administrator /p vrl@55555 /tn V2Diag 2>nul
          echo Task triggered, waiting 20s...
          timeout /t 20 /nobreak
          echo === DIAGNOSTIC OUTPUT ===
          type \\192.168.151.36\C$\diag_out.txt
          net use \\192.168.151.36\C$ /delete /y 2>nul
