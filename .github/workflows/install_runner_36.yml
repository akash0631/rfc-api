name: Setup .36 as primary server
on:
  workflow_dispatch:
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find all DLLs and app locations on .36
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Find Vendor*.dll anywhere on .36 C drive ===
          dir \\192.168.151.36\C$\Vendor*.dll /S /B 2>nul
          
          echo === Find sapnco.dll anywhere on .36 ===
          dir \\192.168.151.36\C$\sapnco.dll /S /B 2>nul

          echo === All dirs under C:\ root of .36 ===
          dir \\192.168.151.36\C$\ /B 2>nul

          echo === inetpub wwwroot contents ===
          dir \\192.168.151.36\C$\inetpub\wwwroot /B 2>nul

          echo === Actions runner work folder ===
          dir \\192.168.151.36\C$\actions-runner\_work 2>nul /B 2>nul

          net use \\192.168.151.36\C$ /delete /y 2>nul
