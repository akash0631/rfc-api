name: Install GitHub Actions runner on .36
on:
  workflow_dispatch:
jobs:
  install:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Enable WinRM on .36 and create V2RfcApi site
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          echo NET_USE: %ERRORLEVEL%

          echo === Enable WinRM on .36 via PsExec or sc ===
          sc \\192.168.151.36 start WinRM 2>nul
          echo WinRM start: %ERRORLEVEL%
          sc \\192.168.151.36 config WinRM start= auto 2>nul

          echo === Create V2RfcApi directory on .36 ===
          mkdir \\192.168.151.36\C$\V2RfcApi 2>nul
          mkdir \\192.168.151.36\C$\V2RfcApi\bin 2>nul

          echo === Copy compiled app from Store Tracker to V2RfcApi (read-only copy) ===
          robocopy "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\bin" "\\192.168.151.36\C$\V2RfcApi\bin" /E /IS /IT /NFL /NDL
          echo ROBOCOPY: %ERRORLEVEL%
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\Web.config" "\\192.168.151.36\C$\V2RfcApi\" 2>nul
          copy /Y "\\192.168.151.36\C$\inetpub\wwwroot\Store Tracker\Global.asax" "\\192.168.151.36\C$\V2RfcApi\" 2>nul

          echo === DLL count in V2RfcApi bin ===
          dir "\\192.168.151.36\C$\V2RfcApi\bin\*.dll" /B 2>nul | find /c ".dll"
          dir "\\192.168.151.36\C$\V2RfcApi\bin\Vendor*.dll" /B 2>nul

          echo === Create IIS site via appcmd on .36 ===
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" add apppool /name:V2RfcApiPool /managedRuntimeVersion:v4.0 2>nul
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" add site /name:V2RfcApi /bindings:http/*:9191: /physicalPath:C:\V2RfcApi 2>nul
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" set site /site.name:V2RfcApi /[path='/'].applicationPool:V2RfcApiPool 2>nul
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" start site /site.name:V2RfcApi 2>nul
          echo Site created: %ERRORLEVEL%

          echo === Current sites on .36 ===
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" list sites
          "\\192.168.151.36\C$\Windows\System32\inetsrv\appcmd.exe" list apppools

          net use \\192.168.151.36\C$ /delete /y 2>nul

      - name: Test V2RfcApi :9191 from .46
        shell: powershell
        run: |
          Start-Sleep 10
          $body = '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"}'
          try {
            $r = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Health" -UseBasicParsing -TimeoutSec 10
            Write-Host "HEALTH OK: $($r.StatusCode) $($r.Content)"
          } catch { Write-Host "HEALTH ERR: $($_.Exception.Message)" }
          try {
            $r2 = Invoke-WebRequest "http://192.168.151.36:9191/api/ZAdvancePaymentRfc/Execute" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 20
            Write-Host "EXECUTE OK: $($r2.StatusCode) $($r2.Content)"
          } catch { Write-Host "EXECUTE ERR: $($_.Exception.Message)" }

      - name: Install GitHub Actions runner on .36
        shell: cmd
        run: |
          net use \\192.168.151.36\C$ vrl@55555 /user:Administrator /persistent:no
          mkdir \\192.168.151.36\C$\actions-runner 2>nul
          echo === Downloading runner to .36 ===
          powershell -NoProfile -Command "Invoke-WebRequest 'https://github.com/actions/runner/releases/download/v2.322.0/actions-runner-win-x64-2.322.0.zip' -OutFile '\\192.168.151.36\C$\actions-runner\runner.zip' -UseBasicParsing; Write-Host Downloaded"
          echo === Extracting ===
          powershell -NoProfile -Command "Expand-Archive '\\192.168.151.36\C$\actions-runner\runner.zip' '\\192.168.151.36\C$\actions-runner' -Force; Write-Host Extracted"
          net use \\192.168.151.36\C$ /delete /y 2>nul
          echo Runner files copied to .36

      - name: Configure runner and update collector
        shell: powershell
        env:
          V2_PAT: ${{ secrets.V2_GH_PAT }}
        run: |
          $tok = (Invoke-RestMethod "https://api.github.com/repos/akash0631/rfc-api/actions/runners/registration-token" `
            -Method POST -Headers @{Authorization="token $env:V2_PAT";"User-Agent"="v2"}).token
          Write-Host "Token: $($tok.Substring(0,8))..."

          # Write config script to .36 and run it via schtasks
          $configScript = "C:\actions-runner\config.cmd --url https://github.com/akash0631/rfc-api --token $tok --name V2DC-ADDVERB --labels self-hosted,Windows,X64,iis --runasservice --windowslogonaccount `"NT AUTHORITY\SYSTEM`" --unattended"
          $net = "\\192.168.151.36\C$"
          $cred = New-Object PSCredential("Administrator",(ConvertTo-SecureString "vrl@55555" -AsPlainText -Force))
          net use $net "vrl@55555" /user:Administrator /persistent:no 2>$null

          $configScript | Set-Content "$net\actions-runner\do_config.bat"
          Write-Host "Config script written to .36"

          # Use schtasks to run on .36
          schtasks /create /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "InstallRunner" /tr "C:\actions-runner\do_config.bat" /sc once /st 00:00 /ru SYSTEM /f 2>$null
          schtasks /run /s 192.168.151.36 /u Administrator /p "vrl@55555" /tn "InstallRunner" 2>$null
          Write-Host "Config task triggered on .36"
          Start-Sleep 60

          # Update RFC Collector to use .36:9191
          $cfg = Get-Content "C:\RfcCollector\appsettings.json" | ConvertFrom-Json
          $cfg.IIS_HOST = "192.168.151.36"
          $cfg.IIS_PORT = "9191"
          $cfg | ConvertTo-Json -Depth 10 | Set-Content "C:\RfcCollector\appsettings.json"
          Restart-Service RfcCollector -Force
          Start-Sleep 12
          $h = Invoke-WebRequest "http://localhost:9090/" -UseBasicParsing -TimeoutSec 8
          Write-Host "Collector: $($h.Content)"

          # Final pipeline test
          $b = '{"rfc":"ZADVANCE_PAYMENT_RFC","params":{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260301","I_POSTING_DATE_HIGH":"20260317"},"targetTable":"ET_ZADVANCE_PAYMENT","targetDb":"claudetestv2","maxRows":5}'
          try {
            $r2 = Invoke-WebRequest "http://localhost:9090/fetch" -Method POST -Body $b -ContentType "application/json" -UseBasicParsing -TimeoutSec 60
            Write-Host "PIPELINE: HTTP $($r2.StatusCode)"
            Write-Host $r2.Content
          } catch { Write-Host "PIPELINE ERR: $($_.Exception.Message)" }
