name: CREATE_NAMED_TUNNEL
on:
  push:
    paths:
      - '.github/workflows/create_named_tunnel.yml'
jobs:
  tunnel:
    runs-on: [self-hosted, iis]
    steps:
      - name: Create named CF tunnel and install as service
        shell: powershell
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: "bab06c93e17ae71cae3c11b4cc40240b"
          GH_TOKEN: ${{ secrets.PIPELINE_GITHUB_TOKEN }}
        run: |
          $cfPath = "C:\cloudflared\cloudflared.exe"
          $tunnelName = "v2-sap-api"
          
          # ── 1. Kill any existing quick tunnel ──
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 2
          
          # ── 2. Create named tunnel via CF API ──
          Write-Host "=== Creating named tunnel: $tunnelName ==="
          $headers = @{
            "Authorization" = "Bearer $env:CF_TOKEN"
            "Content-Type"  = "application/json"
          }
          
          # Check if tunnel already exists
          $listResp = Invoke-RestMethod -Uri "https://api.cloudflare.com/client/v4/accounts/$env:CF_ACCOUNT/cfd_tunnel?name=$tunnelName" -Headers $headers
          Write-Host "Existing tunnels: $($listResp.result.Count)"
          
          $tunnel = $null
          if ($listResp.result.Count -gt 0) {
            $tunnel = $listResp.result[0]
            Write-Host "Tunnel already exists: $($tunnel.id)"
          } else {
            $body = @{ name=$tunnelName; tunnel_secret=(New-Guid).ToString().Replace("-","").Substring(0,32) } | ConvertTo-Json
            $createResp = Invoke-RestMethod -Uri "https://api.cloudflare.com/client/v4/accounts/$env:CF_ACCOUNT/cfd_tunnel" -Method POST -Headers $headers -Body $body
            $tunnel = $createResp.result
            Write-Host "Created tunnel: $($tunnel.id)"
          }
          
          $tunnelId = $tunnel.id
          Write-Host "Tunnel ID: $tunnelId"
          
          # ── 3. Get tunnel token ──
          $tokenResp = Invoke-RestMethod -Uri "https://api.cloudflare.com/client/v4/accounts/$env:CF_ACCOUNT/cfd_tunnel/$tunnelId/token" -Headers $headers
          $tunnelToken = $tokenResp.result
          Write-Host "Got tunnel token (length: $($tunnelToken.Length))"
          
          # ── 4. Create DNS route ── 
          # Route v2-sap-api.v2kart.workers.dev via tunnel (using workers.dev subdomain)
          # Actually, set up a Route on the tunnel to expose localhost:9292
          $routeBody = @{
            config = @{
              ingress = @(
                @{ hostname = ""; service = "http://localhost:9292" }
              )
            }
          } | ConvertTo-Json -Depth 10
          
          try {
            $routeResp = Invoke-RestMethod -Uri "https://api.cloudflare.com/client/v4/accounts/$env:CF_ACCOUNT/cfd_tunnel/$tunnelId/configurations" -Method PUT -Headers $headers -Body $routeBody
            Write-Host "Route configured: $($routeResp.success)"
          } catch { Write-Host "Route config warning: $_" }
          
          # ── 5. Install cloudflared as Windows service with tunnel token ──
          Write-Host "=== Installing cloudflared Windows service ==="
          
          # Stop and delete existing service if any
          $svc = Get-Service "cloudflared" -ErrorAction SilentlyContinue
          if ($svc) {
            Stop-Service "cloudflared" -Force -ErrorAction SilentlyContinue
            & $cfPath service uninstall 2>&1 | Out-Null
            Start-Sleep 3
          }
          
          # Install service
          $env:TUNNEL_TOKEN = $tunnelToken
          & $cfPath service install --token $tunnelToken
          $exitCode = $LASTEXITCODE
          Write-Host "Service install exit code: $exitCode"
          
          Start-Sleep 3
          Start-Service "cloudflared" -ErrorAction SilentlyContinue
          Start-Sleep 5
          
          # Check service status
          $svcStatus = (Get-Service "cloudflared" -ErrorAction SilentlyContinue).Status
          Write-Host "Service status: $svcStatus"
          
          # ── 6. Get the tunnel's public URL ──
          # Named tunnels get URL: $tunnelId.cfargotunnel.com
          # But we want a friendly URL via trycloudflare or our domain
          $tunnelUrl = "https://$tunnelId.cfargotunnel.com"
          Write-Host "=== RAW TUNNEL URL: $tunnelUrl ==="
          
          # ── 7. Test SAP via tunnel ──
          Write-Host "=== Testing SAP via tunnel ==="
          Start-Sleep 10
          try {
            $body = '{"PO_NO":"4500001234","DELV_DATE":"20260401"}'
            $r = Invoke-WebRequest "$tunnelUrl/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 25
            Write-Host "=== SAP RESPONSE: $($r.Content) ==="
          } catch { Write-Host "SAP test: $_" }
          
          # ── 8. Update GitHub secret via API ──
          Write-Host "=== Updating worker with tunnel URL: $tunnelUrl ==="
          
          # Write to a file we can read in next step
          @{tunnelId=$tunnelId; tunnelUrl=$tunnelUrl; tunnelName=$tunnelName} | ConvertTo-Json | Out-File "C:\cloudflared\tunnel_info.json" -Force
          Write-Host "=== TUNNEL_ID: $tunnelId ==="
          Write-Host "=== TUNNEL_URL: $tunnelUrl ==="
          Write-Host "Done."
