name: SETUP_46_PROXY
on:
  push:
    paths: ['.github/workflows/setup_46_proxy.yml']
jobs:
  setup:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Find NCo DLLs on .36 and copy to .46, setup proxy
        shell: powershell
        run: |
          # === Step 1: Find NCo DLLs on .36 ===
          $cred = New-Object PSCredential('V2DC-ADDVERB\Administrator', (ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force))
          $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -EA Stop
          Write-Host "=== Connected to .36 ==="
          
          $dllInfo = Invoke-Command -Session $s -ScriptBlock {
            $found = @()
            $searchPaths = @("C:\Windows\System32","C:\Windows\SysWOW64","C:\V2RfcTest\bin","C:\inetpub\wwwroot")
            foreach ($p in $searchPaths) {
              if (Test-Path $p) {
                $dlls = Get-ChildItem $p -Filter "sapnco*" -EA SilentlyContinue
                $libdlls = Get-ChildItem $p -Filter "libicu*" -EA SilentlyContinue
                $icudlls = Get-ChildItem $p -Filter "icudt*" -EA SilentlyContinue
                foreach ($d in @($dlls)+@($libdlls)+@($icudlls)) {
                  if ($d) { $found += $d.FullName }
                }
              }
            }
            $found
          }
          Write-Host "NCo DLLs on .36:"
          $dllInfo | ForEach-Object { Write-Host "  $_" }
          
          # === Step 2: Copy DLLs from .36 to .46 ===
          Write-Host "`n=== Copying NCo DLLs to .46 System32 ==="
          $destPath = "C:\Windows\System32"
          foreach ($dll in $dllInfo) {
            try {
              $bytes = Invoke-Command -Session $s -ScriptBlock { param($p) [System.IO.File]::ReadAllBytes($p) } -ArgumentList $dll
              $dest = Join-Path $destPath (Split-Path $dll -Leaf)
              [System.IO.File]::WriteAllBytes($dest, $bytes)
              Write-Host "Copied: $dll -> $dest"
            } catch {
              Write-Host "WARN copy $dll : $_"
            }
          }

          # === Step 3: Check .46 IIS and find what port it's on ===
          Write-Host "`n=== .46 IIS Sites ==="
          try {
            Import-Module WebAdministration -EA SilentlyContinue
            Get-Website | ForEach-Object {
              $port = ($_.bindings.collection[0].bindingInformation -split ':')[1]
              Write-Host "Site: $($_.name) | State: $($_.state) | Port: $port | Path: $($_.physicalPath)"
            }
          } catch { Write-Host "IIS check error: $_" }
          
          # === Step 4: Test SAP NCo availability on .46 ===
          Write-Host "`n=== Testing NCo on .46 ==="
          try {
            Add-Type -Path "C:\Windows\System32\sapnco.dll" -EA Stop
            Write-Host "sapnco.dll loaded OK on .46"
          } catch {
            Write-Host "sapnco.dll load error: $_"
          }
          
          Remove-PSSession $s
          Write-Host "`nDone."

      - name: Test .36:9292 direct call from .46
        shell: powershell
        run: |
          Write-Host "=== Testing .36:9292 from .46 ==="
          try {
            $r = Invoke-WebRequest "http://192.168.151.36:9292/api/ZPO_DD_UPD_RFC/Post" `
              -Method POST `
              -Body '{"PO_NO":"4500001234","DELV_DATE":"20260401"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 20
            Write-Host "SUCCESS: $($r.Content)"
          } catch { Write-Host "Error: $_" }
          
          Write-Host "`n=== Testing .36:9292 ZPO_MODIFICATION ==="
          try {
            $r2 = Invoke-WebRequest "http://192.168.151.36:9292/api/ZPO_MODIFICATION/Execute" `
              -Method POST `
              -Body '{"IM_PO_NO":"","IM_DEL_CHG_DATE_LOW":"20260301","IM_DEL_CHG_DATE_HIGH":"20260320"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 20
            Write-Host "SUCCESS: $($r2.Content)"
          } catch { Write-Host "Error: $_" }
          
          Write-Host "`n=== Testing .36:9292 ZADVANCE_PAYMENT_RFC ==="
          try {
            $r3 = Invoke-WebRequest "http://192.168.151.36:9292/api/ZADVANCE_PAYMENT_RFC/Post" `
              -Method POST `
              -Body '{"I_COMPANY_CODE":"1100","I_POSTING_DATE_LOW":"20260101","I_POSTING_DATE_HIGH":"20260320"}' `
              -ContentType "application/json" `
              -UseBasicParsing -TimeoutSec 20
            Write-Host "SUCCESS: $($r3.Content)"
          } catch { Write-Host "Error: $_" }
