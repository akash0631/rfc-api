name: Rebuild and Install RfcCollector Service
on:
  workflow_dispatch:

jobs:
  build-install:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stop and remove old service
        shell: powershell
        run: |
          $svc = Get-Service RfcCollector -ErrorAction SilentlyContinue
          if ($svc) {
            Stop-Service RfcCollector -Force -ErrorAction SilentlyContinue
            Start-Sleep 3
            sc.exe delete RfcCollector
            Start-Sleep 2
            Write-Host "Old service removed"
          }
          Stop-Process -Name RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep 2

      - name: Rebuild with Windows Service support
        shell: powershell
        run: |
          $env:PATH = "C:\dotnet8;" + $env:PATH
          $exe = if (Get-Command dotnet -EA SilentlyContinue) {"dotnet"} else {"C:\dotnet8\dotnet.exe"}
          & $exe publish rfc-collector/RfcCollector/RfcCollector.csproj -c Release -r win-x64 --self-contained true -o C:\RfcCollector
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Host "Build OK"

      - name: Install and start Windows Service
        shell: powershell
        run: |
          # Create service with env vars baked into BinaryPathName via wrapper
          $wrapper = "C:\RfcCollector\svc-wrapper.bat"
          "@echo off" | Out-File $wrapper -Encoding ASCII
          "set IIS_HOST=192.168.151.36" | Out-File $wrapper -Encoding ASCII -Append
          "set IIS_PORT=80" | Out-File $wrapper -Encoding ASCII -Append
          "set SQL_SERVER=192.168.151.46" | Out-File $wrapper -Encoding ASCII -Append
          "set SQL_USER=sa" | Out-File $wrapper -Encoding ASCII -Append
          "set SQL_PASS=vrl@55555" | Out-File $wrapper -Encoding ASCII -Append
          "set SQL_DB=claudetestv2" | Out-File $wrapper -Encoding ASCII -Append
          "set ASPNETCORE_URLS=http://0.0.0.0:9090" | Out-File $wrapper -Encoding ASCII -Append
          "C:\RfcCollector\RfcCollector.exe" | Out-File $wrapper -Encoding ASCII -Append
          
          # Use sc.exe to create service pointing at the exe directly
          # Set env vars in registry after creation
          sc.exe create RfcCollector binPath= "C:\RfcCollector\RfcCollector.exe" start= auto DisplayName= "V2 RFC Collector"
          sc.exe description RfcCollector "SAP RFC to claudetestv2 @ .46 port 9090"
          
          # Set env vars via registry
          $envVars = @(
            "IIS_HOST=192.168.151.36",
            "IIS_PORT=80",
            "SQL_SERVER=192.168.151.46",
            "SQL_USER=sa",
            "SQL_PASS=vrl@55555",
            "SQL_DB=claudetestv2",
            "ASPNETCORE_URLS=http://0.0.0.0:9090"
          )
          [string[]]$envArr = $envVars; Set-ItemProperty "HKLM:\SYSTEM\CurrentControlSet\Services\RfcCollector" -Name Environment -Value $envArr
          
          # Start the service
          sc.exe start RfcCollector
          Start-Sleep 12
          
          $svc = Get-Service RfcCollector -ErrorAction SilentlyContinue
          Write-Host "Service status: $($svc.Status)"

      - name: Health check and firewall
        shell: powershell
        run: |
          # Ensure firewall open
          if (-not (Get-NetFirewallRule -DisplayName "RfcCollector-9090" -EA SilentlyContinue)) {
            New-NetFirewallRule -DisplayName "RfcCollector-9090" -Direction Inbound -Protocol TCP -LocalPort 9090 -Action Allow
          }
          
          # Test health
          for ($i=1; $i -le 8; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 5
              Write-Host "HEALTHY: $($r.Content)"
              break
            } catch {
              Write-Host "Attempt $i: $_"
              Start-Sleep 4
            }
          }
          
          netstat -ano | findstr ":9090"
          Write-Host "Done - RfcCollector installed as Windows Service, port 9090"
