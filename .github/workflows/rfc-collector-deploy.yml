name: Build and Deploy RFC Collector to VM-CRM
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dotnet 8 if missing
        shell: powershell
        run: |
          $dotnet = Get-Command dotnet -ErrorAction SilentlyContinue
          if (-not $dotnet) {
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:TEMP\dotnet-install.ps1" -UseBasicParsing
            & "$env:TEMP\dotnet-install.ps1" -Version "8.0.404" -InstallDir "C:\dotnet8"
            [System.Environment]::SetEnvironmentVariable("PATH","C:\dotnet8;" + [System.Environment]::GetEnvironmentVariable("PATH","Machine"),"Machine")
            $env:PATH = "C:\dotnet8;" + $env:PATH
          }
          Write-Host "dotnet: $(dotnet --version 2>$null || C:\dotnet8\dotnet.exe --version)"

      - name: Publish RfcCollector
        shell: powershell
        run: |
          $env:PATH = "C:\dotnet8;" + $env:PATH
          $exe = if (Get-Command dotnet -EA SilentlyContinue) {"dotnet"} else {"C:\dotnet8\dotnet.exe"}
          if (-not (Test-Path "C:\RfcCollector")) { New-Item -ItemType Directory -Path "C:\RfcCollector" | Out-Null }
          & $exe publish rfc-collector/RfcCollector/RfcCollector.csproj -c Release -r win-x64 --self-contained true -o C:\RfcCollector
          if ($LASTEXITCODE -ne 0) { Write-Error "Build failed"; exit 1 }
          Write-Host "OK - $(Get-ChildItem C:\RfcCollector | Measure-Object).Count files"

      - name: Stop old RfcCollector
        shell: powershell
        run: Stop-Process -Name RfcCollector -Force -ErrorAction SilentlyContinue; Start-Sleep 2

      - name: Start RfcCollector on port 9090
        shell: powershell
        run: |
          "@echo off`nset IIS_HOST=192.168.151.36`nset IIS_PORT=80`nset SQL_SERVER=192.168.151.46`nset SQL_USER=sa`nset SQL_PASS=vrl@55555`nset SQL_DB=claudetestv2`nset ASPNETCORE_URLS=http://0.0.0.0:9090`nC:\RfcCollector\RfcCollector.exe >> C:\RfcCollector\rfc.log 2>&1" | Out-File C:\RfcCollector\start.bat -Encoding ASCII
          Start-Process cmd -ArgumentList "/c C:\RfcCollector\start.bat" -WindowStyle Hidden
          Start-Sleep 10

      - name: Health check
        shell: powershell
        run: |
          for ($i=1; $i -le 5; $i++) {
            try {
              $r = Invoke-WebRequest http://localhost:9090/ -UseBasicParsing -TimeoutSec 5
              Write-Host "UP - $($r.Content)"; break
            } catch { Write-Host "Attempt $i not ready"; Start-Sleep 4 }
            if ($i -eq 5) {
              if (Test-Path C:\RfcCollector\rfc.log) { Get-Content C:\RfcCollector\rfc.log -Tail 20 }
              exit 1
            }
          }

      - name: Print URLs
        run: |
          echo "Health:  http://192.168.151.46:9090/"
          echo "Swagger: http://192.168.151.46:9090/swagger"
          echo "Fetch:   POST http://192.168.151.46:9090/fetch"
