name: Build and Deploy RFC Collector to VM-CRM
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, test-vm]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dotnet 8 if missing
        shell: powershell
        run: |
          $dotnet = Get-Command dotnet -ErrorAction SilentlyContinue
          if (-not $dotnet) {
            Write-Host "Installing .NET 8..."
            Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:TEMP\dotnet-install.ps1" -UseBasicParsing
            & "$env:TEMP\dotnet-install.ps1" -Version "8.0.404" -InstallDir "C:\dotnet8"
            [System.Environment]::SetEnvironmentVariable("PATH","C:\dotnet8;" + [System.Environment]::GetEnvironmentVariable("PATH","Machine"),"Machine")
            $env:PATH = "C:\dotnet8;" + $env:PATH
            Write-Host "Installed .NET 8"
          } else {
            Write-Host "dotnet already available"
          }

      - name: Publish RfcCollector
        shell: powershell
        run: |
          $env:PATH = "C:\dotnet8;" + $env:PATH
          $exe = "dotnet"
          if (-not (Get-Command dotnet -ErrorAction SilentlyContinue)) { $exe = "C:\dotnet8\dotnet.exe" }
          if (-not (Test-Path "C:\RfcCollector")) { New-Item -ItemType Directory -Path "C:\RfcCollector" | Out-Null }
          Write-Host "Building with: $exe"
          & $exe publish rfc-collector/RfcCollector/RfcCollector.csproj -c Release -r win-x64 --self-contained true -o C:\RfcCollector
          if ($LASTEXITCODE -ne 0) { Write-Error "Build failed with exit $LASTEXITCODE"; exit 1 }
          $count = (Get-ChildItem C:\RfcCollector).Count
          Write-Host "Build OK - $count files in C:\RfcCollector"

      - name: Stop old RfcCollector
        shell: powershell
        run: |
          Stop-Process -Name RfcCollector -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          Write-Host "Old process stopped"

      - name: Start RfcCollector on port 9090
        shell: powershell
        run: |
          $bat = "C:\RfcCollector\start.bat"
          "@echo off" | Out-File $bat -Encoding ASCII
          "set IIS_HOST=192.168.151.36" | Out-File $bat -Encoding ASCII -Append
          "set IIS_PORT=80" | Out-File $bat -Encoding ASCII -Append
          "set SQL_SERVER=192.168.151.46" | Out-File $bat -Encoding ASCII -Append
          "set SQL_USER=sa" | Out-File $bat -Encoding ASCII -Append
          "set SQL_PASS=vrl@55555" | Out-File $bat -Encoding ASCII -Append
          "set SQL_DB=claudetestv2" | Out-File $bat -Encoding ASCII -Append
          "set ASPNETCORE_URLS=http://0.0.0.0:9090" | Out-File $bat -Encoding ASCII -Append
          "C:\RfcCollector\RfcCollector.exe >> C:\RfcCollector\rfc.log 2>&1" | Out-File $bat -Encoding ASCII -Append
          Start-Process -FilePath "cmd.exe" -ArgumentList "/c $bat" -WindowStyle Hidden
          Write-Host "Started, waiting 12s..."
          Start-Sleep -Seconds 12

      - name: Health check
        shell: powershell
        run: |
          $ok = $false
          for ($i = 1; $i -le 6; $i++) {
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:9090/" -UseBasicParsing -TimeoutSec 5
              Write-Host "HEALTHY - HTTP $($r.StatusCode)"
              Write-Host $r.Content
              $ok = $true
              break
            } catch {
              Write-Host "Attempt $i - not ready: $_"
              Start-Sleep -Seconds 4
            }
          }
          if (-not $ok) {
            Write-Host "--- LOG TAIL ---"
            if (Test-Path "C:\RfcCollector\rfc.log") { Get-Content "C:\RfcCollector\rfc.log" -Tail 30 }
            exit 1
          }

      - name: Print endpoints
        shell: cmd
        run: |
          echo RFC Collector is LIVE on VM-CRM
          echo Health:  http://192.168.151.46:9090/
          echo Swagger: http://192.168.151.46:9090/swagger
          echo Fetch:   POST http://192.168.151.46:9090/fetch
          echo Tables:  GET  http://192.168.151.46:9090/tables
