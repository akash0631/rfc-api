name: Sync Portal HTML via test-vm → .36
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'portal/**'

jobs:
  sync:
    runs-on: [self-hosted, test-vm]
    name: Copy portal HTML to .36 via PS-Remote
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Copy portal HTML to .36 via PS-Remote
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $pass = ConvertTo-SecureString 'vrl@55555' -AsPlainText -Force
          $cred = New-Object PSCredential('V2DC-ADDVERB\Administrator', $pass)
          $s = New-PSSession -ComputerName 192.168.151.36 -Credential $cred -ErrorAction Stop
          Write-Host "=== Connected to .36 ==="

          # Copy-Item -ToSession transfers the file directly (no string serialisation limit)
          Copy-Item "$env:GITHUB_WORKSPACE\portal\rfc_hub.html" `
            -Destination "C:\V2RfcTest\default.html" `
            -ToSession $s -Force
          Write-Host "File transferred."

          # Verify size and that fix comment is present
          Invoke-Command -Session $s -ScriptBlock {
            $size = (Get-Item "C:\V2RfcTest\default.html").Length
            $hasSync = (Get-Content "C:\V2RfcTest\default.html" -Raw) -match "sync:"
            Write-Host "✅ default.html updated: $size bytes | sync comment present: $hasSync"
          }

          Remove-PSSession $s
          Write-Host "Done — sap-api.v2retail.net now serves latest portal"
