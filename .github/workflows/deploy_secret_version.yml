name: DEPLOY_SECRET_VERSION
on:
  push:
    paths:
      - '.github/workflows/deploy_secret_version.yml'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install wrangler
        run: npm install -g wrangler@latest
      - name: Deploy latest version with secret to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Get the latest version ID
          echo "=== Listing versions ==="
          VERSIONS=$(wrangler versions list --name v2-rfc-pipeline 2>&1)
          echo "$VERSIONS" | head -20
          
          # Deploy latest version (which has the secret) to 100% traffic
          echo "=== Deploying latest version ==="
          wrangler versions deploy --name v2-rfc-pipeline --yes 2>&1
          echo "Deploy exit: $?"
          
          echo "=== Listing secrets after deploy ==="
          wrangler secret list --name v2-rfc-pipeline 2>&1 | head -20
