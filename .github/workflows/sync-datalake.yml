name: Sync SAP to Data Lake (No Build)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'Controllers/**'

env:
  RUNNER_ADDITIONAL_ENVIRONMENT: "POWERSHELL_SECURITY_PROTOCOL=TLS12"

jobs:
  sync:
    name: Create Table + Pull SAP + Expose API
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set PowerShell execution policy
        shell: cmd
        run: powershell.exe -Command "Set-ExecutionPolicy RemoteSigned -Scope LocalMachine -Force"

      - name: STEP 1 - Create SQL table ET_ZADVANCE_PAYMENT
        shell: cmd
        run: |
          powershell.exe -ExecutionPolicy Unrestricted -NonInteractive -Command ^
            "$conn = New-Object System.Data.SqlClient.SqlConnection('Server=192.168.151.28,1433;Database=DataV2;User Id=sa;Password=vrl@55555;TrustServerCertificate=True;'); $conn.Open(); $cmd = $conn.CreateCommand(); $cmd.CommandText = "IF NOT EXISTS (SELECT * FROM sys.tables WHERE name='ET_ZADVANCE_PAYMENT') BEGIN CREATE TABLE dbo.ET_ZADVANCE_PAYMENT (ID INT IDENTITY(1,1) PRIMARY KEY, DOCUMENT_TYPE NVARCHAR(10), COMPANY_CODE NVARCHAR(10), DOCUMENT_NUMBER NVARCHAR(20), FISCAL_YEAR NVARCHAR(10), LINE_ITEM NVARCHAR(10), POSTING_KEY NVARCHAR(10), ACCOUNT_TYPE NVARCHAR(10), SPECIAL_G_L_IND NVARCHAR(10), TRANSACT_TYPE NVARCHAR(20), DEBIT_CREDIT NVARCHAR(5), AMOUNT_IN_LC DECIMAL(18,2), AMOUNT DECIMAL(18,2), [TEXT] NVARCHAR(200), VENDOR NVARCHAR(20), PAYMENT_AMT DECIMAL(18,2), POSTING_DATE DATE, _RFC NVARCHAR(50) DEFAULT 'ZADVANCE_PAYMENT_RFC', _SYNC_AT DATETIME DEFAULT GETDATE()); PRINT 'CREATED' END ELSE PRINT 'EXISTS'"; $cmd.ExecuteNonQuery(); Write-Host 'Table ready'; $conn.Close()"

      - name: STEP 2 - Call SAP RFC via IIS
        shell: cmd
        run: |
          powershell.exe -ExecutionPolicy Unrestricted -NonInteractive -Command ^
            "$body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20250101","I_POSTING_DATE_HIGH":"20260313"}'; $resp = Invoke-RestMethod -Uri 'http://localhost/api/ZADVANCE_PAYMENT_RFC' -Method POST -Body $body -ContentType 'application/json' -TimeoutSec 120; $rows = if ($resp.IT_FINAL) { $resp.IT_FINAL } else { $resp }; Write-Host "SAP returned $($rows.Count) rows"; $rows | ConvertTo-Json -Depth 3 | Out-File C:\datalake_rows.json; Write-Host 'Saved to C:\datalake_rows.json'"

      - name: STEP 3 - Insert rows into DataV2
        shell: cmd
        run: |
          powershell.exe -ExecutionPolicy Unrestricted -NonInteractive -Command ^
            "$rows = Get-Content C:\datalake_rows.json | ConvertFrom-Json; if ($rows -isnot [array]) { $rows = @($rows) }; Write-Host "Inserting $($rows.Count) rows..."; $conn = New-Object System.Data.SqlClient.SqlConnection('Server=192.168.151.28,1433;Database=DataV2;User Id=sa;Password=vrl@55555;TrustServerCertificate=True;'); $conn.Open(); $cmd = $conn.CreateCommand(); $cmd.CommandText = 'TRUNCATE TABLE dbo.ET_ZADVANCE_PAYMENT'; $cmd.ExecuteNonQuery() | Out-Null; $n=0; foreach ($row in $rows) { $c2 = $conn.CreateCommand(); $c2.CommandText = 'INSERT INTO dbo.ET_ZADVANCE_PAYMENT (DOCUMENT_TYPE,COMPANY_CODE,DOCUMENT_NUMBER,FISCAL_YEAR,LINE_ITEM,POSTING_KEY,ACCOUNT_TYPE,SPECIAL_G_L_IND,TRANSACT_TYPE,DEBIT_CREDIT,AMOUNT_IN_LC,AMOUNT,[TEXT],VENDOR,PAYMENT_AMT,POSTING_DATE,_RFC,_SYNC_AT) VALUES (@dt,@co,@dn,@fy,@li,@pk,@at,@sg,@tt,@dc,@al,@am,@tx,@vn,@pa,@pd,@rf,GETDATE())'; $c2.Parameters.AddWithValue('@dt',[string]$row.DOCUMENT_TYPE)|Out-Null; $c2.Parameters.AddWithValue('@co',[string]$row.COMPANY_CODE)|Out-Null; $c2.Parameters.AddWithValue('@dn',[string]$row.DOCUMENT_NUMBER)|Out-Null; $c2.Parameters.AddWithValue('@fy',[string]$row.FISCAL_YEAR)|Out-Null; $c2.Parameters.AddWithValue('@li',[string]$row.LINE_ITEM)|Out-Null; $c2.Parameters.AddWithValue('@pk',[string]$row.POSTING_KEY)|Out-Null; $c2.Parameters.AddWithValue('@at',[string]$row.ACCOUNT_TYPE)|Out-Null; $c2.Parameters.AddWithValue('@sg',[string]$row.SPECIAL_G_L_IND)|Out-Null; $c2.Parameters.AddWithValue('@tt',[string]$row.TRANSACT_TYPE)|Out-Null; $c2.Parameters.AddWithValue('@dc',[string]$row.DEBIT_CREDIT)|Out-Null; $c2.Parameters.AddWithValue('@al',[decimal]($row.AMOUNT_IN_LC ?? 0))|Out-Null; $c2.Parameters.AddWithValue('@am',[decimal]($row.AMOUNT ?? 0))|Out-Null; $c2.Parameters.AddWithValue('@tx',[string]$row.TEXT)|Out-Null; $c2.Parameters.AddWithValue('@vn',[string]$row.VENDOR)|Out-Null; $c2.Parameters.AddWithValue('@pa',[decimal]($row.PAYMENT_AMT ?? 0))|Out-Null; try { $pd=[datetime]::ParseExact([string]$row.POSTING_DATE,'yyyyMMdd',$null); $c2.Parameters.AddWithValue('@pd',$pd)|Out-Null } catch { $c2.Parameters.AddWithValue('@pd',[DBNull]::Value)|Out-Null }; $c2.Parameters.AddWithValue('@rf','ZADVANCE_PAYMENT_RFC')|Out-Null; $c2.ExecuteNonQuery()|Out-Null; $n++ }; $conn.Close(); Write-Host "Inserted $n rows into DataV2.dbo.ET_ZADVANCE_PAYMENT""

      - name: STEP 4 - Verify API is live
        shell: cmd
        run: |
          timeout /t 3 /nobreak > nul
          curl -s "https://my-dab-app.azurewebsites.net/api/ET_ZADVANCE_PAYMENT" | findstr /C:"value" /C:"error"
          echo API check done
