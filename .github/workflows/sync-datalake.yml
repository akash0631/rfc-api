name: Sync SAP to Data Lake (No Build)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'Controllers/**'

jobs:
  sync:
    name: Create Table + Pull SAP + Expose API
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set PowerShell execution policy (best-effort)
        continue-on-error: true
        shell: cmd
        run: powershell.exe -Command "Set-ExecutionPolicy RemoteSigned -Scope LocalMachine -Force"

      - name: STEP 1 - Create SQL table ET_ZADVANCE_PAYMENT
        shell: powershell
        run: |
          $cs = 'Server=192.168.151.28,1433;Database=DataV2;User Id=sa;Password=vrl@55555;TrustServerCertificate=True;'
          $conn = New-Object System.Data.SqlClient.SqlConnection($cs)
          $conn.Open()
          Write-Host "Connected to DataV2"
          $sql = @"
          IF NOT EXISTS (SELECT * FROM sys.tables WHERE name='ET_ZADVANCE_PAYMENT')
          BEGIN
            CREATE TABLE dbo.ET_ZADVANCE_PAYMENT (
              ID            INT IDENTITY(1,1) PRIMARY KEY,
              DOCUMENT_TYPE NVARCHAR(10),
              COMPANY_CODE  NVARCHAR(10),
              DOCUMENT_NUMBER NVARCHAR(20),
              FISCAL_YEAR   NVARCHAR(10),
              LINE_ITEM     NVARCHAR(10),
              POSTING_KEY   NVARCHAR(10),
              ACCOUNT_TYPE  NVARCHAR(10),
              SPECIAL_G_L_IND NVARCHAR(10),
              TRANSACT_TYPE NVARCHAR(20),
              DEBIT_CREDIT  NVARCHAR(5),
              AMOUNT_IN_LC  DECIMAL(18,2),
              AMOUNT        DECIMAL(18,2),
              [TEXT]        NVARCHAR(200),
              VENDOR        NVARCHAR(20),
              PAYMENT_AMT   DECIMAL(18,2),
              POSTING_DATE  DATE,
              _RFC          NVARCHAR(50) DEFAULT 'ZADVANCE_PAYMENT_RFC',
              _SYNC_AT      DATETIME DEFAULT GETDATE()
            )
            PRINT 'Table created'
          END
          ELSE PRINT 'Table already exists'
"@
          $cmd = $conn.CreateCommand()
          $cmd.CommandText = $sql
          $cmd.ExecuteNonQuery() | Out-Null
          $conn.Close()
          Write-Host "STEP 1 complete - table ready"

      - name: STEP 2 - Call SAP RFC and save rows to file
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $body = '{"I_COMPANY_CODE":"1000","I_POSTING_DATE_LOW":"20250101","I_POSTING_DATE_HIGH":"20260313"}'
          Write-Host "Calling http://localhost/api/ZADVANCE_PAYMENT_RFC..."
          $resp = Invoke-RestMethod -Uri 'http://localhost/api/ZADVANCE_PAYMENT_RFC' -Method POST -Body $body -ContentType 'application/json' -TimeoutSec 120
          $rows = if ($resp.IT_FINAL) { $resp.IT_FINAL } else { $resp }
          if ($rows -isnot [array]) { $rows = @($rows) }
          Write-Host "SAP returned $($rows.Count) rows"
          $rows | ConvertTo-Json -Depth 3 | Out-File -FilePath 'C:\datalake_rows.json' -Encoding UTF8
          Write-Host "Saved to C:\datalake_rows.json"

      - name: STEP 3 - Insert rows into DataV2
        shell: powershell
        run: |
          $rows = Get-Content 'C:\datalake_rows.json' | ConvertFrom-Json
          if ($rows -isnot [array]) { $rows = @($rows) }
          Write-Host "Inserting $($rows.Count) rows..."
          $cs = 'Server=192.168.151.28,1433;Database=DataV2;User Id=sa;Password=vrl@55555;TrustServerCertificate=True;'
          $conn = New-Object System.Data.SqlClient.SqlConnection($cs)
          $conn.Open()
          $trunc = $conn.CreateCommand()
          $trunc.CommandText = 'TRUNCATE TABLE dbo.ET_ZADVANCE_PAYMENT'
          $trunc.ExecuteNonQuery() | Out-Null
          $n = 0
          foreach ($row in $rows) {
            $c = $conn.CreateCommand()
            $c.CommandText = 'INSERT INTO dbo.ET_ZADVANCE_PAYMENT (DOCUMENT_TYPE,COMPANY_CODE,DOCUMENT_NUMBER,FISCAL_YEAR,LINE_ITEM,POSTING_KEY,ACCOUNT_TYPE,SPECIAL_G_L_IND,TRANSACT_TYPE,DEBIT_CREDIT,AMOUNT_IN_LC,AMOUNT,[TEXT],VENDOR,PAYMENT_AMT,POSTING_DATE,_RFC,_SYNC_AT) VALUES (@dt,@co,@dn,@fy,@li,@pk,@at,@sg,@tt,@dc,@al,@am,@tx,@vn,@pa,@pd,@rf,GETDATE())'
            $c.Parameters.AddWithValue('@dt', [string]$row.DOCUMENT_TYPE)  | Out-Null
            $c.Parameters.AddWithValue('@co', [string]$row.COMPANY_CODE)   | Out-Null
            $c.Parameters.AddWithValue('@dn', [string]$row.DOCUMENT_NUMBER)| Out-Null
            $c.Parameters.AddWithValue('@fy', [string]$row.FISCAL_YEAR)    | Out-Null
            $c.Parameters.AddWithValue('@li', [string]$row.LINE_ITEM)      | Out-Null
            $c.Parameters.AddWithValue('@pk', [string]$row.POSTING_KEY)    | Out-Null
            $c.Parameters.AddWithValue('@at', [string]$row.ACCOUNT_TYPE)   | Out-Null
            $c.Parameters.AddWithValue('@sg', [string]$row.SPECIAL_G_L_IND)| Out-Null
            $c.Parameters.AddWithValue('@tt', [string]$row.TRANSACT_TYPE)  | Out-Null
            $c.Parameters.AddWithValue('@dc', [string]$row.DEBIT_CREDIT)   | Out-Null
            $c.Parameters.AddWithValue('@al', [decimal]$(if ($null -ne $row.AMOUNT_IN_LC) {$row.AMOUNT_IN_LC} else {0})) | Out-Null
            $c.Parameters.AddWithValue('@am', [decimal]$(if ($null -ne $row.AMOUNT)       {$row.AMOUNT}       else {0})) | Out-Null
            $c.Parameters.AddWithValue('@tx', [string]$row.TEXT)           | Out-Null
            $c.Parameters.AddWithValue('@vn', [string]$row.VENDOR)         | Out-Null
            $c.Parameters.AddWithValue('@pa', [decimal]$(if ($null -ne $row.PAYMENT_AMT)  {$row.PAYMENT_AMT}  else {0})) | Out-Null
            try {
              $pd = [datetime]::ParseExact([string]$row.POSTING_DATE,'yyyyMMdd',$null)
              $c.Parameters.AddWithValue('@pd', $pd) | Out-Null
            } catch {
              $c.Parameters.AddWithValue('@pd', [DBNull]::Value) | Out-Null
            }
            $c.Parameters.AddWithValue('@rf', 'ZADVANCE_PAYMENT_RFC') | Out-Null
            $c.ExecuteNonQuery() | Out-Null
            $n++
          }
          $conn.Close()
          Write-Host "Inserted $n rows into DataV2.dbo.ET_ZADVANCE_PAYMENT"

      - name: STEP 4 - Verify via DAB API
        shell: cmd
        run: |
          timeout /t 4 /nobreak > nul
          curl -s "https://my-dab-app.azurewebsites.net/api/ET_ZADVANCE_PAYMENT?$top=3"
          echo.
          echo SYNC COMPLETE
