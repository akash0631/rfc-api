name: GET_URL_V3
on:
  push:
    paths:
      - '.github/workflows/get_url_v3.yml'
jobs:
  get_url:
    runs-on: [self-hosted, iis]
    steps:
      - name: Start tunnel and get URL
        shell: powershell
        run: |
          $logFile = "C:\cloudflared\tunnel.log"
          $cfPath = "C:\cloudflared\cloudflared.exe"
          
          # Kill any existing cloudflared
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep 3
          
          # Remove old log
          Remove-Item $logFile -ErrorAction SilentlyContinue
          
          # Start cloudflared as background job
          $job = Start-Job -ScriptBlock {
            param($cf, $log)
            & $cf tunnel --url http://localhost:9292 --logfile $log --no-autoupdate
          } -ArgumentList $cfPath, $logFile
          
          Write-Host "Started cloudflared job: $($job.Id)"
          
          # Poll using Get-Content which handles file locks
          $url = ""
          for ($i = 0; $i -lt 40; $i++) {
            Start-Sleep 2
            Write-Host "Poll $i..."
            try {
              # Use Get-Content with -Raw in try/catch for locked file
              $content = ""
              try { $content = Get-Content $logFile -Raw -ErrorAction Stop } 
              catch { 
                # File locked - use copy trick
                $tmp = "C:\cloudflared\tunnel_tmp.log"
                Copy-Item $logFile $tmp -ErrorAction SilentlyContinue
                if (Test-Path $tmp) { $content = Get-Content $tmp -Raw -ErrorAction SilentlyContinue }
              }
              
              if ($content) {
                # Look for URL in JSON format: "url":"https://..."
                $m = [regex]::Match($content, '"url"\s*:\s*"(https://[a-z0-9\-]+\.trycloudflare\.com)"')
                if (-not $m.Success) {
                  $m = [regex]::Match($content, 'https://[a-z0-9\-]+\.trycloudflare\.com')
                }
                if ($m.Success) {
                  $url = if ($m.Groups.Count -gt 1 -and $m.Groups[1].Value) { $m.Groups[1].Value } else { $m.Value }
                  Write-Host "=== TUNNEL URL FOUND: $url ==="
                  break
                }
              }
            } catch { Write-Host "Poll error: $_" }
          }
          
          if (-not $url) {
            Write-Host "=== FAILED - LOG DUMP ==="
            $tmp = "C:\cloudflared\tunnel_tmp.log"
            Copy-Item $logFile $tmp -ErrorAction SilentlyContinue
            Get-Content $tmp -ErrorAction SilentlyContinue | Select-Object -Last 30
            exit 1
          }
          
          # Save URL
          $url | Out-File "C:\cloudflared\tunnel_url.txt" -Force
          Write-Host "Saved URL: $url"
          Start-Sleep 5
          
          # TEST SAP VIA TUNNEL
          Write-Host "=== TESTING SAP ==="
          $body = '{"PO_NO":"4500001234","DELV_DATE":"20260401"}'
          try {
            $r = Invoke-WebRequest "$url/api/ZPO_DD_UPD_RFC/Post" -Method POST -Body $body -ContentType "application/json" -UseBasicParsing -TimeoutSec 25
            Write-Host "=== SAP RESPONSE: $($r.Content) ==="
          } catch { Write-Host "SAP test error: $_" }
          
          Write-Host "=== FINAL TUNNEL URL: $url ==="
