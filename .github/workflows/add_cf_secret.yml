name: ADD_CF_SECRET_TO_WORKER
on:
  push:
    paths:
      - '.github/workflows/add_cf_secret.yml'
jobs:
  add_secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install wrangler
        run: npm install -g wrangler@latest
      
      - name: Add CF API Key secret to worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_KEY_VALUE: ${{ secrets.CF_API_KEY }}
          CF_EMAIL_VALUE: ${{ secrets.CLOUDFLARE_EMAIL }}
        run: |
          # List current worker secrets
          echo "=== Current worker secrets ==="
          wrangler secret list --name v2-rfc-pipeline 2>&1 || true
          
          # Try to add CF API key as CLOUDFLARE_API_KEY secret on the worker
          # Use the Global API key if available
          if [ -n "$CF_API_KEY_VALUE" ]; then
            echo "Adding CF_API_KEY..."
            echo "$CF_API_KEY_VALUE" | wrangler secret put CLOUDFLARE_API_KEY --name v2-rfc-pipeline
            echo "Done: $?"
          elif [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Adding CLOUDFLARE_API_TOKEN as CLOUDFLARE_API_KEY..."
            echo "$CLOUDFLARE_API_TOKEN" | wrangler secret put CLOUDFLARE_API_KEY --name v2-rfc-pipeline
            echo "Done: $?"
          else
            echo "ERROR: No CF key available"
            exit 1
          fi
          
          echo "=== Secrets after update ==="
          wrangler secret list --name v2-rfc-pipeline 2>&1 || true
